      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.95 · Thema7 · 예시문제1</span><br><span data-figure='pending' style='display:inline-block;margin:0.4rem 0;padding:0.35rem 0.7rem;border:1px dashed #f59e0b;border-radius:0.5rem;color:#f59e0b;font-size:0.78rem;font-weight:700'>📷 교재 그림 자리 — 나중에 여기에 그림 삽입 (data-figure)</span><br>Q12. 교재 그림의 함수 \\(f(x),\\ g(x)\\)에 대하여 다음 함수가 \\(x=1\\)에서 연속인지 판별하시오.<br>① \\(f(x)+g(x)\\)<br>② \\(f(x)g(x)\\)<br>풀이 과정에서 각각 좌극한, 우극한, 함숫값을 비교하시오.", answer: "O", hint: "각 합·곱의 좌극한·우극한·함숫값 비교", explanation: "각 함수에 대해 \\(x=1\\)에서의 좌극한, 우극한, 함숫값을 그림에서 읽어 계산한 뒤 세 값이 같으면 연속, 다르면 불연속으로 판별한다. (구체적 값은 교재 그림에 따름.)" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.96~97 · Thema7 · 스킬2</span><br>Q13. 불연속 함수와 연속 함수의 곱이 연속이 되는 조건을 말하시오.<br>① \\(x=a\\)에서 \\(f(x)\\)가 불연속이고 \\(g(x)\\)가 연속일 때, \\(f(x)g(x)\\)가 \\(x=a\\)에서 연속이려면 \\(g(a)\\)는 무엇이어야 하는가?<br>② 왜 연속인 함수의 값이 \\(0\\)이면 곱함수가 연속이 될 수 있는지 설명하시오.<br>③ \\((x-1)f(x)\\)가 \\(x=1\\)에서 연속인 이유를 위 조건으로 설명하시오.", answer: "O", hint: "g(a)=0", explanation: "① \\(g(a)=0\\)<br>② \\(f\\)의 좌·우극한이 서로 다르더라도(유한하면) 각각에 \\(g(a)=0\\)을 곱하면 양쪽 모두 \\(0\\)이 되어 좌극한=우극한=함숫값\\(=0\\)이 되므로 곱함수가 연속이 될 수 있다.<br>③ \\(g(x)=x-1\\)은 연속이고 \\(g(1)=0\\)이므로, \\(f\\)가 \\(x=1\\)에서 불연속(유한한 점프)이어도 \\((x-1)f(x)\\)는 \\(x=1\\)에서 \\(0\\)으로 연속이 된다." },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.97 · Thema7 · 예시문제2</span><br>Q14. 최고차항의 계수가 \\(1\\)인 이차함수 \\(f(x)\\)에 대하여 \\(g(x)=-2x\\ (x<-1),\\quad g(x)=1\\ (-1\\le x\\le2),\\quad g(x)=\\dfrac{3}{2}x\\ (x>2)\\)일 때, 함수 \\(f(x)g(x)\\)가 모든 실수에서 연속이다. \\(f(1)\\)의 값을 구하시오.", answer: "O", hint: "g의 불연속점 x=−1, 2에서 f=0", explanation: "\\(g\\)는 \\(x=-1\\)(값 \\(2\\to1\\))과 \\(x=2\\)(값 \\(1\\to3\\))에서 불연속.<br>\\(f(x)g(x)\\)가 연속이려면 그 점에서 \\(f=0\\): \\(f(-1)\\cdot2=f(-1)\\cdot1\\) → \\(f(-1)=0\\), \\(f(2)\\cdot1=f(2)\\cdot3\\) → \\(f(2)=0\\).<br>\\(f\\)는 최고차항 계수 \\(1\\)인 이차함수이므로 \\(f(x)=(x+1)(x-2)\\), \\(f(1)=(2)(-1)=-2\\)." },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.98 · Thema7 · 예시문제8</span><br><span data-figure='pending' style='display:inline-block;margin:0.4rem 0;padding:0.35rem 0.7rem;border:1px dashed #f59e0b;border-radius:0.5rem;color:#f59e0b;font-size:0.78rem;font-weight:700'>📷 교재 그림 자리 — 나중에 여기에 그림 삽입 (data-figure)</span><br>Q15. 열린구간 \\((-2,\\ 2)\\)에서 정의된 함수 \\(y=f(x)\\)의 그래프가 교재 그림과 같다. 열린구간 \\((-2,\\ 2)\\)에서 함수 \\(g(x)\\)를 \\(g(x)=f(x)+f(-x)\\)로 정의할 때, [보기]에서 옳은 것을 모두 고르시오.<br>[보기]<br>ㄱ. \\(\\lim\\limits_{x\\to0}f(x)\\)가 존재한다.<br>ㄴ. \\(\\lim\\limits_{x\\to0}g(x)\\)가 존재한다.<br>ㄷ. 함수 \\(g(x)\\)는 \\(x=1\\)에서 연속이다.<br>① ㄴ  ② ㄷ  ③ ㄱ, ㄴ  ④ ㄱ, ㄷ  ⑤ ㄴ, ㄷ", answer: "O", hint: "g(x)=f(x)+f(−x)는 우함수(짝함수)", explanation: "\\(g(-x)=f(-x)+f(x)=g(x)\\)이므로 \\(g\\)는 우함수(짝함수)이다. 따라서 \\(x=0\\)에서 좌극한과 우극한이 항상 같아 ㄴ은 그림과 무관하게 성립한다. ㄱ·ㄷ은 교재 그림에서 \\(x=0,\\ 1\\) 부근의 좌·우극한과 함숫값을 읽어 판단한다. (구체적 정답은 교재 그림에 따름.)" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.99 · Thema7 · 예시문제9</span><br>Q16. 함수 \\(f(x)=-2x+6\\ (x<a),\\quad f(x)=2x-a\\ (x\\ge a)\\)에 대하여 함수 \\(\\{f(x)\\}^2\\)이 실수 전체의 집합에서 연속이 되도록 하는 모든 상수 \\(a\\)의 값의 합을 구하시오.<br>① \\(2\\)  ② \\(4\\)  ③ \\(6\\)  ④ \\(8\\)  ⑤ \\(10\\)", answer: "O", hint: "좌극한²=우극한²", explanation: "\\(x=a\\)에서 \\(\\{f\\}^2\\)이 연속: 좌극한 \\((-2a+6)^2\\) = 함숫값 \\((2a-a)^2=a^2\\).<br>\\((-2a+6)^2=a^2\\) → \\(3a^2-24a+36=0\\) → \\(a^2-8a+12=0\\) → \\((a-2)(a-6)=0\\) → \\(a=2\\) 또는 \\(a=6\\).<br>합 \\(=8\\). 정답 ④" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.99 · Thema7 · 예시문제10</span><br>Q17. 두 함수 \\(f(x)=x^2-4x+6\\ (x<2),\\quad f(x)=1\\ (x\\ge2)\\)와 \\(g(x)=ax+1\\)에 대하여 함수 \\(\\dfrac{g(x)}{f(x)}\\)가 실수 전체의 집합에서 연속일 때, 상수 \\(a\\)의 값을 구하시오.<br>① \\(-\\dfrac{5}{4}\\)  ② \\(-1\\)  ③ \\(-\\dfrac{3}{4}\\)  ④ \\(-\\dfrac{1}{2}\\)  ⑤ \\(-\\dfrac{1}{4}\\)", answer: "O", hint: "x=2에서 f가 2→1로 점프", explanation: "\\(f(x)=x^2-4x+6=(x-2)^2+2>0\\)이므로 분모는 \\(0\\)이 아니고, 의심점은 \\(f\\)가 점프하는 \\(x=2\\).<br>\\(f\\)의 좌극한 \\(=2\\), 우극한·함숫값 \\(=1\\). \\(\\dfrac{g}{f}\\) 연속: \\(\\dfrac{g(2)}{2}=\\dfrac{g(2)}{1}\\) → \\(g(2)=0\\) → \\(2a+1=0\\) → \\(a=-\\dfrac{1}{2}\\). 정답 ④" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.100 · Thema7 · 예시문제11</span><br>Q18. 최고차항의 계수가 \\(1\\)인 이차함수 \\(f(x)\\)와 함수 \\(g(x)=-1\\ (x\\le0),\\quad g(x)=-x+1\\ (0<x<2),\\quad g(x)=1\\ (x\\ge2)\\)에 대하여 함수 \\(f(x)g(x)\\)가 실수 전체의 집합에서 연속이다. \\(f(5)\\)의 값을 구하시오.<br>① \\(15\\)  ② \\(17\\)  ③ \\(19\\)  ④ \\(21\\)  ⑤ \\(23\\)", answer: "O", hint: "g의 불연속점 x=0, 2에서 f=0", explanation: "\\(g\\)는 \\(x=0\\)(값 \\(-1\\to1\\))과 \\(x=2\\)(값 \\(-1\\to1\\))에서 불연속.<br>\\(f(x)g(x)\\) 연속: \\(x=0\\)에서 \\(-f(0)=f(0)\\) → \\(f(0)=0\\); \\(x=2\\)에서 \\(-f(2)=f(2)\\) → \\(f(2)=0\\).<br>\\(f(x)=x(x-2)=x^2-2x\\), \\(f(5)=25-10=15\\). 정답 ①" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.101 · Thema7 · 예시문제12</span><br>Q19. 두 함수 \\(f(x)=\\dfrac{1}{x-1}\\ (x<1),\\quad f(x)=\\dfrac{1}{2x+1}\\ (x\\ge1)\\)와 \\(g(x)=2x^3+ax+b\\)에 대하여 함수 \\(f(x)g(x)\\)가 실수 전체의 집합에서 연속일 때, \\(b-a\\)의 값을 구하시오. (단, \\(a,\\ b\\)는 상수이다.)<br>① \\(10\\)  ② \\(9\\)  ③ \\(8\\)  ④ \\(7\\)  ⑤ \\(6\\)", answer: "O", hint: "x=1에서 좌쪽이 발산하지 않도록 g(1)=0", explanation: "\\(x<1\\)에서 \\(f(x)g(x)=\\dfrac{g(x)}{x-1}\\)이 \\(x\\to1^{-}\\)에서 발산하지 않으려면 \\(g(1)=0\\): \\(2+a+b=0\\).<br>이때 좌극한 \\(=\\lim\\limits_{x\\to1}\\dfrac{g(x)}{x-1}=g'(1)=6+a\\), 우극한·함숫값 \\(=\\dfrac{g(1)}{3}=0\\).<br>연속: \\(6+a=0\\) → \\(a=-6\\), 따라서 \\(b=4\\). \\(b-a=4-(-6)=10\\). 정답 ①" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.102 · Thema7 · 예시문제13</span><br><span data-figure='pending' style='display:inline-block;margin:0.4rem 0;padding:0.35rem 0.7rem;border:1px dashed #f59e0b;border-radius:0.5rem;color:#f59e0b;font-size:0.78rem;font-weight:700'>📷 교재 그림 자리 — 나중에 여기에 그림 삽입 (data-figure)</span><br>Q20. 실수 전체의 집합에서 정의된 함수 \\(y=f(x)\\)의 그래프의 일부가 교재 그림과 같을 때, [보기]에서 옳은 것만을 있는 대로 고르시오.<br>[보기]<br>ㄱ. \\(\\lim\\limits_{x\\to-1}f(x)=2\\)<br>ㄴ. \\(\\lim\\limits_{x\\to-1^{+}}f(-x)=f(1)\\)<br>ㄷ. 함수 \\(f(x)f(x+1)\\)은 \\(x=0\\)에서 연속이다.<br>① ㄱ  ② ㄴ  ③ ㄱ, ㄷ  ④ ㄴ, ㄷ  ⑤ ㄱ, ㄴ, ㄷ", answer: "O", hint: "각 보기의 극한·연속을 그림에서 읽어 판단", explanation: "ㄱ은 \\(x=-1\\)에서 좌·우극한이 모두 \\(2\\)인지, ㄴ은 \\(f(-x)\\)의 \\(x\\to-1^{+}\\) 극한(즉 \\(f\\)의 \\(x\\to1^{-}\\) 극한)과 \\(f(1)\\)의 비교, ㄷ은 \\(f(x)f(x+1)\\)의 \\(x=0\\)에서 좌·우극한·함숫값을 그림에서 읽어 판단한다. (구체적 정답은 교재 그림에 따름.)" },
    ] },
    { id: 6, name: "6강", questions: [
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.103 · Thema8 · 개념</span><br>Q1. 합성함수의 핵심 키워드 2가지를 빈칸에 맞게 쓰시오.<br>① 합성함수는 함수가 두 번 정의되는 __________ 구조이다.<br>② 합성함수의 극한이나 연속성을 판단할 때는 최종값만 보지 말고 __________을 기록해야 한다.", answer: "O", hint: "중첩 / 과정", explanation: "① 중첩(함수 안에 함수)<br>② 과정(중간 극한값과 접근 방향)" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.103 · Thema8 · 개념</span><br>Q2. 합성함수 \\((f\\circ g)(x)\\)에 대해 다음 질문에 답하시오.<br>① \\((f\\circ g)(x)\\)는 \\(x\\)를 먼저 어느 함수에 넣는가?<br>② ①의 결과를 다시 어느 함수에 넣는가?<br>③ \\((f\\circ g)(x)\\)에서 \\(f\\)의 정의역은 \\(g\\)의 무엇과 연결되는가?<br>④ \\((f\\circ g)(x)\\)의 정의역은 어느 함수의 정의역과 같은가?", answer: "O", hint: "안쪽 g 먼저 → 바깥 f", explanation: "① 안쪽 함수 \\(g\\)<br>② 바깥 함수 \\(f\\)<br>③ \\(g\\)의 치역(함숫값)<br>④ 안쪽 함수 \\(g\\)의 정의역" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.103 · Thema8 · 개념</span><br>Q3. 합성함수의 연속성에 대해 O/X로 판단하시오.<br>① \\(f(x)\\)가 \\(x=a\\)에서 연속이고, \\(g(x)\\)가 \\(x=a\\)에서 연속이면 \\((g\\circ f)(x)\\)는 \\(x=a\\)에서 항상 연속이다.<br>② \\(f(x)\\)가 \\(x=a\\)에서 연속이고, \\(g(x)\\)가 \\(x=f(a)\\)에서 연속이면 \\((g\\circ f)(x)\\)는 \\(x=a\\)에서 연속이다.<br>③ \\(g(x)\\)가 \\(x=a\\)에서 연속이어도, \\(x=f(a)\\)에서 연속인지 모르면 \\((g\\circ f)(x)\\)의 연속성을 바로 판단할 수 없다.", answer: "O", hint: "바깥 g는 f(a)에서 연속이어야", explanation: "① X (\\(g\\)는 \\(x=a\\)가 아니라 \\(x=f(a)\\)에서 연속이어야 한다.)<br>② O (올바른 합성함수 연속 조건)<br>③ O" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.103 · Thema8 · 예시문제1</span><br>Q4. 다음 두 함수에 대하여 \\(x=2\\)에서 \\((g\\circ f)(x)\\)가 연속인지 판별하시오.<br>\\(f(x)=x+1\\)<br>\\(g(x)=x\\ (x\\ge3),\\quad g(x)=x-1\\ (x<3)\\)<br>풀이 과정에서 다음을 확인하시오.<br>① \\(\\lim\\limits_{x\\to2^{-}}(g\\circ f)(x)\\)<br>② \\(\\lim\\limits_{x\\to2^{+}}(g\\circ f)(x)\\)<br>③ \\(x=2\\)에서 연속인지 여부", answer: "O", hint: "f(2)=3, g의 경계가 3", explanation: "\\((g\\circ f)(x)=g(x+1)\\), \\(f(2)=3\\).<br>① \\(x\\to2^{-}\\): \\(x+1\\to3^{-}(<3)\\)이므로 \\(g=x-1\\) 사용 → \\(3-1=2\\)<br>② \\(x\\to2^{+}\\): \\(x+1\\to3^{+}(\\ge3)\\)이므로 \\(g=x\\) 사용 → \\(3\\)<br>③ 좌극한 \\(2\\ne\\) 우극한 \\(3\\)이므로 \\(x=2\\)에서 불연속" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.104 · Thema8 · 참고7</span><br>Q5. 합성함수의 연속성에 대해 다음 빈칸을 채우시오.<br>① (연속∘연속)\\(=\\)__________은 무조건 성립한다.<br>② (불연속∘불연속), (불연속∘연속), (연속∘불연속)은 바로 판단하지 말고 직접 __________을 따져야 한다.<br>③ 직접 연속성을 따진다는 것은 좌극한, 우극한, __________을 비교한다는 뜻이다.", answer: "O", hint: "연속 / 연속성 / 함숫값", explanation: "① 연속<br>② 연속성<br>③ 함숫값" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.104 · Thema8 · 예시문제2</span><br>Q6. 다음 두 함수에 대하여 \\(x=0\\)에서 \\((g\\circ f)(x)\\)가 연속인지 판별하시오.<br>\\(f(x)=1\\ (x\\ge0),\\quad f(x)=-1\\ (x<0)\\)<br>\\(g(x)=x^2-1\\)<br>풀이 과정에서 다음을 확인하시오.<br>① \\(\\lim\\limits_{x\\to0^{-}}(g\\circ f)(x)\\)<br>② \\(\\lim\\limits_{x\\to0^{+}}(g\\circ f)(x)\\)<br>③ \\((g\\circ f)(0)\\)<br>④ \\(x=0\\)에서 연속인지 여부", answer: "O", hint: "f는 ±1, g(±1)=0", explanation: "\\((g\\circ f)(x)=\\{f(x)\\}^2-1\\). \\(f(x)=\\pm1\\)이므로 어느 경우든 \\((\\pm1)^2-1=0\\).<br>① \\(0\\)<br>② \\(0\\)<br>③ \\((g\\circ f)(0)=g(1)=0\\)<br>④ 좌극한=우극한=함숫값\\(=0\\)이므로 \\(x=0\\)에서 연속" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.105 · Thema8 · 발상&알고리즘8</span><br>Q7. \\((f\\circ g)(x)\\)의 불연속 의심점은 어떻게 찾는지 말하시오.<br>① \\(g(x)\\)가 \\(x=a\\)에서 불연속이면, \\((f\\circ g)(x)\\)의 불연속 의심점으로 어떤 \\(x\\)값을 확인해야 하는가?<br>② \\(f(x)\\)가 \\(x=a\\)에서 불연속이면, \\((f\\circ g)(x)\\)의 불연속 의심점으로 어떤 방정식의 실근을 확인해야 하는가?<br>③ \\(f(x)\\)가 \\(x=a,\\ x=b\\)에서 불연속이고 \\(g(x)\\)가 \\(x=c,\\ x=d\\)에서 불연속이면, \\((f\\circ g)(x)\\)의 불연속 의심점 후보를 모두 말하시오.", answer: "O", hint: "안쪽 불연속점 + g(x)=(바깥 불연속점)의 근", explanation: "① \\(x=a\\) (안쪽 \\(g\\)의 불연속점)<br>② \\(g(x)=a\\)의 실근 (안쪽 값이 바깥의 불연속점 \\(a\\)에 닿는 \\(x\\))<br>③ \\(x=c,\\ x=d\\)(\\(g\\)의 불연속점)와 \\(g(x)=a,\\ g(x)=b\\)의 실근 모두" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.106 · Thema8 · 예시문제14</span><br><span data-figure='pending' style='display:inline-block;margin:0.4rem 0;padding:0.35rem 0.7rem;border:1px dashed #f59e0b;border-radius:0.5rem;color:#f59e0b;font-size:0.78rem;font-weight:700'>📷 교재 그림 자리 — 나중에 여기에 그림 삽입 (data-figure)</span><br>Q8. 실수 전체의 집합에서 정의된 함수 \\(f(x)\\)의 그래프가 교재 그림과 같다. 합성함수 \\((f\\circ f)(x)\\)가 \\(x=a\\)에서 불연속이 되는 모든 \\(a\\)의 값의 합을 구하시오. (단, \\(0\\le a\\le6\\)이다.)", answer: "O", hint: "f의 불연속점 + f(x)=(f의 불연속점)의 x", explanation: "그림에서 \\(f\\)의 불연속점과, \\(f(x)\\)가 \\(f\\)의 불연속점 값에 닿는 \\(x\\)들을 의심점으로 찾아 각각 좌·우극한·함숫값을 비교해 실제 불연속인 \\(a\\)를 정한 뒤 합을 구한다. (구체적 값은 교재 그림에 따름.)" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.107 · Thema8 · 예시문제15</span><br><span data-figure='pending' style='display:inline-block;margin:0.4rem 0;padding:0.35rem 0.7rem;border:1px dashed #f59e0b;border-radius:0.5rem;color:#f59e0b;font-size:0.78rem;font-weight:700'>📷 교재 그림 자리 — 나중에 여기에 그림 삽입 (data-figure)</span><br>Q9. 두 함수 \\(y=f(x),\\ y=g(x)\\)의 그래프가 교재 그림과 같을 때, [보기]에서 옳은 것을 모두 고르시오.<br>[보기]<br>ㄱ. 함수 \\(f(x)g(x)\\)는 \\(x=1\\)에서 연속이다.<br>ㄴ. 함수 \\((f\\circ g)(x)\\)는 \\(x=0\\)에서 연속이다.<br>ㄷ. 함수 \\((g\\circ f)(x)\\)는 \\(x=-1\\)에서 연속이다.<br>① ㄱ  ② ㄴ  ③ ㄱ, ㄷ  ④ ㄴ, ㄷ  ⑤ ㄱ, ㄴ, ㄷ", answer: "O", hint: "각 함수의 해당 점 좌·우극한·함숫값 비교", explanation: "그림에서 각 함수의 해당 점에서의 좌극한·우극한·함숫값을 읽어 세 값이 같은지 판별한다. (구체적 정답은 교재 그림에 따름.)" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.108 · Thema8 · 예시문제16</span><br>Q10. 다음 함수 \\(f(x)\\)에 대하여 [보기]에서 옳은 것을 모두 고르시오.<br>\\(f(x)=x^2-2x-1\\ (x<1),\\quad f(x)=1\\ (x=1),\\quad f(x)=-x^2+2x+1\\ (x>1)\\)<br>[보기]<br>ㄱ. \\(\\lim\\limits_{x\\to1}|f(x)|=2\\)<br>ㄴ. \\(\\lim\\limits_{x\\to2^{+}}f(f(x))=-2\\)<br>ㄷ. 함수 \\(y=f(f(x))\\)의 불연속점의 개수는 \\(3\\)개이다.<br>① ㄱ  ② ㄷ  ③ ㄱ, ㄴ  ④ ㄴ, ㄷ  ⑤ ㄱ, ㄴ, ㄷ", answer: "O", hint: "좌극한 −2, 우극한 2, f(1)=1", explanation: "\\(x=1\\)에서 좌극한 \\(-2\\), 우극한 \\(2\\), \\(f(1)=1\\).<br>ㄱ: \\(|f|\\)의 좌·우극한이 모두 \\(|-2|=|2|=2\\) → \\(2\\) (참)<br>ㄴ: \\(x\\to2^{+}\\)에서 \\(f(x)\\to1^{-}\\), 바깥 \\(f\\)는 \\(1^{-}\\)에서 \\(-2\\) → \\(-2\\) (참)<br>ㄷ: \\(f(x)=1\\)이 되는 \\(x=1-\\sqrt{3},\\ 1,\\ 2\\)에서 \\(f(f(x))\\)가 모두 불연속 → \\(3\\)개 (참)<br>따라서 정답 ⑤ ㄱ, ㄴ, ㄷ" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.109 · Thema9 · 개념</span><br>Q11. 주기함수의 연속성에 대해 다음 질문에 답하시오.<br>① 모든 실수 \\(x\\)에 대하여 \\(f(x+p)=f(x)\\)를 만족하면 \\(p\\)는 함수 \\(f(x)\\)의 무엇인가?<br>② \\(f(x)\\)가 구간 \\((a,\\ a+p)\\)에서 연속이고 \\(f(x+p)=f(x)\\)를 만족할 때, \\(f(x)\\)가 실수 전체에서 연속이 되기 위해 집중해야 할 지점은 어디인가?<br>③ 주기함수를 연속함수로 만들 때 제거해야 하는 것은 무엇인가?<br>④ 주기함수에서 구간의 양 끝점의 함숫값은 어떤 관계가 되어야 하는가?", answer: "O", hint: "주기 / 구간 경계(이음새) / 불연속점 / 같아야", explanation: "① 주기<br>② 구간이 이어지는 경계(이음새)·끝점<br>③ 불연속점<br>④ 서로 같아야 한다" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.109 · Thema9 · 참고8</span><br>Q12. 주기함수에 대해 다음 문장이 맞으면 O, 틀리면 X로 판단하시오.<br>① 주기함수는 식이 반복되는 개념이다.<br>② 주기함수는 그래프가 반복되는 개념이다.<br>③ \\(f(x+2)=f(x)\\)일 때, \\(f(3)\\)의 값은 \\(f(1)\\)의 값과 같다.<br>④ 주기함수 문제에서 구간 밖의 값을 구할 때는 먼저 주기만큼 이동하여 주어진 구간 안의 값으로 바꾸는 것이 좋다.", answer: "O", hint: "①X ②O ③O ④O", explanation: "① X (식이 아니라 함숫값·그래프가 반복된다)<br>② O<br>③ O (\\(f(3)=f(1+2)=f(1)\\))<br>④ O" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.109 · Thema9 · 예시문제1</span><br>Q13. 모든 실수 \\(x\\)에 대하여 연속인 함수 \\(f(x)\\)가 \\(f(x+2)=f(x)\\)를 만족하고, 닫힌구간 \\([-1,\\ 1]\\)에서 \\(f(x)=-x\\ (-1\\le x<0),\\quad f(x)=x\\ (0\\le x\\le1)\\)로 정의된다. \\(f(3)\\)의 값을 구하시오.", answer: "O", hint: "주기 2로 구간 안으로 이동", explanation: "\\(f(3)=f(3-2)=f(1)\\). \\(0\\le x\\le1\\)에서 \\(f(x)=x\\)이므로 \\(f(1)=1\\). 따라서 \\(f(3)=1\\)." },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.110 · Thema9 · 예시문제2</span><br>Q14. 모든 실수 \\(x\\)에 대하여 연속인 함수 \\(f(x)\\)가 \\(f(x+4)=f(x)\\)를 만족하고, 닫힌구간 \\([0,\\ 4]\\)에서 \\(f(x)=3x\\ (0\\le x<1),\\quad f(x)=x^2+ax+b\\ (1\\le x\\le4)\\)로 정의된다. \\(f(10)\\)의 값을 구하시오. 풀이 과정에서 다음을 확인하시오.<br>① \\(f(10)\\)을 주기를 이용하여 어떤 값으로 바꿀 수 있는가?<br>② \\(x=1\\)에서 연속이 되기 위한 식<br>③ 구간의 양 끝점에서 연속이 되기 위한 식<br>④ \\(f(10)\\)의 값", answer: "O", hint: "f(10)=f(2), x=1과 x=4(=x=0) 연속", explanation: "① \\(f(10)=f(10-8)=f(2)\\)<br>② \\(x=1\\): \\(3\\cdot1=1+a+b\\) → \\(a+b=2\\)<br>③ \\(x=4\\)(주기로 \\(x=0\\)과 연결): \\(f(4)=f(0)=0\\) → \\(16+4a+b=0\\)<br>④ 두 식을 풀면 \\(a=-6,\\ b=8\\). \\(f(2)=4+2a+b=4-12+8=0\\) → \\(f(10)=0\\)" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.111 · Thema9 · 예시문제17</span><br>Q15. 연속함수 \\(f(x)\\)가 다음 조건을 만족한다.<br>(가) 모든 실수 \\(x\\)에 대하여 \\(f(x+5)=f(x)\\)<br>(나) \\(f(x)=2x+a\\ (-2\\le x<1),\\quad f(x)=x^2+bx+3\\ (1\\le x\\le3)\\)<br>\\(f(2011)\\)의 값을 구하시오.<br>① \\(-9\\)  ② \\(-7\\)  ③ \\(-5\\)  ④ \\(-3\\)  ⑤ \\(-1\\)", answer: "O", hint: "주기 5, 2011=5·402+1 → f(1)", explanation: "\\(2011=5\\times402+1\\)이므로 \\(f(2011)=f(1)\\).<br>\\(x=1\\) 연속: \\(2+a=1+b+3\\) → \\(a-b=2\\). 양 끝점(주기) \\(f(-2)=f(3)\\): \\(-4+a=12+3b\\) → \\(a-3b=16\\).<br>두 식을 풀면 \\(b=-7,\\ a=-5\\). \\(f(1)=1+b+3=4-7=-3\\). 정답 ④" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.112 · Thema10 · 개념</span><br>Q16. 최대·최소 정리에 대해 다음 질문에 답하시오.<br>① 함수 \\(f(x)\\)가 어떤 구간에서 어떤 조건을 만족하면 반드시 최댓값과 최솟값을 갖는가?<br>② 최대·최소 정리가 성립하려면 구간은 열린구간인가, 닫힌구간인가?<br>③ 최대·최소 정리가 성립하려면 함수는 그 구간에서 어떤 상태여야 하는가?<br>④ 함수가 연속이 아니거나 열린구간에서 정의되면 최댓값 또는 최솟값은 반드시 존재하는가?", answer: "O", hint: "닫힌구간 + 연속", explanation: "① 닫힌구간에서 연속이면 반드시 최댓값·최솟값을 갖는다.<br>② 닫힌구간<br>③ 연속<br>④ 반드시 존재하지는 않는다 (존재하지 않을 수 있다)" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.112 · Thema10 · 예시문제1~3</span><br>Q17. 다음 함수가 주어진 구간에서 최댓값과 최솟값을 갖는지 판단하시오.<br>① \\(f(x)=(x-2)^2\\), 닫힌구간 \\([0,\\ 5]\\)<br>② \\(f(x)=x\\), 반열린구간 \\([0,\\ 3)\\)<br>③ \\(f(x)=\\dfrac{1}{x}\\), 열린구간 \\((0,\\ \\infty)\\)<br>각 문항에서 최댓값과 최솟값의 존재 여부를 말하시오.", answer: "O", hint: "닫힌구간+연속일 때만 둘 다 보장", explanation: "① 닫힌구간에서 연속 → 최댓값 \\(9\\)(\\(x=5\\)), 최솟값 \\(0\\)(\\(x=2\\)) 모두 존재<br>② 최솟값 \\(0\\)(\\(x=0\\))은 존재하지만 \\(x=3\\)이 포함되지 않아 최댓값은 없음<br>③ 열린구간이라 최댓값·최솟값 모두 없음 (\\(x\\to0^{+}\\)에서 \\(\\infty\\), \\(x\\to\\infty\\)에서 \\(0\\)에 가까워지나 도달하지 못함)" },

      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.116 · Thema11 · 예시문제18</span><br>Q24. 두 곡선 \\(f(x)=2x^4-7x^3+x^2,\\ g(x)=-2x^2-7x+1\\)은 \\(-1<x<0\\)에서 적어도 하나의 교점을 가짐을 보이시오. 풀이 과정에서 다음을 확인하시오.<br>① 교점을 보이기 위해 새로 둘 함수 \\(h(x)\\)<br>② \\(h(x)\\)가 닫힌구간 \\([-1,\\ 0]\\)에서 연속인 이유<br>③ \\(h(-1),\\ h(0)\\)의 부호<br>④ 사잇값 정리로 얻는 결론", answer: "O", hint: "h=f−g", explanation: "① \\(h(x)=f(x)-g(x)=2x^4-7x^3+3x^2+7x-1\\)<br>② 다항함수이므로 \\([-1,\\ 0]\\)에서 연속<br>③ \\(h(-1)=2+7+3-7-1=4>0\\), \\(h(0)=-1<0\\)<br>④ \\(h(-1)h(0)<0\\)이므로 사잇값 정리에 의해 \\((-1,\\ 0)\\)에서 \\(h(x)=0\\), 즉 두 곡선의 교점이 적어도 하나 존재한다" },

  // ────────────────────────────────────────────────
  // 상태
  // ────────────────────────────────────────────────
  const state = {
    // 공통
    userType: null,       // 'student' | 'admin'
    studentName: '',
    phone: '',
    adminName: '',
    // 선생님 모드
    selectedStudent: null,  // { id, studentName, phone, ... }
    // 퀴즈
    selectedLecture: null,  // lecture 객체
    currentQuestion: 0,
    answers: {},            // { questionIdx: 'O'|'X' }
    quizCompleted: false,
    // 학습기록
    showRecords: false,
    allStudentData: {},     // { studentDocId: { attempts: [...] } }
    expandedAttempts: {},
    // 캔버스
    canvasStrokes: [],
    penColor: '#000000',
    penSize: 3,
    isEraserMode: false,
    currentCanvas: null,
    // 타이머
    timerInterval: null,
    questionStartTime: null,
    questionElapsed: 0,
    timerRunning: false,
    questionTimes: {},      // { questionIdx: seconds }
    lockedAnswers: {},      // { questionIdx: true } 이미 제출된(채점된) 문제 → 수정 불가
    questionStrokes: {},    // { questionIdx: { strokes:[{p:[x,y,...],c,w}], w, h } }
    _draw: [],              // 렌더 후 그릴 캔버스 목록 { id, data }
  };

  // ────────────────────────────────────────────────
  // Firebase 데이터
  // ────────────────────────────────────────────────
  async function loadStudentData(docId) {
    try {
      const doc = await db.collection('oral-test-students').doc(docId).get();
      if (doc.exists) {
        const d = doc.data();
        state.allStudentData[docId] = { attempts: d.calc1Attempts || [] };
      }
    } catch(e) { console.warn('데이터 로드 실패:', e); }
  }

  async function saveAttempt(attempt) {
    const docId = state.selectedStudent ? state.selectedStudent.id : `${state.studentName}_${state.phone}`;
    try {
      const ref = db.collection('oral-test-students').doc(docId);
      const doc = await ref.get();
      const existing = doc.exists ? (doc.data().calc1Attempts || []) : [];
      existing.push(attempt);
      await ref.set({ calc1Attempts: existing }, { merge: true });
      state.allStudentData[docId] = { attempts: existing };
    } catch(e) { console.warn('저장 실패:', e); }
  }

  function getAttemptsForLecture(lectureId) {
    const docId = state.selectedStudent ? state.selectedStudent.id : `${state.studentName}_${state.phone}`;
    return (state.allStudentData[docId]?.attempts || []).filter(a => a.lectureId === lectureId);
  }

  // 구두테스트 점수(맞은 수 / 푼 수) + 진행률(푼 수 / 전체 문제) 계산. 구버전 기록도 호환.
  function attemptMetrics(a) {
    const answered = (a.answered != null) ? a.answered : (a.total != null ? a.total : 0);
    let totalQ = a.totalQuestions;
    if (totalQ == null) {
      const lec = lectures.find(l => l.id === a.lectureId);
      totalQ = lec ? lec.questions.length : answered;
    }
    const correct = a.correct || 0;
    const score = (a.score != null) ? a.score : (answered > 0 ? Math.round(correct / answered * 100) : 0);
    const progress = (a.progress != null) ? a.progress : (totalQ > 0 ? Math.round(answered / totalQ * 100) : 0);
    return { answered, totalQ, correct, score, progress };
  }

  // ────────────────────────────────────────────────
  // 타이머
  // ────────────────────────────────────────────────
  function startTimer() {
    if (state.timerRunning) return;
    state.timerRunning = true;
    state.questionStartTime = Date.now() - (state.questionElapsed * 1000);
    state.timerInterval = setInterval(() => {
      state.questionElapsed = Math.floor((Date.now() - state.questionStartTime) / 1000);
      const el = document.getElementById('timerDisplay');
      if (el) el.textContent = formatTime(state.questionElapsed);
    }, 500);
  }

  function stopTimer() {
    if (state.timerInterval) clearInterval(state.timerInterval);
    state.timerInterval = null;
    state.timerRunning = false;
  }

  function resetTimer() {
    stopTimer();
    state.questionElapsed = 0;
    state.questionStartTime = null;
  }

  function saveQuestionTime(idx) {
    state.questionTimes[idx] = state.questionElapsed;
  }

  function formatTime(s) {
    const m = Math.floor(s / 60);
    const sec = s % 60;
    return `${m}:${sec.toString().padStart(2, '0')}`;
  }

  // ────────────────────────────────────────────────
  // 캔버스
  // ────────────────────────────────────────────────
  function initCanvas(id) {
    const canvas = document.getElementById(id);
    if (!canvas) return;
    const dpr = window.devicePixelRatio || 1;
    const rect = canvas.getBoundingClientRect();
    canvas.width = rect.width * dpr;
    canvas.height = rect.height * dpr;
    canvas.style.width = rect.width + 'px';
    canvas.style.height = rect.height + 'px';
    const ctx = canvas.getContext('2d');
    ctx.scale(dpr, dpr);
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.strokeStyle = state.penColor;
    ctx.lineWidth = state.penSize;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    state.currentCanvas = canvas;
    setupCanvasEvents(id);
    redrawCanvas();
  }

  function redrawCanvas() {
    const canvas = state.currentCanvas;
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    const dpr = window.devicePixelRatio || 1;
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, canvas.width / dpr, canvas.height / dpr);
    for (const stroke of state.canvasStrokes) {
      if (stroke.points.length < 2) continue;
      ctx.strokeStyle = stroke.color;
      ctx.lineWidth = stroke.width;
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      ctx.beginPath();
      ctx.moveTo(stroke.points[0].x, stroke.points[0].y);
      for (let i = 1; i < stroke.points.length; i++) ctx.lineTo(stroke.points[i].x, stroke.points[i].y);
      ctx.stroke();
    }
  }

  function findStrokeAtPoint(x, y) {
    const t = 10;
    for (let i = state.canvasStrokes.length - 1; i >= 0; i--) {
      for (const p of state.canvasStrokes[i].points) {
        if (Math.hypot(p.x - x, p.y - y) < t) return i;
      }
    }
    return -1;
  }

  function setupCanvasEvents(id) {
    const canvas = document.getElementById(id);
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    let isDrawing = false;
    let currentStroke = null;
    canvas.style.touchAction = 'pan-y pan-x';

    function isPenOrMouse(e) { return e.pointerType === 'pen' || e.pointerType === 'mouse'; }
    function getCoords(e) {
      const rect = canvas.getBoundingClientRect();
      return { x: e.clientX - rect.left, y: e.clientY - rect.top };
    }

    canvas.addEventListener('pointerdown', e => {
      if (!isPenOrMouse(e)) return;
      e.preventDefault();
      canvas.setPointerCapture(e.pointerId);
      const c = getCoords(e);
      isDrawing = true;
      if (state.isEraserMode) {
        const i = findStrokeAtPoint(c.x, c.y);
        if (i !== -1) { state.canvasStrokes.splice(i, 1); redrawCanvas(); }
      } else {
        currentStroke = { points: [c], color: state.penColor, width: state.penSize };
      }
    });

    canvas.addEventListener('pointermove', e => {
      if (!isDrawing || !isPenOrMouse(e)) return;
      e.preventDefault();
      const c = getCoords(e);
      if (state.isEraserMode) {
        const i = findStrokeAtPoint(c.x, c.y);
        if (i !== -1) { state.canvasStrokes.splice(i, 1); redrawCanvas(); }
      } else {
        currentStroke.points.push(c);
        const prev = currentStroke.points[currentStroke.points.length - 2];
        ctx.strokeStyle = currentStroke.color;
        ctx.lineWidth = currentStroke.width;
        ctx.lineCap = 'round'; ctx.lineJoin = 'round';
        ctx.beginPath(); ctx.moveTo(prev.x, prev.y); ctx.lineTo(c.x, c.y); ctx.stroke();
      }
    });

    const stopDraw = () => {
      if (!isDrawing) return;
      isDrawing = false;
      if (!state.isEraserMode && currentStroke && currentStroke.points.length > 0) {
        state.canvasStrokes.push(currentStroke);
      }
      currentStroke = null;
    };
    canvas.addEventListener('pointerup', stopDraw);
    canvas.addEventListener('pointercancel', stopDraw);
    canvas.addEventListener('pointerleave', stopDraw);
  }

  // ────────────────────────────────────────────────
  // 필기(캔버스) 저장 / 복원 / 재생
  // ────────────────────────────────────────────────
  function strokesToCompact(strokes) {
    return (strokes || [])
      .filter(s => s.points && s.points.length >= 2)
      .map(s => {
        const p = [];
        for (const pt of s.points) { p.push(Math.round(pt.x), Math.round(pt.y)); }
        return { p, c: s.color, w: s.width };
      });
  }
  function compactToStrokes(compact) {
    if (!compact) return [];
    return compact.map(s => {
      const points = [];
      for (let i = 0; i + 1 < s.p.length; i += 2) points.push({ x: s.p[i], y: s.p[i + 1] });
      return { points, color: s.c || '#000000', width: s.w || 3 };
    });
  }
  function captureCurrentStrokes() {
    const idx = state.currentQuestion;
    const compact = strokesToCompact(state.canvasStrokes);
    if (compact.length === 0) { delete state.questionStrokes[idx]; return; }
    const rect = state.currentCanvas ? state.currentCanvas.getBoundingClientRect() : null;
    state.questionStrokes[idx] = { strokes: compact, w: rect ? Math.round(rect.width) : 0, h: 320 };
  }
  function loadStrokesFor(idx) {
    const d = state.questionStrokes[idx];
    return d ? compactToStrokes(d.strokes) : [];
  }
  function drawSavedStrokes(canvasEl, data) {
    if (!canvasEl || !data || !data.strokes || !data.strokes.length) return;
    const w0 = data.w || 300, h0 = data.h || 320;
    const dispW = canvasEl.getBoundingClientRect().width || w0;
    const dispH = dispW * (h0 / w0);
    canvasEl.style.height = dispH + 'px';
    const dpr = window.devicePixelRatio || 1;
    canvasEl.width = dispW * dpr;
    canvasEl.height = dispH * dpr;
    const ctx = canvasEl.getContext('2d');
    ctx.scale(dpr, dpr);
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, dispW, dispH);
    const s = dispW / w0;
    ctx.lineCap = 'round'; ctx.lineJoin = 'round';
    for (const st of data.strokes) {
      const p = st.p; if (!p || p.length < 4) continue;
      ctx.strokeStyle = st.c || '#000000';
      ctx.lineWidth = (st.w || 3) * s;
      ctx.beginPath();
      ctx.moveTo(p[0] * s, p[1] * s);
      for (let i = 2; i + 1 < p.length; i += 2) ctx.lineTo(p[i] * s, p[i + 1] * s);
      ctx.stroke();
    }
  }
  function flushPendingDraws() {
    setTimeout(() => {
      (state._draw || []).forEach(d => {
        const el = document.getElementById(d.id);
        if (el) drawSavedStrokes(el, d.data);
      });
      state._draw = [];
    }, 60);
  }

            const isCorrect = ans === q.answer;
            const sData = state.questionStrokes[i];
            const cid = 'res_' + i;
            if (sData) state._draw.push({ id: cid, data: sData });
            const bd = !answeredThis ? 'rgba(107,114,128,0.3)' : (isCorrect ? 'rgba(16,185,129,0.3)' : 'rgba(239,68,68,0.3)');
            return `
              <div style="background:#141428;border:1px solid ${bd};border-radius:0.875rem;padding:1rem">
                <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:0.4rem">
                  <span style="color:#9ca3af;font-size:0.8rem">문제 ${i+1}</span>
                  <span style="color:${!answeredThis?'#6b7280':(isCorrect?'#10b981':'#ef4444')};font-weight:700;font-size:0.85rem">${!answeredThis?'— 미응답':(isCorrect?'✓ 정답':'✗ 오답')}</span>
                </div>
                <div style="font-size:0.85rem;color:#e5e7eb;margin-bottom:0.4rem" class="math-text">${q.question}</div>
                ${q.hint ? `<div style="color:#6b7280;font-size:0.78rem;margin-top:0.3rem">💡 ${q.hint}</div>` : ''}
                ${sData ? `<div style="color:#6b7280;font-size:0.72rem;margin:0.5rem 0 0.25rem">✏ 필기</div><canvas id="${cid}" style="width:100%;display:block;border-radius:0.5rem;background:#fff"></canvas>` : ''}
              </div>`;
          }).join('')}
        </div>
      </div>`;

    renderMath();
    flushPendingDraws();
  }

  function renderRecords() {
    const isAdmin = state.userType === 'admin';
    const isStudent = state.userType === 'student';
    const docId = isAdmin && state.selectedStudent
      ? state.selectedStudent.id
      : `${state.studentName}_${state.phone}`;
    const attempts = state.allStudentData[docId]?.attempts || [];
    const sorted = [...attempts].sort((a, b) => new Date(b.date) - new Date(a.date));
    const app = document.getElementById('app');
    state._draw = [];

    app.innerHTML = `
      ${headerHTML(isAdmin ? state.adminName : state.studentName, state.userType)}
      <div style="max-width:900px;margin:0 auto;padding:1.5rem">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem">
          <h2 style="font-size:1.1rem;font-weight:800;color:#fff">
            ${isAdmin && state.selectedStudent ? state.selectedStudent.studentName + ' 학생의 ' : ''}학습 기록
          </h2>
          <div style="display:flex;gap:0.5rem">
            <button onclick="loadStudentDataAndRender()" style="padding:0.4rem 0.85rem;background:#1f2937;border:1px solid #374151;border-radius:0.5rem;color:#9ca3af;font-size:0.8rem;font-family:inherit;cursor:pointer;font-weight:700">🔄 새로고침</button>
            <button onclick="goBackToHome()" style="padding:0.4rem 0.85rem;background:#1f2937;border:1px solid #374151;border-radius:0.5rem;color:#9ca3af;font-size:0.8rem;font-family:inherit;cursor:pointer;font-weight:700">← 과목 선택</button>
            ${isStudent ? '' : `<button onclick="state.showRecords=false;render()" style="padding:0.4rem 0.85rem;background:#1f2937;border:1px solid #374151;border-radius:0.5rem;color:#9ca3af;font-size:0.8rem;font-family:inherit;cursor:pointer;font-weight:700">강의 목록</button>`}
          </div>
        </div>
        ${sorted.length === 0 ? `
          <div style="background:#141428;border:1px solid #1f1f35;border-radius:1rem;padding:3rem;text-align:center">
            <p style="color:#6b7280">아직 학습 기록이 없습니다.</p>
            ${isStudent ? `<p style="color:#4b5563;font-size:0.82rem;margin-top:0.5rem">선생님이 구두테스트를 진행하면 이곳에 기록이 표시됩니다.</p>` : ''}
          </div>` : sorted.map(a => {
          const lec = lectures.find(l => l.id === a.lectureId);
          const m = attemptMetrics(a);
          const date = new Date(a.date).toLocaleDateString('ko-KR');
          const time = new Date(a.date).toLocaleTimeString('ko-KR', {hour:'2-digit',minute:'2-digit'});
          const expanded = !!state.expandedAttempts[a.date];
          const qStrokes = a.questionStrokes || {};
          const answerKeys = Object.keys(a.answers || {}).map(Number);
          const strokeKeys = Object.keys(qStrokes).map(Number);
          const qCount = lec ? lec.questions.length : (Math.max(-1, ...answerKeys, ...strokeKeys) + 1);
          const hasStrokes = strokeKeys.length > 0;
          let detail = '';
          if (expanded) {
            const rows = [];
            for (let i = 0; i < qCount; i++) {
              const ans = a.answers ? a.answers[i] : undefined;
              const data = qStrokes[i];
              if (ans === undefined && !data) continue;
              const q = lec && lec.questions[i];
              const correctAns = q ? q.answer : null;
              const isCorrect = correctAns != null && ans === correctAns;
              const cid = ('rc_' + a.date + '_' + i).replace(/[^a-zA-Z0-9_]/g, '');
              if (data) state._draw.push({ id: cid, data });
              rows.push(`
                <div style="background:#0f0f1a;border:1px solid #1f2f3f;border-radius:0.75rem;padding:0.75rem">
                  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:0.4rem">
                    <span style="color:#9ca3af;font-size:0.8rem;font-weight:700">문제 ${i+1}</span>
                    <span style="font-size:0.78rem;font-weight:700;color:${ans===undefined?'#6b7280':(isCorrect?'#10b981':'#ef4444')}">${ans===undefined?'미답변':('채점 '+ans+(correctAns!=null?(isCorrect?' ✓':' ✗'):''))}</span>
                  </div>
                  ${data ? `<canvas id="${cid}" style="width:100%;display:block;border-radius:0.5rem;background:#fff"></canvas>` : `<div style="color:#4b5563;font-size:0.75rem">✏ 필기 없음</div>`}
                </div>`);
            }
            detail = `<div style="margin-top:0.9rem;border-top:1px solid #1f2f3f;padding-top:0.9rem;display:flex;flex-direction:column;gap:0.6rem">${rows.join('') || '<div style="color:#4b5563;font-size:0.8rem">저장된 상세 내역이 없습니다.</div>'}</div>`;
          }
          return `
            <div style="background:#141428;border:1px solid #1f2f3f;border-radius:1rem;padding:1.25rem;margin-bottom:0.75rem">
              <div onclick="toggleAttempt('${a.date}')" style="display:flex;align-items:center;justify-content:space-between;cursor:pointer">
                <div>
                  <div style="font-weight:700;color:#fff;margin-bottom:0.25rem">${lec?.name || '알 수 없음'} 구두테스트 <span style="color:#6b7280;font-size:0.75rem;font-weight:500;margin-left:0.25rem">${expanded?'▲ 접기':(hasStrokes?'▼ 필기 보기':'▼ 상세')}</span></div>
                  <div style="color:#6b7280;font-size:0.78rem">${date} ${time}</div>
                </div>
                <div style="text-align:right">
                  <div style="font-size:1.3rem;font-weight:900;color:${m.score>=80?'#10b981':'#f97316'}">${m.score}점</div>
                  <div style="color:#6b7280;font-size:0.75rem">정답 ${m.correct}/${m.answered} · 진행 ${m.progress}%</div>
                </div>
              </div>
              ${detail}
            </div>`;
        }).join('')}
      </div>`;

    flushPendingDraws();
  }

  function renderMath() {
    document.querySelectorAll('.math-text, #questionText').forEach(el => {
      try {
        renderMathInElement(el, {
          delimiters: [
            {left:'\\(', right:'\\)', display:false},
            {left:'\\[', right:'\\]', display:true},
            {left:'$', right:'$', display:false}
          ],
          throwOnError: false
        });
      } catch(e) {}
    });
  }

  // ────────────────────────────────────────────────
  // 이벤트 핸들러
  // ────────────────────────────────────────────────
  function startLecture(id) {
    if (state.userType === 'student') return; // 학생은 스스로 테스트를 시작할 수 없음 (선생님이 진행)
    const lec = lectures.find(l => l.id === id);
    if (!lec || lec.questions.length === 0) return;
    state.selectedLecture = lec;
    // 이전에 제출한 진행(가장 최근 기록)을 불러와 이어서 풀기
    const prev = getLatestAttempt(id);
    state.answers = (prev && prev.answers) ? Object.assign({}, prev.answers) : {};
    state.questionStrokes = (prev && prev.questionStrokes) ? Object.assign({}, prev.questionStrokes) : {};
    state.questionTimes = (prev && prev.questionTimes) ? Object.assign({}, prev.questionTimes) : {};
    state.lockedAnswers = {};
    Object.keys(state.answers).forEach(k => { state.lockedAnswers[k] = true; }); // 이미 푼 문제는 잠금
    state.quizCompleted = false;
    state.currentQuestion = firstUnansweredIndex(lec);
    state.canvasStrokes = loadStrokesFor(state.currentQuestion);
    resetTimer();
    render();
    window.scrollTo({ top: 0, behavior: 'instant' });
  }

  function handleAnswer(ans) {
    if (state.lockedAnswers[state.currentQuestion]) return; // 이미 채점된 문제는 수정 불가
    state.answers[state.currentQuestion] = ans;
    render();
  }

  function toggleAttempt(dateKey) {
    state.expandedAttempts[dateKey] = !state.expandedAttempts[dateKey];
    render();
  }

  function getLatestAttempt(lectureId) {
    const arr = getAttemptsForLecture(lectureId);
    return arr.length ? arr[arr.length - 1] : null;
  }

  function firstUnansweredIndex(lec) {
    for (let i = 0; i < lec.questions.length; i++) {
      if (state.answers[i] === undefined) return i;
    }
    return 0; // 전부 답변됨
  }

  function handleNext() {
    const lec = state.selectedLecture;
    if (state.currentQuestion < lec.questions.length - 1) {
      saveQuestionTime(state.currentQuestion);
      captureCurrentStrokes();
      state.currentQuestion++;
      state.canvasStrokes = loadStrokesFor(state.currentQuestion);
      resetTimer();
      render();
      window.scrollTo({ top: 0, behavior: 'instant' });
    }
  }

  function handlePrev() {
    if (state.currentQuestion > 0) {
      saveQuestionTime(state.currentQuestion);
      captureCurrentStrokes();
      state.currentQuestion--;
      state.canvasStrokes = loadStrokesFor(state.currentQuestion);
      resetTimer();
      render();
      window.scrollTo({ top: 0, behavior: 'instant' });
    }
  }

  async function finishQuiz() {
    const lec = state.selectedLecture;
    const total = lec.questions.length;
    const answeredCount = Object.keys(state.answers).length;
    if (answeredCount === 0) return;

    saveQuestionTime(state.currentQuestion);
    captureCurrentStrokes();
    stopTimer();

    const correct = lec.questions.filter((q, i) => state.answers[i] === q.answer).length;
    const score = answeredCount > 0 ? Math.round(correct / answeredCount * 100) : 0;   // 구두테스트 점수(맞은 수/푼 수)
    const progress = total > 0 ? Math.round(answeredCount / total * 100) : 0;           // 진행률(푼 수/전체)
    const attempt = {
      lectureId: lec.id,
      lectureName: lec.name,
      date: new Date().toISOString(),
      correct,
      answered: answeredCount,
      totalQuestions: total,
      score,
      progress,
      oralTestPassed: score >= 80,
      answers: state.answers,
      questionTimes: state.questionTimes,
      questionStrokes: state.questionStrokes,
      // 구버전 호환 필드
      total: answeredCount,
      percentage: score,
    };

    await saveAttempt(attempt);
    // 제출한 답변은 모두 잠금(재풀이 불가) → 이어서 풀기 시 미답변만 풀 수 있음
    Object.keys(state.answers).forEach(k => { state.lockedAnswers[k] = true; });
    state.quizCompleted = true;
    render();
    window.scrollTo({ top: 0, behavior: 'instant' });
  }

  function backToLectureList() {
    state.selectedLecture = null;
    state.quizCompleted = false;
    state.answers = {};
    state.lockedAnswers = {};
    state.canvasStrokes = [];
    state.questionStrokes = {};
    state.questionTimes = {};
    state.currentQuestion = 0;
    resetTimer();
    render();
    window.scrollTo({ top: 0, behavior: 'instant' });
  }

  function exitQuiz() {
    const hasNew = Object.keys(state.answers).some(k => !state.lockedAnswers[k])
      || (state.canvasStrokes && state.canvasStrokes.length > 0);
    if (hasNew && !confirm('제출하지 않은 이번 답변·필기는 저장되지 않습니다.\n강의 목록으로 돌아갈까요?')) return;
    backToLectureList();
  }

  // 이어서 풀기: 이전 답변·필기를 유지한 채, 아직 안 푼 문제만 풀도록 재개
  function resumeLecture() {
    const lec = state.selectedLecture;
    state.quizCompleted = false;
    state.currentQuestion = firstUnansweredIndex(lec);
    state.canvasStrokes = loadStrokesFor(state.currentQuestion);
    resetTimer();
    render();
    window.scrollTo({ top: 0, behavior: 'instant' });
  }

  function toggleTimer() {
    if (state.timerRunning) { stopTimer(); } else { startTimer(); }
    const btn = document.getElementById('timerBtn');
    if (btn) {
      btn.textContent = state.timerRunning ? '■ 정지' : '▶ 시작';
      btn.style.background = state.timerRunning ? '#dc2626' : '#16a34a';
    }
  }

  function setEraserMode(on) {
    state.isEraserMode = on;
    const penBtn = document.getElementById('penBtn');
    const eraserBtn = document.getElementById('eraserBtn');
    if (penBtn) penBtn.style.background = on ? '#374151' : '#f97316';
    if (eraserBtn) eraserBtn.style.background = on ? '#f97316' : '#374151';
  }

  function goBackToHome() {
    if (state.selectedStudent) {
      sessionStorage.setItem('ox_return_student_id', state.selectedStudent.id);
      sessionStorage.setItem('ox_return_student_name', state.selectedStudent.studentName || '');
    }
    window.location.href = '/';
  }

  function doLogout() {
    stopTimer();
    localStorage.removeItem('ox_quiz_student_name');
    localStorage.removeItem('ox_quiz_student_phone');
    localStorage.removeItem('ox_quiz_auto_login');
    localStorage.removeItem('ox_quiz_admin_name');
    localStorage.removeItem('ox_quiz_admin_auto_login');
    localStorage.removeItem('ox_quiz_preselect_student');
    localStorage.removeItem('mathstart_user');
    window.location.href = '/';
  }

  async function loadStudentDataAndRender() {
    const docId = state.selectedStudent
      ? state.selectedStudent.id
      : `${state.studentName}_${state.phone}`;
    await loadStudentData(docId);
    render();
  }

  async function applyPreselectStudent() {
    const preselectId = localStorage.getItem('ox_quiz_preselect_student');
    if (!preselectId) return;
    localStorage.removeItem('ox_quiz_preselect_student');
    try {
      const doc = await db.collection('oral-test-students').doc(preselectId).get();
      if (doc.exists) {
        state.selectedStudent = { id: doc.id, ...doc.data() };
        await loadStudentData(preselectId);
      }
    } catch(e) { console.warn('preselect 로드 실패:', e); }
  }

  // ────────────────────────────────────────────────
  // 초기화 (자동 로그인)
  // ────────────────────────────────────────────────
  async function init() {
    const adminAuto = localStorage.getItem('ox_quiz_admin_auto_login');
    const studentAuto = localStorage.getItem('ox_quiz_auto_login');

    if (adminAuto === 'true') {
      const name = localStorage.getItem('ox_quiz_admin_name') || '';
      state.userType = 'admin';
      state.adminName = name;
      await applyPreselectStudent();
      render();
    } else if (studentAuto === 'true') {
      const name = localStorage.getItem('ox_quiz_student_name') || '';
      const phone = localStorage.getItem('ox_quiz_student_phone') || '';
      state.userType = 'student';
      state.studentName = name;
      state.phone = phone;
      await loadStudentData(`${name}_${phone}`);
      render();
    } else {
      redirectToHome();
    }
  }

  init();
</script>
</body>
</html>
