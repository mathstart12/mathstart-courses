  // ────────────────────────────────────────────────
  // 강의 데이터 (문제 추가 방법: questions 배열에 항목 추가)

  const lectures = [
    { id: 1, name: "1강", questions: [
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.2 · 학습목표·공부법</span><br>Q1. 다음 빈칸을 채우시오.<br>① 함수의 극한의 __________을 알고, 함수의 극한에 대한 __________을 이해하여 극한값을 구할 수 있어야 한다.<br>② 함수의 극한은 식만 보는 것보다 __________ 관점으로 공부한다.<br>③ 함수의 극한은 논리보다 __________을 많이 사용하여 이해한다.", answer: "O", hint: "뜻·성질 / 그래프 / 직관", explanation: "① 뜻(정의) / 성질<br>② 그래프(적)<br>③ 직관" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.4 · PartⅠ · 핵심태도</span><br>Q2. 함수의 극한이 무엇을 보는 개념인지 설명하시오.<br>① \\(x\\)가 어떤 특정한 값 \\(a\\)에 한없이 가까워질 때, 무엇을 관찰하는가?<br>② 함수의 극한을 이해할 때 그래프를 활용하면 좋은 이유를 말하시오.", answer: "O", hint: "x→a일 때 f(x)가 어떤 값에 가까워지는지", explanation: "① \\(x\\)가 \\(a\\)에 가까워질 때 함숫값 \\(f(x)\\)가 어떤 값에 한없이 가까워지는지 관찰한다.<br>② \\(x\\)가 \\(a\\)에 가까워질 때 \\(f(x)\\)의 변화(가까워지는 값)를 시각적으로 한눈에 파악할 수 있기 때문." },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.4~5 · Thema1 · 개념</span><br>Q3. \\(\\infty\\), 수렴, 발산에 대해 다음 질문에 답하시오.<br>① \\(\\infty\\)는 숫자인가, “한없이 커진다”는 상태를 나타내는 기호인가?<br>② \\(x\\to\\infty\\)와 \\(x\\to-\\infty\\)의 의미를 각각 말하시오.<br>③ 수렴은 \\(f(x)\\)가 어떤 상태가 되는 것을 말하는가?<br>④ 발산은 \\(f(x)\\)가 어떤 상태가 되는 것을 말하는가?<br>⑤ \\(\\lim\\limits_{x\\to a}f(x)=\\infty\\)라고 쓰여 있으면 극한값이 존재한다고 하는가, 발산한다고 하는가?", answer: "O", hint: "∞는 상태 기호, ∞로 가면 발산", explanation: "① 숫자가 아니라 “한없이 커진다”는 상태를 나타내는 기호.<br>② \\(x\\to\\infty\\): \\(x\\)가 한없이 커진다. \\(x\\to-\\infty\\): \\(x\\)가 한없이 작아진다(음수로 커진다).<br>③ \\(f(x)\\)가 일정한 실수 값에 한없이 가까워지는 상태.<br>④ 수렴하지 않는 상태(한없이 커지거나 작아지거나 진동).<br>⑤ 발산한다고 한다. (\\(\\infty\\)는 값이 아니므로 극한값이 존재하는 것이 아님.)" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.4~5 · Thema1 · 개념</span><br>Q4. 다음 극한 기호의 의미를 말하시오.<br>① \\(\\lim\\limits_{x\\to\\infty}f(x)=L\\)<br>② \\(\\lim\\limits_{x\\to-\\infty}f(x)=L\\)<br>③ \\(\\lim\\limits_{x\\to\\infty}2x=\\infty\\)<br>④ \\(\\lim\\limits_{x\\to-\\infty}2x=-\\infty\\)<br>⑤ 분모는 한없이 커지고 분자는 숫자(상수)인 분수는 어떤 값에 가까워지는가?", answer: "O", hint: "분모→∞, 분자 상수면 0", explanation: "① \\(x\\)가 한없이 커질 때 \\(f(x)\\)가 \\(L\\)에 한없이 가까워진다.<br>② \\(x\\)가 한없이 작아질 때 \\(f(x)\\)가 \\(L\\)에 한없이 가까워진다.<br>③ \\(x\\)가 커지면 \\(2x\\)도 한없이 커진다.<br>④ \\(x\\)가 작아지면 \\(2x\\)도 한없이 작아진다.<br>⑤ \\(0\\)에 가까워진다." },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.4~6 · Thema1 · 예시문제</span><br>Q5. 다음 극한값을 구하고, 그래프 또는 직관을 이용하여 이유를 설명하시오.<br>① \\(\\lim\\limits_{x\\to\\infty}\\dfrac{1}{x}\\)<br>② \\(\\lim\\limits_{x\\to-\\infty}\\dfrac{1}{x}\\)<br>③ \\(\\lim\\limits_{x\\to\\infty}\\dfrac{3}{x^2+1}\\)", answer: "O", hint: "분모가 커지면 분수는 0으로", explanation: "① \\(0\\) (\\(x\\)가 커질수록 \\(\\frac1x\\)는 \\(0\\)에 가까워짐)<br>② \\(0\\) (\\(x\\)가 음수로 커질수록 \\(\\frac1x\\)는 음수 쪽에서 \\(0\\)에 가까워짐)<br>③ \\(0\\) (분모 \\(x^2+1\\)이 한없이 커지므로 \\(\\frac{3}{x^2+1}\\to0\\))" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.7~9 · Thema2 · 개념</span><br>Q6. \\(x\\to a\\)일 때의 극한에 대해 다음 빈칸을 채우시오.<br>① \\(x\\to a\\)는 \\(x=\\)__________라는 뜻이 아니라, \\(x\\ne\\)__________이면서 \\(x\\)가 \\(a\\)에 가까워진다는 뜻이다.<br>② \\(\\lim\\limits_{x\\to a}f(x)=L\\)은 \\(f(x)\\)가 \\(L\\)을 __________으로 향한다는 뜻이다.<br>③ 함수에서 함숫값, 극한값처럼 “값”이라고 하면 보통 __________값을 의미한다.<br>④ 다항함수에서는 \\(\\lim\\limits_{x\\to a}f(x)=\\)__________가 성립한다.<br>⑤ 다항함수가 아닌 함수는 함숫값과 극한값이 다를 수 있으므로 __________ 또는 좌우극한을 확인한다.", answer: "O", hint: "x≠a로 접근, 다항함수는 f(a) 대입", explanation: "① \\(a\\) / \\(a\\)<br>② 목표(값)<br>③ \\(y\\)<br>④ \\(f(a)\\) (대입)<br>⑤ 그래프" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.7~9 · Thema2 · 예시문제</span><br>Q7. 다음 극한값을 구하시오.<br>① \\(f(x)=x+1\\)일 때, \\(\\lim\\limits_{x\\to1}f(x)\\)<br>② \\(\\lim\\limits_{x\\to1}5\\)<br>③ \\(\\lim\\limits_{x\\to1}\\dfrac{x^2-1}{x-1}\\)<br>④ ③에서 \\(x=1\\)일 때의 함숫값이 존재하는지 말하고, 극한값은 존재하는데 함숫값은 그렇지 않은 이유를 설명하시오.", answer: "O", hint: "③ 약분하면 x+1 → 2, x=1에서 분모 0", explanation: "① \\(2\\)<br>② \\(5\\) (상수함수의 극한은 그 상수)<br>③ \\(\\dfrac{x^2-1}{x-1}=\\dfrac{(x-1)(x+1)}{x-1}=x+1\\to2\\)<br>④ \\(x=1\\)에서는 분모가 \\(0\\)이 되어 함숫값이 존재하지 않는다. 하지만 \\(x\\to1\\)은 \\(x\\ne1\\)로 접근하므로 약분이 가능해 극한값은 \\(2\\)로 존재한다." },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.9 · Thema2 · 참고5</span><br>Q8. 함숫값과 극한값에 대해 O/X로 판단하시오.<br>① \\(\\lim\\limits_{x\\to a}f(x)\\)가 존재하면 \\(f(a)\\)도 반드시 존재한다.<br>② \\(\\lim\\limits_{x\\to a}f(x)\\)와 \\(f(a)\\)가 모두 존재하면 두 값은 반드시 같다.<br>③ 다항함수는 \\(x=a\\)를 대입하여 극한값을 구할 수 있다.<br>④ 절댓값 함수, 분수함수, 가우스 함수는 그래프나 좌우극한을 확인하는 것이 좋다.", answer: "O", hint: "①X ②X ③O ④O", explanation: "① X (극한값은 존재해도 함숫값은 없을 수 있다. 예: \\(\\frac{x^2-1}{x-1}\\)의 \\(x=1\\))<br>② X (구멍·점프가 있으면 다를 수 있다)<br>③ O<br>④ O" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.10~11 · Thema2 · 개념·예시문제</span><br>Q9. 다음 극한은 수렴하는지, 발산하는지 판별하고 이유를 말하시오.<br>① \\(\\lim\\limits_{x\\to0}\\dfrac{1}{x^2}\\)<br>② \\(\\lim\\limits_{x\\to0}\\left(-\\dfrac{1}{x^2}\\right)\\)<br>③ ①은 양의 무한대로 발산하는가, 음의 무한대로 발산하는가?<br>④ ②는 양의 무한대로 발산하는가, 음의 무한대로 발산하는가?", answer: "O", hint: "1/x²은 항상 양수 → +∞", explanation: "① 발산 (\\(x^2>0\\)이고 \\(x\\to0\\)이면 \\(\\frac{1}{x^2}\\)이 한없이 커짐 → \\(+\\infty\\))<br>② 발산 (\\(-\\frac{1}{x^2}\\to-\\infty\\))<br>③ 양의 무한대(\\(+\\infty\\))<br>④ 음의 무한대(\\(-\\infty\\))" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.12 · Thema3 · 개념</span><br>Q10. 우극한과 좌극한에 대해 다음 빈칸을 채우시오.<br>① \\(x\\to a^{+}\\)는 \\(x\\)가 \\(a\\)보다 __________ 쪽에서 \\(a\\)에 가까워진다는 뜻이다.<br>② \\(x\\to a^{-}\\)는 \\(x\\)가 \\(a\\)보다 __________ 쪽에서 \\(a\\)에 가까워진다는 뜻이다.<br>③ \\(x\\to a^{+}\\)일 때의 극한을 __________이라고 한다.<br>④ \\(x\\to a^{-}\\)일 때의 극한을 __________이라고 한다.<br>⑤ \\(x\\to2^{+}\\)와 \\(x\\to2^{-}\\)의 의미를 각각 말하시오.", answer: "O", hint: "+ 큰 쪽=우극한, − 작은 쪽=좌극한", explanation: "① 큰(오른) 쪽<br>② 작은(왼) 쪽<br>③ 우극한<br>④ 좌극한<br>⑤ \\(x\\to2^{+}\\): \\(2\\)보다 큰 쪽에서 \\(2\\)에 가까워짐. \\(x\\to2^{-}\\): \\(2\\)보다 작은 쪽에서 \\(2\\)에 가까워짐." },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.13 · Thema3 · 예시문제1,2</span><br><span data-figure='pending' style='display:inline-block;margin:0.4rem 0;padding:0.35rem 0.7rem;border:1px dashed #f59e0b;border-radius:0.5rem;color:#f59e0b;font-size:0.78rem;font-weight:700'>📷 교재 그림 자리 — 나중에 여기에 그림 삽입 (data-figure)</span><br>Q11. 교재 그림을 보고 다음 값을 구하시오.<br>① 예시문제1에서 \\(x=1\\)일 때의 우극한<br>② 예시문제1에서 \\(x=1\\)일 때의 좌극한<br>③ 예시문제2에서 \\(x=0\\)일 때의 우극한<br>④ 예시문제2에서 \\(x=0\\)일 때의 좌극한", answer: "O", hint: "그래프에서 오른쪽/왼쪽으로 접근하는 y값을 읽는다", explanation: "교재 그림(예시문제1·2의 그래프)에서 각 점의 오른쪽(우극한)·왼쪽(좌극한)으로 다가갈 때 \\(y\\)값을 읽어 답한다. (구체적 값은 그림에 따름)" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.14 · Thema3 · 개념</span><br>Q12. 극한값이 존재할 조건을 말하시오.<br>① \\(\\lim\\limits_{x\\to a}f(x)\\)가 존재하려면 우극한과 좌극한은 어떤 관계여야 하는가?<br>② 우극한과 좌극한이 서로 다르면 \\(\\lim\\limits_{x\\to a}f(x)\\)는 존재하는가?<br>③ 극한값 존재 조건을 기호로 쓰시오.", answer: "O", hint: "좌극한=우극한이어야 극한 존재", explanation: "① 서로 같아야 한다(일치해야 한다).<br>② 존재하지 않는다.<br>③ \\(\\lim\\limits_{x\\to a^{-}}f(x)=\\lim\\limits_{x\\to a^{+}}f(x)=L\\) 이면 \\(\\lim\\limits_{x\\to a}f(x)=L\\)" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.15 · Thema3 · 발상&알고리즘2</span><br>Q13. 극한값을 구할 때 함수의 종류에 따라 어떻게 판단하는지 말하시오.<br>① 다항함수의 극한값은 어떻게 구하는가?<br>② 다항함수에서 우극한과 좌극한은 어떤 관계인가?<br>③ 다항함수가 아닌 함수는 무엇을 따로 계산해야 하는가?<br>④ 유리함수, 절댓값 함수, 가우스 함수에서 좌극한과 우극한을 확인해야 하는 이유를 말하시오.", answer: "O", hint: "다항함수는 대입, 그 외는 좌우극한 확인", explanation: "① \\(x=a\\)를 대입하여 구한다(\\(\\lim\\limits_{x\\to a}f(x)=f(a)\\)).<br>② 항상 서로 같다.<br>③ 좌극한과 우극한을 따로 계산해야 한다.<br>④ 이런 함수들은 \\(x=a\\)의 좌우에서 식이나 값이 달라지거나(불연속·점프·구멍) 절댓값의 부호가 바뀌어 좌극한과 우극한이 다를 수 있기 때문." },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.15 · Thema3 · 예시문제1,2</span><br>Q14. 다음 극한값이 존재하는지 판단하고, 존재하면 값을 구하시오.<br>① \\(f(x)=|x|\\)일 때, \\(\\lim\\limits_{x\\to0}f(x)\\)<br>② \\(f(x)=\\dfrac{|x|}{x}\\)일 때, \\(\\lim\\limits_{x\\to0}f(x)\\)", answer: "O", hint: "|x|/x는 x>0이면 1, x<0이면 −1", explanation: "① 좌극한·우극한 모두 \\(0\\)이므로 극한값 \\(0\\) (존재).<br>② 우극한 \\(1\\), 좌극한 \\(-1\\)로 서로 다르므로 극한값이 존재하지 않는다." },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.16 · Thema3 · 예시문제1</span><br><span data-figure='pending' style='display:inline-block;margin:0.4rem 0;padding:0.35rem 0.7rem;border:1px dashed #f59e0b;border-radius:0.5rem;color:#f59e0b;font-size:0.78rem;font-weight:700'>📷 교재 그림 자리 — 나중에 여기에 그림 삽입 (data-figure)</span><br>Q15. 함수 \\(y=f(x)\\)의 그래프가 교재 그림과 같을 때, 다음 값을 구하시오.<br>\\[\\lim\\limits_{x\\to-2^{-}}f(x)+\\lim\\limits_{x\\to0^{+}}f(x)+\\lim\\limits_{x\\to1^{-}}f(x)+f(0)\\]", answer: "O", hint: "각 좌·우극한과 f(0)을 그래프에서 읽어 더한다", explanation: "그래프에서 \\(x=-2\\)의 좌극한, \\(x=0\\)의 우극한, \\(x=1\\)의 좌극한, 그리고 함숫값 \\(f(0)\\)을 각각 읽어 더한다. (구체적 값은 교재 그림에 따름)" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.16 · Thema3 · 예시문제2</span><br>Q16. 다음 함수에 대하여 극한값을 조사하시오.<br>\\(f(x)=\\dfrac{1}{x+1}\\ (x<-1)\\)<br>\\(f(x)=x^2\\ (-1\\le x<1)\\)<br>\\(f(x)=\\dfrac{1}{x}\\ (x\\ge1)\\)<br>① \\(\\lim\\limits_{x\\to1}f(x)\\)<br>② \\(\\lim\\limits_{x\\to-1}f(x)\\)<br>③ \\(\\lim\\limits_{x\\to\\infty}f(x)\\)<br>④ \\(\\lim\\limits_{x\\to-\\infty}f(x)\\)", answer: "O", hint: "경계 x=1, x=-1에서 좌·우극한 비교", explanation: "① 좌극한(\\(x^2\\)): \\(1\\), 우극한(\\(\\frac1x\\)): \\(1\\) → \\(1\\)<br>② 좌극한(\\(\\frac{1}{x+1}\\), \\(x\\to-1^{-}\\)): \\(-\\infty\\), 우극한(\\(x^2\\)): \\(1\\) → 서로 달라 극한값이 존재하지 않음<br>③ \\(x\\ge1\\)에서 \\(\\frac1x\\to0\\) → \\(0\\)<br>④ \\(x<-1\\)에서 \\(\\frac{1}{x+1}\\to0\\) → \\(0\\)" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.17 · Thema3 · 스킬1</span><br>Q17. 구간이 나뉘어진 함수의 극한값 존재 조건을 말하시오. 다항함수 \\(f(x),\\ g(x)\\)에 대하여 \\(f(x)\\ (x\\le a)\\), \\(g(x)\\ (x>a)\\)일 때,<br>① 극한값의 존재를 확인하려면 먼저 무엇을 비교하는가?<br>② \\(f(a)=g(a)\\)이면 극한값은 어떻게 된다고 판단하는가?<br>③ \\(f(a)\\ne g(a)\\)이면 좌극한과 우극한은 어떻게 된다고 판단하는가?", answer: "O", hint: "경계 x=a에서 f(a)와 g(a) 비교", explanation: "① 경계 \\(x=a\\)에서의 좌극한 \\(f(a)\\)와 우극한 \\(g(a)\\)를 비교한다.<br>② 좌극한과 우극한이 같으므로 극한값이 존재한다(값은 \\(f(a)=g(a)\\)).<br>③ 좌극한과 우극한이 서로 달라 극한값이 존재하지 않는다." },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.17 · Thema3 · 예시문제3</span><br>Q18. 다음 함수에서 \\(\\lim\\limits_{x\\to1}f(x)\\)의 값이 존재하도록 하는 상수 \\(a\\)의 값을 구하시오.<br>\\(f(x)=3x^2-6x+1\\ (x<1)\\)<br>\\(f(x)=2x+a\\ (x\\ge1)\\)", answer: "O", hint: "좌극한=우극한", explanation: "좌극한 \\(=3(1)^2-6(1)+1=-2\\), 우극한 \\(=2(1)+a=2+a\\).<br>존재하려면 \\(-2=2+a\\) → \\(a=-4\\)" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.17 · Thema3 · 예시문제4</span><br>Q19. 극한값이 존재하는 것만을 [보기]에서 고르시오.<br>[보기]<br>ㄱ. \\(\\lim\\limits_{x\\to3}(x-3)\\)<br>ㄴ. \\(\\lim\\limits_{x\\to-2}|x+2|\\)<br>ㄷ. \\(\\lim\\limits_{x\\to1}\\dfrac{|x-1|}{x^2-1}\\)<br>ㄹ. \\(\\lim\\limits_{x\\to5}\\dfrac{x^2-25}{x-5}\\)", answer: "O", hint: "ㄷ만 좌우극한이 다름", explanation: "ㄱ. \\(0\\) (존재)<br>ㄴ. \\(0\\) (존재)<br>ㄷ. 우극한 \\(\\frac{1}{x+1}\\to\\frac12\\), 좌극한 \\(-\\frac{1}{x+1}\\to-\\frac12\\) → 존재하지 않음<br>ㄹ. \\(\\frac{(x-5)(x+5)}{x-5}=x+5\\to10\\) (존재)<br>따라서 존재하는 것은 ㄱ, ㄴ, ㄹ." },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.19 · Thema5 · 개념</span><br>Q20. 함수의 극한에 대한 성질을 쓰시오. \\(\\lim\\limits_{x\\to a}f(x)=\\alpha,\\ \\lim\\limits_{x\\to a}g(x)=\\beta\\)일 때,<br>① \\(\\lim\\limits_{x\\to a}\\{f(x)+g(x)\\}\\)<br>② \\(\\lim\\limits_{x\\to a}\\{f(x)-g(x)\\}\\)<br>③ \\(\\lim\\limits_{x\\to a}c\\,f(x)\\) (\\(c\\)는 상수)<br>④ \\(\\lim\\limits_{x\\to a}f(x)g(x)\\)<br>⑤ \\(\\lim\\limits_{x\\to a}\\dfrac{f(x)}{g(x)}\\) (단, \\(\\beta\\ne0\\))", answer: "O", hint: "합·차·상수배·곱·몫으로 분리(수렴할 때)", explanation: "① \\(\\alpha+\\beta\\)<br>② \\(\\alpha-\\beta\\)<br>③ \\(c\\alpha\\)<br>④ \\(\\alpha\\beta\\)<br>⑤ \\(\\dfrac{\\alpha}{\\beta}\\) (\\(\\beta\\ne0\\))" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.19~21 · Thema5 · 주의점</span><br>Q21. 함수의 극한 성질을 사용할 때 주의할 점을 말하시오.<br>① \\(\\lim\\)을 나누어 계산하려면 각각의 함수가 먼저 어떻게 되어야 하는가?<br>② 하나라도 수렴하지 않는 함수가 있으면 극한의 사칙연산 성질을 그대로 사용할 수 있는가?<br>③ 전체 식이 수렴한다고 해서 식의 일부가 반드시 수렴한다고 말할 수 있는가?<br>④ \\(x\\to0\\)에서 \\(f(x)=\\dfrac{1}{x},\\ g(x)=-\\dfrac{1}{x}\\)일 때, \\(f(x)+g(x)\\)는 수렴하지만 \\(f(x)\\)는 어떻게 되는가?<br>⑤ \\(x\\to0\\)에서 \\(f(x)=\\dfrac{1}{x},\\ g(x)=x\\)일 때, \\(f(x)g(x)\\)는 수렴하지만 \\(f(x)\\)는 어떻게 되는가?", answer: "O", hint: "각각 수렴해야 성질 사용; f+g나 fg가 수렴해도 f는 발산 가능", explanation: "① 각각 수렴해야 한다(극한값이 존재해야 한다).<br>② 사용할 수 없다.<br>③ 아니다(일부는 발산할 수 있다).<br>④ \\(f(x)+g(x)=0\\)으로 수렴하지만 \\(f(x)=\\frac1x\\)는 \\(x\\to0\\)에서 발산한다.<br>⑤ \\(f(x)g(x)=1\\)로 수렴하지만 \\(f(x)=\\frac1x\\)는 \\(x\\to0\\)에서 발산한다." },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.20 · Thema5 · 발상&알고리즘4</span><br>Q22. 극한 성질을 바로 쓰기 어려운 식은 어떻게 처리하는가? 다음 빈칸을 채우시오.<br>① 하나라도 수렴하지 않아 보이는 식이 있으면 극한 내부에서 식을 __________한다.<br>② 식을 조작하는 목적은 수렴하는 __________로 바꾸기 위해서이다.<br>③ \\(\\lim\\limits_{x\\to0}\\)에서 \\(x\\)는 \\(0\\)에 가까워지는 것이지 \\(0\\)은 아니므로, 필요한 경우 분자와 분모를 __________로 나눌 수 있다.", answer: "O", hint: "식을 변형해 수렴하는 꼴로; x로 약분", explanation: "① 변형(정리)<br>② 꼴(형태)<br>③ \\(x\\) (\\(x\\ne0\\)이므로 \\(x\\)로 나눌 수 있다)" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.20 · Thema5 · 예시문제1</span><br>Q23. \\(\\lim\\limits_{x\\to0}\\dfrac{f(x)}{x}=2\\)일 때, 다음 극한값을 구하시오.<br>\\[\\lim\\limits_{x\\to0}\\dfrac{2x^2+5f(x)}{3x^2-f(x)}\\]", answer: "O", hint: "분자·분모를 x로 나눠 f(x)/x=2 이용", explanation: "분자·분모를 \\(x\\)로 나누면 분자 \\(=2x+5\\cdot\\dfrac{f(x)}{x}\\to0+5(2)=10\\), 분모 \\(=3x-\\dfrac{f(x)}{x}\\to0-2=-2\\).<br>따라서 \\(\\dfrac{10}{-2}=-5\\)" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.21 · Thema5 · 발상&알고리즘5</span><br>Q24. 극한에서 내부식이 복잡해 보일 때 어떻게 계산할지 말하시오.<br>① 내부식이 복잡해 보이면 먼저 무엇을 해서 계산하기 쉽게 만드는가?<br>② 단답형·객관식에서는 정확히 계산하는 대신 어떤 방법을 쓰면 더 빠를 수 있는가?", answer: "O", hint: "식 정리(약분/인수분해) / a에 가까운 수 대입", explanation: "① 식을 정리(약분·인수분해·통분 등)하여 수렴하는 꼴로 만든다.<br>② \\(x\\)에 \\(a\\)와 아주 가까운 수를 직접 대입해 근삿값으로 답을 고르는 방법이 빠를 수 있다." },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.21 · Thema5 · 예시문제2,3</span><br>Q25. 다음 극한값을 구하시오.<br>① \\(\\lim\\limits_{x\\to2}(3x^2-2x)\\)<br>② \\(\\lim\\limits_{x\\to1}\\dfrac{2x-3}{x^2+1}\\)", answer: "O", hint: "다항·유리함수는 대입", explanation: "① \\(3(2)^2-2(2)=12-4=8\\)<br>② \\(\\dfrac{2(1)-3}{1^2+1}=\\dfrac{-1}{2}=-\\dfrac12\\)" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.22 · Thema5 · 예시문제5</span><br>Q26. 두 함수 \\(f(x),\\ g(x)\\)에 대하여 \\(\\lim\\limits_{x\\to2}f(x)=-1,\\ \\lim\\limits_{x\\to2}g(x)=3\\)일 때, 다음 극한값을 구하시오.<br>① \\(\\lim\\limits_{x\\to2}\\{g(x)-2f(x)\\}\\)<br>② \\(\\lim\\limits_{x\\to2}\\dfrac{f(x)+3g(x)}{\\{f(x)\\}^2}\\)", answer: "O", hint: "극한값을 그대로 대입", explanation: "① \\(3-2(-1)=3+2=5\\)<br>② \\(\\dfrac{-1+3(3)}{(-1)^2}=\\dfrac{8}{1}=8\\)" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.22 · Thema5 · 예시문제6</span><br>Q27. \\(\\lim\\limits_{x\\to2}(x+1)f(x)=6,\\ \\lim\\limits_{x\\to2}\\dfrac{g(x)}{x+2}=1\\)일 때, 다음 극한값을 구하시오.<br>\\[\\lim\\limits_{x\\to2}\\dfrac{x\\,f(x)}{g(x)}\\]", answer: "O", hint: "먼저 lim f(x), lim g(x)를 구한다", explanation: "\\(\\lim(x+1)=3\\)이므로 \\(\\lim f(x)=\\dfrac63=2\\). \\(\\lim(x+2)=4\\)이므로 \\(\\lim g(x)=4\\cdot1=4\\).<br>따라서 \\(\\lim\\dfrac{x f(x)}{g(x)}=\\dfrac{2\\cdot2}{4}=1\\)" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.22 · Thema5 · 예시문제7</span><br>Q28. \\(\\lim\\limits_{x\\to0}\\dfrac{f(x)}{x}=a\\)일 때, 다음 극한값을 구하시오. (단, \\(a\\ne0\\))<br>\\[\\lim\\limits_{x\\to0}\\dfrac{7x^2+2f(x)}{f(x)}\\]", answer: "O", hint: "식을 7x²/f(x) + 2로 분리", explanation: "\\(\\dfrac{7x^2+2f(x)}{f(x)}=\\dfrac{7x^2}{f(x)}+2\\). 여기서 \\(\\dfrac{7x^2}{f(x)}=7x\\cdot\\dfrac{x}{f(x)}\\to7\\cdot0\\cdot\\dfrac1a=0\\).<br>따라서 \\(0+2=2\\)" },
    ] },
    { id: 2, name: "2강", questions: [
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.18 · Thema4 · 개념</span><br>Q1. 합성함수의 극한에 대해 다음 빈칸을 채우시오.<br>① 합성함수 \\(g(f(x))\\)는 \\(x\\)를 먼저 __________에 넣고, 그 결과를 다시 __________에 넣는 구조이다.<br>② \\(f(x)\\)는 함수 \\(g\\)의 __________이자, 동시에 함수 \\(f\\)의 __________이다.<br>③ 합성함수의 극한에서는 \\(f(x)\\) 또는 \\(g(x)\\)가 어떤 값으로 가는지만 보는 것이 아니라, 어느 쪽에서 가까워지는지인 __________를 표시해야 한다.<br>④ 합성함수의 극한을 구할 때는 최종값만 쓰지 말고 __________을 기록한다.", answer: "O", hint: "안쪽 f → 바깥 g / 방향(부호)까지", explanation: "① 안쪽 \\(f\\) / 바깥 \\(g\\)<br>② 함수 \\(g\\)의 입력(정의역 값) / 함수 \\(f\\)의 출력(함숫값)<br>③ 방향(좌·우, 부호 \\(+/-\\))<br>④ 과정(중간 극한값과 접근 방향)" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.18 · Thema4 · 발상&알고리즘3</span><br>Q2. 합성함수의 극한 \\(\\lim\\limits_{x\\to a}f(g(x))\\)는 어떻게 구할까? 다음 빈칸을 채우시오.<br>① \\(x\\to a^{+}\\)일 때 \\(g(x)\\)의 __________를 체크한 뒤, 우극한을 구한다.<br>② \\(x\\to a^{-}\\)일 때 \\(g(x)\\)의 __________를 체크한 뒤, 좌극한을 구한다.<br>③ 마지막으로 좌극한과 우극한이 __________ 확인하여 극한값을 판단한다.", answer: "O", hint: "g(x)가 향하는 값과 방향 / 좌극한=우극한", explanation: "① \\(g(x)\\)가 향하는 값과 접근 방향(부호)<br>② \\(g(x)\\)가 향하는 값과 접근 방향(부호)<br>③ 서로 같은지" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.18 · Thema4 · 예시문제1</span><br><span data-figure='pending' style='display:inline-block;margin:0.4rem 0;padding:0.35rem 0.7rem;border:1px dashed #f59e0b;border-radius:0.5rem;color:#f59e0b;font-size:0.78rem;font-weight:700'>📷 교재 그림 자리 — 나중에 여기에 그림 삽입 (data-figure)</span><br>Q3. 정의역이 \\(\\{x\\mid 0\\le x\\le4\\}\\)인 함수 \\(y=f(x)\\)의 그래프가 교재 그림과 같을 때, 다음 값을 구하시오.<br>\\[\\lim\\limits_{x\\to0^{+}}f(f(x))+\\lim\\limits_{x\\to2^{+}}f(f(x))\\]풀이 과정에서 다음을 반드시 표시하시오.<br>① \\(f(0^{+})\\)가 어느 값의 어느 쪽으로 가까워지는지<br>② \\(f(f(0^{+}))\\)가 어떤 극한값으로 가는지<br>③ \\(f(2^{+})\\)가 어느 값으로 가까워지는지<br>④ \\(f(f(2^{+}))\\)가 어떤 값으로 가는지", answer: "O", hint: "안쪽 f(x)의 극한값과 접근 방향을 먼저 구한 뒤 바깥 f에 대입", explanation: "교재 그림에서 안쪽 \\(f(x)\\)가 향하는 값과 그 접근 방향(좌·우)을 먼저 읽고, 그 방향을 유지한 채 바깥 \\(f\\)의 극한을 읽어 두 값을 더한다. (구체적 값은 교재 그림에 따름)" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.23 · Thema6 · 개념</span><br>Q4. 샌드위치 정리에 대해 다음 빈칸을 채우시오.<br>① \\(f(x)\\le h(x)\\le g(x)\\)에서 양 끝 함수 \\(f(x),\\ g(x)\\)가 같은 값으로 수렴하면 가운데 함수 __________도 같은 값으로 수렴한다.<br>② \\(f(x)\\le h(x)\\le g(x)\\)에 \\(\\lim\\)를 취하면 없던 __________가 생길 수 있다.<br>③ 샌드위치 정리는 \\(x\\to a\\)뿐 아니라 \\(x\\to a^{+},\\ x\\to a^{-},\\ x\\to\\infty,\\ x\\to-\\infty\\)인 경우에도 __________.", answer: "O", hint: "가운데 h(x) / 등호(=) / 성립한다", explanation: "① \\(h(x)\\)<br>② 등호(\\(=\\)) — 부등호 \\(\\le\\)가 극한을 취하면 \\(=\\)가 될 수 있다.<br>③ 성립한다(똑같이 적용된다)" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.23 · Thema6 · 발상&알고리즘6</span><br>Q5. 샌드위치 정리(가운데 함수의 극한)를 떠올려야 하는 것은, 구하려는 함수를 \\(h(x)\\)라 할 때 어떤 형태의 부등식이 주어질 때인가? 두 가지 형태로 쓰시오.<br>① \\(\\le\\)를 사용한 형태<br>② \\(<\\)를 사용한 형태", answer: "O", hint: "구할 함수가 두 함수 사이에 끼인 부등식", explanation: "① \\(f(x)\\le h(x)\\le g(x)\\)<br>② \\(f(x)<h(x)<g(x)\\)<br>즉 구하려는 함수 \\(h(x)\\)가 두 함수 사이에 끼인(부등식으로 갇힌) 형태일 때 샌드위치 정리를 떠올린다." },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.23 · Thema6 · 예시문제1</span><br>Q6. 함수 \\(f(x)\\)가 모든 실수 \\(x\\)에 대하여 \\(-x^2+3\\le f(x)\\le x^2-4x+5\\)를 만족시킬 때, \\(\\lim\\limits_{x\\to1}f(x)\\)의 값을 구하시오.", answer: "O", hint: "양 끝 함수의 x=1에서의 극한을 비교", explanation: "\\(\\lim\\limits_{x\\to1}(-x^2+3)=-1+3=2\\), \\(\\lim\\limits_{x\\to1}(x^2-4x+5)=1-4+5=2\\).<br>양 끝이 모두 \\(2\\)로 수렴하므로 샌드위치 정리에 의해 \\(\\lim\\limits_{x\\to1}f(x)=2\\)." },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.24 · PartⅢ · 핵심태도</span><br>Q7. 함수의 극한 계산에서 부정형에 대해 다음 질문에 답하시오.<br>① 부정형이란 무엇인가?<br>② 부정형을 계산할 때 가장 중요한 목표는 무엇인가?<br>③ 고교과정에서 주로 다루는 부정형 4가지를 쓰시오.<br>④ 함수의 극한 계산 문제를 보면 가장 먼저 무엇을 해야 하는가?<br>⑤ 꼴을 파악한 뒤에는 무엇을 해야 하는가?", answer: "O", hint: "형태만으로 값이 정해지지 않는 꼴 / 부정형을 없애기", explanation: "① \\(x\\)가 향하는 값을 대입했을 때 값이 하나로 정해지지 않는 꼴(형태만으로는 극한값을 알 수 없는 꼴).<br>② 부정형을 없애 수렴하는(값이 정해지는) 꼴로 바꾸는 것.<br>③ \\(\\dfrac{0}{0},\\ \\dfrac{\\infty}{\\infty},\\ \\infty-\\infty,\\ 0\\times\\infty\\)<br>④ \\(x\\)가 향하는 값을 대입해 어떤 꼴(부정형)인지 파악한다.<br>⑤ 그 꼴에 맞는 계산 방법(인수분해·약분, 유리화, 최고차항으로 나누기 등)을 정해 부정형을 없앤다." },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.24 · PartⅢ · 핵심태도</span><br>Q8. 다음 각 극한에 대해 ① \\(x\\)가 향하는 값을 대입했을 때 나오는 부정형의 꼴, ② 그 부정형을 해결하기 위해 먼저 떠올릴 계산 방법을 쓰시오.<br>[계산 방법] ㉠ 공통인수로 인수분해 후 약분 · ㉡ 최고차항의 계수비 확인 · ㉢ 유리화 · ㉣ \\(\\dfrac{0}{0}\\) 또는 \\(\\dfrac{\\infty}{\\infty}\\) 꼴로 식 변형<br>⑴ \\(\\lim\\limits_{x\\to1}\\dfrac{x^2-1}{x-1}\\)<br>⑵ \\(\\lim\\limits_{x\\to\\infty}\\dfrac{4x-1}{x+3}\\)<br>⑶ \\(\\lim\\limits_{x\\to\\infty}(\\sqrt{x^2+2x}-x)\\)<br>⑷ \\(\\lim\\limits_{x\\to0}\\dfrac{1}{x}\\left(1-\\dfrac{1}{x+1}\\right)\\)", answer: "O", hint: "각 식의 꼴: 0/0, ∞/∞, ∞−∞, ∞×0", explanation: "⑴ 꼴 \\(\\dfrac{0}{0}\\) / 방법 ㉠ (인수분해 후 약분)<br>⑵ 꼴 \\(\\dfrac{\\infty}{\\infty}\\) / 방법 ㉡ (최고차항 계수비)<br>⑶ 꼴 \\(\\infty-\\infty\\) / 방법 ㉢ (유리화)<br>⑷ 꼴 \\(\\infty\\times0\\) / 방법 ㉣ 후 ㉠ — 통분해 \\(\\dfrac{0}{0}\\) 꼴로 바꾼 뒤 약분(정리하면 \\(\\dfrac{1}{x+1}\\to1\\))." },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.25 · Thema7 · 개념·발상&알고리즘7</span><br>Q9. \\(\\dfrac{0}{0}\\) 꼴의 계산법을 빈칸에 맞게 말하시오.<br>① \\(x=a\\)를 대입했을 때 분자와 분모가 모두 \\(0\\)이면 __________ 꼴이다.<br>② 분자 또는 분모를 __________하여 공통인수 \\((x-a)^n\\)을 찾는다.<br>③ 공통인수를 __________한 뒤 \\(x=a\\)를 대입한다.<br>④ 분모 또는 분자에 \\(\\sqrt{\\ }\\)가 있으면 먼저 __________를 한다.<br>⑤ \\(\\dfrac{0}{0}\\) 꼴이 수렴한다면 분자와 분모가 보통 __________라는 공통인수를 가진다고 생각한다.", answer: "O", hint: "0/0 / 인수분해 / 약분 / 유리화 / (x−a)", explanation: "① \\(\\dfrac{0}{0}\\)<br>② 인수분해<br>③ 약분<br>④ 유리화<br>⑤ \\((x-a)\\)" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.25~26 · Thema7 · 예시문제2</span><br>Q10. 다음 극한값을 구하시오.<br>\\[\\lim\\limits_{x\\to2}\\dfrac{\\sqrt{x-1}-1}{x-2}\\]", answer: "O", hint: "분자를 유리화", explanation: "분자·분모에 \\(\\sqrt{x-1}+1\\)을 곱하면<br>\\(\\dfrac{(\\sqrt{x-1}-1)(\\sqrt{x-1}+1)}{(x-2)(\\sqrt{x-1}+1)}=\\dfrac{x-2}{(x-2)(\\sqrt{x-1}+1)}=\\dfrac{1}{\\sqrt{x-1}+1}\\).<br>\\(x=2\\)를 대입하면 \\(\\dfrac{1}{\\sqrt{1}+1}=\\dfrac{1}{2}\\)." },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.26 · Thema7 · 스킬2</span><br>Q11. 로피탈에 대해 다음 빈칸을 채우시오.<br>① 로피탈은 \\(\\dfrac{0}{0}\\) 꼴을 계산할 수 있는 __________이다.<br>② \\(x^n\\)을 미분하면 __________이 된다.<br>③ 로피탈을 사용할 때는 분모와 분자를 각각 __________한다.<br>④ 로피탈은 계산을 편하게 하는 스킬일 뿐, 먼저 익혀야 할 풀이는 __________이 되는 풀이이다.", answer: "O", hint: "스킬 / nxⁿ⁻¹ / 미분 / 기본(정석)", explanation: "① 스킬(계산 방법)<br>② \\(nx^{n-1}\\)<br>③ 미분<br>④ 기본(정석) — 인수분해·약분 같은 기본 풀이" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.27 · Thema7 · 예시문제8</span><br>Q12. 다음 극한값을 구하시오.<br>\\[\\lim\\limits_{x\\to2}\\dfrac{x^2-4}{2x^2-3x-2}+\\lim\\limits_{x\\to-1}\\dfrac{x+1}{\\sqrt{x^2+3}-2}\\]", answer: "O", hint: "앞은 인수분해, 뒤는 유리화", explanation: "앞: \\(\\dfrac{x^2-4}{2x^2-3x-2}=\\dfrac{(x-2)(x+2)}{(2x+1)(x-2)}=\\dfrac{x+2}{2x+1}\\to\\dfrac{4}{5}\\).<br>뒤: 분모를 유리화하면 \\(\\dfrac{(x+1)(\\sqrt{x^2+3}+2)}{x^2-1}=\\dfrac{(x+1)(\\sqrt{x^2+3}+2)}{(x-1)(x+1)}=\\dfrac{\\sqrt{x^2+3}+2}{x-1}\\to\\dfrac{2+2}{-2}=-2\\).<br>따라서 \\(\\dfrac{4}{5}+(-2)=-\\dfrac{6}{5}\\)." },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.28 · Thema8 · 개념·발상&알고리즘8</span><br>Q13. \\(\\dfrac{\\infty}{\\infty}\\) 꼴의 계산법에 대해 다음 질문에 답하시오.<br>① 방법1에서는 분모와 분자를 무엇으로 나누는가?<br>② 방법2에서는 분모와 분자의 무엇을 비교하는가?<br>③ 분모의 차수가 분자의 차수보다 크면 극한값은 어떻게 되는가?<br>④ 분모의 차수와 분자의 차수가 같으면 극한값은 무엇인가?<br>⑤ 분모의 차수가 분자의 차수보다 작으면 극한은 어떻게 되는가?", answer: "O", hint: "분모 최고차항으로 나눔 / 차수 비교", explanation: "① 분모의 최고차항(예: \\(x^n\\))으로 분모·분자를 모두 나눈다.<br>② 분모와 분자의 최고차항의 차수를 비교한다.<br>③ \\(0\\)으로 수렴한다.<br>④ 분모·분자의 최고차항의 계수의 비(계수비).<br>⑤ 발산한다(\\(\\pm\\infty\\))." },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.28~29 · Thema8 · 예시문제1~4</span><br>Q14. 다음 극한값을 구하시오.<br>① \\(\\lim\\limits_{x\\to\\infty}\\dfrac{x^2-x+5}{4x^2-x-1}\\)<br>② \\(\\lim\\limits_{x\\to\\infty}\\dfrac{x-1}{2x^2+3x+1}\\)<br>③ \\(\\lim\\limits_{x\\to\\infty}\\dfrac{x^3}{2x^3+7x+1}\\)<br>④ \\(\\lim\\limits_{x\\to\\infty}\\dfrac{2x^2+3x+1}{x-1}\\)", answer: "O", hint: "차수 같으면 계수비, 분모차수 크면 0, 분자차수 크면 발산", explanation: "① 차수 같음 → 계수비 \\(\\dfrac{1}{4}\\)<br>② 분모 차수가 큼 → \\(0\\)<br>③ 차수 같음 → \\(\\dfrac{1}{2}\\)<br>④ 분자 차수가 큼 → 발산(\\(\\infty\\))" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.29 · Thema8 · 참고7</span><br>Q15. \\(\\dfrac{\\infty}{\\infty}\\) 꼴에서 분모의 최고차항 차수로 나누는 이유를 빈칸에 맞게 말하시오.<br>① 바로 \\(\\lim\\)를 분배하기 어려운 이유는 각각의 함수들이 __________하는 형태가 아니기 때문이다.<br>② 분모와 분자의 모든 항을 최고차항 차수로 나누면 식이 __________하는 형태로 바뀐다.<br>③ 식이 수렴하는 형태가 되면 \\(\\lim\\)를 __________할 수 있다.", answer: "O", hint: "수렴 / 수렴 / 분배(나누어 계산)", explanation: "① 수렴<br>② 수렴<br>③ 분배(각 항에 나누어 적용)" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.30 · Thema8 · 스킬3</span><br>Q16. 소거법에 대해 다음 빈칸을 채우시오.<br>① 소거법은 \\(\\infty\\)를 “한없이 커지는 상태”가 아니라 “__________ 큰 상태”로 보는 관점에서 출발한다.<br>② \\(\\infty\\pm\\)(숫자)에서 숫자는 __________할 수 있다.<br>③ 다항식에서는 최고차항보다 낮은 차수의 항을 __________할 수 있다.<br>④ \\(\\lim\\limits_{x\\to\\infty}\\dfrac{x^2-x+5}{4x^2-x-1}\\)을 소거법으로 계산할 때 분자에는 __________만, 분모에는 __________만 남는다.", answer: "O", hint: "충분히(아주) 큰 / 무시(소거) / 무시 / x²·4x²", explanation: "① 충분히(아주)<br>② 무시(소거)<br>③ 무시(소거)<br>④ 분자 \\(x^2\\), 분모 \\(4x^2\\) → \\(\\dfrac{x^2}{4x^2}=\\dfrac{1}{4}\\)" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.31 · Thema8 · 참고8</span><br>Q17. \\(\\infty\\)의 사칙연산에 대해 O/X로 판단하시오.<br>① \\(\\infty\\)는 숫자이므로 일반적인 사칙연산을 그대로 해도 된다.<br>② 분모가 \\(\\infty\\)이고 분자가 상수(숫자)인 분수는 \\(0\\)으로 수렴한다.<br>③ \\(\\dfrac{\\infty}{\\infty}=1\\)로 계산할 수 있다.<br>④ \\(\\infty-\\infty=0\\)으로 계산할 수 있다.<br>⑤ \\(\\dfrac{\\infty}{\\infty}\\)와 \\(\\infty-\\infty\\)는 부정형이다.<br>⑥ \\(\\infty+\\infty\\)는 \\(\\infty\\)로 생각할 수 있다.", answer: "O", hint: "①X ②O ③X ④X ⑤O ⑥O", explanation: "① X (\\(\\infty\\)는 숫자가 아니라 상태를 나타내는 기호)<br>② O<br>③ X (\\(\\dfrac{\\infty}{\\infty}\\)는 부정형이라 \\(1\\)이라 할 수 없음)<br>④ X (\\(\\infty-\\infty\\)는 부정형이라 \\(0\\)이라 할 수 없음)<br>⑤ O<br>⑥ O (둘 다 한없이 커지므로 \\(\\infty\\))" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.31 · Thema8 · 발상&알고리즘9</span><br>Q18. \\(x\\to-\\infty\\)일 때 극한 계산법을 빈칸에 맞게 말하시오.<br>① \\(x\\to-\\infty\\)일 때는 보통 __________ 쪽으로 접근한다.<br>② 경우에 따라 \\(x=\\)__________로 치환하고, \\(t\\to\\)__________로 바꾸어 계산할 수 있다.<br>③ \\(\\sqrt{x^2}\\)은 \\(x\\to\\infty\\)일 때는 __________처럼 처리할 수 있다.<br>④ \\(\\sqrt{x^2}\\)은 \\(x\\to-\\infty\\)일 때는 부호에 주의해야 하므로 __________처럼 처리된다.", answer: "O", hint: "음수 / x=−t / t→∞ / √x²=|x|", explanation: "① 음수(음의 방향)<br>② \\(x=-t\\) / \\(t\\to\\infty\\)<br>③ \\(\\sqrt{x^2}=|x|=x\\) (\\(x>0\\))<br>④ \\(\\sqrt{x^2}=|x|=-x\\) (\\(x<0\\))" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.31 · Thema8 · 예시</span><br>Q19. 다음 극한값을 구하시오.<br>① \\(\\lim\\limits_{x\\to\\infty}\\dfrac{4x-1}{x+3}\\)<br>② \\(\\lim\\limits_{x\\to-\\infty}\\dfrac{4x-1}{x+3}\\)<br>③ \\(\\lim\\limits_{x\\to\\infty}\\dfrac{2x+1}{\\sqrt{x^2+2x}+2x}\\)<br>④ \\(\\lim\\limits_{x\\to-\\infty}\\dfrac{2x+1}{\\sqrt{x^2+2x}+2x}\\)", answer: "O", hint: "③④는 분모·분자를 x로 나누되 √x²=|x| 주의", explanation: "① 차수 같음, 계수비 \\(\\dfrac{4}{1}=4\\)<br>② 마찬가지로 \\(4\\)<br>③ \\(x>0\\): 분자·분모를 \\(x\\)로 나누면 분자 \\(\\to2\\), 분모 \\(\\sqrt{1+2/x}+2\\to1+2=3\\) → \\(\\dfrac{2}{3}\\)<br>④ \\(x<0\\)이라 \\(x=-t\\ (t\\to\\infty)\\): \\(t\\)로 나누면 분자 \\(\\to-2\\), 분모 \\(\\sqrt{1-2/t}-2\\to1-2=-1\\) → \\(\\dfrac{-2}{-1}=2\\)" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.32 · Thema9 · 개념·발상&알고리즘10</span><br>Q20. \\(\\infty-\\infty\\) 꼴의 계산법을 빈칸에 맞게 말하시오.<br>① \\(\\infty-\\infty\\)처럼 뺄셈 꼴이 나오면 먼저 __________를 생각한다.<br>② 유리화를 하면 보통 __________ 꼴로 바뀐다.<br>③ 그 뒤에는 최고차항 나누기, 계수비, __________ 등을 활용한다.<br>④ 특히 (같은 차수의 근호식) \\(-\\) (같은 차수의 근호식) 꼴이면 __________를 떠올린다.", answer: "O", hint: "유리화 / ∞÷∞(분수) / 소거법 / 유리화", explanation: "① 유리화<br>② 분수(\\(\\dfrac{\\infty}{\\infty}\\))<br>③ 소거법<br>④ 유리화" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.32 · Thema9 · 예시문제1</span><br>Q21. 다음 극한값을 구하시오.<br>\\[\\lim\\limits_{x\\to\\infty}(\\sqrt{x^2+2x}-x)\\]", answer: "O", hint: "유리화 후 x로 나눔", explanation: "\\(\\sqrt{x^2+2x}-x=\\dfrac{(x^2+2x)-x^2}{\\sqrt{x^2+2x}+x}=\\dfrac{2x}{\\sqrt{x^2+2x}+x}\\).<br>분모·분자를 \\(x\\)로 나누면 \\(\\dfrac{2}{\\sqrt{1+2/x}+1}\\to\\dfrac{2}{1+1}=1\\)." },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.33 · Thema9 · 참고9</span><br>Q22. \\(\\infty-\\infty\\) 꼴에서 유리화를 할지 판단하는 기준을 말하시오.<br>① 유리화가 효과적인 \\(\\infty-\\infty\\) 꼴은 빼는 두 항의 최고차항의 __________와 __________가 같은 경우이다.<br>② 최고차항의 차수나 계수가 같지 않다면 __________ 꼴처럼 생각하여 계산한다.<br>③ \\(\\lim\\limits_{x\\to\\infty}\\dfrac{\\sqrt{x^2+1}-\\sqrt{x-1}}{x}\\)는 유리화가 먼저인가, 최고차항 비교가 먼저인가?<br>④ \\(\\lim\\limits_{x\\to\\infty}\\dfrac{x}{\\sqrt{4x^2+1}-\\sqrt{x^2+2}}\\)는 유리화가 먼저인가, 최고차항 비교가 먼저인가?", answer: "O", hint: "차수·계수 모두 같을 때만 유리화가 효과적", explanation: "① 차수 / 계수<br>② \\(\\dfrac{\\infty}{\\infty}\\)<br>③ 최고차항 비교가 먼저 — 분자의 \\(\\sqrt{x^2+1}\\)(1차)과 \\(\\sqrt{x-1}\\)(\\(\\frac12\\)차)은 차수가 달라 상쇄가 없으므로 유리화가 필요 없다.<br>④ 최고차항 비교가 먼저 — 분모의 \\(\\sqrt{4x^2+1}\\approx2x\\)와 \\(\\sqrt{x^2+2}\\approx x\\)는 계수가 달라 상쇄가 없으므로 유리화가 필요 없다." },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.33 · Thema9 · 예시문제2,3</span><br>Q23. 다음 극한값을 구하시오.<br>① \\(\\lim\\limits_{x\\to\\infty}\\dfrac{\\sqrt{x^2+1}-\\sqrt{x-1}}{x}\\)<br>② \\(\\lim\\limits_{x\\to\\infty}\\dfrac{x}{\\sqrt{4x^2+1}-\\sqrt{x^2+2}}\\)", answer: "O", hint: "최고차항만 남기고 비교", explanation: "① 분자에서 \\(\\sqrt{x^2+1}\\approx x\\), \\(\\sqrt{x-1}\\)은 \\(x\\)에 비해 무시 → \\(\\dfrac{x}{x}=1\\).<br>② 분모 \\(\\sqrt{4x^2+1}\\approx2x\\), \\(\\sqrt{x^2+2}\\approx x\\) → 분모 \\(\\approx2x-x=x\\) → \\(\\dfrac{x}{x}=1\\)." },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.34 · Thema9 · 스킬4</span><br>Q24. \\(\\sqrt{\\ }\\)(이차식) 꼴을 빠르게 처리하는 방법을 빈칸에 맞게 말하시오.<br>① \\(\\sqrt{\\ }\\)(이차식) 꼴이 등장하면 이차식을 __________으로 바꾸어 생각할 수 있다.<br>② 이 방법은 \\(\\infty\\)에서 __________ 차이는 무시할 수 있다는 성질 때문에 가능하다.<br>③ \\(\\lim\\limits_{x\\to\\infty}(\\sqrt{x^2+6x}-x)\\)에서 \\(x^2+6x\\)를 완전제곱식으로 만들기 위해 더하는 숫자는 __________이다.<br>④ \\(x^2+6x+9\\)를 완전제곱식으로 쓰면 __________이다.", answer: "O", hint: "완전제곱식 / 상수 / 9 / (x+3)²", explanation: "① 완전제곱식<br>② 상수(낮은 차수 항)<br>③ \\(9\\) (\\(x^2+6x+9=(x+3)^2\\))<br>④ \\((x+3)^2\\)" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.34 · Thema9 · 예시문제4</span><br>Q25. 다음 극한값을 구하시오.<br>\\[\\lim\\limits_{x\\to\\infty}(\\sqrt{x^2+6x}-x)\\]", answer: "O", hint: "유리화 후 x로 나눔", explanation: "\\(\\sqrt{x^2+6x}-x=\\dfrac{6x}{\\sqrt{x^2+6x}+x}\\).<br>분모·분자를 \\(x\\)로 나누면 \\(\\dfrac{6}{\\sqrt{1+6/x}+1}\\to\\dfrac{6}{1+1}=3\\)." },
    ] },
    { id: 3, name: "3강", questions: [
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.35 · Thema10 · 개념</span><br>Q1. \\(0\\times\\infty\\) 꼴의 부정형 계산법을 말하시오.<br>① \\(0\\times\\infty\\) 꼴이 나오면 먼저 식을 어떻게 조작하는가?<br>② 식을 조작한 뒤 어떤 꼴로 바꾸어 계산하는가? 가능한 꼴을 모두 말하시오.<br>③ 변형한 뒤에는 무엇에 맞게 계산법을 적용하는가?", answer: "O", hint: "분수 꼴로 만들어 0/0 또는 ∞/∞ 로", explanation: "① 통분·유리화·인수분해 등으로 식을 한 덩어리(분수 꼴)로 만든다.<br>② \\(\\dfrac{0}{0}\\) 또는 \\(\\dfrac{\\infty}{\\infty}\\) 꼴(그 밖에 \\(\\infty\\times a\\), \\(\\dfrac{a}{\\infty}\\)처럼 수렴을 판단할 수 있는 꼴)로 바꾼다.<br>③ 바뀐 꼴(부정형)에 맞는 계산법을 적용한다." },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.35 · Thema10 · 발상&알고리즘11</span><br>Q2. \\(0\\times\\infty\\) 꼴이 등장했을 때의 풀이 순서를 빈칸에 맞게 말하시오.<br>① 1단계 : 식 조작을 한다. 이때 __________, __________, __________를 이용한다.<br>② 2단계 : \\(\\dfrac{0}{0},\\ \\dfrac{\\infty}{\\infty},\\ \\infty\\times a,\\ \\dfrac{a}{\\infty}\\) 꼴 중 하나로 __________한다.<br>③ 3단계 : 각 꼴에 맞는 __________을 취한다.", answer: "O", hint: "통분·유리화·인수분해 / 변형 / 극한(계산법)", explanation: "① 통분 · 유리화 · 인수분해<br>② 변형(전환)<br>③ 극한(각 꼴에 맞는 계산법)" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.35 · Thema10 · 예시문제2</span><br>Q3. 다음 극한값을 구하시오.<br>\\[\\lim\\limits_{x\\to\\infty}x\\left(1-\\dfrac{x}{x+1}\\right)\\]", answer: "O", hint: "괄호 안을 통분해 약분", explanation: "\\(x\\cdot\\dfrac{(x+1)-x}{x+1}=x\\cdot\\dfrac{1}{x+1}=\\dfrac{x}{x+1}\\to1\\)" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.36 · Thema10 · 예시문제9</span><br>Q4. 다음 극한값을 구하시오.<br>① \\(\\lim\\limits_{x\\to2}\\dfrac{x^2-x-2}{x-2}\\)<br>② \\(\\lim\\limits_{x\\to\\infty}\\left\\{\\sqrt{x^2+4x+1}-\\sqrt{x^2-4x+1}\\right\\}\\)<br>③ \\(\\lim\\limits_{x\\to1}(\\sqrt{x}-1)\\left(1+\\dfrac{3}{x-1}\\right)\\)<br>④ \\(\\lim\\limits_{x\\to-\\infty}\\dfrac{\\sqrt{x^2+3}}{x}\\)<br>⑤ \\(\\lim\\limits_{x\\to0}\\dfrac{\\sqrt{1+x}-\\sqrt{1+2x^2}}{\\sqrt{1-2x}-\\sqrt{1+x^2}}\\)", answer: "O", hint: "①인수분해 ②유리화 ③통분·약분 ④√x²=|x| ⑤분자·분모 각각 유리화", explanation: "① \\(\\dfrac{(x-2)(x+1)}{x-2}=x+1\\to3\\)<br>② 유리화 → \\(\\dfrac{8x}{\\sqrt{x^2+4x+1}+\\sqrt{x^2-4x+1}}\\), \\(x\\)로 나누면 \\(\\dfrac{8}{1+1}=4\\)<br>③ \\((\\sqrt{x}-1)\\cdot\\dfrac{x+2}{x-1}=\\dfrac{(\\sqrt{x}-1)(x+2)}{(\\sqrt{x}-1)(\\sqrt{x}+1)}=\\dfrac{x+2}{\\sqrt{x}+1}\\to\\dfrac{3}{2}\\)<br>④ \\(x\\to-\\infty\\)이므로 \\(\\sqrt{x^2+3}=|x|\\sqrt{1+3/x^2}=-x\\sqrt{1+3/x^2}\\) → \\(\\dfrac{-x\\sqrt{1+3/x^2}}{x}\\to-1\\)<br>⑤ 분자·분모를 각각 유리화하면 \\(\\dfrac{x(1-2x)/(\\sqrt{1+x}+\\sqrt{1+2x^2})}{-x(2+x)/(\\sqrt{1-2x}+\\sqrt{1+x^2})}\\to\\dfrac{1/2}{-1}=-\\dfrac{1}{2}\\)" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.37 · Thema10 · 예시문제10</span><br>Q5. 함수 \\(f(x)=\\dfrac{\\sqrt{x^2-4x+9}-3}{x-4}\\)에 대하여 \\(\\lim\\limits_{x\\to\\infty}f(x)=a,\\ \\lim\\limits_{x\\to4}f(x)=b\\)일 때, \\(3ab\\)의 값을 구하시오.", answer: "O", hint: "a는 최고차 비교, b는 x=4에서 유리화", explanation: "\\(a=\\lim\\limits_{x\\to\\infty}\\dfrac{\\sqrt{x^2-4x+9}-3}{x-4}\\): 분모·분자를 \\(x\\)로 나누면 \\(\\dfrac{\\sqrt{1-4/x+9/x^2}-3/x}{1-4/x}\\to\\dfrac{1}{1}=1\\) → \\(a=1\\).<br>\\(b=\\lim\\limits_{x\\to4}f(x)\\): \\(x=4\\)에서 \\(\\dfrac{0}{0}\\), 유리화하면 \\(\\dfrac{(x^2-4x+9)-9}{(x-4)(\\sqrt{x^2-4x+9}+3)}=\\dfrac{x(x-4)}{(x-4)(\\sqrt{\\cdots}+3)}=\\dfrac{x}{\\sqrt{x^2-4x+9}+3}\\to\\dfrac{4}{3+3}=\\dfrac{2}{3}\\) → \\(b=\\dfrac{2}{3}\\).<br>따라서 \\(3ab=3\\cdot1\\cdot\\dfrac{2}{3}=2\\)." },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.37 · Thema10 · 예시문제11</span><br>Q6. 다음 식을 만족하는 상수 \\(a\\)와 \\(n\\)의 값을 구하시오. (단, \\(a>0\\))<br>\\[\\lim\\limits_{x\\to\\infty}\\left\\{\\sqrt{x^n+4x}-ax\\right\\}=2\\]", answer: "O", hint: "√ 안이 x²이어야 유한, 유리화", explanation: "유한한 값이 나오려면 \\(\\sqrt{x^n+4x}\\)가 \\(ax\\)와 같은 차수여야 하므로 \\(n=2\\).<br>\\(\\sqrt{x^2+4x}-ax\\)에서 최고차 계수를 맞추면 \\(a=1\\).<br>확인: \\(\\sqrt{x^2+4x}-x=\\dfrac{4x}{\\sqrt{x^2+4x}+x}\\to\\dfrac{4}{1+1}=2\\). ✔ 따라서 \\(a=1,\\ n=2\\)." },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.38 · Thema10 · 예시문제12</span><br><span data-figure='pending' style='display:inline-block;margin:0.4rem 0;padding:0.35rem 0.7rem;border:1px dashed #f59e0b;border-radius:0.5rem;color:#f59e0b;font-size:0.78rem;font-weight:700'>📷 교재 그림 자리 — 나중에 여기에 그림 삽입 (data-figure)</span><br>Q7. 함수 \\(y=\\sqrt{2x}\\)의 그래프 위의 점 \\(P(t,\\ \\sqrt{2t})\\)에서 \\(x\\)축에 내린 수선의 발을 \\(Q\\)라 하자. 다음 극한값을 구하시오. (단, \\(O\\)는 원점이다.)<br>\\[\\lim\\limits_{t\\to\\infty}\\dfrac{\\overline{OP}}{\\overline{OQ}}\\]", answer: "O", hint: "Q=(t,0), OP=√(t²+2t), OQ=t", explanation: "\\(Q\\)는 \\(P\\)에서 \\(x\\)축에 내린 발이므로 \\(Q(t,0)\\).<br>\\(\\overline{OP}=\\sqrt{t^2+(\\sqrt{2t})^2}=\\sqrt{t^2+2t}\\), \\(\\overline{OQ}=t\\).<br>\\(\\dfrac{\\overline{OP}}{\\overline{OQ}}=\\dfrac{\\sqrt{t^2+2t}}{t}=\\sqrt{1+\\dfrac{2}{t}}\\to1\\)." },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.39 · Thema11 · 개념</span><br>Q8. 미정계수의 결정에서 다음 조건이 주어졌을 때 알 수 있는 결론을 말하시오.<br>① \\(\\lim\\limits_{x\\to a}\\dfrac{f(x)}{g(x)}=\\alpha,\\ \\lim\\limits_{x\\to a}g(x)=0\\)이면 \\(\\lim\\limits_{x\\to a}f(x)\\)는 무엇인가?<br>② \\(\\lim\\limits_{x\\to a}\\dfrac{f(x)}{g(x)}=\\alpha\\ (\\alpha\\ne0),\\ \\lim\\limits_{x\\to a}f(x)=0\\)이면 \\(\\lim\\limits_{x\\to a}g(x)\\)는 무엇인가?<br>③ \\(\\lim\\limits_{x\\to a}f(x)g(x)=\\alpha,\\ \\lim\\limits_{x\\to a}|g(x)|=\\infty\\)이면 \\(\\lim\\limits_{x\\to a}f(x)\\)는 무엇인가?<br>④ \\(\\lim\\limits_{x\\to a}f(x)g(x)=\\alpha\\ (\\alpha\\ne0),\\ \\lim\\limits_{x\\to a}f(x)=0\\)이면 \\(\\lim\\limits_{x\\to a}|g(x)|\\)는 무엇인가?", answer: "O", hint: "①0 ②0 ③0 ④∞", explanation: "① \\(0\\) — \\(f=\\dfrac{f}{g}\\cdot g\\to\\alpha\\cdot0=0\\)<br>② \\(0\\) — \\(g=f\\div\\dfrac{f}{g}\\to0\\div\\alpha=0\\)<br>③ \\(0\\) — \\(|g|\\to\\infty\\)인데 곱이 유한하려면 \\(f\\to0\\)<br>④ \\(\\infty\\) — 곱이 \\(0\\)이 아닌데 \\(f\\to0\\)이면 \\(|g|\\to\\infty\\)" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.39 · Thema11 · 참고10</span><br>Q9. 다음 상황에서 \\(\\square\\)에 들어갈 극한 상태를 말하시오.<br>① \\(\\infty-\\square=\\)(숫자)가 되려면 \\(\\square\\)는 어떤 상태여야 하는가?<br>② \\(\\square\\)가 유한한 숫자라면 \\(\\infty-\\square\\)는 유한한 숫자가 될 수 있는가?<br>③ \\(\\infty-\\square=\\)(숫자) 꼴은 어떤 부정형으로 바뀌어야 유한한 값이 나올 수 있는가?", answer: "O", hint: "①∞로 발산 ②아니다 ③∞−∞", explanation: "① \\(\\square\\)도 \\(\\infty\\)로 발산해야 한다.<br>② 될 수 없다. (\\(\\infty-\\)(유한)\\(=\\infty\\))<br>③ \\(\\infty-\\infty\\) 부정형으로 바뀌어야 유한한 값이 나올 수 있다." },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.39 · Thema11 · 예시문제1</span><br>Q10. 함수 \\(f(x)=ax+b\\)에 대하여 \\(\\lim\\limits_{x\\to\\infty}\\left\\{(x+2)-f(x)\\right\\}=3\\)을 만족할 때, \\(a,\\ b\\)의 값을 구하시오.", answer: "O", hint: "x의 계수는 0이 되어야 유한", explanation: "\\((x+2)-(ax+b)=(1-a)x+(2-b)\\).<br>유한한 값이 되려면 \\(x\\)의 계수 \\(1-a=0\\) → \\(a=1\\).<br>남은 상수 \\(2-b=3\\) → \\(b=-1\\). 따라서 \\(a=1,\\ b=-1\\)." },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.40 · Thema11 · 발상&알고리즘12</span><br>Q11. 미정계수의 결정을 언제 떠올리는지 빈칸에 맞게 말하시오.<br>극한식에 __________가 포함되어 있으면 미정계수의 결정을 떠올린다.", answer: "O", hint: "아직 정해지지 않은 문자 상수(미지수)", explanation: "미지수(아직 정해지지 않은 문자 상수, 즉 미정계수)<br>극한값이 주어졌는데 식 안에 \\(a,\\ b\\) 같은 미지의 상수가 있으면, 그 값을 결정하는 문제로 본다." },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.40 · Thema11 · 예시문제2</span><br>Q12. 다음 등식이 성립하도록 상수 \\(a,\\ b\\)의 값을 구하시오.<br>\\[\\lim\\limits_{x\\to1}\\dfrac{a\\sqrt{x}+b}{x-1}=2\\]", answer: "O", hint: "분모→0이므로 분자도 →0", explanation: "분모 \\(\\to0\\)이고 극한이 유한하므로 분자도 \\(\\to0\\): \\(a\\sqrt{1}+b=a+b=0\\) → \\(b=-a\\).<br>\\(\\dfrac{a(\\sqrt{x}-1)}{x-1}=\\dfrac{a(\\sqrt{x}-1)}{(\\sqrt{x}-1)(\\sqrt{x}+1)}=\\dfrac{a}{\\sqrt{x}+1}\\to\\dfrac{a}{2}\\).<br>\\(\\dfrac{a}{2}=2\\) → \\(a=4,\\ b=-4\\)." },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.41 · Thema11 · 예시문제13</span><br>Q13. 다음 등식이 성립하도록 상수 \\(a,\\ b\\)의 값을 구하시오.<br>① \\(\\lim\\limits_{x\\to2}\\dfrac{ax^2+bx+2}{x-2}=5\\)<br>② \\(\\lim\\limits_{x\\to2}\\dfrac{a\\sqrt{x+2}+b}{x-2}=\\dfrac{1}{4}\\)", answer: "O", hint: "분모→0이므로 분자도 x=2에서 →0", explanation: "① 분자가 \\(x=2\\)에서 \\(0\\): \\(4a+2b+2=0\\). 인수분해 \\(ax^2+bx+2=(x-2)(ax-1)\\)이라 하면 극한 \\(=\\lim(ax-1)=2a-1=5\\) → \\(a=3\\), 이때 \\(b=-7\\). (검산: \\(3x^2-7x+2=(x-2)(3x-1)\\) ✔)<br>② 분자가 \\(x=2\\)에서 \\(0\\): \\(2a+b=0\\) → \\(b=-2a\\). 유리화하면 \\(\\dfrac{a(\\sqrt{x+2}-2)}{x-2}=\\dfrac{a}{\\sqrt{x+2}+2}\\to\\dfrac{a}{4}=\\dfrac{1}{4}\\) → \\(a=1,\\ b=-2\\)." },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.41 · Thema11 · 예시문제14</span><br>Q14. 다음 등식이 성립하도록 하는 상수 \\(a,\\ b,\\ c\\)에 대하여 \\(a+b+c\\)의 값을 구하시오.<br>\\[\\lim\\limits_{x\\to2}\\dfrac{3x^2+ax+b}{(x-2)^2}=c\\]", answer: "O", hint: "분자가 (x−2)²로 나누어떨어져야", explanation: "분모가 \\((x-2)^2\\), 분자는 최고차 계수 \\(3\\)인 이차식이므로 유한한 극한이 되려면 분자 \\(=3(x-2)^2=3x^2-12x+12\\).<br>따라서 \\(a=-12,\\ b=12\\)이고 극한값 \\(c=3\\).<br>\\(a+b+c=-12+12+3=3\\)." },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.42 · Thema11 · 예시문제15</span><br>Q15. 함수 \\(f(x)\\)에 대하여 \\(\\lim\\limits_{x\\to2}\\dfrac{f(x)-3}{x-2}=5\\)일 때, 다음 극한값을 구하시오.<br>\\[\\lim\\limits_{x\\to2}\\dfrac{x-2}{f(x)^2-9}\\]", answer: "O", hint: "f(x)²−9=(f(x)−3)(f(x)+3), f(2)=3", explanation: "조건에서 분모 \\(\\to0\\)이고 극한이 유한하므로 \\(f(2)=3\\).<br>\\(\\dfrac{x-2}{f(x)^2-9}=\\dfrac{x-2}{(f(x)-3)(f(x)+3)}=\\dfrac{1}{\\dfrac{f(x)-3}{x-2}}\\cdot\\dfrac{1}{f(x)+3}\\to\\dfrac{1}{5}\\cdot\\dfrac{1}{3+3}=\\dfrac{1}{30}\\)." },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.42 · Thema12 · 개념</span><br>Q16. \\(\\dfrac{0}{0}\\) 꼴의 다항함수 결정에서 다음 조건이 주어졌을 때 알 수 있는 정보를 말하시오.<br>① \\(\\lim\\limits_{x\\to a}\\dfrac{g(x)}{f(x)}\\)가 \\(0\\)이 아닌 숫자이고 \\(f(a)=0\\) 또는 \\(g(a)=0\\)이면 \\(f(x),\\ g(x)\\)는 어떤 공통인수를 갖는가?<br>② \\(\\lim\\limits_{x\\to0}\\dfrac{f(x)}{x^n}=\\alpha\\)이면 \\(f(x)\\)는 어떤 꼴로 나타낼 수 있는가? (\\(f(x)=x^n h(x)\\) 꼴로 답할 것)<br>③ ②에서 \\(h(0)\\)의 값은 무엇인가?<br>④ \\(\\lim\\limits_{x\\to a}\\dfrac{g(x)}{(x-a)^n}=\\beta\\)이면 \\(g(x)\\)는 어떤 꼴로 나타낼 수 있는가?<br>⑤ ④에서 \\(h(a)\\)의 값은 무엇인가?", answer: "O", hint: "둘 다 (x−a)를 인수로; f=xⁿh, g=(x−a)ⁿh", explanation: "① 공통인수 \\((x-a)\\) (둘 다 \\(x=a\\)에서 \\(0\\)이 되어야 하므로)<br>② \\(f(x)=x^n h(x)\\)<br>③ \\(h(0)=\\alpha\\)<br>④ \\(g(x)=(x-a)^n h(x)\\)<br>⑤ \\(h(a)=\\beta\\)" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.43 · Thema12 · 참고11</span><br>Q17. \\(f(x)\\)가 다항함수일 때, 다음 조건에서 \\(f(x)\\)의 인수 정보를 말하시오.<br>① \\(\\lim\\limits_{x\\to a}\\dfrac{f(x)}{(x-a)^n}=0\\)이면 \\(f(x)\\)는 \\((x-a)\\)를 최소 몇 개 인수로 갖는가?<br>② \\(\\lim\\limits_{x\\to a}\\dfrac{(x-a)^n}{f(x)}=0\\)이면 \\(f(x)\\)는 \\((x-a)\\)를 최대 몇 개까지 인수로 가질 수 있는가?<br>③ \\(\\lim\\limits_{x\\to1}\\dfrac{f(x)}{(x-1)^2}=0\\)이면 \\(f(x)\\)의 인수 \\((x-1)\\)의 차수는 \\(2\\)보다 큰가, 작은가?<br>④ \\(\\lim\\limits_{x\\to1}\\dfrac{(x-1)^2}{f(x)}=0\\)이면 \\(f(x)\\)의 인수 \\((x-1)\\)의 차수는 \\(2\\)보다 큰가, 작은가?", answer: "O", hint: "①n+1개 ②n−1개 ③크다 ④작다", explanation: "① 최소 \\(n+1\\)개 (차수가 \\(n\\)보다 커야 분자가 더 빨리 \\(0\\)이 됨)<br>② 최대 \\(n-1\\)개 (차수가 \\(n\\)보다 작아야 분모가 덜 빨리 \\(0\\)이 되어 전체가 \\(0\\))<br>③ \\(2\\)보다 크다<br>④ \\(2\\)보다 작다" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.43 · Thema12 · 스킬5</span><br>Q18. 다항함수 \\(f(x)\\)에 대하여 다음 조건이 주어졌을 때 알 수 있는 정보를 말하시오.<br>\\[\\lim\\limits_{x\\to0}\\dfrac{f(x)}{x^n}=\\alpha\\quad(\\alpha\\ne0)\\]① \\(f(x)\\)의 최저차항의 차수는 무엇인가?<br>② \\(f(x)\\)의 최저차항의 계수는 무엇인가?<br>③ \\(\\lim\\limits_{x\\to0}\\dfrac{f(x)}{x^3}=4\\)이면 \\(f(x)\\)의 최저차항을 쓰시오.", answer: "O", hint: "최저차항 = αxⁿ", explanation: "① 최저차항의 차수는 \\(n\\)<br>② 최저차항의 계수는 \\(\\alpha\\)<br>③ 최저차항은 \\(4x^3\\)" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.44 · Thema12 · 개념</span><br>Q19. \\(\\dfrac{\\infty}{\\infty}\\) 꼴의 다항함수 결정에서 다음 조건이 주어졌을 때 알 수 있는 정보를 말하시오.<br>\\[\\lim\\limits_{x\\to\\infty}\\dfrac{f(x)}{g(x)}=\\alpha\\quad(\\alpha\\ne0)\\]① \\(f(x)\\)와 \\(g(x)\\)의 최고차항 차수는 어떤 관계인가?<br>② 극한값 \\(\\alpha\\)는 어떤 계수의 비와 같은가?<br>③ \\(\\lim\\limits_{x\\to\\infty}\\dfrac{f(x)}{x^n}=\\alpha\\)이면 \\(f(x)\\)의 최고차항 차수는 무엇인가?<br>④ ③에서 \\(f(x)\\)의 최고차항 계수는 무엇인가?", answer: "O", hint: "차수 같음, α=최고차 계수비", explanation: "① 두 함수의 최고차항 차수가 서로 같다.<br>② \\(\\alpha\\)는 \\(f,\\ g\\)의 최고차항 계수의 비이다.<br>③ \\(f(x)\\)의 최고차항 차수는 \\(n\\)<br>④ 최고차항 계수는 \\(\\alpha\\)" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.44 · Thema12 · 개념 예시</span><br>Q20. 다음 조건에서 \\(f(x)\\)의 최고차항을 구하시오.<br>\\[\\lim\\limits_{x\\to\\infty}\\dfrac{f(x)}{2x^3}=3\\]", answer: "O", hint: "최고차항 = 3×2x³", explanation: "\\(f(x)\\)의 최고차항 차수는 \\(3\\)이고, 최고차항 계수는 \\(3\\times2=6\\).<br>따라서 최고차항은 \\(6x^3\\)." },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.44 · Thema12 · 발상&알고리즘14</span><br>Q21. \\(\\dfrac{\\infty}{\\infty}\\) 꼴에서 극한값이 \\(0\\)이 나올 때의 다항함수 정보를 말하시오.<br>① \\(\\lim\\limits_{x\\to\\infty}\\dfrac{f(x)}{x^n}=0\\)이면 \\(f(x)\\)의 차수는 \\(n\\)보다 큰가, 작은가?<br>② \\(\\lim\\limits_{x\\to\\infty}\\dfrac{f(x)}{x^2}=0\\)이면 \\(f(x)\\)의 차수는 \\(2\\)보다 큰가, 작은가?<br>③ \\(f(x)\\)의 차수가 \\(2\\)보다 크면 \\(\\lim\\limits_{x\\to\\infty}\\dfrac{f(x)}{x^2}\\)는 수렴하는가, 발산하는가?<br>④ \\(f(x)\\)의 차수가 정확히 \\(2\\)이고 최고차항 계수가 \\(0\\)이 아니면 \\(\\lim\\limits_{x\\to\\infty}\\dfrac{f(x)}{x^2}\\)는 \\(0\\)이 될 수 있는가?", answer: "O", hint: "①작다 ②작다 ③발산 ④될 수 없다", explanation: "① \\(n\\)보다 작다<br>② \\(2\\)보다 작다<br>③ 발산한다<br>④ \\(0\\)이 될 수 없다 (극한값이 최고차항 계수와 같아 \\(0\\)이 아님)" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.45 · Thema12 · 예시문제16</span><br>Q22. 다항함수 \\(f(x)\\)가 \\(\\lim\\limits_{x\\to\\infty}\\dfrac{f(x)-2x^3}{x^2}=2,\\ \\lim\\limits_{x\\to0}\\dfrac{f(x)}{x}=-3\\)을 만족시킬 때, \\(f(2)\\)의 값을 구하는 풀이 과정과 답을 쓰시오.", answer: "O", hint: "f(x)=2x³+2x²+px, 상수항·1차항 결정", explanation: "첫 조건: \\(f(x)-2x^3\\)이 \\(x^2\\)으로 나누어 \\(2\\)로 수렴하므로 \\(f(x)=2x^3+2x^2+px+q\\).<br>둘째 조건: \\(\\lim\\limits_{x\\to0}\\dfrac{f(x)}{x}\\)가 유한하려면 \\(q=0\\), 그리고 \\(\\lim\\limits_{x\\to0}(2x^2+2x+p)=p=-3\\).<br>따라서 \\(f(x)=2x^3+2x^2-3x\\), \\(f(2)=16+8-6=18\\)." },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.45 · Thema12 · 예시문제17</span><br>Q23. 다항함수 \\(f(x)\\)가 \\(\\lim\\limits_{x\\to\\infty}\\dfrac{f(x)}{x}=3\\)을 만족하고 \\(f(0)=2\\)일 때, \\(f(5)\\)를 구하시오.", answer: "O", hint: "f는 일차식 3x+b", explanation: "\\(\\dfrac{f(x)}{x}\\)가 유한(\\(=3\\))하므로 \\(f(x)\\)는 일차식 \\(f(x)=3x+b\\).<br>\\(f(0)=b=2\\) → \\(f(x)=3x+2\\), \\(f(5)=15+2=17\\)." },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.46 · Thema12 · 예시문제18</span><br>Q24. 삼차함수 \\(f(x)\\)가 \\(\\lim\\limits_{x\\to-1}\\dfrac{f(x)}{x+1}=-3,\\ \\lim\\limits_{x\\to2}\\dfrac{f(x)}{x-2}=-6\\)을 만족시킬 때, \\(f(x)\\)를 구하시오.", answer: "O", hint: "f(−1)=0, f(2)=0 → (x+1)(x−2) 인수", explanation: "두 극한이 유한하므로 \\(f(-1)=0,\\ f(2)=0\\) → \\(f(x)=(x+1)(x-2)(px+q)\\).<br>\\(\\lim\\limits_{x\\to-1}\\dfrac{f(x)}{x+1}=(x-2)(px+q)\\big|_{x=-1}=(-3)(-p+q)=-3\\) → \\(q-p=1\\).<br>\\(\\lim\\limits_{x\\to2}\\dfrac{f(x)}{x-2}=(x+1)(px+q)\\big|_{x=2}=3(2p+q)=-6\\) → \\(2p+q=-2\\).<br>연립하면 \\(p=-1,\\ q=0\\). 따라서 \\(f(x)=(x+1)(x-2)(-x)=-x^3+x^2+2x\\)." },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.46 · Thema12 · 예시문제19</span><br>Q25. 함수 \\(f(x)=\\dfrac{ax^3+bx^2+cx+d}{x^2-1}\\)가 \\(\\lim\\limits_{x\\to\\infty}f(x)=3,\\ \\lim\\limits_{x\\to1}f(x)=2\\)를 만족시킬 때, 상수 \\(a,\\ b,\\ c,\\ d\\)에 대하여 \\(a-b-c+d\\)의 값을 구하시오.", answer: "O", hint: "∞에서 유한 → a=0, b=3; x=1에서 분자=0", explanation: "\\(x\\to\\infty\\)에서 유한하려면 분자 차수 \\(\\le2\\) → \\(a=0\\), 그리고 최고차 계수비 \\(b=3\\).<br>\\(x\\to1\\)에서 유한하려면 분자가 \\(x=1\\)에서 \\(0\\): \\(3+c+d=0\\). 분자 \\(=3x^2+cx+d=(x-1)(3x+e)\\)로 놓으면 \\(f(x)=\\dfrac{3x+e}{x+1}\\), \\(\\lim\\limits_{x\\to1}=\\dfrac{3+e}{2}=2\\) → \\(e=1\\).<br>따라서 \\(c=e-3=-2,\\ d=-e=-1\\). \\(a-b-c+d=0-3-(-2)+(-1)=-2\\)." },
    ] },
    { id: 4, name: "4강", questions: [
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.77 · Thema1 · 핵심태도</span><br>Q1. 함수의 연속에서 기억해야 할 핵심 태도를 빈칸에 맞게 말하시오.<br>① 불연속 __________을 발견한다.<br>② 불연속 의심점을 제거하여 그 점을 __________점으로 만든다.", answer: "O", hint: "의심점 발견 → 연속점으로", explanation: "① 의심점<br>② 연속" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.77 · Thema1 · 개념</span><br>Q2. 함수 \\(f(x)\\)가 \\(x=a\\)에서 연속이 되기 위한 조건 3가지를 말하시오.<br>① \\(f(a)\\)가 __________한다.<br>② \\(\\lim\\limits_{x\\to a}f(x)\\)가 __________한다.<br>③ \\(\\lim\\limits_{x\\to a}f(x)\\)와 \\(f(a)\\)가 __________.", answer: "O", hint: "존재 / 존재 / 같다 (셋 다 만족해야 연속)", explanation: "① 존재(정의)<br>② 존재<br>③ 같다<br>※ 세 조건을 모두 만족해야 연속이고, 셋 중 하나라도 어긋나면 불연속이다." },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.77 · Thema1 · 개념</span><br>Q3. \\(x=a\\)에서 연속이라는 말을 극한으로 표현하시오. 다음 빈칸을 채우시오.<br>① \\(x=a\\)에서 연속 \\(\\Leftrightarrow\\) \\(\\lim\\limits_{x\\to a^{-}}f(x)=\\lim\\limits_{x\\to a^{+}}f(x)=\\)__________<br>② 기하적으로 \\(x=a\\)에서 연속이라는 것은 그래프가 \\(x=a\\)에서 __________ 않고 이어져 있다는 뜻이다.<br>③ \\(x=a\\)에서 불연속처럼 보이지만 실제로 연속성을 따졌을 때 연속이면 __________ 가능한 불연속점이라고 한다.", answer: "O", hint: "f(a) / 끊어지지 / 제거", explanation: "① \\(f(a)\\)<br>② 끊어지지<br>③ 제거" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.78 · Thema1 · 발상&알고리즘1</span><br>Q4. 그래프가 주어지지 않았을 때, \\(f(x)\\)가 \\(x=a\\)에서 연속인지 확인하는 방법을 말하시오. 다음 세 가지를 구한 뒤 모두 같은지 확인하시오.<br>① 좌극한 : __________<br>② 우극한 : __________<br>③ 함숫값 : __________", answer: "O", hint: "좌극한·우극한·함숫값이 모두 같으면 연속", explanation: "① \\(\\lim\\limits_{x\\to a^{-}}f(x)\\)<br>② \\(\\lim\\limits_{x\\to a^{+}}f(x)\\)<br>③ \\(f(a)\\)<br>세 값이 모두 같으면 \\(x=a\\)에서 연속이다." },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.78 · Thema1 · 예시문제1</span><br>Q5. 함수 \\(f(x)=x+1\\)이 \\(x=1\\)에서 연속인지 판별하시오. 풀이 과정에서 다음 값을 각각 구하시오.<br>① \\(\\lim\\limits_{x\\to1}f(x)\\)<br>② \\(f(1)\\)<br>③ \\(x=1\\)에서 연속인지 판별", answer: "O", hint: "다항함수는 극한값=함숫값", explanation: "① \\(\\lim\\limits_{x\\to1}(x+1)=2\\)<br>② \\(f(1)=2\\)<br>③ 극한값과 함숫값이 \\(2\\)로 같으므로 \\(x=1\\)에서 연속이다." },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.79 · Thema2 · 예시문제1,2</span><br>Q6. 다음 함수가 \\(x=1\\)에서 연속인지 판별하고, 불연속이면 그 이유를 말하시오.<br>① \\(g(x)=x\\ (x>1),\\quad g(x)=x+1\\ (x\\le1)\\)<br>② \\(h(x)=\\dfrac{x^2-1}{x-1}\\ (x\\ne1),\\quad h(x)=1\\ (x=1)\\)", answer: "O", hint: "① 좌극한≠우극한 ② 극한값≠함숫값", explanation: "① 좌극한 \\(\\lim\\limits_{x\\to1^{-}}(x+1)=2\\), 우극한 \\(\\lim\\limits_{x\\to1^{+}}x=1\\)로 달라 극한이 존재하지 않음 → 불연속<br>② \\(\\lim\\limits_{x\\to1}\\dfrac{x^2-1}{x-1}=\\lim\\limits_{x\\to1}(x+1)=2\\)이지만 \\(h(1)=1\\)이라 극한값과 함숫값이 달라 → 불연속" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.80 · Thema2 · 예시문제1</span><br>Q7. 함수 \\(f(x)\\)가 \\(x=2\\)에서 연속이고 \\(\\lim\\limits_{x\\to2^{-}}f(x)=a+2,\\ \\lim\\limits_{x\\to2^{+}}f(x)=3a-2\\)를 만족시킨다. \\(a+f(2)\\)의 값을 구하시오. (단, \\(a\\)는 상수이다.)", answer: "O", hint: "연속 → 좌극한=우극한=f(2)", explanation: "연속이므로 좌극한=우극한: \\(a+2=3a-2\\) → \\(a=2\\).<br>이때 \\(f(2)=\\lim\\limits_{x\\to2}f(x)=a+2=4\\).<br>따라서 \\(a+f(2)=2+4=6\\)." },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.80 · Thema2 · 예시문제2</span><br><span data-figure='pending' style='display:inline-block;margin:0.4rem 0;padding:0.35rem 0.7rem;border:1px dashed #f59e0b;border-radius:0.5rem;color:#f59e0b;font-size:0.78rem;font-weight:700'>📷 교재 그림 자리 — 나중에 여기에 그림 삽입 (data-figure)</span><br>Q8. 함수 \\(y=f(x)\\)의 그래프가 교재 그림과 같다. \\(0<x<4\\)를 만족하는 \\(x\\)에 대하여 다음 값을 구하시오.<br>① 함수 \\(f(x)\\)의 극한값이 존재하지 않는 \\(x\\)의 값의 개수 \\(a\\)<br>② 함수 \\(f(x)\\)가 불연속인 \\(x\\)의 값의 개수 \\(b\\)<br>③ \\(a-b\\)의 값", answer: "O", hint: "극한이 없는 점 ⊂ 불연속점 (a ≤ b)", explanation: "그래프에서 \\(0<x<4\\) 구간을 보고 ① 좌극한≠우극한인 \\(x\\)의 개수 \\(a\\), ② 불연속인(극한이 없거나 극한값≠함숫값) \\(x\\)의 개수 \\(b\\)를 세어 \\(a-b\\)를 구한다. (극한이 없는 점은 모두 불연속이므로 \\(a\\le b\\). 구체적 개수는 교재 그림에 따름.)" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.81 · Thema2 · 예시문제3</span><br><span data-figure='pending' style='display:inline-block;margin:0.4rem 0;padding:0.35rem 0.7rem;border:1px dashed #f59e0b;border-radius:0.5rem;color:#f59e0b;font-size:0.78rem;font-weight:700'>📷 교재 그림 자리 — 나중에 여기에 그림 삽입 (data-figure)</span><br>Q9. 함수 \\(y=f(x)\\)의 그래프가 교재 그림과 같을 때, [보기]에서 옳은 것만 고르시오.<br>[보기]<br>ㄱ. \\(\\lim\\limits_{x\\to0^{+}}f(x)=1\\)<br>ㄴ. \\(\\lim\\limits_{x\\to2^{-}}f(x)=-1\\)<br>ㄷ. 함수 \\(|f(x)|\\)는 \\(x=2\\)에서 연속이다.", answer: "O", hint: "ㄷ은 |f|의 좌극한·우극한·함숫값 비교", explanation: "ㄱ·ㄴ은 그래프에서 해당 방향의 극한값을 읽어 판단한다.<br>ㄷ은 \\(|f(x)|\\)의 \\(x=2\\)에서의 좌극한·우극한·함숫값이 모두 같은지 확인한다. (\\(f\\)가 \\(x=2\\)에서 크기가 같고 부호만 다른 값으로 점프하면 \\(|f|\\)는 연속이 될 수 있다.) 구체적 정답은 교재 그림에 따름." },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.81 · Thema2 · 발상&알고리즘2</span><br>Q10. 함수의 극한·연속 문제에서 그래프가 주어지면 어떻게 접근하는가?<br>① 1단계 : __________ 관점으로 먼저 판단한다.<br>② 2단계 : 잘 안 되면 __________ 관점으로 판단한다.", answer: "O", hint: "그래프 관점 먼저, 안 되면 식 관점", explanation: "① 그래프(직관)<br>② 식(수식·대수)" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.82 · Thema3 · 개념</span><br>Q11. 다음 구간 표현을 기호로 나타내시오.<br>① \\(a\\le x\\le b\\)<br>② \\(a\\le x<b\\)<br>③ \\(a<x\\le b\\)<br>④ \\(a<x<b\\)", answer: "O", hint: "닫힘 [ ], 열림 ( )", explanation: "① \\([a,\\ b]\\)<br>② \\([a,\\ b)\\)<br>③ \\((a,\\ b]\\)<br>④ \\((a,\\ b)\\)" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.82 · Thema3 · 개념</span><br>Q12. 다음 구간의 이름을 말하시오.<br>① \\((a,\\ b)\\)<br>② \\([a,\\ b]\\)<br>③ \\([a,\\ b)\\)<br>④ \\((a,\\ b]\\)", answer: "O", hint: "열린 / 닫힌 / 반닫힌", explanation: "① 열린구간<br>② 닫힌구간<br>③ 반닫힌(반열린)구간<br>④ 반닫힌(반열린)구간" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.82 · Thema3 · 참고2</span><br>Q13. 시험에 자주 나오는 구간 표현을 기호로 쓰시오.<br>① \\(x\\ge a\\)<br>② \\(x\\le a\\)<br>③ \\(x>a\\)<br>④ 실수 전체", answer: "O", hint: "∞ 쪽은 항상 열림", explanation: "① \\([a,\\ \\infty)\\)<br>② \\((-\\infty,\\ a]\\)<br>③ \\((a,\\ \\infty)\\)<br>④ \\((-\\infty,\\ \\infty)\\)" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.83 · Thema4 · 개념</span><br>Q14. 연속함수에 대해 다음 질문에 답하시오.<br>① 함수 \\(f(x)\\)가 어떤 구간의 모든 실수에서 연속이면 \\(f(x)\\)를 그 구간에서 무엇이라고 하는가?<br>② 어떤 구간에서 연속함수라는 말은 그 구간 안에 무엇이 없다는 뜻인가?<br>③ “실수 전체에서 연속”이라는 말은 정의역 어디에도 무엇이 없다는 뜻인가?", answer: "O", hint: "연속함수 / 불연속점 / 불연속점", explanation: "① 연속함수<br>② 불연속점<br>③ 불연속점" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.83 · Thema4 · 예시문제1,2</span><br>Q15. 다음 문장을 완성하시오.<br>① \\(f(x)=2x\\)는 열린구간 \\((1,\\ 3)\\)에서 불연속점이 없으므로 \\((1,\\ 3)\\)에서 __________이다.<br>② \\(f(x)=x^2\\)은 구간 \\((-\\infty,\\ \\infty)\\)에서 연속이므로 __________에서 연속이다.", answer: "O", hint: "연속(함수) / 실수 전체", explanation: "① 연속(연속함수)<br>② 실수 전체" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.83 · Thema4 · 개념</span><br>Q16. 함수 \\(f(x)\\)가 닫힌구간 \\([a,\\ b]\\)에서 연속이기 위한 조건을 말하시오.<br>① 열린구간 \\((a,\\ b)\\)에서는 \\(f(x)\\)가 __________이어야 한다.<br>② 왼쪽 끝점 \\(a\\)에서는 \\(\\lim\\limits_{x\\to a^{+}}f(x)=\\)__________이어야 한다.<br>③ 오른쪽 끝점 \\(b\\)에서는 \\(\\lim\\limits_{x\\to b^{-}}f(x)=\\)__________이어야 한다.", answer: "O", hint: "(a,b) 연속, 끝점은 한쪽 극한=함숫값", explanation: "① 연속<br>② \\(f(a)\\)<br>③ \\(f(b)\\)<br>끝점에서는 구간 안쪽 방향의 한쪽 극한만 함숫값과 같으면 된다." },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.83 · Thema4 · 예시문제4</span><br>Q17. 함수 \\(f(x)=\\sqrt{x+2}\\)가 구간 \\([-2,\\ \\infty)\\)에서 연속인지 판단하시오. 풀이 과정에서 다음을 확인하시오.<br>① 열린구간 \\((-2,\\ \\infty)\\)에서 연속인지<br>② \\(\\lim\\limits_{x\\to-2^{+}}f(x)\\)와 \\(f(-2)\\)가 같은지", answer: "O", hint: "√ 함수는 정의역에서 연속, 끝점 확인", explanation: "① \\(\\sqrt{x+2}\\)는 정의역 \\((-2,\\ \\infty)\\)에서 연속이다.<br>② \\(\\lim\\limits_{x\\to-2^{+}}\\sqrt{x+2}=0\\), \\(f(-2)=\\sqrt{0}=0\\)으로 같다.<br>따라서 \\([-2,\\ \\infty)\\)에서 연속이다." },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.84 · Thema5 · 핵심태도</span><br>Q18. 구간별로 정의된 함수의 연속성을 볼 때 가장 먼저 해야 할 일을 말하시오.<br>① 함수식이 바뀌는 점은 무엇으로 의심해야 하는가?<br>② 문제에서 “모든 실수에서 연속”이라고 하면, 의심점을 어떻게 만들어야 하는가?", answer: "O", hint: "경계점을 불연속 의심점으로; 연속이 되게", explanation: "① 불연속 의심점(함수식이 바뀌는 경계점)<br>② 그 의심점에서 좌극한=우극한=함숫값이 되도록(연속이 되도록) 조건을 세운다." },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.84 · Thema5 · 발상&알고리즘3</span><br>Q19. 다음과 같은 함수가 주어졌을 때, \\(x=a\\)에서 연속이 되도록 만드는 조건을 쓰시오.<br>\\(h(x)=g(x)\\ (x=a),\\quad h(x)=f(x)\\ (x\\ne a)\\)<br>① 불연속 의심점은 \\(x=\\)__________이다.<br>② \\(x=a\\)에서 연속이 되려면 \\(\\lim\\limits_{x\\to a}f(x)=\\)__________이어야 한다.", answer: "O", hint: "의심점 a; lim f = g(a)", explanation: "① \\(a\\)<br>② \\(g(a)\\) — 점에서의 값 \\(g(a)\\)와 주변 \\(f(x)\\)의 극한이 같아야 연속이다." },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.84 · Thema5 · 예시문제1</span><br>Q20. 다음 함수가 모든 실수 \\(x\\)에서 연속인지 판별하시오.<br>\\(f(x)=\\dfrac{x^2-3x+2}{x-2}\\ (x\\ne2),\\quad f(x)=1\\ (x=2)\\)<br>풀이 과정에서 다음을 확인하시오.<br>① 불연속 의심점<br>② 그 점에서의 극한값<br>③ 그 점에서의 함숫값<br>④ 연속 여부", answer: "O", hint: "인수분해 후 약분", explanation: "① 의심점 \\(x=2\\)<br>② \\(\\lim\\limits_{x\\to2}\\dfrac{(x-1)(x-2)}{x-2}=\\lim\\limits_{x\\to2}(x-1)=1\\)<br>③ \\(f(2)=1\\)<br>④ 극한값과 함숫값이 \\(1\\)로 같으므로 \\(x=2\\)에서 연속이고, 나머지에서도 연속이므로 모든 실수에서 연속이다." },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.85 · Thema5 · 스킬1</span><br>Q21. 다음과 같은 구간별 함수가 주어졌을 때, \\(x=a\\)에서 연속이 되도록 만드는 조건을 쓰시오. (단, \\(f(x),\\ g(x)\\)는 \\(x=a\\)에서 연속이다.)<br>\\(h(x)=g(x)\\ (x>a),\\quad h(x)=f(x)\\ (x\\le a)\\)<br>① 불연속 의심점은 \\(x=\\)__________이다.<br>② \\(x=a\\)에서 연속이 되려면 \\(f(a)=\\)__________이어야 한다.", answer: "O", hint: "의심점 a; f(a)=g(a)", explanation: "① \\(a\\)<br>② \\(g(a)\\) — 좌극한·함숫값 \\(f(a)\\)와 우극한 \\(g(a)\\)가 같아야 연속이다." },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.85 · Thema5 · 예시문제2</span><br>Q22. 다음 함수가 모든 실수 \\(x\\)에서 연속하도록 하는 상수 \\(a\\)의 값을 구하시오.<br>\\(f(x)=2x+1\\ (x\\ge2),\\quad f(x)=x^2+3x+a\\ (x<2)\\)<br>풀이 과정에서 다음을 구하시오.<br>① \\(\\lim\\limits_{x\\to2^{+}}f(x)\\)<br>② \\(\\lim\\limits_{x\\to2^{-}}f(x)\\)<br>③ \\(f(2)\\)<br>④ \\(a\\)의 값", answer: "O", hint: "좌극한=우극한", explanation: "① \\(\\lim\\limits_{x\\to2^{+}}(2x+1)=5\\)<br>② \\(\\lim\\limits_{x\\to2^{-}}(x^2+3x+a)=10+a\\)<br>③ \\(f(2)=2(2)+1=5\\)<br>④ 연속이려면 \\(10+a=5\\) → \\(a=-5\\)" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.86 · Thema5 · 예시문제4</span><br>Q23. 두 양수 \\(a,\\ b\\)에 대하여 함수 \\(f(x)\\)가 다음과 같다.<br>\\(f(x)=x+a\\ (x<-1),\\quad f(x)=x\\ (-1\\le x<3),\\quad f(x)=bx-2\\ (x\\ge3)\\)<br>함수 \\(|f(x)|\\)가 실수 전체에서 연속일 때, \\(a+b\\)의 값을 구하시오. 풀이 과정에서 다음을 확인하시오.<br>① 불연속 의심점<br>② 각 의심점에서 \\(|f(x)|\\)의 좌극한과 우극한<br>③ \\(a,\\ b\\)의 값<br>④ \\(a+b\\)의 값", answer: "O", hint: "|좌극한|=|우극한|, a·b는 양수", explanation: "① 의심점 \\(x=-1,\\ x=3\\)<br>② \\(x=-1\\): 좌극한 \\(|-1+a|=|a-1|\\), 우극한·함숫값 \\(|-1|=1\\) → \\(|a-1|=1\\), \\(a>0\\)이므로 \\(a=2\\).<br>\\(x=3\\): 좌극한 \\(|3|=3\\), 우극한·함숫값 \\(|3b-2|\\) → \\(|3b-2|=3\\), \\(b>0\\)이므로 \\(b=\\dfrac{5}{3}\\).<br>③ \\(a=2,\\ b=\\dfrac{5}{3}\\)<br>④ \\(a+b=2+\\dfrac{5}{3}=\\dfrac{11}{3}\\)" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.86 · Thema5 · 예시문제5</span><br>Q24. \\(f(x)\\)가 다항함수일 때, 모든 실수에서 연속인 함수 \\(g(x)\\)를 다음과 같이 정의한다.<br>\\(g(x)=\\dfrac{f(x)-x^2}{x-1}\\ (x\\ne1),\\quad g(x)=k\\ (x=1)\\)<br>\\(\\lim\\limits_{x\\to\\infty}g(x)=2\\)일 때, \\(k+f(3)\\)의 값을 구하시오. (단, \\(k\\)는 상수이다.) 풀이 과정에서 다음을 확인하시오.<br>① \\(g(x)\\)가 \\(x=1\\)에서 연속이기 위한 조건<br>② \\(\\lim\\limits_{x\\to\\infty}g(x)=2\\)에서 알 수 있는 \\(f(x)\\)의 형태<br>③ \\(k\\)의 값<br>④ \\(f(3)\\)의 값", answer: "O", hint: "분자 f(x)−x²가 (x−1)로 나누어떨어져야", explanation: "① \\(x=1\\)에서 연속이려면 분자 \\(f(x)-x^2\\)이 \\(x=1\\)에서 \\(0\\) → \\(f(1)=1\\), 그리고 \\(k=\\lim\\limits_{x\\to1}\\dfrac{f(x)-x^2}{x-1}\\).<br>② \\(\\lim\\limits_{x\\to\\infty}\\dfrac{f(x)-x^2}{x-1}=2\\)이므로 \\(f(x)-x^2\\)은 일차식 \\(2(x-1)\\) 꼴 → \\(f(x)=x^2+2x-2\\) (\\(f(1)=1\\) 확인됨).<br>③ \\(g(x)=\\dfrac{2(x-1)}{x-1}=2\\)이므로 \\(k=2\\).<br>④ \\(f(3)=9+6-2=13\\). 따라서 \\(k+f(3)=2+13=15\\)." },
    ] },
    { id: 5, name: "5강", questions: [
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.87 · Thema6 · 개념</span><br>Q1. 연속함수의 사칙연산 성질을 말하시오. 두 함수 \\(f(x),\\ g(x)\\)가 각각 \\(x=a\\)에서 연속일 때, 다음 함수가 \\(x=a\\)에서 연속인지 말하시오.<br>① \\(f(x)+g(x)\\)<br>② \\(f(x)-g(x)\\)<br>③ \\(cf(x)\\) (단, \\(c\\)는 상수)<br>④ \\(f(x)g(x)\\)<br>⑤ \\(\\dfrac{f(x)}{g(x)}\\) (단, \\(g(a)\\ne0\\))", answer: "O", hint: "모두 x=a에서 연속 (⑤는 g(a)≠0일 때)", explanation: "① 연속<br>② 연속<br>③ 연속<br>④ 연속<br>⑤ 연속 (\\(g(a)\\ne0\\)이면)" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.87 · Thema6 · 참고4</span><br>Q2. 다음 함수의 불연속 의심점을 말하시오.<br>① 다항함수의 불연속 의심점<br>② 유리함수의 불연속 의심점<br>③ 무리함수 \\(\\sqrt{f(x)}\\)가 연속인 구간", answer: "O", hint: "다항=없음, 유리=분모0, 무리=근호 안≥0", explanation: "① 없음 (다항함수는 모든 실수에서 연속)<br>② 분모가 \\(0\\)이 되는 \\(x\\)<br>③ \\(f(x)\\ge0\\)인 구간에서 연속" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.87 · Thema6 · 예시문제1~3</span><br>Q3. 다음 함수가 연속인 구간을 말하시오.<br>① \\(f(x)=2x^2-x+1\\)<br>② \\(g(x)=\\dfrac{1}{x^2-4x+3}\\)<br>③ \\(h(x)=\\sqrt{x-2}\\)", answer: "O", hint: "② 분모=(x−1)(x−3), ③ x−2≥0", explanation: "① 실수 전체 \\((-\\infty,\\ \\infty)\\)<br>② \\(x^2-4x+3=(x-1)(x-3)\\)이므로 \\(x\\ne1,\\ 3\\) → \\((-\\infty,\\ 1),\\ (1,\\ 3),\\ (3,\\ \\infty)\\)<br>③ \\(x-2\\ge0\\) → \\([2,\\ \\infty)\\)" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.88 · Thema6 · 참고5</span><br>Q4. 다음 문장이 맞으면 O, 틀리면 X로 판단하시오.<br>① \\(f(x)+g(x)\\)가 \\(x=a\\)에서 연속이면 \\(f(x),\\ g(x)\\)도 각각 \\(x=a\\)에서 반드시 연속이다.<br>② \\(f(x)g(x)\\)가 \\(x=a\\)에서 연속이면 \\(f(x),\\ g(x)\\)도 각각 \\(x=a\\)에서 반드시 연속이다.<br>③ \\(f(x),\\ g(x)\\) 중 적어도 하나가 \\(x=a\\)에서 불연속이어도 \\(f(x)+g(x)\\)는 \\(x=a\\)에서 연속일 수 있다.<br>④ \\(f(x),\\ g(x)\\) 중 적어도 하나가 \\(x=a\\)에서 불연속이어도 \\(f(x)g(x)\\)는 \\(x=a\\)에서 연속일 수 있다.", answer: "O", hint: "①X ②X ③O ④O", explanation: "① X (합이 연속이어도 각각은 불연속일 수 있다)<br>② X (곱이 연속이어도 각각은 불연속일 수 있다)<br>③ O (예: 서로 반대로 점프하는 두 함수의 합)<br>④ O (예: 불연속함수 × 그 점에서 \\(0\\)인 연속함수)" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.89 · Thema6 · 발상&알고리즘4</span><br>Q5. 분수꼴 함수의 불연속 의심점에 대해 답하시오.<br>① \\(\\dfrac{f(x)}{g(x)}\\)의 불연속 의심점은 어떤 \\(x\\)값인가?<br>② 분수꼴 함수에서 분모가 \\(0\\)이 되면 왜 불연속 의심점이 되는가?<br>③ 함수 \\(\\dfrac{3}{x+1}\\)이 연속인 \\(x\\)의 범위를 말하시오.<br>④ 함수 \\(\\dfrac{x^2+2x+1}{g(x)}\\)의 불연속 의심점을 말하시오.", answer: "O", hint: "분모=0인 x", explanation: "① \\(g(x)=0\\)이 되는 \\(x\\)<br>② 분모가 \\(0\\)이면 함숫값이 정의되지 않아(나눗셈 불가) 그 점에서 불연속이 될 수 있기 때문<br>③ \\(x\\ne-1\\) → \\((-\\infty,\\ -1),\\ (-1,\\ \\infty)\\)<br>④ \\(g(x)=0\\)이 되는 \\(x\\)" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.90 · Thema6 · 발상&알고리즘5</span><br>Q6. \\((x-a)f(x)=g(x)\\) 꼴에서 \\(f(x)\\)를 실수 전체에서 연속하게 만드는 방법을 말하시오. 다음 빈칸을 채우시오.<br>① \\(x\\ne a\\)일 때, \\(f(x)=\\)__________로 둘 수 있다.<br>② 이때 불연속 의심점은 \\(x=\\)__________이다.<br>③ \\(f(x)\\)가 \\(x=a\\)에서 연속이려면 \\(f(a)=\\)__________가 성립해야 한다.", answer: "O", hint: "g(x)/(x−a); 의심점 a; f(a)=극한", explanation: "① \\(\\dfrac{g(x)}{x-a}\\)<br>② \\(a\\)<br>③ \\(\\lim\\limits_{x\\to a}\\dfrac{g(x)}{x-a}\\) (이 극한이 존재하려면 \\(g(a)=0\\)이어야 한다.)" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.90 · Thema6 · 예시문제6</span><br>Q7. 모든 실수에서 연속인 함수 \\(f(x)\\)가 \\((x-5)f(x)=x^2-x+a\\)를 만족시킬 때, \\(f(5)\\)의 값을 구하시오. (단, \\(a\\)는 상수이다.)", answer: "O", hint: "우변이 x=5에서 0이어야", explanation: "\\(f(x)=\\dfrac{x^2-x+a}{x-5}\\)가 \\(x=5\\)에서 연속이려면 분자가 \\(x=5\\)에서 \\(0\\): \\(25-5+a=0\\) → \\(a=-20\\).<br>\\(x^2-x-20=(x-5)(x+4)\\)이므로 \\(f(x)=x+4\\), \\(f(5)=9\\)." },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.91 · Thema6 · 발상&알고리즘6</span><br>Q8. “실수 전체에서 연속”이라는 말이 나오면 어떻게 해야 하는가? 다음 빈칸을 채우시오.<br>① 실수 전체에서 연속이라는 말은 불연속점이 __________개도 존재하면 안 된다는 뜻이다.<br>② 1단계 : __________을 찾는다.<br>③ 2단계 : 그 의심점을 __________한다.<br>④ 특정 구간 \\([a,\\ b]\\)에서 연속해야 한다면 그 구간 안에 있는 __________을 찾아 연속하게 만든다.", answer: "O", hint: "1(한)개도; 의심점; 연속처리; 의심점", explanation: "① \\(1\\)(한)<br>② 불연속 의심점<br>③ (연속이 되도록) 처리<br>④ 불연속 의심점" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.92 · Thema6 · 예시문제6</span><br>Q9. 함수 \\(f(x)=\\dfrac{x+1}{x^2+ax+2a}\\)가 실수 전체의 집합에서 연속이 되도록 하는 정수 \\(a\\)의 개수를 구하시오.", answer: "O", hint: "분모가 0이 되는 실수가 없어야 (판별식<0)", explanation: "분모 \\(x^2+ax+2a\\)가 실수해를 갖지 않아야 하므로 판별식 \\(D=a^2-8a<0\\) → \\(a(a-8)<0\\) → \\(0<a<8\\).<br>정수 \\(a=1,\\ 2,\\ \\cdots,\\ 7\\) → \\(7\\)개." },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.92 · Thema6 · 예시문제7</span><br>Q10. 실수 전체의 집합에서 연속인 함수 \\(f(x)\\)가 모든 실수 \\(x\\)에 대하여 \\((x-1)f(x)=\\sqrt{x^2+3}+a\\)를 만족시킬 때, \\(f(1)\\)의 값을 구하시오. (단, \\(a\\)는 상수이다.)<br>① \\(\\dfrac{1}{4}\\)  ② \\(\\dfrac{1}{2}\\)  ③ \\(\\dfrac{3}{4}\\)  ④ \\(1\\)  ⑤ \\(\\dfrac{5}{4}\\)", answer: "O", hint: "우변이 x=1에서 0 → a 결정, 유리화", explanation: "\\(x=1\\)에서 우변 \\(=0\\): \\(\\sqrt{4}+a=2+a=0\\) → \\(a=-2\\).<br>\\(f(1)=\\lim\\limits_{x\\to1}\\dfrac{\\sqrt{x^2+3}-2}{x-1}\\), 유리화하면 \\(\\dfrac{x^2-1}{(x-1)(\\sqrt{x^2+3}+2)}=\\dfrac{x+1}{\\sqrt{x^2+3}+2}\\to\\dfrac{2}{4}=\\dfrac{1}{2}\\).<br>정답 ② \\(\\dfrac{1}{2}\\)" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.94 · Thema7 · 발상&알고리즘7</span><br>Q11. \\(f(x),\\ g(x)\\) 중 적어도 하나가 \\(x=a\\)에서 불연속일 때, \\(f(x)+g(x),\\ f(x)-g(x),\\ f(x)g(x),\\ \\dfrac{f(x)}{g(x)}\\)의 연속성을 판단하는 방법을 말하시오.<br>① 불연속 의심점은 어떤 \\(x\\)값인가?<br>② 그 점에서 직접 확인해야 하는 3가지를 쓰시오.", answer: "O", hint: "불연속인 점; 좌극한·우극한·함숫값", explanation: "① 불연속인 점 \\(x=a\\)<br>② 좌극한, 우극한, 함숫값 (이 세 값이 모두 같은지 직접 확인한다.)" },
