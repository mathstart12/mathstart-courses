  // ────────────────────────────────────────────────
  // 강의 데이터 (문제 추가 방법: questions 배열에 항목 추가)
  // { question: "Q1. 문제 내용 (LaTeX: \\(...\\))", answer: "O" or "X", hint: "", explanation: "" }
  // ────────────────────────────────────────────────
  const lectures = [
    { id: 1,  name: '1강',  questions: [
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.5 · Thema1 · 개념</span><br>Q1. 다음 질문에 답하시오.<br>① 두 점 사이의 거리는 항상 어떤 값이 나와야 하는가?<br>② 수직선 위의 두 점 \\(A(x_1)\\), \\(B(x_2)\\) 사이의 거리 공식을 쓰시오.<br>③ 두 점의 좌표가 미지수라서 어떤 점이 큰지 작은지 불분명할 때는 왜 절댓값을 붙여야 하는가?", answer: "O", hint: "① 음이 아닌 값(0 이상) ② \\(\\overline{AB}=|x_2-x_1|\\) ③ 거리는 음수가 될 수 없으므로", explanation: "① 거리는 항상 0 이상의 값(음이 아닌 값)이어야 한다.<br>② \\(\\overline{AB}=|x_2-x_1|\\)<br>③ 어느 점이 큰지 알 수 없어 \\(x_2-x_1\\)의 부호가 정해지지 않으므로, 항상 0 이상이 되도록 절댓값을 붙인다." },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.5 · Thema1 · 예시문제</span><br>Q2. 다음을 구하시오.<br>① 수직선 위의 두 점 \\(A(1)\\), \\(B(4)\\) 사이의 거리<br>② 수직선 위의 두 점 \\(A(2)\\), \\(B(-3)\\) 사이의 거리<br>③ 수직선 위의 두 점 \\(A(3)\\), \\(B(a)\\) 사이의 거리가 \\(4\\)일 때, 상수 \\(a\\)의 값", answer: "O", hint: "\\(\\overline{AB}=|x_2-x_1|\\) 이용", explanation: "① \\(|4-1|=3\\)<br>② \\(|-3-2|=5\\)<br>③ \\(|a-3|=4\\) 이므로 \\(a-3=\\pm4\\), 따라서 \\(a=7\\) 또는 \\(a=-1\\)" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.6 · Thema2 · 개념</span><br>Q3. 다음 질문에 답하시오.<br>① 좌표평면 위의 두 점 \\(A(x_1,\\ y_1)\\), \\(B(x_2,\\ y_2)\\) 사이의 거리 공식을 쓰시오.<br>② 원점 \\(O(0,\\ 0)\\)과 점 \\(A(x_1,\\ y_1)\\) 사이의 거리 공식을 쓰시오.<br>③ 좌표평면에서 두 점 사이의 거리 공식은 어떤 정리로부터 유도되는가?<br>④ 두 점 사이의 거리 공식을 암기할 때 어떤 느낌으로 암기하면 좋은가?<br>⑤ \\(x\\)좌표의 차이 또는 \\(y\\)좌표의 차이가 음수여도 공식이 성립하는 이유를 설명하시오.", answer: "O", hint: "① \\(\\overline{AB}=\\sqrt{(x_2-x_1)^2+(y_2-y_1)^2}\\) ③ 피타고라스 정리", explanation: "① \\(\\overline{AB}=\\sqrt{(x_2-x_1)^2+(y_2-y_1)^2}\\)<br>② \\(\\overline{OA}=\\sqrt{{x_1}^2+{y_1}^2}\\)<br>③ 피타고라스 정리로부터 유도된다.<br>④ 가로 방향 차이와 세로 방향 차이를 두 변으로 하는 직각삼각형의 빗변 길이(각 차이를 제곱해 더한 뒤 제곱근)로 기억한다.<br>⑤ 차이를 제곱하면 부호에 관계없이 항상 0 이상이 되므로, 차이가 음수여도 공식이 그대로 성립한다." },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.6 · Thema2 · 예시문제</span><br>Q4. 두 점 \\(A(5,\\ -2)\\), \\(B(3,\\ 2)\\) 사이의 거리를 구하시오.", answer: "O", hint: "\\(\\sqrt{(x_2-x_1)^2+(y_2-y_1)^2}\\)", explanation: "\\(\\overline{AB}=\\sqrt{(3-5)^2+(2-(-2))^2}=\\sqrt{4+16}=\\sqrt{20}=2\\sqrt{5}\\)" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.7 · Thema2 · 발상&알고리즘2</span><br>Q5. 다음 식이 어떤 두 점 사이의 거리를 의미하는지 말하시오.<br>\\[\\sqrt{(a-1)^2+(b-3)^2}\\]", answer: "O", hint: "거리 공식과 비교", explanation: "점 \\((a,\\ b)\\)와 점 \\((1,\\ 3)\\) 사이의 거리를 의미한다." },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.7 · Thema2 · 예시문제1</span><br>Q6. 세 점 \\(A(3,\\ 0)\\), \\(B(5,\\ -2)\\), \\(C(a,\\ 1)\\)에 대하여 \\(\\overline{AC}=\\overline{BC}\\)가 되는 상수 \\(a\\)의 값을 구하시오.", answer: "O", hint: "\\(\\overline{AC}^2=\\overline{BC}^2\\)으로 놓기", explanation: "\\(\\overline{AC}^2=(a-3)^2+1\\), \\(\\overline{BC}^2=(a-5)^2+9\\)<br>\\((a-3)^2+1=(a-5)^2+9\\)<br>\\(-6a+10=-10a+34\\)<br>\\(4a=24\\), 따라서 \\(a=6\\)" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.7 · Thema2 · 예시문제2</span><br>Q7. \\(a,\\ b\\)가 실수일 때, 다음 식의 최솟값을 구하시오.<br>\\[\\sqrt{a^2+b^2}+\\sqrt{(a-1)^2+(b-3)^2}\\]", answer: "O", hint: "두 거리의 합 → 세 점이 일직선일 때 최소", explanation: "이 식은 점 \\(P(a,\\ b)\\)에서 \\(O(0,\\ 0)\\)까지의 거리와 \\(A(1,\\ 3)\\)까지의 거리의 합이다.<br>\\(P\\)가 선분 \\(OA\\) 위에 있을 때 최소이고, 최솟값은 \\(\\overline{OA}=\\sqrt{1^2+3^2}=\\sqrt{10}\\)" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.8 · Thema2 · 발상&알고리즘3</span><br>Q8. “~ 위의 점”이라는 말이 나오면 어떻게 설정하는지 빈칸을 채우시오.<br>① \\(x\\)축 위의 점 → \\((a,\\ ①)\\)<br>② \\(y\\)축 위의 점 → \\((②,\\ a)\\)<br>③ 직선 \\(x+y=1\\) 위의 점 → \\((a,\\ ③)\\)", answer: "O", hint: "축·직선 위의 점은 조건을 만족하도록 한 좌표를 나머지로 표현", explanation: "① \\(0\\) (→ \\((a,\\ 0)\\))<br>② \\(0\\) (→ \\((0,\\ a)\\))<br>③ \\(1-a\\) (→ \\((a,\\ 1-a)\\))" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.8 · Thema2 · 예시문제3</span><br>Q9. 두 점 \\(A(1,\\ -2)\\), \\(B(5,\\ 2)\\)로부터 같은 거리에 있는 점 \\(P(a,\\ b)\\)가 직선 \\(y=x+1\\) 위의 점일 때, \\(a^2+b^2\\)의 값을 구하시오.", answer: "O", hint: "\\(\\overline{AP}^2=\\overline{BP}^2\\), 그리고 \\(b=a+1\\)", explanation: "\\(\\overline{AP}^2=\\overline{BP}^2\\)에서<br>\\((a-1)^2+(b+2)^2=(a-5)^2+(b-2)^2\\)<br>정리하면 \\(a+b=3\\).<br>\\(P\\)가 \\(y=x+1\\) 위에 있으므로 \\(b=a+1\\).<br>두 식에서 \\(a=1,\\ b=2\\).<br>따라서 \\(a^2+b^2=1+4=5\\)" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.8 · Thema2 · 발상&알고리즘4</span><br>Q10. 삼각형의 외심 관련 문제가 나오면 다음 성질을 떠올린다. 다음 빈칸을 채우시오.<br>① 삼각형의 세 꼭짓점에서 외심까지의 __________는 모두 같다.<br>② 직각삼각형의 외심은 __________의 중점이다.<br>③ 중심각은 원주각의 __________배이다.", answer: "O", hint: "외접원의 반지름 / 빗변 / 2", explanation: "① 거리(외접원의 반지름)<br>② 빗변<br>③ \\(2\\)배" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.8 · Thema2 · 예시문제4</span><br>Q11. 좌표평면 위의 한 점 \\(A(2,\\ 1)\\)을 꼭짓점으로 하는 삼각형 \\(ABC\\)의 외심은 변 \\(BC\\) 위에 있고 좌표가 \\((-1,\\ -1)\\)일 때, \\(\\overline{AB}^2+\\overline{AC}^2\\)의 값을 구하시오. (단, 외심은 \\(O\\)이다.)", answer: "O", hint: "외심이 \\(BC\\) 위 → \\(BC\\)는 지름, \\(\\angle A=90^\\circ\\)", explanation: "외심 \\(O\\)가 변 \\(BC\\) 위에 있으므로 \\(\\overline{BC}\\)는 외접원의 지름이고 \\(\\angle A=90^\\circ\\)이다.<br>외접원의 반지름 \\(R=\\overline{OA}=\\sqrt{(2-(-1))^2+(1-(-1))^2}=\\sqrt{9+4}=\\sqrt{13}\\)<br>\\(\\overline{BC}=2R\\)이므로 피타고라스 정리에 의해<br>\\(\\overline{AB}^2+\\overline{AC}^2=\\overline{BC}^2=(2R)^2=4\\times13=52\\)" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.9 · Thema2 · 발상&알고리즘5</span><br>Q12. “삼각형의 모양을 결정”하라는 문제가 나오면 어떻게 풀까? 다음 빈칸을 채우시오.<br>① 1단계 : 세 변의 __________를 구한다.<br>② 2단계 : __________ 혹은 세 변의 길이 동일성을 사용해본다.<br>③ 3단계 : 피타고라스가 성립하면 __________, 길이 동일성이 되면 __________ 혹은 __________이다.", answer: "O", hint: "길이 / 피타고라스 정리 / 직각·정·이등변삼각형", explanation: "① 길이<br>② 피타고라스 정리<br>③ 직각삼각형 / 정삼각형 / 이등변삼각형" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.9 · Thema2 · 예시문제5</span><br>Q13. 세 점 \\(A(1,\\ 2)\\), \\(B(-4,\\ 5)\\), \\(C(-2,\\ -3)\\)을 꼭짓점으로 하는 삼각형 \\(ABC\\)의 모양을 설명하시오.", answer: "O", hint: "세 변의 제곱을 비교", explanation: "\\(\\overline{AB}^2=(-5)^2+3^2=34\\), \\(\\overline{AC}^2=(-3)^2+(-5)^2=34\\), \\(\\overline{BC}^2=2^2+(-8)^2=68\\)<br>\\(\\overline{AB}=\\overline{AC}\\)이고 \\(\\overline{AB}^2+\\overline{AC}^2=\\overline{BC}^2\\)이므로,<br>\\(\\angle A=90^\\circ\\)인 직각이등변삼각형이다." },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.9 · Thema2 · 발상&알고리즘6</span><br>Q14. “제곱의 합이 최소”인 점의 좌표를 구하는 방법을 빈칸에 맞게 말하시오.<br>[방법1] 이차함수의 최대, 최소를 이용하여 구한다.<br>① 1단계 : 점 \\(P\\)를 __________이라고 미지수 설정을 한다.<br>② 2단계 : \\(\\overline{AP}^2+\\overline{BP}^2\\)에 맞게 __________에 관한 관계식을 세운다.<br>③ 3단계 : __________의 최솟값을 이용하여 \\(\\overline{AP}^2+\\overline{BP}^2\\)의 최솟값을 구한다.<br>[방법2]<br>④ 세 점이 __________ 위에 놓이면 직선의 길이는 최소가 된다.<br>⑤ \\(A\\) 혹은 \\(B\\)좌표를 일직선 위에 있게끔 __________을 시킨다.", answer: "O", hint: "미지수 / 미지수(변수) / 이차함수 / 한 직선 / 대칭이동", explanation: "① 미지수 \\((a,\\ b)\\) 등으로 설정<br>② 미지수(설정한 변수)<br>③ 이차함수<br>④ 한 직선(일직선)<br>⑤ 대칭이동" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.9 · Thema2 · 예시문제6</span><br>Q15. 두 점 \\(A(4,\\ 1)\\), \\(B(-2,\\ 5)\\)와 \\(x\\)축 위의 점 \\(P\\)에 대하여 \\(\\overline{AP}^2+\\overline{BP}^2\\)의 최솟값을 구하시오.", answer: "O", hint: "\\(P(a,\\ 0)\\)로 놓고 이차함수 최소", explanation: "\\(P(a,\\ 0)\\)이라 하면<br>\\(\\overline{AP}^2+\\overline{BP}^2=(a-4)^2+1+(a+2)^2+25=2a^2-4a+46=2(a-1)^2+44\\)<br>\\(a=1\\)일 때 최소이고, 최솟값은 \\(44\\)" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.10 · Thema3 · 발상&알고리즘7</span><br>Q16. 도형의 성질 증명 문제는 어떻게 풀까? 다음 빈칸을 채우시오.<br>① 도형을 __________시킨다.<br>② 이때, 미지수를 __________하여 도입한다.<br>③ 문제에 주어진 조건을 통해 __________을 세운다.<br>④ 대칭의 중심이 __________이 되도록 좌표 설정한다.<br>⑤ 직각 point가 __________이 되도록 좌표 설정한다.", answer: "O", hint: "좌표화 / 간단히(문자로) / 관계식 / 원점 / 원점", explanation: "① 좌표화(좌표평면 위에 놓기)<br>② 되도록 간단하게(문자로)<br>③ 관계식(등식)<br>④ 원점<br>⑤ 원점" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.10 · Thema3 · 도형의 좌표화</span><br><span data-figure='pending' style='display:inline-block;margin:0.4rem 0;padding:0.35rem 0.7rem;border:1px dashed #f59e0b;border-radius:0.5rem;color:#f59e0b;font-size:0.78rem;font-weight:700'>📷 교재 그림 자리 — 나중에 여기에 그림 삽입 (data-figure)</span><br>Q17. 교재 그림을 보고 다음 도형의 좌표 설정을 말하시오.<br>① 직사각형 \\(ABCD\\)<br>② 정삼각형 \\(ABC\\)<br>③ 이등변삼각형 \\(ABC\\)<br>④ 직각삼각형 \\(ABC\\)", answer: "O", hint: "대칭·직각을 원점/축에 맞춰 간단히 설정", explanation: "(예시 좌표 설정)<br>① 직사각형 \\(ABCD\\): \\(A(0,\\ 0),\\ B(a,\\ 0),\\ C(a,\\ b),\\ D(0,\\ b)\\)<br>② 정삼각형 \\(ABC\\): \\(A(-a,\\ 0),\\ B(a,\\ 0),\\ C(0,\\ \\sqrt{3}\\,a)\\)<br>③ 이등변삼각형 \\(ABC\\): \\(B(-a,\\ 0),\\ C(a,\\ 0),\\ A(0,\\ b)\\)<br>④ 직각삼각형 \\(ABC\\): \\(A(0,\\ 0),\\ B(a,\\ 0),\\ C(0,\\ b)\\) (직각을 원점에)" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.11 · Thema3 · 예시문제1</span><br>Q18. 직사각형 \\(ABCD\\)의 두 대각선의 길이가 같음을 좌표평면을 이용하여 증명하시오.", answer: "O", hint: "\\(A(0,0),\\ B(a,0),\\ C(a,b),\\ D(0,b)\\)로 설정", explanation: "\\(A(0,\\ 0),\\ B(a,\\ 0),\\ C(a,\\ b),\\ D(0,\\ b)\\)로 놓으면<br>\\(\\overline{AC}=\\sqrt{a^2+b^2}\\), \\(\\overline{BD}=\\sqrt{(0-a)^2+(b-0)^2}=\\sqrt{a^2+b^2}\\)<br>따라서 \\(\\overline{AC}=\\overline{BD}\\)이므로 두 대각선의 길이는 같다." },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.12 · Thema3 · 예시문제2</span><br>Q19. 직사각형 \\(ABCD\\)와 임의의 점 \\(P\\)에 대하여 \\(\\overline{AP}^2+\\overline{CP}^2=\\overline{BP}^2+\\overline{DP}^2\\)이 성립함을 좌표평면을 이용하여 증명하시오.", answer: "O", hint: "\\(A(0,0),B(a,0),C(a,b),D(0,b),P(x,y)\\)", explanation: "\\(A(0,\\ 0),\\ B(a,\\ 0),\\ C(a,\\ b),\\ D(0,\\ b),\\ P(x,\\ y)\\)로 놓으면<br>\\(\\overline{AP}^2+\\overline{CP}^2=(x^2+y^2)+((x-a)^2+(y-b)^2)\\)<br>\\(\\overline{BP}^2+\\overline{DP}^2=((x-a)^2+y^2)+(x^2+(y-b)^2)\\)<br>두 식을 전개하면 모두 \\(x^2+y^2+(x-a)^2+(y-b)^2\\)으로 같다.<br>따라서 \\(\\overline{AP}^2+\\overline{CP}^2=\\overline{BP}^2+\\overline{DP}^2\\)" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.13 · Thema3 · 예시문제7</span><br>Q20. 직각삼각형 \\(ABC\\)가 있다. 빗변 \\(BC\\)의 중점 \\(M\\)에 대하여 \\(2\\overline{AM}=\\overline{BC}\\)임을 좌표평면을 이용하여 증명하시오.", answer: "O", hint: "직각을 원점에: \\(A(0,0),\\ B(a,0),\\ C(0,b)\\)", explanation: "직각인 꼭짓점 \\(A\\)를 원점에 두어 \\(A(0,\\ 0),\\ B(a,\\ 0),\\ C(0,\\ b)\\)로 놓으면<br>\\(M=\\left(\\dfrac{a}{2},\\ \\dfrac{b}{2}\\right)\\)<br>\\(\\overline{AM}=\\sqrt{\\dfrac{a^2}{4}+\\dfrac{b^2}{4}}=\\dfrac{1}{2}\\sqrt{a^2+b^2}\\), \\(\\overline{BC}=\\sqrt{a^2+b^2}\\)<br>따라서 \\(2\\overline{AM}=\\sqrt{a^2+b^2}=\\overline{BC}\\)" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.14 · Thema4 · 개념</span><br>Q21. 중선정리에 대해 다음 질문에 답하시오.<br>① 삼각형 \\(ABC\\)에서 선분 \\(BC\\)의 중점이 \\(M\\)일 때, 중선은 어느 선분인가?<br>② 중선정리의 공식을 쓰시오.<br>③ 중선정리를 증명할 때, 직선 \\(BC\\)는 어떤 축으로 잡는가?<br>④ 선분 \\(BC\\)의 중점 \\(M\\)은 어떤 점이 되도록 좌표평면을 잡는가?", answer: "O", hint: "\\(\\overline{AB}^2+\\overline{AC}^2=2(\\overline{AM}^2+\\overline{BM}^2)\\)", explanation: "① 선분 \\(AM\\) (꼭짓점 \\(A\\)와 대변 \\(BC\\)의 중점 \\(M\\)을 잇는 선분)<br>② \\(\\overline{AB}^2+\\overline{AC}^2=2(\\overline{AM}^2+\\overline{BM}^2)\\)<br>③ \\(x\\)축<br>④ 원점" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.14 · Thema4 · 중선정리 유도</span><br>Q22. 중선정리의 좌표 설정과 유도 과정을 빈칸에 맞게 말하시오.<br>① \\(A\\)는 \\((a,\\ b)\\), \\(B\\)는 \\((\\ ,\\ 0)\\), \\(C\\)는 \\((\\ ,\\ 0)\\)으로 둔다.<br>② \\(\\overline{AB}^2+\\overline{AC}^2\\)를 정리하면 __________이다.<br>③ \\(\\overline{AM}^2\\)는 __________, \\(\\overline{BM}^2\\)는 __________이다.<br>④ 따라서 \\(\\overline{AB}^2+\\overline{AC}^2=\\)__________이 성립한다.", answer: "O", hint: "\\(B(-c,0),\\ C(c,0)\\), \\(M\\)은 원점", explanation: "① \\(B(-c,\\ 0),\\ C(c,\\ 0)\\) (\\(M\\)이 원점이 되도록)<br>② \\(\\overline{AB}^2+\\overline{AC}^2=(a+c)^2+b^2+(a-c)^2+b^2=2a^2+2b^2+2c^2\\)<br>③ \\(\\overline{AM}^2=a^2+b^2\\), \\(\\overline{BM}^2=c^2\\)<br>④ \\(2(\\overline{AM}^2+\\overline{BM}^2)=2(a^2+b^2+c^2)\\)" },
