      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.181 · Thema4 · 예시문제8</span><br><span data-figure='pending' style='display:inline-block;margin:0.4rem 0;padding:0.35rem 0.7rem;border:1px dashed #f59e0b;border-radius:0.5rem;color:#f59e0b;font-size:0.78rem;font-weight:700'>📷 교재 그림 자리 — 나중에 여기에 그림 삽입 (data-figure)</span><br>Q17. 도형 \\(f(x,\\ y)=0\\)의 그래프가 교재 그림과 같을 때, 다음 중 도형 \\(f(y+1,\\ -x)=0\\)의 그래프를 고르시오. (① ~ ⑤ 중 택)", answer: "O", hint: "새 점 \\((x,y)\\)에 대해 \\(X=y+1,\\ Y=-x\\)가 원래 도형 위 → 원래 \\((X,Y)\\)가 \\((-Y,\\ X-1)\\)로 이동", explanation: "\\(f(y+1,\\ -x)=0\\)은 원래 도형 위의 점 \\((X,\\ Y)\\)에 대해 \\(X=y+1,\\ Y=-x\\), 즉 새 점 \\((x,\\ y)=(-Y,\\ X-1)\\). 이는 \\((X,Y)\\to(-Y,\\ X)\\) (원점 중심 \\(90^\\circ\\) 반시계 회전) 후 \\(y\\)축으로 \\(-1\\)만큼 평행이동한 것.<br>따라서 원래 그래프를 반시계로 \\(90^\\circ\\) 회전한 뒤 아래로 \\(1\\)만큼 내린 그래프를 고른다. (보기 그림 확인 필요)" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.182 · Thema5 · 개념</span><br>Q18. 점대칭에 대해 다음 질문에 답하시오.<br>① 두 점 \\(A(1,\\ 3)\\), \\(B(3,\\ 5)\\)의 한가운데 있는 점은 어떻게 구하는가?<br>② 두 점 \\(A,\\ B\\)의 중점 좌표를 구하시오.<br>③ 두 점 \\(A,\\ B\\)가 어떤 한 점을 기준으로 대칭인 상태를 무엇이라 하는가?<br>④ 점 \\(P(x,\\ y)\\)를 점 \\(A(a,\\ b)\\)에 대칭이동한 점 \\(P'\\)의 좌표를 쓰시오.<br>⑤ 도형 \\(f(x,\\ y)=0\\)을 점 \\(A(a,\\ b)\\)에 대칭이동한 도형의 방정식을 쓰시오.", answer: "O", hint: "\\(P'(2a-x,\\ 2b-y)\\), \\(f(2a-x,\\ 2b-y)=0\\)", explanation: "① 중점 공식(두 점 좌표의 평균)<br>② \\(\\left(\\dfrac{1+3}{2},\\ \\dfrac{3+5}{2}\\right)=(2,\\ 4)\\)<br>③ 점대칭<br>④ \\(P'(2a-x,\\ 2b-y)\\)<br>⑤ \\(f(2a-x,\\ 2b-y)=0\\)" },

  // ────────────────────────────────────────────────
  // 상태
  // ────────────────────────────────────────────────
  const state = {
    // 공통
    userType: null,       // 'student' | 'admin'
    studentName: '',
    phone: '',
    adminName: '',
    // 선생님 모드
    selectedStudent: null,  // { id, studentName, phone, ... }
    // 퀴즈
    selectedLecture: null,  // lecture 객체
    currentQuestion: 0,
    answers: {},            // { questionIdx: 'O'|'X' }
    quizCompleted: false,
    // 학습기록
    showRecords: false,
    allStudentData: {},     // { studentDocId: { attempts: [...] } }
    expandedAttempts: {},
    // 캔버스
    canvasStrokes: [],
    penColor: '#000000',
    penSize: 3,
    isEraserMode: false,
    currentCanvas: null,
    // 타이머
    timerInterval: null,
    questionStartTime: null,
    questionElapsed: 0,
    timerRunning: false,
    questionTimes: {},      // { questionIdx: seconds }
    lockedAnswers: {},      // { questionIdx: true } 이미 제출된(채점된) 문제 → 수정 불가
    questionStrokes: {},    // { questionIdx: { strokes:[{p:[x,y,...],c,w}], w, h } }
    _draw: [],              // 렌더 후 그릴 캔버스 목록 { id, data }
  };

  // ────────────────────────────────────────────────
  // Firebase 데이터
  // ────────────────────────────────────────────────
  async function loadStudentData(docId) {
    try {
      const doc = await db.collection('oral-test-students').doc(docId).get();
      if (doc.exists) {
        const d = doc.data();
        state.allStudentData[docId] = { attempts: d.cm2Attempts || [] };
      }
    } catch(e) { console.warn('데이터 로드 실패:', e); }
  }

  async function saveAttempt(attempt) {
    const docId = state.selectedStudent ? state.selectedStudent.id : `${state.studentName}_${state.phone}`;
    try {
      const ref = db.collection('oral-test-students').doc(docId);
      const doc = await ref.get();
      const existing = doc.exists ? (doc.data().cm2Attempts || []) : [];
      existing.push(attempt);
      await ref.set({ cm2Attempts: existing }, { merge: true });
      state.allStudentData[docId] = { attempts: existing };
    } catch(e) { console.warn('저장 실패:', e); }
  }

  function getAttemptsForLecture(lectureId) {
    const docId = state.selectedStudent ? state.selectedStudent.id : `${state.studentName}_${state.phone}`;
    return (state.allStudentData[docId]?.attempts || []).filter(a => a.lectureId === lectureId);
  }

  // 구두테스트 점수(맞은 수 / 푼 수) + 진행률(푼 수 / 전체 문제) 계산. 구버전 기록도 호환.
  function attemptMetrics(a) {
    const answered = (a.answered != null) ? a.answered : (a.total != null ? a.total : 0);
    let totalQ = a.totalQuestions;
    if (totalQ == null) {
      const lec = lectures.find(l => l.id === a.lectureId);
      totalQ = lec ? lec.questions.length : answered;
    }
    const correct = a.correct || 0;
    const score = (a.score != null) ? a.score : (answered > 0 ? Math.round(correct / answered * 100) : 0);
    const progress = (a.progress != null) ? a.progress : (totalQ > 0 ? Math.round(answered / totalQ * 100) : 0);
    return { answered, totalQ, correct, score, progress };
  }

  // ────────────────────────────────────────────────
  // 타이머
  // ────────────────────────────────────────────────
  function startTimer() {
    if (state.timerRunning) return;
    state.timerRunning = true;
    state.questionStartTime = Date.now() - (state.questionElapsed * 1000);
    state.timerInterval = setInterval(() => {
      state.questionElapsed = Math.floor((Date.now() - state.questionStartTime) / 1000);
      const el = document.getElementById('timerDisplay');
      if (el) el.textContent = formatTime(state.questionElapsed);
    }, 500);
  }

  function stopTimer() {
    if (state.timerInterval) clearInterval(state.timerInterval);
    state.timerInterval = null;
    state.timerRunning = false;
  }

  function resetTimer() {
    stopTimer();
    state.questionElapsed = 0;
    state.questionStartTime = null;
  }

  function saveQuestionTime(idx) {
    state.questionTimes[idx] = state.questionElapsed;
  }

  function formatTime(s) {
    const m = Math.floor(s / 60);
    const sec = s % 60;
    return `${m}:${sec.toString().padStart(2, '0')}`;
  }

  // ────────────────────────────────────────────────
  // 캔버스
  // ────────────────────────────────────────────────
  function initCanvas(id) {
    const canvas = document.getElementById(id);
    if (!canvas) return;
    const dpr = window.devicePixelRatio || 1;
    const rect = canvas.getBoundingClientRect();
    canvas.width = rect.width * dpr;
    canvas.height = rect.height * dpr;
    canvas.style.width = rect.width + 'px';
    canvas.style.height = rect.height + 'px';
    const ctx = canvas.getContext('2d');
    ctx.scale(dpr, dpr);
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.strokeStyle = state.penColor;
    ctx.lineWidth = state.penSize;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    state.currentCanvas = canvas;
    setupCanvasEvents(id);
    redrawCanvas();
  }

  function redrawCanvas() {
    const canvas = state.currentCanvas;
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    const dpr = window.devicePixelRatio || 1;
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, canvas.width / dpr, canvas.height / dpr);
    for (const stroke of state.canvasStrokes) {
      if (stroke.points.length < 2) continue;
      ctx.strokeStyle = stroke.color;
      ctx.lineWidth = stroke.width;
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      ctx.beginPath();
      ctx.moveTo(stroke.points[0].x, stroke.points[0].y);
      for (let i = 1; i < stroke.points.length; i++) ctx.lineTo(stroke.points[i].x, stroke.points[i].y);
      ctx.stroke();
    }
  }

  function findStrokeAtPoint(x, y) {
    const t = 10;
    for (let i = state.canvasStrokes.length - 1; i >= 0; i--) {
      for (const p of state.canvasStrokes[i].points) {
        if (Math.hypot(p.x - x, p.y - y) < t) return i;
      }
    }
    return -1;
  }

  function setupCanvasEvents(id) {
    const canvas = document.getElementById(id);
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    let isDrawing = false;
    let currentStroke = null;
    canvas.style.touchAction = 'pan-y pan-x';

    function isPenOrMouse(e) { return e.pointerType === 'pen' || e.pointerType === 'mouse'; }
    function getCoords(e) {
      const rect = canvas.getBoundingClientRect();
      return { x: e.clientX - rect.left, y: e.clientY - rect.top };
    }

    canvas.addEventListener('pointerdown', e => {
      if (!isPenOrMouse(e)) return;
      e.preventDefault();
      canvas.setPointerCapture(e.pointerId);
      const c = getCoords(e);
      isDrawing = true;
      if (state.isEraserMode) {
        const i = findStrokeAtPoint(c.x, c.y);
        if (i !== -1) { state.canvasStrokes.splice(i, 1); redrawCanvas(); }
      } else {
        currentStroke = { points: [c], color: state.penColor, width: state.penSize };
      }
    });

    canvas.addEventListener('pointermove', e => {
      if (!isDrawing || !isPenOrMouse(e)) return;
      e.preventDefault();
      const c = getCoords(e);
      if (state.isEraserMode) {
        const i = findStrokeAtPoint(c.x, c.y);
        if (i !== -1) { state.canvasStrokes.splice(i, 1); redrawCanvas(); }
      } else {
        currentStroke.points.push(c);
        const prev = currentStroke.points[currentStroke.points.length - 2];
        ctx.strokeStyle = currentStroke.color;
        ctx.lineWidth = currentStroke.width;
        ctx.lineCap = 'round'; ctx.lineJoin = 'round';
        ctx.beginPath(); ctx.moveTo(prev.x, prev.y); ctx.lineTo(c.x, c.y); ctx.stroke();
      }
    });

    const stopDraw = () => {
      if (!isDrawing) return;
      isDrawing = false;
      if (!state.isEraserMode && currentStroke && currentStroke.points.length > 0) {
        state.canvasStrokes.push(currentStroke);
      }
      currentStroke = null;
    };
    canvas.addEventListener('pointerup', stopDraw);
    canvas.addEventListener('pointercancel', stopDraw);
    canvas.addEventListener('pointerleave', stopDraw);
  }

  // 렌더링

  // 필기(캔버스) 저장 / 복원 / 재생
  // ────────────────────────────────────────────────
  function strokesToCompact(strokes) {
    return (strokes || [])
      .filter(s => s.points && s.points.length >= 2)
      .map(s => {
        const p = [];
        for (const pt of s.points) { p.push(Math.round(pt.x), Math.round(pt.y)); }
        return { p, c: s.color, w: s.width };
      });
  }
  function compactToStrokes(compact) {
    if (!compact) return [];
    return compact.map(s => {
      const points = [];
      for (let i = 0; i + 1 < s.p.length; i += 2) points.push({ x: s.p[i], y: s.p[i + 1] });
      return { points, color: s.c || '#000000', width: s.w || 3 };
    });
  }
  function captureCurrentStrokes() {
    const idx = state.currentQuestion;
    const compact = strokesToCompact(state.canvasStrokes);
    if (compact.length === 0) { delete state.questionStrokes[idx]; return; }
    const rect = state.currentCanvas ? state.currentCanvas.getBoundingClientRect() : null;
    state.questionStrokes[idx] = { strokes: compact, w: rect ? Math.round(rect.width) : 0, h: 320 };
  }
  function loadStrokesFor(idx) {
    const d = state.questionStrokes[idx];
    return d ? compactToStrokes(d.strokes) : [];
  }
  function drawSavedStrokes(canvasEl, data) {
    if (!canvasEl || !data || !data.strokes || !data.strokes.length) return;
    const w0 = data.w || 300, h0 = data.h || 320;
    const dispW = canvasEl.getBoundingClientRect().width || w0;
    const dispH = dispW * (h0 / w0);
    canvasEl.style.height = dispH + 'px';
    const dpr = window.devicePixelRatio || 1;
    canvasEl.width = dispW * dpr;
    canvasEl.height = dispH * dpr;
    const ctx = canvasEl.getContext('2d');
    ctx.scale(dpr, dpr);
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, dispW, dispH);
    const s = dispW / w0;
    ctx.lineCap = 'round'; ctx.lineJoin = 'round';
    for (const st of data.strokes) {
      const p = st.p; if (!p || p.length < 4) continue;
      ctx.strokeStyle = st.c || '#000000';
      ctx.lineWidth = (st.w || 3) * s;
      ctx.beginPath();
      ctx.moveTo(p[0] * s, p[1] * s);
      for (let i = 2; i + 1 < p.length; i += 2) ctx.lineTo(p[i] * s, p[i + 1] * s);
      ctx.stroke();
    }
  }
  function flushPendingDraws() {
    setTimeout(() => {
      (state._draw || []).forEach(d => {
        const el = document.getElementById(d.id);
        if (el) drawSavedStrokes(el, d.data);
      });
      state._draw = [];
    }, 60);
  }

          </h2>
          <div style="display:flex;gap:0.5rem">
            <button onclick="goBackToHome()" style="padding:0.4rem 0.85rem;background:#1f2937;border:1px solid #374151;border-radius:0.5rem;color:#9ca3af;font-size:0.8rem;font-family:inherit;cursor:pointer;font-weight:700">← 과목 선택</button>
            <button onclick="state.showRecords=false;render()" style="padding:0.4rem 0.85rem;background:#1f2937;border:1px solid #374151;border-radius:0.5rem;color:#9ca3af;font-size:0.8rem;font-family:inherit;cursor:pointer;font-weight:700">강의 목록</button>
          </div>
        </div>
        ${sorted.length === 0 ? `
          <div style="background:#141428;border:1px solid #1f1f35;border-radius:1rem;padding:3rem;text-align:center">
            <p style="color:#6b7280">아직 학습 기록이 없습니다.</p>
          </div>` : sorted.map(a => {
          const lec = lectures.find(l => l.id === a.lectureId);
          const m = attemptMetrics(a);
          const date = new Date(a.date).toLocaleDateString('ko-KR');
          const time = new Date(a.date).toLocaleTimeString('ko-KR', {hour:'2-digit',minute:'2-digit'});
          const expanded = !!state.expandedAttempts[a.date];
          const qStrokes = a.questionStrokes || {};
          const answerKeys = Object.keys(a.answers || {}).map(Number);
          const strokeKeys = Object.keys(qStrokes).map(Number);
          const qCount = lec ? lec.questions.length : (Math.max(-1, ...answerKeys, ...strokeKeys) + 1);
          const hasStrokes = strokeKeys.length > 0;
          let detail = '';
          if (expanded) {
            const rows = [];
            for (let i = 0; i < qCount; i++) {
              const ans = a.answers ? a.answers[i] : undefined;
              const data = qStrokes[i];
              if (ans === undefined && !data) continue;
              const q = lec && lec.questions[i];
              const correctAns = q ? q.answer : null;
              const isCorrect = correctAns != null && ans === correctAns;
              const cid = ('rc_' + a.date + '_' + i).replace(/[^a-zA-Z0-9_]/g, '');
              if (data) state._draw.push({ id: cid, data });
              rows.push(`
                <div style="background:#0f0f1a;border:1px solid #1f2f3f;border-radius:0.75rem;padding:0.75rem">
                  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:0.4rem">
                    <span style="color:#9ca3af;font-size:0.8rem;font-weight:700">문제 ${i+1}</span>
                    <span style="font-size:0.78rem;font-weight:700;color:${ans===undefined?'#6b7280':(isCorrect?'#10b981':'#ef4444')}">${ans===undefined?'미답변':('채점 '+ans+(correctAns!=null?(isCorrect?' ✓':' ✗'):''))}</span>
                  </div>
                  ${data ? `<canvas id="${cid}" style="width:100%;display:block;border-radius:0.5rem;background:#fff"></canvas>` : `<div style="color:#4b5563;font-size:0.75rem">✏ 필기 없음</div>`}
                </div>`);
            }
            detail = `<div style="margin-top:0.9rem;border-top:1px solid #1f2f3f;padding-top:0.9rem;display:flex;flex-direction:column;gap:0.6rem">${rows.join('') || '<div style="color:#4b5563;font-size:0.8rem">저장된 상세 내역이 없습니다.</div>'}</div>`;
          }
          return `
            <div style="background:#141428;border:1px solid #1f2f3f;border-radius:1rem;padding:1.25rem;margin-bottom:0.75rem">
              <div onclick="toggleAttempt('${a.date}')" style="display:flex;align-items:center;justify-content:space-between;cursor:pointer">
                <div>
                  <div style="font-weight:700;color:#fff;margin-bottom:0.25rem">${lec?.name || '알 수 없음'} 구두테스트 <span style="color:#6b7280;font-size:0.75rem;font-weight:500;margin-left:0.25rem">${expanded?'▲ 접기':(hasStrokes?'▼ 필기 보기':'▼ 상세')}</span></div>
                  <div style="color:#6b7280;font-size:0.78rem">${date} ${time}</div>
                </div>
                <div style="text-align:right">
                  <div style="font-size:1.3rem;font-weight:900;color:${m.score>=80?'#10b981':'#f97316'}">${m.score}점</div>
                  <div style="color:#6b7280;font-size:0.75rem">정답 ${m.correct}/${m.answered} · 진행 ${m.progress}%</div>
                </div>
              </div>
              ${detail}
            </div>`;
        }).join('')}
      </div>`;

    flushPendingDraws();
  }

  function renderMath() {
    document.querySelectorAll('.math-text, #questionText').forEach(el => {
      try {
        renderMathInElement(el, {
          delimiters: [
            {left:'\\(', right:'\\)', display:false},
            {left:'\\[', right:'\\]', display:true},
            {left:'$', right:'$', display:false}
          ],
          throwOnError: false
        });
      } catch(e) {}
    });
  }

  // ────────────────────────────────────────────────
  // 이벤트 핸들러
  // ────────────────────────────────────────────────
  function startLecture(id) {
    const lec = lectures.find(l => l.id === id);
    if (!lec || lec.questions.length === 0) return;
    state.selectedLecture = lec;
    // 이전에 제출한 진행(가장 최근 기록)을 불러와 이어서 풀기
    const prev = getLatestAttempt(id);
    state.answers = (prev && prev.answers) ? Object.assign({}, prev.answers) : {};
    state.questionStrokes = (prev && prev.questionStrokes) ? Object.assign({}, prev.questionStrokes) : {};
    state.questionTimes = (prev && prev.questionTimes) ? Object.assign({}, prev.questionTimes) : {};
    state.lockedAnswers = {};
    Object.keys(state.answers).forEach(k => { state.lockedAnswers[k] = true; }); // 이미 푼 문제는 잠금
    state.quizCompleted = false;
    state.currentQuestion = firstUnansweredIndex(lec);
    state.canvasStrokes = loadStrokesFor(state.currentQuestion);
    resetTimer();
    render();
    window.scrollTo({ top: 0, behavior: 'instant' });
  }

  function handleAnswer(ans) {
    if (state.lockedAnswers[state.currentQuestion]) return; // 이미 채점된 문제는 수정 불가
    state.answers[state.currentQuestion] = ans;
    render();
  }

  function toggleAttempt(dateKey) {
    state.expandedAttempts[dateKey] = !state.expandedAttempts[dateKey];
    render();
  }

  function getLatestAttempt(lectureId) {
    const arr = getAttemptsForLecture(lectureId);
    return arr.length ? arr[arr.length - 1] : null;
  }

  function firstUnansweredIndex(lec) {
    for (let i = 0; i < lec.questions.length; i++) {
      if (state.answers[i] === undefined) return i;
    }
    return 0; // 전부 답변됨
  }

  function handleNext() {
    const lec = state.selectedLecture;
    if (state.currentQuestion < lec.questions.length - 1) {
      saveQuestionTime(state.currentQuestion);
      captureCurrentStrokes();
      state.currentQuestion++;
      state.canvasStrokes = loadStrokesFor(state.currentQuestion);
      resetTimer();
      render();
      window.scrollTo({ top: 0, behavior: 'instant' });
    }
  }

  function handlePrev() {
    if (state.currentQuestion > 0) {
      saveQuestionTime(state.currentQuestion);
      captureCurrentStrokes();
      state.currentQuestion--;
      state.canvasStrokes = loadStrokesFor(state.currentQuestion);
      resetTimer();
      render();
      window.scrollTo({ top: 0, behavior: 'instant' });
    }
  }

  async function finishQuiz() {
    const lec = state.selectedLecture;
    const total = lec.questions.length;
    const answeredCount = Object.keys(state.answers).length;
    if (answeredCount === 0) return;

    saveQuestionTime(state.currentQuestion);
    captureCurrentStrokes();
    stopTimer();

    const correct = lec.questions.filter((q, i) => state.answers[i] === q.answer).length;
    const score = answeredCount > 0 ? Math.round(correct / answeredCount * 100) : 0;   // 구두테스트 점수(맞은 수/푼 수)
    const progress = total > 0 ? Math.round(answeredCount / total * 100) : 0;           // 진행률(푼 수/전체)
    const attempt = {
      lectureId: lec.id,
      lectureName: lec.name,
      date: new Date().toISOString(),
      correct,
      answered: answeredCount,
      totalQuestions: total,
      score,
      progress,
      oralTestPassed: score >= 80,
      answers: state.answers,
      questionTimes: state.questionTimes,
      questionStrokes: state.questionStrokes,
      // 구버전 호환 필드
      total: answeredCount,
      percentage: score,
    };

    await saveAttempt(attempt);
    // 제출한 답변은 모두 잠금(재풀이 불가) → 이어서 풀기 시 미답변만 풀 수 있음
    Object.keys(state.answers).forEach(k => { state.lockedAnswers[k] = true; });
    state.quizCompleted = true;
    render();
    window.scrollTo({ top: 0, behavior: 'instant' });
  }

  function backToLectureList() {
    state.selectedLecture = null;
    state.quizCompleted = false;
    state.answers = {};
    state.lockedAnswers = {};
    state.canvasStrokes = [];
    state.questionStrokes = {};
    state.questionTimes = {};
    state.currentQuestion = 0;
    resetTimer();
    render();
    window.scrollTo({ top: 0, behavior: 'instant' });
  }

  function exitQuiz() {
    const hasNew = Object.keys(state.answers).some(k => !state.lockedAnswers[k])
      || (state.canvasStrokes && state.canvasStrokes.length > 0);
    if (hasNew && !confirm('제출하지 않은 이번 답변·필기는 저장되지 않습니다.\n강의 목록으로 돌아갈까요?')) return;
    backToLectureList();
  }

  // 이어서 풀기: 이전 답변·필기를 유지한 채, 아직 안 푼 문제만 풀도록 재개
  function resumeLecture() {
    const lec = state.selectedLecture;
    state.quizCompleted = false;
    state.currentQuestion = firstUnansweredIndex(lec);
    state.canvasStrokes = loadStrokesFor(state.currentQuestion);
    resetTimer();
    render();
    window.scrollTo({ top: 0, behavior: 'instant' });
  }

  function toggleTimer() {
    if (state.timerRunning) { stopTimer(); } else { startTimer(); }
    const btn = document.getElementById('timerBtn');
    if (btn) {
      btn.textContent = state.timerRunning ? '■ 정지' : '▶ 시작';
      btn.style.background = state.timerRunning ? '#dc2626' : '#16a34a';
    }
  }

  function setEraserMode(on) {
    state.isEraserMode = on;
    const penBtn = document.getElementById('penBtn');
    const eraserBtn = document.getElementById('eraserBtn');
    if (penBtn) penBtn.style.background = on ? '#374151' : '#f97316';
    if (eraserBtn) eraserBtn.style.background = on ? '#f97316' : '#374151';
  }

  function goBackToHome() {
    if (state.selectedStudent) {
      sessionStorage.setItem('ox_return_student_id', state.selectedStudent.id);
      sessionStorage.setItem('ox_return_student_name', state.selectedStudent.studentName || '');
    }
    window.location.href = '/';
  }

  function doLogout() {
    stopTimer();
    localStorage.removeItem('ox_quiz_student_name');
    localStorage.removeItem('ox_quiz_student_phone');
    localStorage.removeItem('ox_quiz_auto_login');
    localStorage.removeItem('ox_quiz_admin_name');
    localStorage.removeItem('ox_quiz_admin_auto_login');
    localStorage.removeItem('ox_quiz_preselect_student');
    localStorage.removeItem('mathstart_user');
    window.location.href = '/';
  }

  async function loadStudentDataAndRender() {
    const docId = state.selectedStudent
      ? state.selectedStudent.id
      : `${state.studentName}_${state.phone}`;
    await loadStudentData(docId);
    render();
  }

  async function applyPreselectStudent() {
    const preselectId = localStorage.getItem('ox_quiz_preselect_student');
    if (!preselectId) return;
    localStorage.removeItem('ox_quiz_preselect_student');
    try {
      const doc = await db.collection('oral-test-students').doc(preselectId).get();
      if (doc.exists) {
        state.selectedStudent = { id: doc.id, ...doc.data() };
        await loadStudentData(preselectId);
      }
    } catch(e) { console.warn('preselect 로드 실패:', e); }
  }

  // ────────────────────────────────────────────────
  // 초기화 (자동 로그인)
  // ────────────────────────────────────────────────
  async function init() {
    const adminAuto = localStorage.getItem('ox_quiz_admin_auto_login');
    const studentAuto = localStorage.getItem('ox_quiz_auto_login');

    if (adminAuto === 'true') {
      const name = localStorage.getItem('ox_quiz_admin_name') || '';
      state.userType = 'admin';
      state.adminName = name;
      await applyPreselectStudent();
      render();
    } else if (studentAuto === 'true') {
      const name = localStorage.getItem('ox_quiz_student_name') || '';
      const phone = localStorage.getItem('ox_quiz_student_phone') || '';
      state.userType = 'student';
      state.studentName = name;
      state.phone = phone;
      await loadStudentData(`${name}_${phone}`);
      render();
    } else {
      redirectToHome();
    }
  }

  init();
</script>
</body>
</html>
