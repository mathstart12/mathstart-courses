      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.81 · Thema5 · 발상&알고리즘13</span><br>Q20. 세 직선이 삼각형을 이루지 않는다는 것은 어떤 상황일까? 다음 빈칸을 채우시오.<br>① 세 직선이 모두 __________할 때<br>② 세 직선 중 두 직선이 __________할 때<br>③ 세 직선이 __________에서 만날 때", answer: "O", hint: "모두 평행 / 두 직선 평행 / 한 점에서 만남", explanation: "① 평행<br>② 평행<br>③ 한 점" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.81 · Thema5 · 예시문제15</span><br>Q21. 세 직선 \\(2x-y+2=0\\), \\(x+y-5=0\\), \\(ax-y-1=0\\)이 삼각형을 이루지 않도록 하는 상수 \\(a\\)의 값의 합을 구하시오.", answer: "O", hint: "셋째 직선이 ① 첫째와 평행 ② 둘째와 평행 ③ 두 직선의 교점 통과", explanation: "셋째 직선 \\(ax-y-1=0\\)의 기울기는 \\(a\\).<br>① 첫째(\\(2x-y+2=0\\), 기울기 \\(2\\))와 평행: \\(a=2\\).<br>② 둘째(\\(x+y-5=0\\), 기울기 \\(-1\\))와 평행: \\(a=-1\\).<br>③ 첫째·둘째의 교점 \\((1,\\ 4)\\)를 지남: \\(a\\cdot1-4-1=0\\) → \\(a=5\\).<br>따라서 값의 합 \\(=2+(-1)+5=6\\)" },
    ] },
    { id: 6,  name: '6강',  questions: [
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.82 · Thema6 · 핵심태도·개념</span><br>Q1. 다음 질문에 답하시오.<br>① 점과 직선 사이의 거리 파트에서는 증명과정 자체보다 무엇을 알아 두고 활용하는 것이 중요한가?<br>② 점 \\((x_1,\\ y_1)\\)과 직선 \\(ax+by+c=0\\) 사이의 거리 공식을 쓰시오.<br>③ 원점과 직선 \\(ax+by+c=0\\) 사이의 거리 공식을 쓰시오.<br>④ 수학에서 말하는 거리는 대개 어떤 거리를 의미하는가?<br>⑤ 점과 직선 사이의 거리 문제에서 직선이 표준형으로 나왔다면 어떤 형태로 바꿔서 푸는 것이 좋은가?", answer: "O", hint: "\\(d=\\dfrac{|ax_1+by_1+c|}{\\sqrt{a^2+b^2}}\\)", explanation: "① 거리 공식을 알아두고 활용하는 것.<br>② \\(d=\\dfrac{|ax_1+by_1+c|}{\\sqrt{a^2+b^2}}\\)<br>③ \\(d=\\dfrac{|c|}{\\sqrt{a^2+b^2}}\\)<br>④ 수직거리(최단거리)<br>⑤ 일반형 \\(ax+by+c=0\\)으로 바꿔서 푼다." },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.82 · Thema6 · 예시문제1</span><br>Q2. 점 \\((2,\\ 1)\\)과 직선 \\(3x-4y+8=0\\) 사이의 거리를 구하시오.", answer: "O", hint: "\\(\\dfrac{|ax_1+by_1+c|}{\\sqrt{a^2+b^2}}\\)", explanation: "\\(d=\\dfrac{|3\\cdot2-4\\cdot1+8|}{\\sqrt{3^2+(-4)^2}}=\\dfrac{|10|}{5}=2\\)" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.83 · Thema6 · 예시문제2</span><br>Q3. 직선 \\(y=-\\dfrac43x+\\dfrac94\\)에 평행하고, 점 \\((-3,\\ 6)\\)에서의 거리가 \\(2\\)인 직선의 방정식을 모두 구하시오.", answer: "O", hint: "\\(4x+3y+d=0\\)으로 놓고 거리 \\(=2\\)", explanation: "평행한 직선을 \\(4x+3y+d=0\\)이라 하면 \\(\\dfrac{|4(-3)+3(6)+d|}{\\sqrt{4^2+3^2}}=\\dfrac{|6+d|}{5}=2\\) → \\(|6+d|=10\\) → \\(d=4\\) 또는 \\(d=-16\\).<br>따라서 \\(4x+3y+4=0\\), \\(4x+3y-16=0\\)" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.84 · Thema7 · 개념</span><br>Q4. 평행한 두 직선 사이의 거리에 대해 다음 질문에 답하시오.<br>① 평행한 두 직선 사이의 거리는 모든 곳에서 어떤가?<br>② 평행한 두 직선 \\(l:ax+by+c=0\\), \\(l':ax+by+c'=0\\) 사이의 거리는 어떤 점과 어떤 직선 사이의 거리로 구할 수 있는가?<br>③ 두 직선 \\(l,\\ l'\\) 사이의 거리 공식을 쓰시오.<br>④ 이 공식은 어떤 원리를 통해 유도된 공식인가?<br>⑤ 무엇을 모른 채 공식만 암기하는 것은 수학에서 절대 금물인가?", answer: "O", hint: "\\(d=\\dfrac{|c-c'|}{\\sqrt{a^2+b^2}}\\)", explanation: "① 모든 곳에서 일정(같다).<br>② 한 직선 위의 한 점과 다른 직선 사이의 거리.<br>③ \\(d=\\dfrac{|c-c'|}{\\sqrt{a^2+b^2}}\\)<br>④ 점과 직선 사이의 거리 공식(원리)으로 유도된다.<br>⑤ 공식의 유도 원리(개념)를 모른 채 암기하는 것." },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.85 · Thema7 · 발상&알고리즘15</span><br>Q5. 평행한 두 직선 사이의 거리를 구하는 방법을 빈칸에 맞게 말하시오.<br>① 방법1 : 한 직선 위의 임의의 한 점 \\(P(x_1,\\ y_1)\\)을 잡고, 그 점과 __________ 사이의 거리를 구한다.<br>② 이때 임의의 한 점은 보통 __________ 또는 __________으로 설정한다.<br>③ 방법2 : 평행한 두 직선 사이의 거리 __________을 사용한다.", answer: "O", hint: "다른 직선 / x절편·y절편 / 공식", explanation: "① 다른(나머지) 직선<br>② \\(x\\)절편 / \\(y\\)절편 (계산이 쉬운 축과의 교점)<br>③ 공식" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.85 · Thema7 · 예시문제1</span><br>Q6. 두 직선 \\(y=-x-1\\), \\(y=-x-3\\) 사이의 거리를 구하시오.", answer: "O", hint: "일반형 \\(x+y+1=0,\\ x+y+3=0\\) → \\(\\dfrac{|c-c'|}{\\sqrt{a^2+b^2}}\\)", explanation: "\\(x+y+1=0\\), \\(x+y+3=0\\)이므로 \\(d=\\dfrac{|1-3|}{\\sqrt{1^2+1^2}}=\\dfrac{2}{\\sqrt2}=\\sqrt2\\)" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.86 · Thema7 · 예시문제16</span><br>Q7. 직선 \\((k+1)x-(k-3)y+k-15=0\\)은 실수 \\(k\\)의 값에 관계없이 일정한 점 \\(A\\)를 지난다. 점 \\(A\\)와 직선 \\(2x-y+m=0\\) 사이의 거리가 \\(\\sqrt5\\)일 때, 모든 상수 \\(m\\) 값의 합을 구하시오.", answer: "O", hint: "\\(k\\)로 정리해 정점 \\(A\\) 먼저", explanation: "\\(k(x-y+1)+(x+3y-15)=0\\)에서 \\(x-y+1=0,\\ x+3y-15=0\\) → \\(A(3,\\ 4)\\).<br>\\(\\dfrac{|2\\cdot3-4+m|}{\\sqrt{2^2+(-1)^2}}=\\dfrac{|2+m|}{\\sqrt5}=\\sqrt5\\) → \\(|2+m|=5\\) → \\(m=3\\) 또는 \\(m=-7\\).<br>따라서 합 \\(=3+(-7)=-4\\)" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.86 · Thema7 · 예시문제17</span><br>Q8. 다음 두 직선 사이의 거리가 \\(\\sqrt5\\)일 때, 양수 \\(k\\)의 값을 구하시오.<br>\\(2x-y+3=0\\), \\(2x-y+k=0\\)", answer: "O", hint: "\\(\\dfrac{|3-k|}{\\sqrt5}=\\sqrt5\\)", explanation: "\\(\\dfrac{|3-k|}{\\sqrt{2^2+(-1)^2}}=\\dfrac{|3-k|}{\\sqrt5}=\\sqrt5\\) → \\(|3-k|=5\\) → \\(k=-2\\) 또는 \\(k=8\\).<br>양수이므로 \\(k=8\\)" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.87 · Thema7 · 예시문제18</span><br>Q9. 두 직선 \\(x+y-3=0\\), \\(x-y-1=0\\)의 교점을 지나는 직선 중에서 원점에서의 거리가 최대인 직선의 방정식을 구하시오.", answer: "O", hint: "교점 \\(P\\)에서 원점까지 거리가 최대 → \\(OP\\)에 수직", explanation: "교점 \\(P\\): \\(x+y=3,\\ x-y=1\\) → \\(P(2,\\ 1)\\).<br>\\(P\\)를 지나는 직선 중 원점에서의 거리는 직선이 \\(OP\\)에 수직일 때 최대(그때 거리 \\(=\\overline{OP}\\)).<br>\\(OP\\)의 기울기 \\(\\dfrac12\\) → 수직인 직선의 기울기 \\(-2\\): \\(y-1=-2(x-2)\\) → \\(2x+y-5=0\\)" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.87 · Thema7 · 스킬1</span><br>Q10. 삼각형 넓이를 구하는 방식에 대해 다음 질문에 답하시오.<br>① 삼각형 넓이를 구할 때 점과 직선 사이의 거리 공식을 이용하면 무엇을 구하여 풀 수 있는가?<br>② 삼각형 넓이를 구할 때 사용할 수 있는 또 다른 공식은 무엇인가?<br>③ 세 점 \\(A(x_1,\\ y_1)\\), \\(B(x_2,\\ y_2)\\), \\(C(x_3,\\ y_3)\\)일 때, 신발끈 공식을 이용한 삼각형 \\(ABC\\)의 넓이 공식을 쓰시오.", answer: "O", hint: "밑변(한 변) + 높이(점과 직선 거리), 또는 신발끈 공식", explanation: "① 한 변을 밑변으로, 나머지 꼭짓점에서 그 변까지의 거리를 높이로 구해 \\(\\dfrac12\\times\\text{밑변}\\times\\text{높이}\\)로 푼다.<br>② 신발끈 공식(사선공식).<br>③ \\(S=\\dfrac12\\left|x_1(y_2-y_3)+x_2(y_3-y_1)+x_3(y_1-y_2)\\right|\\)" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.87 · Thema7 · 예시문제19</span><br>Q11. 세 점 \\(A(2,\\ 7)\\), \\(B(-2,\\ -1)\\), \\(C(4,\\ -3)\\)을 꼭짓점으로 하는 삼각형 \\(ABC\\)의 넓이를 구하시오.", answer: "O", hint: "신발끈 공식", explanation: "\\(S=\\dfrac12|2(-1-(-3))+(-2)(-3-7)+4(7-(-1))|=\\dfrac12|2\\cdot2+(-2)(-10)+4\\cdot8|=\\dfrac12|4+20+32|=\\dfrac12\\cdot56=28\\)" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.88 · Thema7 · 예시문제2</span><br>Q12. 세 점 \\(O(0,\\ 0)\\), \\(A(4,\\ 3)\\), \\(B(-2,\\ 6)\\)을 꼭짓점으로 하는 삼각형 \\(OAB\\)의 넓이를 다음 두 가지 방법으로 각각 설명하시오.<br>① 점과 직선 사이의 거리 공식을 이용한 방법<br>② 신발끈 공식을 이용한 방법", answer: "O", hint: "① 밑변 \\(OA\\)와 \\(B\\)까지의 거리 / ② 신발끈", explanation: "① 밑변 \\(\\overline{OA}=\\sqrt{4^2+3^2}=5\\). 직선 \\(OA\\): \\(3x-4y=0\\). \\(B(-2,6)\\)까지 거리 \\(=\\dfrac{|3(-2)-4(6)|}{5}=\\dfrac{30}{5}=6\\). 넓이 \\(=\\dfrac12\\cdot5\\cdot6=15\\).<br>② \\(S=\\dfrac12|0(3-6)+4(6-0)+(-2)(0-3)|=\\dfrac12|0+24+6|=15\\)" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.89 · Thema7 · 예시문제20</span><br>Q13. 세 직선 \\(2x-3y+3=0\\), \\(3x-y-6=0\\), \\(x+2y-2=0\\)으로 만들어지는 삼각형의 넓이를 구하시오.", answer: "O", hint: "세 교점(꼭짓점)을 구한 뒤 신발끈", explanation: "세 교점: \\((2x-3y+3=0)\\cap(3x-y-6=0)=(3,\\ 3)\\), \\((2x-3y+3=0)\\cap(x+2y-2=0)=(0,\\ 1)\\), \\((3x-y-6=0)\\cap(x+2y-2=0)=(2,\\ 0)\\).<br>\\(S=\\dfrac12|3(1-0)+0(0-3)+2(3-1)|=\\dfrac12|3+0+4|=\\dfrac72\\)" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.89 · Thema7 · 발상&알고리즘16</span><br>Q14. 각의 이등분선과 관련된 문제에서는 어떻게 생각해야 하는가? 다음 질문에 답하시오.<br>① 좌표평면에서 두 직선으로부터 같은 거리에 있는 점의 자취는 무엇인가?<br>② 두 직선의 각의 이등분선이 나오면, 이등분선 위의 임의의 점 \\(P(x,\\ y)\\)에서 무엇이 같음을 이용하는가?<br>③ 위 사실을 이용하여 무엇을 구할 수 있는가?", answer: "O", hint: "두 직선까지의 거리가 같은 점 → 각의 이등분선", explanation: "① 두 직선이 이루는 각의 이등분선.<br>② 점 \\(P\\)에서 두 직선까지의 거리가 서로 같음을 이용한다.<br>③ 각의 이등분선의 방정식을 구할 수 있다." },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.89 · Thema7 · 예시문제21</span><br>Q15. 좌표평면에서 직선 \\(y=2x\\), \\(y=-\\dfrac12x\\), \\(y=mx+5\\) \\((m>0)\\)로 둘러싸인 도형이 이등변삼각형일 때, \\(m\\)의 값을 구하시오.", answer: "O", hint: "\\(y=2x\\perp y=-\\tfrac12x\\) (원점서 직각) → 두 변의 길이가 같아야", explanation: "\\(y=2x\\)와 \\(y=-\\dfrac12x\\)는 기울기의 곱이 \\(-1\\)이라 원점 \\(O\\)에서 수직으로 만난다. 즉 원점이 직각인 직각삼각형.<br>이등변이 되려면 직각을 낀 두 변의 길이가 같아야 한다. 교점 \\(P\\)(\\(y=2x\\) 위), \\(Q\\)(\\(y=-\\tfrac12x\\) 위)에 대해 \\(\\overline{OP}=\\overline{OQ}\\).<br>\\(\\overline{OP}=\\dfrac{5\\sqrt5}{|2-m|}\\), \\(\\overline{OQ}=\\dfrac{5\\sqrt5}{|1+2m|}\\)이므로 \\(|2-m|=|1+2m|\\) → \\(m=\\dfrac13\\) (\\(m=-3\\)은 \\(m>0\\)에 위배).<br>따라서 \\(m=\\dfrac13\\)" },
    ] },
    { id: 7,  name: '7강',  questions: [
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.109 · Thema1 · 핵심태도</span><br>Q1. 원의 방정식에서 중요한 태도에 대해 다음 질문에 답하시오.<br>① 모든 원의 방정식은 어떤 두 가지 요소만 있으면 구할 수 있는가?<br>② 원의 방정식 문제를 풀 때 위의 두 가지 요소를 어떻게 해야 하는가?", answer: "O", hint: "중심 + 반지름", explanation: "① 중심과 반지름.<br>② 이 두 가지(중심, 반지름)를 찾아야(구해야) 한다." },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.109 · Thema1 · 개념</span><br>Q2. 원의 방정식에 대해 다음 질문에 답하시오.<br>① 중심의 좌표가 \\((a,\\ b)\\)이고 반지름의 길이가 \\(r\\)인 원의 방정식을 쓰시오.<br>② 중심이 원점이고 반지름의 길이가 \\(r\\)인 원의 방정식을 쓰시오.<br>③ 중심이 원점이고 반지름의 길이가 \\(1\\)인 원을 무엇이라고 부르는가?<br>④ 원의 방정식 \\((x-a)^2+(y-b)^2=r^2\\)에서 반지름은 \\(r\\)인가, \\(r^2\\)인가?", answer: "O", hint: "\\((x-a)^2+(y-b)^2=r^2\\)", explanation: "① \\((x-a)^2+(y-b)^2=r^2\\)<br>② \\(x^2+y^2=r^2\\)<br>③ 단위원<br>④ 반지름은 \\(r\\) (\\(r^2\\)이 아니다)" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.109 · Thema1 · 원의 방정식 유도</span><br>Q3. 원의 방정식이 만들어지는 과정을 빈칸에 맞게 말하시오.<br>① 원 위의 점을 \\(P(x,\\ y)\\), 중심을 \\(C(a,\\ b)\\)라고 하면 \\(\\overline{CP}=\\)__________이다.<br>② 거리공식에 의해 \\(\\overline{CP}=\\sqrt{\\phantom{()}}\\)이다. (근호 안을 쓰시오.)<br>③ 따라서 \\(\\sqrt{(x-a)^2+(y-b)^2}=\\)__________이고, 양변을 제곱하면 원의 방정식은 __________이다.<br>④ \\((x-a)^2+(y-b)^2=r^2\\)을 만족시키는 점 \\(P(x,\\ y)\\)는 점 \\(C(a,\\ b)\\)로부터의 거리가 __________인 점이다.", answer: "O", hint: "\\(\\overline{CP}=r\\), 제곱 → \\((x-a)^2+(y-b)^2=r^2\\)", explanation: "① \\(\\overline{CP}=r\\)<br>② \\(\\sqrt{(x-a)^2+(y-b)^2}\\)<br>③ \\(\\sqrt{(x-a)^2+(y-b)^2}=r\\), 제곱하면 \\((x-a)^2+(y-b)^2=r^2\\)<br>④ \\(r\\)인 점" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.109 · Thema1 · 예시문제1</span><br>Q4. 중심이 점 \\((1,\\ -2)\\)이고 반지름의 길이가 \\(3\\)인 원의 방정식을 구하시오.", answer: "O", hint: "\\((x-a)^2+(y-b)^2=r^2\\)", explanation: "\\((x-1)^2+(y+2)^2=9\\)" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.110 · Thema1 · 발상&알고리즘1</span><br>Q5. “지름을 양 끝으로 하는 원의 방정식”은 어떻게 구할까? 다음 빈칸을 채우시오.<br>① 두 점 \\(A,\\ B\\)를 지나는 원은 무수히 많지만, 두 점 \\(A,\\ B\\)를 __________의 양 끝점으로 하는 원은 하나로 결정된다.<br>② 선분 \\(AB\\)의 __________이 원의 중심이다.<br>③ \\(\\dfrac12\\overline{AB}\\)가 원의 __________의 길이이다.<br>④ 1단계 : \\(AB\\)의 __________을 구한다.<br>⑤ 2단계 : \\(\\dfrac12\\overline{AB}\\)로 __________을 구한다.<br>⑥ 중심과 반지름이 나왔으므로 __________을 세울 수 있다.", answer: "O", hint: "지름 / 중점 / 반지름", explanation: "① 지름<br>② 중점<br>③ 반지름<br>④ 중점<br>⑤ 반지름<br>⑥ 원의 방정식" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.110 · Thema1 · 예시문제2</span><br>Q6. 두 점 \\(A(4,\\ -1)\\), \\(B(0,\\ 3)\\)을 지름의 양 끝점으로 하는 원의 방정식을 구하시오.", answer: "O", hint: "중심=중점, 반지름=½AB", explanation: "중심 \\(=\\overline{AB}\\)의 중점 \\(=(2,\\ 1)\\). \\(\\overline{AB}=\\sqrt{(0-4)^2+(3+1)^2}=\\sqrt{32}=4\\sqrt2\\), 반지름 \\(=2\\sqrt2\\), \\(r^2=8\\).<br>따라서 \\((x-2)^2+(y-1)^2=8\\)" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.111 · Thema1 · 발상&알고리즘2</span><br>Q7. “세 점을 지나는 원의 방정식”은 어떻게 구할까? 다음 빈칸을 채우시오.<br>① 원의 방정식은 \\(a,\\ b,\\ r\\)로 이루어진 미지수 __________개의 방정식이라고 생각한다.<br>② 세 점을 지나게 되면 식이 __________개가 나온다.<br>③ 원의 중심을 \\(P(a,\\ b)\\)라고 하면 \\(\\overline{PA}=\\overline{PB}=\\overline{PC}\\)라고 식을 만들 수 있다.<br>④ 1단계 : 원의 중심을 \\(P(a,\\ b)\\)라 두고 \\(\\overline{PA}=\\overline{PB}=\\overline{PC}\\)라 둔다.<br>⑤ 2단계 : \\(\\overline{PA}=\\overline{PB}\\)라 두어 식을 __________개 만든다.<br>⑥ 3단계 : \\(\\overline{PB}=\\overline{PC}\\)라 두어 식을 __________개 또 만들고, 연립하면 \\(P(a,\\ b)\\)가 나온다.<br>⑦ 4단계 : \\((x-a)^2+(y-b)^2=r^2\\)에 세 점 중 __________개를 대입하여 \\(r\\)을 찾는다.", answer: "O", hint: "미지수 3개, 식 3개", explanation: "① \\(3\\)개<br>② \\(3\\)개<br>⑤ \\(1\\)개<br>⑥ \\(1\\)개<br>⑦ \\(1\\)개" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.111 · Thema1 · 예시문제3</span><br>Q8. 세 점 \\(A(1,\\ 2)\\), \\(B(0,\\ 3)\\), \\(C(-2,\\ -1)\\)을 지나는 원의 방정식을 구하시오.", answer: "O", hint: "일반형 \\(x^2+y^2+Dx+Ey+F=0\\)에 세 점 대입", explanation: "\\(x^2+y^2+Dx+Ey+F=0\\)에 대입하면 \\(D=2,\\ E=-2,\\ F=-3\\).<br>즉 \\(x^2+y^2+2x-2y-3=0\\) → \\((x+1)^2+(y-1)^2=5\\) (중심 \\((-1,\\ 1)\\), 반지름 \\(\\sqrt5\\))" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.112 · Thema1 · 예시문제1</span><br>Q9. 좌표평면 위의 두 점 \\(A(-1,\\ 3)\\), \\(B(5,\\ 0)\\)에 대하여 선분 \\(AB\\)를 \\(1:2\\)로 내분하는 점을 \\(C\\)라 하자. 선분 \\(BC\\)를 지름으로 하는 원의 중심의 좌표를 \\((a,\\ b)\\)라 할 때, \\(a+b\\)의 값을 구하시오.", answer: "O", hint: "\\(C\\)(내분점) → \\(BC\\)의 중점이 중심", explanation: "\\(C=\\left(\\dfrac{1\\cdot5+2\\cdot(-1)}{3},\\ \\dfrac{1\\cdot0+2\\cdot3}{3}\\right)=(1,\\ 2)\\).<br>원의 중심 \\(=\\overline{BC}\\)의 중점 \\(=\\left(\\dfrac{5+1}{2},\\ \\dfrac{0+2}{2}\\right)=(3,\\ 1)\\). 따라서 \\(a+b=4\\)" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.112 · Thema1 · 예시문제2</span><br>Q10. 중심이 직선 \\(y=x-2\\) 위에 있고 두 점 \\(A(0,\\ -4)\\), \\(B(4,\\ 0)\\)을 지나는 원의 반지름을 구하시오.", answer: "O", hint: "중심 \\((t,\\ t-2)\\), \\(\\overline{CA}=\\overline{CB}\\)", explanation: "중심을 \\((t,\\ t-2)\\)라 하면 \\(\\overline{CA}^2=\\overline{CB}^2\\): \\(t^2+(t+2)^2=(t-4)^2+(t-2)^2\\) → \\(16t=16\\) → \\(t=1\\), 중심 \\((1,\\ -1)\\).<br>반지름 \\(=\\sqrt{(1-0)^2+(-1+4)^2}=\\sqrt{10}\\)" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.113 · Thema2 · 개념</span><br>Q11. 원의 방정식의 표준형과 일반형에 대해 다음 질문에 답하시오.<br>① 원의 방정식의 표준형은 어떤 꼴인가?<br>② 원의 방정식의 일반형은 어떤 꼴인가?<br>③ 표준형 \\((x-a)^2+(y-b)^2=r^2\\)을 전개하여 정리하면 어떤 꼴로 나타낼 수 있는가?<br>④ \\(x^2+y^2+Ax+By+C=0\\)을 원의 방정식의 무엇이라고 하는가?", answer: "O", hint: "표준형 \\((x-a)^2+(y-b)^2=r^2\\) / 일반형 \\(x^2+y^2+Ax+By+C=0\\)", explanation: "① \\((x-a)^2+(y-b)^2=r^2\\)<br>② \\(x^2+y^2+Ax+By+C=0\\)<br>③ \\(x^2+y^2+Ax+By+C=0\\) 꼴<br>④ 원의 방정식의 일반형" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.113 · Thema2 · 참고1</span><br>Q12. 이차방정식과 원의 방정식의 관계에 대해 다음 빈칸을 채우시오.<br>① 원의 방정식은 \\(x^2\\)과 \\(y^2\\)의 계수가 __________.<br>② 원의 방정식은 \\(xy\\)항이 __________ \\(x,\\ y\\)에 대한 이차방정식이다.<br>③ 따라서 \\(x^2\\)과 \\(y^2\\)의 계수가 같은 일반형이 나오면 이 방정식이 나타내는 도형이 __________임을 알 수 있다.", answer: "O", hint: "계수 같음 / xy항 없음 / 원", explanation: "① 같다<br>② 없는<br>③ 원 (단, 반지름의 제곱이 양수여야 실제 원이 된다.)" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.113 · Thema2 · 발상&알고리즘3</span><br>Q13. “원”은 어떤 꼴로 바꾸어야 할까? 다음 빈칸을 채우시오.<br>① 원의 방정식이 일반형으로 나오면 __________과 __________을 쉽게 찾을 수 없다.<br>② 따라서 일반형으로 시험문제에 나왔다면 무조건 인수분해 또는 __________ 공식을 사용하여 __________으로 바꾼다.", answer: "O", hint: "중심·반지름 / 완전제곱 / 표준형", explanation: "① 중심 / 반지름<br>② 완전제곱(식) / 표준형" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.113 · Thema2 · 예시문제1</span><br>Q14. 방정식 \\(x^2+y^2+2x-4y-4=0\\)의 원의 중심과 반지름을 구하시오.", answer: "O", hint: "완전제곱식으로 표준형 변형", explanation: "\\((x^2+2x+1)+(y^2-4y+4)=4+1+4\\) → \\((x+1)^2+(y-2)^2=9\\).<br>중심 \\((-1,\\ 2)\\), 반지름 \\(3\\)" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.114 · Thema2 · 예시문제3</span><br>Q15. 방정식 \\(x^2+y^2-4ax+2ay+10a+15=0\\)이 원을 나타내도록 하는 실수 \\(a\\)의 값의 범위를 구하시오.", answer: "O", hint: "표준형으로 바꿔 (반지름)\\(^2>0\\)", explanation: "\\((x-2a)^2+(y+a)^2=5a^2-10a-15\\). 원이 되려면 \\(5a^2-10a-15>0\\) → \\(a^2-2a-3>0\\) → \\((a-3)(a+1)>0\\).<br>따라서 \\(a<-1\\) 또는 \\(a>3\\)" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.114 · Thema2 · 예시문제4</span><br>Q16. 직선 \\(ax-y=1\\)이 두 원 \\(x^2+y^2-by=0\\), \\(x^2-4x+y^2-8y=0\\)의 넓이를 이등분할 때, 상수 \\(a,\\ b\\)에 대하여 \\(a+b\\)의 값을 구하시오.", answer: "O", hint: "원의 넓이 이등분 → 직선이 두 원의 중심을 모두 지남", explanation: "직선이 원의 넓이를 이등분하려면 원의 중심을 지나야 한다.<br>원1: \\(x^2+(y-\\tfrac{b}{2})^2=(\\tfrac{b}{2})^2\\) → 중심 \\((0,\\ \\tfrac{b}{2})\\). 대입: \\(-\\tfrac{b}{2}=1\\) → \\(b=-2\\).<br>원2: \\((x-2)^2+(y-4)^2=20\\) → 중심 \\((2,\\ 4)\\). 대입: \\(2a-4=1\\) → \\(a=\\tfrac52\\).<br>따라서 \\(a+b=\\tfrac52-2=\\dfrac12\\)" },
    ] },
    { id: 8,  name: '8강',  questions: [
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.115 · Thema3 · 개념</span><br>Q1. 축에 접하는 원의 방정식에 대해 다음 질문에 답하시오.<br>① 원이 \\(x\\)축에 접할 때, 반지름의 길이는 중심의 어떤 좌표의 절댓값과 같은가?<br>② 중심의 좌표가 \\((a,\\ b)\\)이고 \\(x\\)축에 접하는 원의 방정식을 쓰시오.<br>③ 원이 \\(y\\)축에 접할 때, 반지름의 길이는 중심의 어떤 좌표의 절댓값과 같은가?<br>④ 중심의 좌표가 \\((a,\\ b)\\)이고 \\(y\\)축에 접하는 원의 방정식을 쓰시오.", answer: "O", hint: "\\(x\\)축 접 → \\(r=|b|\\), \\(y\\)축 접 → \\(r=|a|\\)", explanation: "① \\(y\\)좌표(의 절댓값 \\(|b|\\))<br>② \\((x-a)^2+(y-b)^2=b^2\\)<br>③ \\(x\\)좌표(의 절댓값 \\(|a|\\))<br>④ \\((x-a)^2+(y-b)^2=a^2\\)" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.116 · Thema3 · 개념</span><br>Q2. \\(x\\)축과 \\(y\\)축에 동시에 접하는 원의 방정식에 대해 다음 질문에 답하시오.<br>① 이 원에서 반지름의 길이는 중심의 \\(x\\)좌표, \\(y\\)좌표와 어떤 관계인가?<br>② 중심이 제1사분면에 있을 때 원의 방정식을 쓰시오.<br>③ 중심이 제2사분면에 있을 때 원의 방정식을 쓰시오.<br>④ 중심이 제3사분면에 있을 때 원의 방정식을 쓰시오.<br>⑤ 중심이 제4사분면에 있을 때 원의 방정식을 쓰시오.", answer: "O", hint: "\\(r=|중심의\\ x좌표|=|중심의\\ y좌표|\\)", explanation: "① 반지름 \\(r=|x\\text{좌표}|=|y\\text{좌표}|\\) (\\(x,\\ y\\)좌표의 절댓값이 모두 \\(r\\)).<br>② 중심 \\((r,\\ r)\\): \\((x-r)^2+(y-r)^2=r^2\\)<br>③ 중심 \\((-r,\\ r)\\): \\((x+r)^2+(y-r)^2=r^2\\)<br>④ 중심 \\((-r,\\ -r)\\): \\((x+r)^2+(y+r)^2=r^2\\)<br>⑤ 중심 \\((r,\\ -r)\\): \\((x-r)^2+(y+r)^2=r^2\\)" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.116 · Thema3 · 발상&알고리즘4</span><br>Q3. “축에 접한다”라는 말이 나오면 어떻게 생각해야 할까? 다음 빈칸을 채우시오.<br>① 축에 접한다는 말이 나오면 반지름의 길이가 중심의 __________와 동일하다는 성질을 활용한다.<br>② 이 성질을 이용하여 상황에 맞게 원의 __________과 __________을 찾아낸다.", answer: "O", hint: "좌표의 절댓값 / 중심·반지름", explanation: "① 좌표의 절댓값(\\(x\\)축이면 \\(y\\)좌표, \\(y\\)축이면 \\(x\\)좌표)<br>② 중심 / 반지름" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.116 · Thema3 · 예시문제</span><br>Q4. 다음 원의 방정식을 구하시오.<br>① 중심의 좌표가 \\((4,\\ -3)\\)이고 \\(x\\)축에 접하는 원<br>② 중심의 좌표가 \\((-2,\\ 5)\\)이고 \\(y\\)축에 접하는 원<br>③ 중심의 좌표가 \\((2,\\ 2)\\)이고 \\(x\\)축과 \\(y\\)축에 접하는 원", answer: "O", hint: "\\(x\\)축 접→\\(r=|y|\\), \\(y\\)축 접→\\(r=|x|\\)", explanation: "① \\(r=|-3|=3\\): \\((x-4)^2+(y+3)^2=9\\)<br>② \\(r=|-2|=2\\): \\((x+2)^2+(y-5)^2=4\\)<br>③ \\(r=2\\): \\((x-2)^2+(y-2)^2=4\\)" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.117 · Thema3 · 예시문제5</span><br>Q5. 중심이 직선 \\(y=x-2\\) 위에 있는 원이 \\(y\\)축에 접하고 점 \\((3,\\ -2)\\)를 지날 때, 이 원의 반지름의 길이를 구하시오.", answer: "O", hint: "중심 \\((t,\\ t-2)\\), \\(y\\)축 접 → \\(r=|t|\\)", explanation: "중심을 \\((t,\\ t-2)\\)라 하면 \\(y\\)축에 접하므로 \\(r=|t|\\).<br>점 \\((3,\\ -2)\\)를 지나므로 \\((t-3)^2+(t-2-(-2))^2=t^2\\) → \\((t-3)^2+t^2=t^2\\) → \\((t-3)^2=0\\) → \\(t=3\\).<br>따라서 반지름 \\(=|3|=3\\)" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.117 · Thema3 · 예시문제6</span><br>Q6. 점 \\((-5,\\ 0)\\)에서 \\(x\\)축에 접하는 원의 넓이가 \\(16\\pi\\)일 때, 이 원의 방정식을 구하시오. (단, 원의 중심은 제3사분면 위에 있다.)", answer: "O", hint: "넓이 \\(16\\pi\\) → \\(r=4\\), 접점 \\((-5,0)\\)에서 중심은 바로 위·아래", explanation: "\\(\\pi r^2=16\\pi\\) → \\(r=4\\). \\(x\\)축과 \\((-5,\\ 0)\\)에서 접하므로 중심은 \\((-5,\\ \\pm4)\\). 제3사분면이므로 중심 \\((-5,\\ -4)\\).<br>따라서 \\((x+5)^2+(y+4)^2=16\\)" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.117 · Thema3 · 참고2</span><br>Q7. \\(x\\)축과 \\(y\\)축에 동시에 접하는 원의 방정식에 대해 다음 빈칸을 채우시오.<br>\\(x\\)축과 \\(y\\)축에 동시에 접하는 원은 __________개 이상이 나올 수 있기 때문에 주의한다.", answer: "O", hint: "조건에 따라 여러 개(보통 2개)", explanation: "\\(2\\)개 (중심이 어느 사분면에 있는지에 따라 여러 개가 나올 수 있으므로 경우를 나누어 확인해야 한다.)" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.117 · Thema3 · 예시문제7</span><br>Q8. \\(x\\)축과 \\(y\\)축에 동시에 접하고 점 \\((-2,\\ -1)\\)을 지나는 원의 방정식을 모두 구하시오.", answer: "O", hint: "점이 제3사분면 → 중심 \\((-r,\\ -r)\\)", explanation: "점 \\((-2,\\ -1)\\)이 제3사분면에 있으므로 중심은 \\((-r,\\ -r)\\), 원은 \\((x+r)^2+(y+r)^2=r^2\\).<br>대입: \\((r-2)^2+(r-1)^2=r^2\\) → \\(r^2-6r+5=0\\) → \\((r-1)(r-5)=0\\) → \\(r=1\\) 또는 \\(r=5\\).<br>따라서 \\((x+1)^2+(y+1)^2=1\\), \\((x+5)^2+(y+5)^2=25\\)" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.118 · Thema4 · 개념</span><br>Q9. 자취의 방정식에 대해 다음 질문에 답하시오.<br>① 자취의 방정식이란 무엇인가?<br>② 자취란 수학에서 무엇의 집합이라고 볼 수 있는가?<br>③ 점들이 많이 모이면 무엇이 되거나 무엇이 되는가?<br>④ 자취의 방정식은 선이나 도형을 무엇으로 나타내는 것을 의미하는가?", answer: "O", hint: "조건을 만족하는 점들의 집합(자취)을 나타내는 방정식", explanation: "① 어떤 조건을 만족하는 점들이 그리는 도형(자취)을 나타내는 방정식.<br>② (조건을 만족하는) 점들의 집합.<br>③ 선이 되거나 도형이 된다.<br>④ 방정식(식)으로 나타내는 것." },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.118 · Thema4 · 발상&알고리즘5</span><br>Q10. 도형의 방정식 또는 도형의 길이는 어떻게 구할까? 다음 빈칸을 채우시오.<br>① 시험에서 “도형의 방정식” 또는 “도형의 길이”를 구하라는 것은 __________의 방정식을 구하라는 의미로 생각한다.<br>② 1단계 : 주어진 조건을 만족하는 임의의 점을 __________로 설정한다.<br>③ 2단계 : 주어진 조건에 따라 \\(x,\\ y\\)에 관한 __________을 세운다.<br>④ 3단계 : 관계식이 나타내는 __________이 무엇인지 파악해서 문제를 푼다.<br>⑤ 보통 도형은 __________ 아니면 __________일 확률이 높다.", answer: "O", hint: "자취 / \\(P(x,y)\\) / 관계식 / 도형 / 직선·원", explanation: "① 자취<br>② \\(P(x,\\ y)\\)<br>③ 관계식(방정식)<br>④ 도형<br>⑤ 직선 / 원" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.118 · Thema4 · 개념</span><br>Q11. 아폴로니오스 원에 대해 다음 질문에 답하시오.<br>① 두 정점으로부터 거리의 비가 일정한 점의 자취는 어떤 도형이 되는가?<br>② 두 점 \\(A,\\ B\\)에 대하여 \\(\\overline{PA}:\\overline{PB}=m:n\\)인 점 \\(P\\)가 그리는 도형은 어떤 두 점을 지름의 양 끝점으로 하는 원인가?<br>③ 이 원을 무엇이라고 하는가?<br>④ 이때 \\(m,\\ n\\)은 어떤 조건을 만족해야 하는가?", answer: "O", hint: "\\(m:n\\)의 내분점·외분점을 지름으로 하는 원, \\(m\\ne n\\)", explanation: "① 원<br>② 선분 \\(AB\\)를 \\(m:n\\)으로 내분하는 점과 외분하는 점<br>③ 아폴로니오스의 원<br>④ \\(m\\ne n\\) (\\(m=n\\)이면 자취가 \\(\\overline{AB}\\)의 수직이등분선인 직선이 된다.)" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.119 · Thema4 · 예시문제8</span><br>Q12. 두 점 \\(A(1,\\ 0)\\), \\(B(4,\\ 0)\\)에 대하여 \\(\\overline{AP}:\\overline{BP}=2:1\\)을 만족시키는 점 \\(P\\)가 그리는 도형의 방정식을 구하시오.", answer: "O", hint: "\\(\\overline{AP}^2=4\\overline{BP}^2\\)로 놓고 정리", explanation: "\\(P(x,\\ y)\\), \\(\\overline{AP}=2\\overline{BP}\\) → \\(\\overline{AP}^2=4\\overline{BP}^2\\).<br>\\((x-1)^2+y^2=4\\{(x-4)^2+y^2\\}\\) → \\(3x^2+3y^2-30x+63=0\\) → \\(x^2+y^2-10x+21=0\\).<br>따라서 \\((x-5)^2+y^2=4\\) (중심 \\((5,\\ 0)\\), 반지름 \\(2\\))" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.119 · Thema4 · 예시문제9</span><br>Q13. 두 점 \\(A(2,\\ 3)\\), \\(B(4,\\ 0)\\)에 대하여 \\(\\overline{OP}^2=\\overline{AP}^2+\\overline{BP}^2\\)을 만족시키는 점 \\(P\\)가 나타내는 도형의 길이를 구하시오. (단, \\(O\\)는 원점이다.)<br>① \\(4\\pi\\)  ② \\(6\\pi\\)  ③ \\(8\\pi\\)  ④ \\(10\\pi\\)  ⑤ \\(12\\pi\\)", answer: "O", hint: "관계식을 정리하면 원 → 길이는 둘레 \\(2\\pi r\\)", explanation: "\\(P(x,\\ y)\\): \\(x^2+y^2=\\{(x-2)^2+(y-3)^2\\}+\\{(x-4)^2+y^2\\}\\) → \\(x^2+y^2-12x-6y+29=0\\).<br>\\((x-6)^2+(y-3)^2=16\\) (반지름 \\(4\\)).<br>도형의 길이(둘레) \\(=2\\pi\\cdot4=8\\pi\\). (정답 ③)" },
    ] },
    { id: 9,  name: '9강',  questions: [
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.120 · Thema5 · 핵심태도</span><br>Q1. 원과 직선의 위치 관계에서 중요한 태도에 대해 다음 질문에 답하시오.<br>① 원의 방정식과 직선의 관계는 어떤 세 가지 경우가 존재하는가?<br>② 원과 직선의 위치 관계를 판단할 때 기준은 항상 어떤 경우로 잡는가?<br>③ 실제 시험에서 가장 많이 나오는 경우는 어떤 경우인가?", answer: "O", hint: "두 점 만남 / 접함 / 안 만남 — 기준은 (중심~직선 거리)와 반지름", explanation: "① 서로 다른 두 점에서 만난다 / 한 점에서 만난다(접한다) / 만나지 않는다.<br>② 원의 중심과 직선 사이의 거리 \\(d\\)와 반지름 \\(r\\)의 대소.<br>③ 접하는 경우." },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.120 · Thema5 · 개념</span><br>Q2. 점과 직선 사이의 거리 공식 관점에서 원과 직선의 위치 관계를 판단하는 방법을 빈칸에 맞게 말하시오.<br>원의 중심과 직선 사이의 거리를 \\(d\\), 원의 반지름을 \\(r\\)이라 할 때,<br>① \\(d<r\\)이면 원과 직선은 __________에서 만난다.<br>② \\(d=r\\)이면 원과 직선은 __________에서 만난다. 즉, __________.<br>③ \\(d>r\\)이면 원과 직선은 __________.", answer: "O", hint: "d<r 두 점 / d=r 한 점(접함) / d>r 안 만남", explanation: "① 서로 다른 두 점<br>② 한 점 / 접한다<br>③ 만나지 않는다" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.120 · Thema5 · 개념</span><br>Q3. 중심이 점 \\((p,\\ q)\\)이고 반지름이 \\(r\\)인 원과 직선 \\(ax+by+c=0\\)의 위치 관계에 대해 다음 질문에 답하시오.<br>① 원의 중심과 직선 사이의 거리 \\(d\\)를 구하는 공식을 쓰시오.<br>② 원과 직선의 위치 관계는 \\(d\\)와 무엇의 대소 관계로 판단하는가?<br>③ \\(d<r,\\ d=r,\\ d>r\\)일 때 각각 위치 관계를 말하시오.", answer: "O", hint: "\\(d=\\dfrac{|ap+bq+c|}{\\sqrt{a^2+b^2}}\\)", explanation: "① \\(d=\\dfrac{|ap+bq+c|}{\\sqrt{a^2+b^2}}\\)<br>② 반지름 \\(r\\)<br>③ \\(d<r\\): 서로 다른 두 점에서 만난다 / \\(d=r\\): 접한다 / \\(d>r\\): 만나지 않는다" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.120 · Thema5 · 참고3</span><br>Q4. 접한다는 말에 대해 다음 질문에 답하시오.<br>① 원과 직선이 한 점에서 만날 때, 원과 직선이 무엇한다고 하는가?<br>② 이때 직선을 원의 무엇이라고 하는가?<br>③ 접선이 원과 만나는 점을 무엇이라고 하는가?", answer: "O", hint: "접한다 / 접선 / 접점", explanation: "① 접한다<br>② 접선<br>③ 접점" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.121 · Thema5 · 예시문제1</span><br>Q5. 원 \\(x^2+y^2=2\\)와 직선 \\(y=-x+2\\)의 위치 관계를 말하시오.", answer: "O", hint: "중심 \\((0,0)\\), \\(r=\\sqrt2\\), \\(d\\)와 비교", explanation: "중심 \\((0,\\ 0)\\), \\(r=\\sqrt2\\). 직선 \\(x+y-2=0\\)까지 거리 \\(d=\\dfrac{|-2|}{\\sqrt2}=\\sqrt2\\).<br>\\(d=r\\)이므로 원과 직선은 접한다." },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.122 · Thema5 · 개념</span><br>Q6. 판별식 관점에서 원과 직선의 위치 관계를 판단하는 방법을 빈칸에 맞게 말하시오.<br>원 \\(x^2+y^2=r^2\\)에 직선 \\(y=mx+n\\)을 대입하여 얻은 \\(x\\)에 대한 이차방정식의 판별식을 \\(D\\)라 할 때,<br>① \\(D>0\\)이면 원과 직선은 __________에서 만난다.<br>② \\(D=0\\)이면 원과 직선은 __________에서 만난다. 즉, __________.<br>③ \\(D<0\\)이면 원과 직선은 __________.", answer: "O", hint: "D>0 두 점 / D=0 한 점(접함) / D<0 안 만남", explanation: "① 서로 다른 두 점<br>② 한 점 / 접한다<br>③ 만나지 않는다" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.122 · Thema5 · 개념</span><br>Q7. 원과 직선의 교점 개수에 대해 다음 질문에 답하시오.<br>① 원과 직선의 교점의 개수는 두 방정식을 모두 만족시키는 실수 \\(x,\\ y\\)의 무엇의 개수와 같은가?<br>② 원 \\(x^2+y^2=r^2\\)에 직선 \\(y=mx+n\\)을 대입하면 어떤 \\(x\\)에 대한 이차방정식이 되는가?<br>③ 원과 직선의 교점의 \\(x\\)좌표는 연립하여 얻은 이차방정식의 무엇과 같은가?", answer: "O", hint: "순서쌍(해)의 개수 = 이차방정식의 실근 개수", explanation: "① 순서쌍 \\((x,\\ y)\\), 즉 해(연립방정식의 실근)의 개수.<br>② \\((1+m^2)x^2+2mnx+(n^2-r^2)=0\\)<br>③ 이 이차방정식의 실근(과 같다)." },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.123 · Thema5 · 예시문제2</span><br>Q8. 원 \\(x^2+y^2=4\\)와 직선 \\(y=x+k\\)가 서로 다른 두 점에서 만나도록 실수 \\(k\\)의 값의 범위를 구하시오. (거리 공식 또는 판별식 중 하나로 설명)", answer: "O", hint: "\\(d<r\\) 또는 \\(D>0\\)", explanation: "[거리] 중심 \\((0,0)\\), \\(r=2\\), 직선 \\(x-y+k=0\\)까지 거리 \\(d=\\dfrac{|k|}{\\sqrt2}<2\\) → \\(|k|<2\\sqrt2\\).<br>[판별식] \\(2x^2+2kx+k^2-4=0\\), \\(\\dfrac{D}{4}=k^2-2(k^2-4)=8-k^2>0\\).<br>따라서 \\(-2\\sqrt2<k<2\\sqrt2\\)" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.123 · Thema5 · 발상&알고리즘6</span><br>Q9. “원과 직선” 관련 문제가 나오면 어떻게 생각해야 할까? 다음 빈칸을 채우시오.<br>① 원과 직선이 “만난다” 또는 “위치 관계를 구하시오”라는 문구가 나오면 __________ 문제로 해석한다.<br>② 이 문제는 __________으로도 풀 수 있고, __________으로도 풀 수 있다.<br>③ 체감상 더 수월한 방법은 __________이다.", answer: "O", hint: "위치 관계 / 거리 공식 / 판별식 / 거리 공식", explanation: "① 위치 관계(교점 개수)<br>② 점과 직선 사이의 거리 공식 / 판별식<br>③ 점과 직선 사이의 거리 공식" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.124 · Thema5 · 스킬1</span><br>Q10. 문제에서 “만난다”라고만 명시되어 있으면 어떤 경우들을 떠올려야 하는가? 다음 빈칸을 채우시오.<br>① 서로 다른 __________에서 만나는 경우<br>② __________ 경우", answer: "O", hint: "두 점 / 접하는(한 점)", explanation: "① 두 점<br>② 접하는(한 점에서 만나는) 경우<br>“만난다”는 두 점에서 만나는 경우와 접하는 경우를 모두 포함하므로 \\(d\\le r\\)로 잡아야 한다." },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.124 · Thema5 · 예시문제10</span><br>Q11. 원 \\(x^2+y^2=4\\)와 직선 \\(4x-3y+k=0\\)이 만날 때, 실수 \\(k\\)의 최댓값과 최솟값의 곱을 구하시오.", answer: "O", hint: "만난다 → \\(d\\le r\\)", explanation: "중심 \\((0,0)\\), \\(r=2\\). \\(d=\\dfrac{|k|}{\\sqrt{4^2+(-3)^2}}=\\dfrac{|k|}{5}\\le2\\) → \\(|k|\\le10\\) → \\(-10\\le k\\le10\\).<br>최댓값 \\(10\\), 최솟값 \\(-10\\), 곱 \\(=-100\\)" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.124 · Thema5 · 예시문제11</span><br>Q12. 중심의 좌표가 \\((1,\\ -3)\\)이고 직선 \\(x+y+k=0\\)에 접하는 원의 넓이가 \\(12\\pi\\)일 때, 모든 실수 \\(k\\)의 값의 합을 구하시오.<br>① \\(-4\\)  ② \\(-2\\)  ③ \\(0\\)  ④ \\(2\\)  ⑤ \\(4\\)", answer: "O", hint: "넓이 \\(12\\pi\\) → \\(r=2\\sqrt3\\), 접함 → \\(d=r\\)", explanation: "\\(\\pi r^2=12\\pi\\) → \\(r=2\\sqrt3\\). 접하므로 \\(d=\\dfrac{|1-3+k|}{\\sqrt2}=2\\sqrt3\\) → \\(|k-2|=2\\sqrt6\\) → \\(k=2\\pm2\\sqrt6\\).<br>두 값의 합 \\(=4\\). (정답 ⑤)" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.125 · Thema6 · 개념</span><br><span data-figure='pending' style='display:inline-block;margin:0.4rem 0;padding:0.35rem 0.7rem;border:1px dashed #f59e0b;border-radius:0.5rem;color:#f59e0b;font-size:0.78rem;font-weight:700'>📷 교재 그림 자리 — 나중에 여기에 그림 삽입 (data-figure)</span><br>Q13. 원과 원의 위치 관계에 대해 다음 질문에 답하시오.<br>① 두 원의 위치 관계는 어떤 세 가지 경우가 존재하는가?<br>② 원과 원의 위치 관계에서도 가장 중요하게 생각해야 하는 기준은 무엇인가?<br>③ 원이 접하는 경우는 어떤 두 가지로 나뉘는가?<br>④ 교재 그림에서 외접하는 경우는 몇 번 그림인가?<br>⑤ 교재 그림에서 내접하는 경우는 몇 번 그림인가?", answer: "O", hint: "만남/접함/안 만남 — 기준은 중심거리 d와 (r+r'), |r-r'|", explanation: "① 서로 다른 두 점에서 만난다 / 접한다 / 만나지 않는다.<br>② 두 원의 중심 사이의 거리 \\(d\\)와 두 반지름의 합 \\(r+r'\\), 차 \\(|r-r'|\\)의 대소.<br>③ 외접, 내접.<br>④·⑤ 교재 그림의 번호를 참조(외접·내접 그림 확인)." },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.126 · Thema6 · 예시문제12</span><br>Q14. 두 원 \\(x^2+y^2=1\\), \\((x-a)^2+(y-b)^2=4\\)에 대하여 다음 물음에 답하시오.<br>① 두 원의 중심 사이의 거리를 구하시오.<br>② 두 원의 외접 조건을 구하시오.<br>③ 두 원의 내접 조건을 구하시오.<br>④ 두 원이 서로 다른 두 점에서 만날 조건을 구하시오.", answer: "O", hint: "\\(r=1,\\ r'=2\\), \\(d=\\sqrt{a^2+b^2}\\)", explanation: "중심 \\((0,0),\\ (a,b)\\), 반지름 \\(1,\\ 2\\).<br>① \\(d=\\sqrt{a^2+b^2}\\)<br>② 외접: \\(d=r+r'=3\\) → \\(a^2+b^2=9\\)<br>③ 내접: \\(d=|r'-r|=1\\) → \\(a^2+b^2=1\\)<br>④ 두 점에서 만남: \\(1<d<3\\) → \\(1<a^2+b^2<9\\)" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.127 · Thema7 · 개념</span><br>Q15. 두 원 \\(O:x^2+y^2+ax+by+c=0\\), \\(O':x^2+y^2+a'x+b'y+c'=0\\)이 두 점에서 만날 때, 다음 질문에 답하시오.<br>① 두 원의 교점을 지나는 원의 방정식을 \\(k\\)를 사용하여 나타내시오.<br>② 위 식에서 \\(k=-1\\)을 대입하면 어떤 방정식이 나오는가?<br>③ 두 원의 교점을 지나는 직선을 무엇이라고 하는가?<br>④ 공통현의 방정식을 \\(a,\\ b,\\ c,\\ a',\\ b',\\ c'\\)로 쓰시오.<br>⑤ \\(k\\ne-1\\)이면 어떤 방정식이 나오는가?", answer: "O", hint: "\\(k=-1\\)이면 \\(x^2,y^2\\)이 소거되어 직선(공통현)", explanation: "① \\((x^2+y^2+ax+by+c)+k(x^2+y^2+a'x+b'y+c')=0\\) (단 \\(k\\ne-1\\))<br>② \\(x^2,\\ y^2\\)항이 소거되어 직선(공통현)의 방정식.<br>③ 공통현<br>④ \\((a-a')x+(b-b')y+(c-c')=0\\)<br>⑤ 두 원의 교점을 지나는 원의 방정식" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.127 · Thema7 · 참고5</span><br>Q16. 다음 빈칸을 채우시오.<br>① \\(k=-1\\)이면 두 원의 교점을 지나는 __________의 방정식이 나온다.<br>② \\(k\\ne-1\\)이면 두 원의 교점을 지나는 __________의 방정식이 나온다.", answer: "O", hint: "직선(공통현) / 원", explanation: "① 직선(공통현)<br>② 원" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.127 · Thema7 · 발상&알고리즘7</span><br>Q17. “현 또는 공통현의 길이”를 묻는 문제가 나오면 어떻게 풀까? 다음 빈칸을 채우시오.<br>① 1단계 : 원의 중심에서 현에 내린 __________으로 그 현을 이등분하여 직각삼각형을 만든다.<br>② 2단계 : 점과 직선 사이의 거리 공식을 이용하여 삼각형의 __________을 구한다.<br>③ 3단계 : __________를 사용하여 나머지 길이 \\(\\dfrac{l}{2}\\)를 구한다.<br>④ 4단계 : 구한 길이 \\(\\dfrac{l}{2}\\)를 __________배하여 \\(l\\)을 찾는다.", answer: "O", hint: "수선 / 한 변(중심~현 거리 d) / 피타고라스 / 2", explanation: "① 수선(수선의 발)<br>② 한 변(중심에서 현까지의 거리 \\(d\\))<br>③ 피타고라스 정리 (\\(\\left(\\tfrac{l}{2}\\right)^2=r^2-d^2\\))<br>④ \\(2\\)배" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.128 · Thema7 · 예시문제13</span><br>Q18. 다음 원 또는 직선의 방정식을 구하시오.<br>① 두 원 \\(x^2+y^2=6\\), \\(x^2+y^2+4x-6y-2=0\\)의 교점과 원점을 지나는 원의 방정식<br>② 두 원 \\(x^2+y^2-6x+2y+8=0\\), \\(x^2+y^2-4x=0\\)의 교점을 지나는 직선의 방정식", answer: "O", hint: "① 교점 지나는 원족에 원점 대입 / ② 두 식 빼기(공통현)", explanation: "① \\((x^2+y^2-6)+k(x^2+y^2+4x-6y-2)=0\\)에 원점 대입: \\(-6-2k=0\\) → \\(k=-3\\). 정리하면 \\(x^2+y^2+6x-9y=0\\).<br>② 두 식을 빼면 \\((-6x+2y+8)-(-4x)=0\\) → \\(-2x+2y+8=0\\) → \\(x-y-4=0\\)" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.128 · Thema7 · 예시문제14</span><br>Q19. 두 원 \\(x^2+y^2+2x+2y-3=0\\), \\(x^2+y^2+x+2y-2=0\\)의 공통현을 지름으로 하는 원의 방정식을 구하시오.", answer: "O", hint: "공통현을 구하고 두 교점을 지름으로", explanation: "두 식을 빼면 공통현: \\((2x-x)+(-3+2)=0\\) → \\(x-1=0\\), 즉 \\(x=1\\).<br>\\(x=1\\)을 첫 원에 대입: \\(1+y^2+2+2y-3=0\\) → \\(y^2+2y=0\\) → \\(y=0\\) 또는 \\(y=-2\\). 교점 \\((1,\\ 0),\\ (1,\\ -2)\\).<br>이를 지름으로 하는 원: 중심 \\((1,\\ -1)\\), 반지름 \\(1\\) → \\((x-1)^2+(y+1)^2=1\\)" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.129 · Thema7 · 예시문제15</span><br><span data-figure='pending' style='display:inline-block;margin:0.4rem 0;padding:0.35rem 0.7rem;border:1px dashed #f59e0b;border-radius:0.5rem;color:#f59e0b;font-size:0.78rem;font-weight:700'>📷 교재 그림 자리 — 나중에 여기에 그림 삽입 (data-figure)</span><br>Q20. 그림은 원 \\((x+1)^2+(y-3)^2=4\\)와 직선 \\(y=mx+2\\)를 좌표평면 위에 나타낸 것이다. 원과 직선의 두 교점을 각각 \\(A,\\ B\\)라 할 때, 선분 \\(AB\\)의 길이가 \\(2\\sqrt2\\)가 되도록 하는 상수 \\(m\\)의 값을 구하시오.", answer: "O", hint: "\\(r^2=d^2+\\left(\\tfrac{AB}{2}\\right)^2\\)로 \\(d\\)를 구함", explanation: "중심 \\((-1,\\ 3)\\), \\(r=2\\). \\(\\left(\\dfrac{AB}{2}\\right)^2=(\\sqrt2)^2=2\\)이므로 \\(d^2=r^2-2=4-2=2\\), \\(d=\\sqrt2\\).<br>직선 \\(mx-y+2=0\\)까지 거리: \\(\\dfrac{|-m-3+2|}{\\sqrt{m^2+1}}=\\dfrac{|m+1|}{\\sqrt{m^2+1}}=\\sqrt2\\) → \\((m+1)^2=2(m^2+1)\\) → \\((m-1)^2=0\\) → \\(m=1\\)" },
    ] },
    { id: 10, name: '10강', questions: [
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.130 · Thema8 · 개념</span><br>Q1. 원과 점 사이의 최대·최소 거리에 대해 다음 질문에 답하시오.<br>① 중심이 \\(O\\)이고 반지름이 \\(r\\)인 원 밖의 한 정점 \\(H\\)에서 원 위의 동점 \\(A\\)에 이르는 거리의 최댓값과 최솟값은 무엇을 이용하여 구하는가?<br>② 거리의 최댓값을 쓰시오.<br>③ 거리의 최솟값을 쓰시오.", answer: "O", hint: "중심선 \\(\\overline{OH}=d\\) 기준, 최대 \\(d+r\\)·최소 \\(d-r\\)", explanation: "① 중심 \\(O\\)와 점 \\(H\\)를 잇는 직선(중심선), 즉 \\(\\overline{OH}=d\\)를 이용한다.<br>② 최댓값 \\(=d+r\\) (\\(=\\overline{OH}+r\\))<br>③ 최솟값 \\(=d-r\\) (\\(=\\overline{OH}-r\\))" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.130 · Thema8 · 개념</span><br>Q2. 원 위의 한 점과 직선 사이의 최대·최소 거리에 대해 다음 질문에 답하시오.<br>① 중심 \\(O\\), 반지름 \\(r\\)인 원 밖의 직선 \\(l\\)에 대하여, 원 위의 동점 \\(A\\)에서 직선 \\(l\\)까지 거리의 최대·최소는 무엇을 이용하여 구하는가?<br>② 최댓값을 쓰시오.<br>③ 최솟값을 쓰시오.", answer: "O", hint: "중심~직선 거리 \\(d\\) 기준, 최대 \\(d+r\\)·최소 \\(d-r\\)", explanation: "① 원의 중심 \\(O\\)에서 직선 \\(l\\)까지의 거리 \\(d\\)를 이용한다.<br>② 최댓값 \\(=d+r\\)<br>③ 최솟값 \\(=d-r\\)" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.130 · Thema8 · 참고6</span><br>Q3. 최댓값이 \\(d+r\\), 최솟값이 \\(d-r\\)일 때, 다음 빈칸을 채우시오.<br>① 최댓값과 최솟값의 합은 __________이다.<br>② 최댓값과 최솟값의 곱은 __________이다.<br>③ 최댓값과 최솟값의 차는 __________이다.", answer: "O", hint: "합 2d, 곱 d²−r², 차 2r", explanation: "① \\((d+r)+(d-r)=2d\\)<br>② \\((d+r)(d-r)=d^2-r^2\\)<br>③ \\((d+r)-(d-r)=2r\\)" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.131 · Thema8 · 예시문제16</span><br>Q4. 점 \\(A(-3,\\ -5)\\)와 원 \\(x^2+y^2+2x-2y-7=0\\) 위의 점 \\(P\\)에 대하여 선분 \\(AP\\)의 길이의 최댓값을 \\(M\\), 최솟값을 \\(m\\)이라 할 때, \\(Mm\\)의 값을 구하시오.", answer: "O", hint: "\\(M=d+r,\\ m=d-r\\) → \\(Mm=d^2-r^2\\)", explanation: "원: \\((x+1)^2+(y-1)^2=9\\), 중심 \\((-1,\\ 1)\\), \\(r=3\\). \\(d=\\overline{AC}=\\sqrt{(-3+1)^2+(-5-1)^2}=\\sqrt{40}=2\\sqrt{10}\\).<br>\\(M=d+r,\\ m=d-r\\)이므로 \\(Mm=d^2-r^2=40-9=31\\)" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.131 · Thema8 · 예시문제17</span><br>Q5. 좌표평면 위의 점 \\((3,\\ 4)\\)를 지나는 직선 중에서 원점과의 거리가 최대인 직선을 \\(l\\)이라 하자. 원 \\((x-7)^2+(y-5)^2=1\\) 위의 점 \\(P\\)와 직선 \\(l\\) 사이의 거리의 최솟값을 \\(m\\)이라 할 때, \\(10m\\)의 값을 구하시오.", answer: "O", hint: "\\(l\\)은 \\(O(3,4)\\)에 수직 → \\(3x+4y-25=0\\), 최소거리 \\(=d_{중심}-r\\)", explanation: "\\(l\\)은 점 \\((3,\\ 4)\\)에서 원점 방향에 수직일 때 거리가 최대(\\(=5\\)). \\(l:3x+4y-25=0\\).<br>원의 중심 \\((7,\\ 5)\\)에서 \\(l\\)까지 거리 \\(=\\dfrac{|21+20-25|}{5}=\\dfrac{16}{5}\\). 최소거리 \\(m=\\dfrac{16}{5}-1=\\dfrac{11}{5}\\).<br>\\(10m=22\\)" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.132 · Thema9 · 핵심태도</span><br>Q6. 원과 접선의 방정식 단원의 핵심태도에 대해 다음 질문에 답하시오.<br>① 이 단원의 핵심개념들은 원의 중심이 어디임을 기준으로 하는가?<br>② 원의 접선 문제를 푸는 방법은 한 가지인가, 여러 가지인가?<br>③ 원의 접선 문제를 풀 때 사용할 수 있는 방법 4가지를 말하시오.", answer: "O", hint: "공식 / 판별식 / 점과 직선 거리 / 수직관계", explanation: "① 원의 중심이 원점(에 있는지)을 기준으로 한다.<br>② 여러 가지이다.<br>③ (1) 공식 대입 (2) 판별식 (\\(D=0\\)) (3) 점과 직선 사이의 거리 공식(거리 \\(=r\\)) (4) 수직관계(중심과 접점을 잇는 반지름 \\(\\perp\\) 접선)" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.132 · Thema9 · 개념</span><br>Q7. 기울기가 주어진 원의 접선의 방정식에 대해 다음 질문에 답하시오.<br>① 원 \\(x^2+y^2=r^2\\)에 접하고 기울기가 \\(m\\)인 접선의 방정식을 쓰시오.<br>② 위 공식에서 접선이 항상 몇 개 나오는지 말하시오.<br>③ 중심이 원점이 아닌 원에서 기울기가 주어진 접선을 구할 때 어떤 관점을 이용할 수 있는가?", answer: "O", hint: "\\(y=mx\\pm r\\sqrt{m^2+1}\\)", explanation: "① \\(y=mx\\pm r\\sqrt{m^2+1}\\)<br>② 항상 \\(2\\)개<br>③ 평행이동(중심을 원점으로 옮긴 관점)을 이용한다." },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.132 · Thema9 · 예시문제1</span><br>Q8. 원 \\(x^2+y^2=4\\)에 접하고 기울기가 \\(2\\)인 직선의 방정식을 구하시오.", answer: "O", hint: "\\(y=mx\\pm r\\sqrt{m^2+1}\\)", explanation: "\\(r=2,\\ m=2\\): \\(y=2x\\pm2\\sqrt{2^2+1}=2x\\pm2\\sqrt5\\)" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.132 · Thema9 · 예시문제2</span><br>Q9. 원 \\((x-1)^2+(y-2)^2=4\\)에 접하고 기울기가 \\(2\\)인 직선의 방정식을 구하시오.", answer: "O", hint: "중심 \\((1,2)\\)와 직선 \\(2x-y+c=0\\)의 거리 \\(=2\\)", explanation: "접선을 \\(2x-y+c=0\\)이라 하면 중심 \\((1,\\ 2)\\)까지 거리 \\(\\dfrac{|2-2+c|}{\\sqrt5}=\\dfrac{|c|}{\\sqrt5}=2\\) → \\(c=\\pm2\\sqrt5\\).<br>따라서 \\(y=2x\\pm2\\sqrt5\\)" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.133 · Thema9 · 참고7</span><br>Q10. 다음 빈칸을 채우시오.<br>한 원에서 기울기가 같은 접선은 항상 __________개이다.", answer: "O", hint: "2개", explanation: "\\(2\\)개 (서로 평행하며 원을 사이에 두고 반대쪽에 하나씩)." },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.133 · Thema9 · 발상&알고리즘8</span><br>Q11. 기울기가 주어진 원의 접선은 어떻게 구할까? 다음 질문에 답하시오.<br>① 공식에 대입하는 방법에서 중심이 원점이 아니라면 어떤 관점을 이용하는가?<br>② 원 \\((x-a)^2+(y-b)^2=r^2\\)에 접하고 기울기가 \\(m\\)인 접선의 방정식을 쓰시오.<br>③ 판별식을 이용할 때는 어떤 조건을 사용하는가?<br>④ 점과 직선 사이의 거리 공식을 이용할 때는 무엇과 반지름이 같음을 이용하는가?", answer: "O", hint: "\\(y-b=m(x-a)\\pm r\\sqrt{m^2+1}\\), \\(D=0\\), 중심~접선 거리 \\(=r\\)", explanation: "① 평행이동 관점<br>② \\(y-b=m(x-a)\\pm r\\sqrt{m^2+1}\\)<br>③ 판별식 \\(D=0\\) (접함)<br>④ 원의 중심과 접선(직선) 사이의 거리 \\(=r\\)" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.134 · Thema10 · 개념</span><br>Q12. 원 위의 점에서의 접선의 방정식에 대해 다음 질문에 답하시오.<br>① 원 \\(x^2+y^2=r^2\\) 위의 점 \\((x_1,\\ y_1)\\)에서의 접선의 방정식을 쓰시오.<br>② 접선 위의 점을 \\(Q(x,\\ y)\\)라 하면 삼각형 \\(POQ\\)는 어떤 삼각형인가?<br>③ 점 \\(P(x_1,\\ y_1)\\)이 원 \\(x^2+y^2=r^2\\) 위의 점이므로 \\({x_1}^2+{y_1}^2\\)은 무엇과 같은가?", answer: "O", hint: "\\(x_1x+y_1y=r^2\\)", explanation: "① \\(x_1x+y_1y=r^2\\)<br>② 직각삼각형(반지름 \\(\\overline{OP}\\)가 접선에 수직, \\(\\angle P=90^\\circ\\))<br>③ \\({x_1}^2+{y_1}^2=r^2\\)" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.134 · Thema10 · 예시문제</span><br>Q13. 다음 접선의 방정식을 구하시오.<br>① 원 \\(x^2+y^2=5\\) 위의 점 \\((1,\\ 2)\\)에서의 접선<br>② 원 \\(x^2+y^2=9\\) 위의 점 \\((-3,\\ 0)\\)에서의 접선<br>③ 원 \\((x+2)^2+y^2=5\\) 위의 점 \\((0,\\ 1)\\)에서의 접선", answer: "O", hint: "\\(x_1x+y_1y=r^2\\) (중심 이동 시 \\((x_1-a)(x-a)+(y_1-b)(y-b)=r^2\\))", explanation: "① \\(1\\cdot x+2\\cdot y=5\\) → \\(x+2y=5\\)<br>② \\(-3x+0=9\\) → \\(x=-3\\)<br>③ 중심 \\((-2,0)\\): \\((0+2)(x+2)+(1)(y)=5\\) → \\(2x+y=1\\)" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.135 · Thema10 · 발상&알고리즘9</span><br>Q14. 원 위의 점에서의 접선의 방정식은 어떻게 구할까? 다음 질문에 답하시오.<br>① 중심이 원점이 아닌 원 \\((x-a)^2+(y-b)^2=r^2\\) 위의 점 \\((x_1,\\ y_1)\\)에서의 접선의 방정식을 쓰시오.<br>② 수직관계를 이용할 때, 원의 중심을 지나는 반지름과 접선은 어떤 관계인가?<br>③ 직선 \\(OP\\)의 기울기가 \\(\\dfrac{y_1}{x_1}\\)일 때, 접선의 기울기는?<br>④ 판별식을 이용할 때는 어떤 조건을 사용하는가?<br>⑤ 점과 직선 사이의 거리 공식을 이용할 때는 무엇과 반지름이 같음을 이용하는가?", answer: "O", hint: "\\((x_1-a)(x-a)+(y_1-b)(y-b)=r^2\\), 접선 기울기 \\(-\\dfrac{x_1}{y_1}\\)", explanation: "① \\((x_1-a)(x-a)+(y_1-b)(y-b)=r^2\\)<br>② 서로 수직<br>③ \\(-\\dfrac{x_1}{y_1}\\) (반지름 기울기의 음의 역수)<br>④ \\(D=0\\)<br>⑤ 원의 중심과 접선 사이의 거리 \\(=r\\)" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.136 · Thema11 · 참고8</span><br>Q15. 원 밖의 점에서 그은 접선의 방정식에 대해 다음 빈칸을 채우시오.<br>① 원 밖에서 그은 접선의 방정식은 무조건 __________개가 나온다.<br>② 따라서 답을 적을 때 __________하도록 한다.", answer: "O", hint: "2개, 빠짐없이", explanation: "① \\(2\\)개<br>② 두 접선을 빠짐없이(모두) 적도록 한다." },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.136 · Thema11 · 예시문제1</span><br>Q16. 점 \\((2,\\ 0)\\)에서 원 \\(x^2+y^2=2\\)에 그은 접선의 방정식을 구하시오.", answer: "O", hint: "\\(y=m(x-2)\\)로 두고 중심~직선 거리 \\(=\\sqrt2\\)", explanation: "접선을 \\(y=m(x-2)\\), 즉 \\(mx-y-2m=0\\)이라 하면 \\(\\dfrac{|-2m|}{\\sqrt{m^2+1}}=\\sqrt2\\) → \\(4m^2=2(m^2+1)\\) → \\(m^2=1\\) → \\(m=\\pm1\\).<br>따라서 \\(y=x-2\\), \\(y=-x+2\\)" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.137 · Thema11 · 발상&알고리즘10</span><br>Q17. 원 밖의 점에서 그은 접선의 방정식은 어떻게 구할까? 다음 질문에 답하시오.<br>① 원 위의 점에서의 접선 공식을 이용하는 방법에서는 무엇의 좌표를 \\((x_1,\\ y_1)\\)로 놓는가?<br>② 판별식을 이용하는 방법에서는 접선의 기울기를 무엇으로 두는가?<br>③ 점 \\((a,\\ b)\\)를 지나는 접선의 방정식을 기울기 \\(m\\)으로 쓰시오.<br>④ 판별식 방법에서는 어떤 조건을 이용하는가?<br>⑤ 거리 공식 방법에서는 무엇과 반지름이 같음을 이용하는가?", answer: "O", hint: "접점 \\((x_1,y_1)\\), 기울기 \\(m\\), \\(y-b=m(x-a)\\), \\(D=0\\), 중심~직선 거리 \\(=r\\)", explanation: "① 접점의 좌표<br>② 접선의 기울기를 \\(m\\)으로 둔다.<br>③ \\(y-b=m(x-a)\\)<br>④ 연립하여 얻은 이차방정식의 판별식 \\(D=0\\)<br>⑤ 원의 중심과 접선 사이의 거리 \\(=r\\)" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.138 · Thema11 · 예시문제18</span><br>Q18. 원 \\((x+1)^2+y^2=1\\)에 접하고 기울기가 \\(-1\\)인 접선의 방정식을 구하시오.", answer: "O", hint: "중심 \\((-1,0)\\), \\(x+y+k=0\\)까지 거리 \\(=1\\)", explanation: "접선을 \\(x+y+k=0\\)이라 하면 중심 \\((-1,\\ 0)\\)까지 거리 \\(\\dfrac{|-1+k|}{\\sqrt2}=1\\) → \\(|k-1|=\\sqrt2\\) → \\(k=1\\pm\\sqrt2\\).<br>따라서 \\(y=-x-1\\pm\\sqrt2\\) (즉 \\(x+y+1\\mp\\sqrt2=0\\))" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.138 · Thema11 · 예시문제19</span><br>Q19. 원 \\((x-1)^2+(y-2)^2=10\\) 위의 점 \\(A(2,\\ -1)\\)에서의 접선의 방정식을 구하시오.", answer: "O", hint: "\\((x_1-a)(x-a)+(y_1-b)(y-b)=r^2\\)", explanation: "중심 \\((1,\\ 2)\\), 점 \\((2,\\ -1)\\): \\((2-1)(x-1)+(-1-2)(y-2)=10\\) → \\((x-1)-3(y-2)=10\\) → \\(x-3y+5=10\\) → \\(x-3y-5=0\\)" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.138 · Thema11 · 예시문제20</span><br>Q20. 점 \\((4,\\ 3)\\)에서 원 \\(x^2+y^2=9\\)에 그은 두 접선 중에서 기울기가 양수인 접선의 기울기를 \\(\\dfrac{q}{p}\\)라 할 때, \\(p+q\\)의 값을 구하는 풀이 과정과 답을 쓰시오.", answer: "O", hint: "\\(y=m(x-4)+3\\), 중심~직선 거리 \\(=3\\)", explanation: "접선을 \\(y=m(x-4)+3\\), 즉 \\(mx-y-4m+3=0\\)이라 하면 \\(\\dfrac{|-4m+3|}{\\sqrt{m^2+1}}=3\\) → \\((3-4m)^2=9(m^2+1)\\) → \\(7m^2-24m=0\\) → \\(m=0\\) 또는 \\(m=\\dfrac{24}{7}\\).<br>양수 기울기 \\(m=\\dfrac{24}{7}=\\dfrac{q}{p}\\) → \\(p=7,\\ q=24\\), 따라서 \\(p+q=31\\)" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.139 · Thema12 · 개념</span><br>Q21. 중학교 때 배운 원의 성질에 대해 다음 빈칸을 채우시오.<br>① 원의 중심에서 현에 그은 수선은 그 현을 __________한다.<br>② 원의 접선은 접점을 지나는 __________에 수직이다.<br>③ 원 밖의 한 점에서 원에 그은 두 접선의 길이는 __________.<br>④ 한 호에 대한 원주각의 크기는 그 호에 대한 중심각의 크기의 __________이다.<br>⑤ 한 원에서 길이가 같은 호에 대한 원주각의 크기는 __________.<br>⑥ 원에 내접하는 사각형의 대각의 크기의 합은 __________이다.<br>⑦ 원과 __________ 관계를 이용할 수 있다.", answer: "O", hint: "이등분 / 반지름 / 같다 / ½ / 같다 / 180°", explanation: "① 이등분<br>② 반지름<br>③ 서로 같다<br>④ \\(\\dfrac12\\)<br>⑤ 서로 같다<br>⑥ \\(180^\\circ\\)<br>⑦ 비례 관계(방멱: 원의 두 할선·접선이 이루는 선분의 곱이 일정) — 교재 문맥에 따라 “직선의 위치 관계”로 볼 수도 있음." },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.140 · Thema12 · 예시문제21</span><br><span data-figure='pending' style='display:inline-block;margin:0.4rem 0;padding:0.35rem 0.7rem;border:1px dashed #f59e0b;border-radius:0.5rem;color:#f59e0b;font-size:0.78rem;font-weight:700'>📷 교재 그림 자리 — 나중에 여기에 그림 삽입 (data-figure)</span><br>Q22. 원 \\(x^2+y^2-x-12y=0\\) 위에 두 점 \\(O(0,\\ 0)\\), \\(A(5,\\ 2)\\)가 있다. 이 원 위의 점 \\(P\\)에 대하여 \\(\\angle OAP=90^\\circ\\)일 때, 직선 \\(OP\\)의 기울기를 구하시오.", answer: "O", hint: "\\(\\angle OAP=90^\\circ\\) (원주각) → \\(OP\\)는 지름 → 중심을 지남", explanation: "원 \\(x^2+y^2-x-12y=0\\)의 중심은 \\(\\left(\\dfrac12,\\ 6\\right)\\).<br>\\(\\angle OAP=90^\\circ\\)이고 \\(O,\\ A,\\ P\\)가 원 위에 있으므로 반원의 원주각 성질에 의해 \\(\\overline{OP}\\)는 지름이다. 즉 \\(OP\\)는 중심을 지난다.<br>직선 \\(OP\\)의 기울기 \\(=\\dfrac{6-0}{\\tfrac12-0}=12\\)" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.141 · Thema13 · 개념</span><br><span data-figure='pending' style='display:inline-block;margin:0.4rem 0;padding:0.35rem 0.7rem;border:1px dashed #f59e0b;border-radius:0.5rem;color:#f59e0b;font-size:0.78rem;font-weight:700'>📷 교재 그림 자리 — 나중에 여기에 그림 삽입 (data-figure)</span><br>Q23. 두 원에 동시에 접하는 접선의 길이에 대해 다음 질문에 답하시오. 두 원 \\(O,\\ O'\\)의 반지름을 각각 \\(r,\\ r'\\ (r>r')\\), 중심거리를 \\(d\\)라 할 때,<br>① 공통외접선의 길이 \\(\\overline{AB}\\) 공식을 쓰시오.<br>② 공통내접선의 길이 \\(\\overline{CD}\\) 공식을 쓰시오.<br>③ 공통외접선 공식에서는 두 반지름의 차·합 중 무엇을 쓰는가?<br>④ 공통내접선 공식에서는 무엇을 쓰는가?", answer: "O", hint: "외접선 \\(\\sqrt{d^2-(r-r')^2}\\), 내접선 \\(\\sqrt{d^2-(r+r')^2}\\)", explanation: "① \\(\\overline{AB}=\\sqrt{d^2-(r-r')^2}\\)<br>② \\(\\overline{CD}=\\sqrt{d^2-(r+r')^2}\\)<br>③ 두 반지름의 차 \\((r-r')\\)<br>④ 두 반지름의 합 \\((r+r')\\)" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.142 · Thema13 · 예시문제22</span><br><span data-figure='pending' style='display:inline-block;margin:0.4rem 0;padding:0.35rem 0.7rem;border:1px dashed #f59e0b;border-radius:0.5rem;color:#f59e0b;font-size:0.78rem;font-weight:700'>📷 교재 그림 자리 — 나중에 여기에 그림 삽입 (data-figure)</span><br>Q24. 두 원 \\(x^2+(y-4)^2=4\\), \\((x-5)^2+(y+1)^2=9\\)에 동시에 접하는 접선을 그을 때, 두 접점 \\(A,\\ B\\) 사이의 거리를 구하시오.<br>① \\(7\\)  ② \\(5\\sqrt2\\)  ③ \\(3\\sqrt6\\)  ④ \\(8\\)  ⑤ \\(4\\sqrt5\\)", answer: "O", hint: "중심거리 \\(d\\)와 반지름 \\(2,\\ 3\\)로 공통접선 길이", explanation: "중심 \\((0,\\ 4),\\ (5,\\ -1)\\), 반지름 \\(2,\\ 3\\). \\(d=\\sqrt{5^2+(-5)^2}=\\sqrt{50}=5\\sqrt2\\).<br>공통외접선 길이 \\(=\\sqrt{d^2-(r-r')^2}=\\sqrt{50-1}=7\\). (내접선은 \\(\\sqrt{50-25}=5\\)로 보기에 없음)<br>따라서 \\(\\overline{AB}=7\\). (정답 ①)" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.142 · Thema13 · 예시문제23</span><br><span data-figure='pending' style='display:inline-block;margin:0.4rem 0;padding:0.35rem 0.7rem;border:1px dashed #f59e0b;border-radius:0.5rem;color:#f59e0b;font-size:0.78rem;font-weight:700'>📷 교재 그림 자리 — 나중에 여기에 그림 삽입 (data-figure)</span><br>Q25. 두 원 \\(O:x^2+y^2=1\\), \\(O':(x+5)^2+(y-2)^2=r^2\\)에 동시에 접하는 접선을 긋고 접점을 각각 \\(A,\\ B\\)라 할 때, 선분 \\(AB\\)의 길이는 \\(\\sqrt{13}\\)이다. 양수 \\(r\\)의 값을 구하시오.", answer: "O", hint: "\\(d=\\sqrt{29}\\), 공통접선 길이 \\(\\sqrt{d^2-(1\\pm r)^2}=\\sqrt{13}\\)", explanation: "중심거리 \\(d=\\sqrt{(-5)^2+2^2}=\\sqrt{29}\\).<br>공통외접선이면 \\(\\overline{AB}=\\sqrt{29-(r-1)^2}=\\sqrt{13}\\) → \\((r-1)^2=16\\) → \\(r=5\\).<br>공통내접선이면 \\(\\overline{AB}=\\sqrt{29-(r+1)^2}=\\sqrt{13}\\) → \\((r+1)^2=16\\) → \\(r=3\\).<br>따라서 그림이 외접선이면 \\(r=5\\), 내접선이면 \\(r=3\\) (교재 그림에서 어떤 접선인지 확인 필요)." },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.143 · Thema13 · 예시문제24</span><br>Q26. 직선 \\(y=mx+n\\)이 두 원 \\(x^2+y^2=9\\), \\((x+3)^2+y^2=4\\)에 동시에 접할 때, 두 실수 \\(m,\\ n\\)에 대하여 \\(32mn\\)의 값을 구하는 풀이 과정과 답을 쓰시오.", answer: "O", hint: "중심 \\((0,0),(-3,0)\\)에서 직선까지 거리 \\(=3,\\ 2\\)", explanation: "\\(mx-y+n=0\\)에 대하여 \\(\\dfrac{|n|}{\\sqrt{m^2+1}}=3\\), \\(\\dfrac{|-3m+n|}{\\sqrt{m^2+1}}=2\\).<br>\\(n^2=9(m^2+1)\\), \\((n-3m)^2=4(m^2+1)\\)을 빼면 \\(6mn=14m^2+5\\).<br>두 식을 연립하면 \\(128m^4+184m^2-25=0\\) → \\(m^2=\\dfrac18\\). 이때 \\(mn=\\dfrac{14\\cdot\\frac18+5}{6}=\\dfrac{9}{8}\\).<br>따라서 \\(32mn=32\\cdot\\dfrac98=36\\)" },
    ] },
    { id: 11, name: '11강', questions: [
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.166 · Thema1 · 핵심태도</span><br>Q1. 다음 질문에 답하시오.<br>① 점의 평행이동과 도형의 평행이동은 서로 같은 방식인가, 구별해야 하는가?<br>② 점의 평행이동과 도형의 평행이동을 구별해야 하는 이유를 말하시오.", answer: "O", hint: "점은 좌표에 +, 도형은 식에 − (부호 반대)", explanation: "① 구별해야 한다.<br>② 점은 좌표에 \\((+a,\\ +b)\\)를 더하지만, 도형(방정식)은 \\(x\\) 대신 \\(x-a\\), \\(y\\) 대신 \\(y-b\\)를 대입한다. 즉 이동 방향은 같아도 식에 적용되는 부호가 반대이므로 구별해야 한다." },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.166 · Thema1 · 개념</span><br>Q2. 점의 평행이동에 대해 다음 질문에 답하시오.<br>① 점 \\(P(x,\\ y)\\)를 \\(x\\)축의 방향으로 \\(a\\)만큼, \\(y\\)축의 방향으로 \\(b\\)만큼 평행이동한 점 \\(P'\\)의 좌표를 쓰시오.<br>② 점의 평행이동에서는 \\(x\\)좌표와 \\(y\\)좌표를 각각 어떻게 이동한다고 생각하면 되는가?<br>③ 점 \\(P(1,\\ 2)\\)를 \\(x\\)축의 방향으로 \\(3\\)만큼, \\(y\\)축의 방향으로 \\(-4\\)만큼 평행이동한 점 \\(P'\\)의 좌표를 구하시오.", answer: "O", hint: "\\(P'(x+a,\\ y+b)\\)", explanation: "① \\(P'(x+a,\\ y+b)\\)<br>② \\(x\\)좌표에 \\(a\\)만큼, \\(y\\)좌표에 \\(b\\)만큼 각각 더한다.<br>③ \\((1+3,\\ 2-4)=(4,\\ -2)\\)" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.167 · Thema2 · 개념</span><br>Q3. 도형의 평행이동에 대해 다음 질문에 답하시오.<br>① 방정식 \\(f(x,\\ y)=0\\)은 일반적으로 좌표평면 위의 무엇을 나타내는가?<br>② \\(f(x,\\ y)=0\\)이 나타내는 도형을 \\(x\\)축으로 \\(a\\), \\(y\\)축으로 \\(b\\)만큼 평행이동한 도형의 방정식을 쓰시오.<br>③ 도형 위의 점 \\(P(x,\\ y)\\)를 평행이동한 점을 \\(P'(x',\\ y')\\)이라 할 때, \\(x',\\ y'\\)를 \\(x,\\ y,\\ a,\\ b\\)로 나타내시오.<br>④ 위 관계에서 \\(x,\\ y\\)를 \\(x',\\ y',\\ a,\\ b\\)로 나타내시오.<br>⑤ 도형의 평행이동은 평행이동된 무엇들의 집합이라고 볼 수 있는가?", answer: "O", hint: "\\(f(x-a,\\ y-b)=0\\)", explanation: "① 도형(곡선·직선 등)<br>② \\(f(x-a,\\ y-b)=0\\)<br>③ \\(x'=x+a,\\ y'=y+b\\)<br>④ \\(x=x'-a,\\ y=y'-b\\)<br>⑤ 평행이동된 점들의 집합" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.167 · Thema2 · 예시문제1</span><br>Q4. 좌표평면에서 도형 \\(f(x,\\ y)=0\\)을 \\(f(x+2,\\ y-3)=0\\)으로 옮기는 평행이동에 의하여 다음 도형이 옮겨지는 도형의 방정식을 구하시오.<br>① \\(2x+y-1=0\\)<br>② \\((x-1)^2+y^2=4\\)<br>③ \\(y=-x^2+2x\\)", answer: "O", hint: "\\(x\\to x+2,\\ y\\to y-3\\) 대입 (즉 평행이동 \\((-2,\\ +3)\\))", explanation: "각 식에 \\(x\\to x+2,\\ y\\to y-3\\)을 대입한다.<br>① \\(2(x+2)+(y-3)-1=0\\) → \\(2x+y=0\\)<br>② \\((x+2-1)^2+(y-3)^2=4\\) → \\((x+1)^2+(y-3)^2=4\\)<br>③ \\((y-3)=-(x+2)^2+2(x+2)\\) → \\(y=-x^2-2x+3\\)" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.167 · Thema2 · 참고1</span><br>Q5. 평행이동과 대칭이동에 대해 다음 빈칸을 채우시오.<br>① 평행이동과 대칭이동은 그래프의 고유 __________은 변하지 않는다.<br>② 평행이동과 대칭이동은 도형의 __________만 바뀌는 개념이다.<br>③ 따라서 원의 __________이나 직선의 __________ 등은 절대로 변하지 않는다.", answer: "O", hint: "모양 / 위치 / 반지름·기울기", explanation: "① 모양(형태)<br>② 위치<br>③ 반지름 / 기울기" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.168 · Thema2 · 참고2</span><br>Q6. 음함수와 양함수에 대해 다음 질문에 답하시오.<br>① 양함수는 어떤 꼴의 표현법인가?<br>② 음함수는 어떤 꼴의 표현법인가?<br>③ \\(y=2x+3\\)은 양함수식인가, 음함수식인가?<br>④ \\(2x-y+3=0\\)은 양함수식인가, 음함수식인가?<br>⑤ \\(x^2+y^2=1\\)처럼 \\(x,\\ y\\)가 한쪽으로 몰려 있는 형태는 주로 어떤 꼴로 나타내는가?", answer: "O", hint: "양함수 \\(y=f(x)\\) / 음함수 \\(f(x,y)=0\\)", explanation: "① \\(y=f(x)\\) 꼴 (\\(y\\)에 대해 정리된 꼴)<br>② \\(f(x,\\ y)=0\\) 꼴<br>③ 양함수식<br>④ 음함수식<br>⑤ 음함수 꼴 \\(f(x,\\ y)=0\\)" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.168 · Thema2 · 참고3</span><br>Q7. 점의 평행이동과 도형의 평행이동의 차이를 빈칸에 맞게 말하시오.<br>① 점 \\(P(x,\\ y)\\)를 \\(x:+a,\\ y:+b\\)만큼 평행이동하면 \\(P'\\)의 좌표는 __________이다.<br>② 점의 평행이동은 부호가 __________이다.<br>③ \\(f(x,\\ y)=0\\)을 \\(x:+a,\\ y:+b\\)만큼 평행이동하면 도형의 방정식은 __________이다.<br>④ 도형의 평행이동은 부호가 __________이다.", answer: "O", hint: "점 \\((x+a,y+b)\\)(+) / 도형 \\(f(x-a,y-b)=0\\)(−)", explanation: "① \\((x+a,\\ y+b)\\)<br>② 그대로(더한다, \\(+\\))<br>③ \\(f(x-a,\\ y-b)=0\\)<br>④ 반대(빼준다, \\(-\\))" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.169 · Thema2 · 발상&알고리즘1</span><br>Q8. 도형의 평행이동은 어떻게 생각할까? 다음 빈칸을 채우시오.<br>① 도형 \\(f(x,\\ y)=0\\)을 \\(x\\)축으로 \\(a\\), \\(y\\)축으로 \\(b\\)만큼 평행이동하면 도형의 방정식은 __________이다.<br>② 이는 \\(x\\) 대신 __________, \\(y\\) 대신 __________를 대입하는 것이라 생각하면 된다.<br>③ \\(y=x^2+2\\)를 \\(x\\)축으로 \\(+2\\), \\(y\\)축으로 \\(-3\\)만큼 평행이동하면 \\(x\\)자리 대신 __________, \\(y\\)자리 대신 __________을 대입한다.", answer: "O", hint: "\\(f(x-a,y-b)=0\\), \\(x\\to x-a,\\ y\\to y-b\\)", explanation: "① \\(f(x-a,\\ y-b)=0\\)<br>② \\(x-a\\) / \\(y-b\\)<br>③ \\(x-2\\) / \\(y+3\\) (\\(y-(-3)=y+3\\)) → \\((y+3)=(x-2)^2+2\\)" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.170 · Thema2 · 예시문제1</span><br>Q9. 두 점 \\(A(-1,\\ a)\\), \\(B(b,\\ 4)\\)가 어떤 평행이동에 의하여 각각 \\(A'(1,\\ 3)\\), \\(B'(5,\\ 7)\\)로 옮겨질 때, 이 평행이동을 통해 점 \\((a,\\ b)\\)를 구하시오.", answer: "O", hint: "이동벡터가 같음: \\(A\\to A'\\)와 \\(B\\to B'\\)", explanation: "이동벡터 \\(A\\to A'\\)는 \\((1-(-1),\\ 3-a)=(2,\\ 3-a)\\), \\(B\\to B'\\)는 \\((5-b,\\ 3)\\).<br>같으므로 \\(2=5-b\\) → \\(b=3\\), \\(3-a=3\\) → \\(a=0\\). 따라서 \\((a,\\ b)=(0,\\ 3)\\)" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.170 · Thema2 · 예시문제2</span><br>Q10. 직선 \\(y=ax+b\\)를 \\(x\\)축으로 \\(2\\), \\(y\\)축으로 \\(-1\\)만큼 평행이동한 직선은 직선 \\(y=-\\dfrac12x+1\\)과 \\(y\\)축 위에서 수직으로 만난다. 이때 상수 \\(a,\\ b\\)의 곱 \\(ab\\)의 값을 구하시오.", answer: "O", hint: "평행이동한 직선 \\(y=ax+(b-2a-1)\\), 수직 → \\(a\\cdot(-\\tfrac12)=-1\\)", explanation: "평행이동: \\((y+1)=a(x-2)+b\\) → \\(y=ax+(b-2a-1)\\).<br>수직 조건: \\(a\\cdot\\left(-\\dfrac12\\right)=-1\\) → \\(a=2\\).<br>\\(y\\)축(\\(x=0\\))에서 만남: \\(b-2a-1=1\\) → \\(b=2+2a=6\\).<br>따라서 \\(ab=2\\cdot6=12\\)" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.171 · Thema2 · 예시문제3</span><br>Q11. 좌표평면에서 원 \\((x+1)^2+(y+2)^2=9\\)를 \\(x\\)축으로 \\(3\\), \\(y\\)축으로 \\(a\\)만큼 평행이동한 원을 \\(C\\)라 하자. 원 \\(C\\)의 넓이가 직선 \\(3x+4y-7=0\\)에 의하여 이등분되도록 하는 상수 \\(a\\)의 값을 구하시오.", answer: "O", hint: "이등분 → 직선이 \\(C\\)의 중심을 지남", explanation: "원의 중심 \\((-1,\\ -2)\\)를 \\((3,\\ a)\\)만큼 이동 → \\(C\\)의 중심 \\((2,\\ a-2)\\).<br>직선이 넓이를 이등분하려면 중심을 지나야 하므로 \\(3\\cdot2+4(a-2)-7=0\\) → \\(4a-9=0\\) → \\(a=\\dfrac94\\)" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.171 · Thema2 · 스킬1</span><br>Q12. 도형의 평행이동 Tip에 대해 다음 질문에 답하시오.<br>① 평행이동을 할 때는 무엇을 잡고 하는 것이 좋은가?<br>② 원이 일반형으로 나왔으면 먼저 어떤 형태로 바꾼 뒤 평행이동하는가?<br>③ 원은 무엇을 기준으로 평행이동하는가?<br>④ 원을 평행이동할 때 변하지 않는 것은?<br>⑤ 직선은 무엇이 유지된 채 평행이동하는가?<br>⑥ 이차함수가 일반형으로 나왔으면 먼저 어떤 형태로 바꾸는가?<br>⑦ 이차함수는 무엇을 기준으로 평행이동하는가?<br>⑧ 이차함수를 평행이동할 때 변하지 않는 것은?", answer: "O", hint: "기준점(원=중심, 이차함수=꼭짓점)을 잡고 이동", explanation: "① 도형의 기준점(특징적인 점)<br>② 표준형 \\((x-a)^2+(y-b)^2=r^2\\)<br>③ 중심<br>④ 반지름<br>⑤ 기울기<br>⑥ 표준형(꼭짓점 형태) \\(y=a(x-p)^2+q\\)<br>⑦ 꼭짓점<br>⑧ 그래프의 모양(\\(x^2\\)의 계수, 폭)" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.171 · Thema2 · 예시문제4</span><br>Q13. 이차함수 \\(y=x^2-2x\\)의 그래프를 \\(x\\)축으로 \\(-2\\), \\(y\\)축으로 \\(-1\\)만큼 평행이동시키면 직선 \\(y=mx\\)와 두 점 \\(P,\\ Q\\)에서 만난다. 선분 \\(PQ\\)의 중점이 원점일 때, 상수 \\(m\\)의 값을 구하시오.", answer: "O", hint: "평행이동한 포물선과 \\(y=mx\\) 연립 → 근의 합으로 중점", explanation: "평행이동: \\((y+1)=(x+2)^2-2(x+2)\\) → \\(y=x^2+2x-1\\).<br>\\(y=mx\\)와 연립: \\(x^2+(2-m)x-1=0\\). 두 근의 합 \\(=m-2\\), \\(PQ\\)의 중점의 \\(x\\)좌표 \\(=\\dfrac{m-2}{2}=0\\) → \\(m=2\\).<br>(\\(m=2\\)이면 \\(x^2-1=0\\), \\(P(1,2),\\ Q(-1,-2)\\), 중점 \\((0,0)\\) 확인)" },
    ] },
    { id: 12, name: '12강', questions: [
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.172 · Thema3 · 개념</span><br>Q1. 대칭이동에 대해 다음 질문에 답하시오.<br>① 도형을 주어진 점 또는 직선에 대하여 대칭인 도형으로 옮기는 것을 무엇이라 하는가?<br>② 점 \\(P(a,\\ b)\\)를 \\(x\\)축에 대하여 대칭이동한 점의 좌표를 쓰시오.<br>③ 점 \\(P(a,\\ b)\\)를 \\(y\\)축에 대하여 대칭이동한 점의 좌표를 쓰시오.<br>④ 점 \\(P(a,\\ b)\\)를 원점에 대하여 대칭이동한 점의 좌표를 쓰시오.<br>⑤ 점 \\(P(a,\\ b)\\)를 직선 \\(y=x\\)에 대하여 대칭이동한 점의 좌표를 쓰시오.", answer: "O", hint: "x축 \\((a,-b)\\) / y축 \\((-a,b)\\) / 원점 \\((-a,-b)\\) / y=x \\((b,a)\\)", explanation: "① 대칭이동<br>② \\((a,\\ -b)\\)<br>③ \\((-a,\\ b)\\)<br>④ \\((-a,\\ -b)\\)<br>⑤ \\((b,\\ a)\\)" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.172 · Thema3 · 개념</span><br>Q2. 직선 \\(y=x\\)에 대한 대칭이동에 대해 다음 빈칸을 채우시오. 점 \\(P(a,\\ b)\\)를 \\(y=x\\)에 대칭이동한 점을 \\(P'(a',\\ b')\\)이라 할 때,<br>① 선분 \\(PP'\\)의 중점은 직선 __________ 위의 점이다.<br>② 직선 \\(PP'\\)은 직선 \\(y=x\\)에 __________이다.<br>③ 두 조건을 연립하여 풀면 \\(a'=\\)__________, \\(b'=\\)__________이다.<br>④ 따라서 점 \\(P'\\)의 좌표는 __________이다.", answer: "O", hint: "중점은 y=x 위, PP'⊥y=x → \\(P'(b,a)\\)", explanation: "① \\(y=x\\)<br>② 수직<br>③ \\(a'=b,\\ b'=a\\)<br>④ \\((b,\\ a)\\)" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.173 · Thema3 · 예시문제2</span><br>Q3. 점 \\((1,\\ 2)\\)를 다음 기준에 대하여 대칭이동한 점의 좌표를 각각 구하시오.<br>① \\(x\\)축  ② \\(y\\)축  ③ 원점  ④ 직선 \\(y=x\\)", answer: "O", hint: "부호/자리 바꾸기", explanation: "① \\((1,\\ -2)\\)<br>② \\((-1,\\ 2)\\)<br>③ \\((-1,\\ -2)\\)<br>④ \\((2,\\ 1)\\)" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.173 · Thema3 · 참고</span><br>Q4. 다음 질문에 답하시오.<br>① 원점에 대한 대칭이동은 어떤 두 대칭이동을 순서에 상관없이 동시에 한 것인가?<br>② 점 \\((a,\\ b)\\)를 직선 \\(y=-x\\)에 대하여 대칭이동한 점의 좌표를 쓰시오.<br>③ 대칭이동에서 대칭되는 기준점은 몇 대 몇 내분점인가?<br>④ 대칭 기준에 대해 생긴 길이들은 항상 어떤 관계인가?", answer: "O", hint: "원점=x축·y축 대칭 동시 / y=-x → \\((-b,-a)\\)", explanation: "① \\(x\\)축 대칭과 \\(y\\)축 대칭<br>② \\((-b,\\ -a)\\)<br>③ \\(1:1\\) 내분점(중점)<br>④ 서로 같다" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.174 · Thema3 · 발상&알고리즘2</span><br>Q5. 점의 대칭이동은 어떻게 생각하면 좋을까? 다음 빈칸을 채우시오.<br>① \\(x\\)축 대칭 → __________의 부호를 바꾼다.<br>② \\(y\\)축 대칭 → __________의 부호를 바꾼다.<br>③ 원점 대칭 → __________의 부호를 모두 바꾼다.<br>④ \\(y=x\\) 대칭 → \\(x,\\ y\\)의 __________를 바꾼다.<br>⑤ \\(y=-x\\) 대칭 → \\(x,\\ y\\)의 __________를 바꾼 후 __________를 바꾼다.", answer: "O", hint: "x축: y / y축: x / 원점: x,y / y=x: 자리 / y=-x: 자리+부호", explanation: "① \\(y\\)<br>② \\(x\\)<br>③ \\(x,\\ y\\)<br>④ 자리(위치)<br>⑤ 자리 / 부호" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.175~176 · Thema4 · 개념</span><br>Q6. 방정식 \\(f(x,\\ y)=0\\)이 나타내는 도형을 다음 기준에 대하여 대칭이동한 도형의 방정식을 쓰시오.<br>① \\(x\\)축  ② \\(y\\)축  ③ 원점  ④ 직선 \\(y=x\\)", answer: "O", hint: "x축 \\(f(x,-y)=0\\) / y축 \\(f(-x,y)=0\\) / 원점 \\(f(-x,-y)=0\\) / y=x \\(f(y,x)=0\\)", explanation: "① \\(f(x,\\ -y)=0\\)<br>② \\(f(-x,\\ y)=0\\)<br>③ \\(f(-x,\\ -y)=0\\)<br>④ \\(f(y,\\ x)=0\\)" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.175 · Thema4 · 개념</span><br>Q7. 도형을 \\(x\\)축에 대하여 대칭이동한 방정식이 만들어지는 과정을 빈칸에 맞게 말하시오. 도형 위의 점 \\(P(x,\\ y)\\)를 \\(x\\)축 대칭이동한 점을 \\(P'(x',\\ y')\\)이라 할 때,<br>① \\(x'=\\)__________, \\(y'=\\)__________이다.<br>② 따라서 \\(x=\\)__________, \\(y=\\)__________이다.<br>③ 이것을 \\(f(x,\\ y)=0\\)에 대입하면 __________\\(=0\\)이다.<br>④ 따라서 \\(x\\)축 대칭이동한 도형의 방정식은 __________\\(=0\\)이다.", answer: "O", hint: "\\(x'=x,\\ y'=-y\\) → \\(f(x,-y)=0\\)", explanation: "① \\(x'=x,\\ y'=-y\\)<br>② \\(x=x',\\ y=-y'\\)<br>③ \\(f(x',\\ -y')=0\\)<br>④ \\(f(x,\\ -y)=0\\)" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.176 · Thema4 · 예시문제1</span><br>Q8. 방정식 \\(3x+y-1=0\\)이 나타내는 도형을 다음 기준에 대하여 대칭이동한 도형의 방정식을 구하시오.<br>① \\(x\\)축  ② \\(y\\)축  ③ 원점  ④ 직선 \\(y=x\\)", answer: "O", hint: "x축 y→−y, y축 x→−x, 원점 둘 다, y=x 자리 바꿈", explanation: "① \\(3x-y-1=0\\)<br>② \\(-3x+y-1=0\\) (즉 \\(3x-y+1=0\\))<br>③ \\(-3x-y-1=0\\) (즉 \\(3x+y+1=0\\))<br>④ \\(x+3y-1=0\\)" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.176 · Thema4 · 참고7</span><br>Q9. 다음 빈칸을 채우시오.<br>도형에서 원점에 대한 대칭이동은 도형을 원점을 중심으로 __________회전한 것으로 간주한다.", answer: "O", hint: "180°", explanation: "\\(180^\\circ\\)만큼" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.177 · Thema4 · 발상&알고리즘3</span><br>Q10. 도형의 대칭이동은 어떻게 할까? \\(f(x,\\ y)=0\\)이 나타내는 도형을<br>① \\(x\\)축 대칭 → \\(y\\) 대신 __________를 대입한다.<br>② \\(y\\)축 대칭 → \\(x\\) 대신 __________를 대입한다.<br>③ 원점 대칭 → \\(x\\) 대신 __________, \\(y\\) 대신 __________를 대입한다.<br>④ \\(y=x\\) 대칭 → \\(x,\\ y\\) __________를 바꾼다.<br>⑤ \\(y=-x\\) 대칭 → \\(x,\\ y\\) 자리를 바꾼 후 __________를 바꾼다.", answer: "O", hint: "−y / −x / −x,−y / 자리 / 부호", explanation: "① \\(-y\\)<br>② \\(-x\\)<br>③ \\(-x\\) / \\(-y\\)<br>④ 자리(위치)<br>⑤ 부호" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.178 · Thema4 · 스킬2</span><br>Q11. 일직선 위의 세 점이 등장할 때는 어떤 관점으로 해석하는가? 다음 빈칸을 채우시오.<br>① __________<br>② __________가 같다", answer: "O", hint: "한 직선 위(공선) / 기울기", explanation: "① 한 직선 위에 있다(공선 조건, 직선의 방정식 이용)<br>② (어느 두 점으로 구한) 기울기가 같다" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.178 · Thema4 · 예시문제5</span><br>Q12. 점 \\(A(1,\\ 3)\\)을 \\(x\\)축, \\(y\\)축에 대칭이동한 점을 각각 \\(B,\\ C\\)라 하고, 점 \\(D(a,\\ b)\\)를 \\(x\\)축에 대칭이동한 점을 \\(E\\)라 하자. 세 점 \\(B,\\ C,\\ E\\)가 한 직선 위에 있을 때, 직선 \\(AD\\)의 기울기를 구하시오. (단, \\(a\\ne\\pm1\\))", answer: "O", hint: "\\(B(1,-3),\\ C(-1,3),\\ E(a,-b)\\) 공선 → \\(b=3a\\)", explanation: "\\(B(1,\\ -3),\\ C(-1,\\ 3),\\ E(a,\\ -b)\\). 직선 \\(BC\\)는 기울기 \\(\\dfrac{3-(-3)}{-1-1}=-3\\), 즉 \\(y=-3x\\).<br>\\(E\\)가 \\(BC\\) 위: \\(-b=-3a\\) → \\(b=3a\\). 따라서 \\(D(a,\\ 3a)\\).<br>직선 \\(AD\\)의 기울기 \\(=\\dfrac{3a-3}{a-1}=\\dfrac{3(a-1)}{a-1}=3\\)" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.179 · Thema4 · 스킬3</span><br>Q13. 대칭이동에서 원과 직선에 대해 다음 질문에 답하시오.<br>① 대칭이동은 도형의 모양과 크기가 변하는가?<br>② 대칭이동에서 도형의 무엇이 변하는가?<br>③ 대칭이동할 때 원의 반지름은 변하는가?<br>④ \\(x\\)축 또는 \\(y\\)축 대칭이동한 직선의 기울기는(원래 \\(m\\))?<br>⑤ 원점 대칭이동한 직선의 기울기는(원래 \\(m\\))?<br>⑥ \\(y=x\\) 또는 \\(y=-x\\) 대칭이동한 직선의 기울기는(원래 \\(m\\))?<br>⑦ 원의 대칭이동은 무엇을 기준으로 하는 것이 좋은가?", answer: "O", hint: "x·y축 \\(-m\\) / 원점 \\(m\\) / y=±x \\(\\tfrac1m\\)", explanation: "① 변하지 않는다.<br>② 위치(방향)<br>③ 변하지 않는다.<br>④ \\(-m\\)<br>⑤ \\(m\\) (그대로)<br>⑥ \\(\\dfrac1m\\)<br>⑦ 원의 중심(을 기준으로 대칭이동)" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.179 · Thema4 · 예시문제6</span><br>Q14. 원 \\((x+1)^2+(y+3)^2=4\\)를 원점에 대칭이동한 원을 \\(C\\), 직선 \\(mx-y+6=0\\)을 \\(y\\)축에 대칭이동한 직선을 \\(l\\)이라 하자. 직선 \\(l\\)이 원 \\(C\\)의 넓이를 이등분할 때, 상수 \\(m\\)의 값을 구하시오.", answer: "O", hint: "\\(l\\)이 \\(C\\)의 중심을 지남", explanation: "원의 중심 \\((-1,\\ -3)\\)을 원점 대칭 → \\(C\\)의 중심 \\((1,\\ 3)\\).<br>\\(l\\): \\(mx-y+6=0\\)에 \\(x\\to-x\\) → \\(-mx-y+6=0\\).<br>\\(l\\)이 \\(C\\)의 넓이를 이등분하려면 중심 \\((1,\\ 3)\\)을 지남: \\(-m-3+6=0\\) → \\(m=3\\)" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.180 · Thema4 · 스킬4</span><br>Q15. 대칭이동과 평행이동이 혼합된 문제가 나오면 어떻게 해야 하는가? 다음 빈칸을 채우시오.<br>① 반드시 문제 __________ 그대로 따라간다.<br>② 직선 \\(2x+y-1=0\\)을 \\(x\\)축으로 \\(+3\\), \\(y\\)축으로 \\(-1\\)만큼 평행이동하면 식은 어떻게 되는가?<br>③ ②의 결과를 원점대칭하려면 \\(x\\) 대신 __________, \\(y\\) 대신 __________를 대입한다.", answer: "O", hint: "순서 그대로 / 평행이동 후 원점대칭", explanation: "① 순서(제시된 순서)<br>② \\(x\\to x-3,\\ y\\to y+1\\): \\(2(x-3)+(y+1)-1=0\\) → \\(2x+y-6=0\\)<br>③ \\(-x\\) / \\(-y\\) (\\(2(-x)+(-y)-6=0\\) → \\(2x+y+6=0\\))" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.180 · Thema4 · 예시문제7</span><br>Q16. 원 \\(x^2+y^2=9\\)를 \\(x\\)축으로 \\(1\\), \\(y\\)축으로 \\(2\\)만큼 평행이동한 뒤 다시 직선 \\(y=x\\)에 대칭이동하였다. 이 원이 직선 \\(3x-4y-12=0\\)과 두 점 \\(P,\\ Q\\)에서 만날 때, 선분 \\(PQ\\)의 길이를 구하시오.", answer: "O", hint: "중심 이동·대칭 후, 현의 길이 \\(2\\sqrt{r^2-d^2}\\)", explanation: "중심 \\((0,0)\\) → 평행이동 \\((1,\\ 2)\\) → \\(y=x\\) 대칭 \\((2,\\ 1)\\). 원 \\((x-2)^2+(y-1)^2=9\\).<br>중심 \\((2,\\ 1)\\)에서 직선까지 거리 \\(d=\\dfrac{|3\\cdot2-4\\cdot1-12|}{5}=\\dfrac{10}{5}=2\\).<br>\\(\\overline{PQ}=2\\sqrt{r^2-d^2}=2\\sqrt{9-4}=2\\sqrt5\\)" },
