  // ────────────────────────────────────────────────
  // 강의 데이터 (문제 추가 방법: questions 배열에 항목 추가)
  // { question: "Q1. 문제 내용 (LaTeX: \\(...\\))", answer: "O" or "X", hint: "", explanation: "" }
  // ────────────────────────────────────────────────
  const lectures = [
    { id: 1,  name: '1강',  questions: [
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.5 · Thema1 · 개념</span><br>Q1. 다음 질문에 답하시오.<br>① 두 점 사이의 거리는 항상 어떤 값이 나와야 하는가?<br>② 수직선 위의 두 점 \\(A(x_1)\\), \\(B(x_2)\\) 사이의 거리 공식을 쓰시오.<br>③ 두 점의 좌표가 미지수라서 어떤 점이 큰지 작은지 불분명할 때는 왜 절댓값을 붙여야 하는가?", answer: "O", hint: "① 음이 아닌 값(0 이상) ② \\(\\overline{AB}=|x_2-x_1|\\) ③ 거리는 음수가 될 수 없으므로", explanation: "① 거리는 항상 0 이상의 값(음이 아닌 값)이어야 한다.<br>② \\(\\overline{AB}=|x_2-x_1|\\)<br>③ 어느 점이 큰지 알 수 없어 \\(x_2-x_1\\)의 부호가 정해지지 않으므로, 항상 0 이상이 되도록 절댓값을 붙인다." },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.5 · Thema1 · 예시문제</span><br>Q2. 다음을 구하시오.<br>① 수직선 위의 두 점 \\(A(1)\\), \\(B(4)\\) 사이의 거리<br>② 수직선 위의 두 점 \\(A(2)\\), \\(B(-3)\\) 사이의 거리<br>③ 수직선 위의 두 점 \\(A(3)\\), \\(B(a)\\) 사이의 거리가 \\(4\\)일 때, 상수 \\(a\\)의 값", answer: "O", hint: "\\(\\overline{AB}=|x_2-x_1|\\) 이용", explanation: "① \\(|4-1|=3\\)<br>② \\(|-3-2|=5\\)<br>③ \\(|a-3|=4\\) 이므로 \\(a-3=\\pm4\\), 따라서 \\(a=7\\) 또는 \\(a=-1\\)" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.6 · Thema2 · 개념</span><br>Q3. 다음 질문에 답하시오.<br>① 좌표평면 위의 두 점 \\(A(x_1,\\ y_1)\\), \\(B(x_2,\\ y_2)\\) 사이의 거리 공식을 쓰시오.<br>② 원점 \\(O(0,\\ 0)\\)과 점 \\(A(x_1,\\ y_1)\\) 사이의 거리 공식을 쓰시오.<br>③ 좌표평면에서 두 점 사이의 거리 공식은 어떤 정리로부터 유도되는가?<br>④ 두 점 사이의 거리 공식을 암기할 때 어떤 느낌으로 암기하면 좋은가?<br>⑤ \\(x\\)좌표의 차이 또는 \\(y\\)좌표의 차이가 음수여도 공식이 성립하는 이유를 설명하시오.", answer: "O", hint: "① \\(\\overline{AB}=\\sqrt{(x_2-x_1)^2+(y_2-y_1)^2}\\) ③ 피타고라스 정리", explanation: "① \\(\\overline{AB}=\\sqrt{(x_2-x_1)^2+(y_2-y_1)^2}\\)<br>② \\(\\overline{OA}=\\sqrt{{x_1}^2+{y_1}^2}\\)<br>③ 피타고라스 정리로부터 유도된다.<br>④ 가로 방향 차이와 세로 방향 차이를 두 변으로 하는 직각삼각형의 빗변 길이(각 차이를 제곱해 더한 뒤 제곱근)로 기억한다.<br>⑤ 차이를 제곱하면 부호에 관계없이 항상 0 이상이 되므로, 차이가 음수여도 공식이 그대로 성립한다." },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.6 · Thema2 · 예시문제</span><br>Q4. 두 점 \\(A(5,\\ -2)\\), \\(B(3,\\ 2)\\) 사이의 거리를 구하시오.", answer: "O", hint: "\\(\\sqrt{(x_2-x_1)^2+(y_2-y_1)^2}\\)", explanation: "\\(\\overline{AB}=\\sqrt{(3-5)^2+(2-(-2))^2}=\\sqrt{4+16}=\\sqrt{20}=2\\sqrt{5}\\)" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.7 · Thema2 · 발상&알고리즘2</span><br>Q5. 다음 식이 어떤 두 점 사이의 거리를 의미하는지 말하시오.<br>\\[\\sqrt{(a-1)^2+(b-3)^2}\\]", answer: "O", hint: "거리 공식과 비교", explanation: "점 \\((a,\\ b)\\)와 점 \\((1,\\ 3)\\) 사이의 거리를 의미한다." },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.7 · Thema2 · 예시문제1</span><br>Q6. 세 점 \\(A(3,\\ 0)\\), \\(B(5,\\ -2)\\), \\(C(a,\\ 1)\\)에 대하여 \\(\\overline{AC}=\\overline{BC}\\)가 되는 상수 \\(a\\)의 값을 구하시오.", answer: "O", hint: "\\(\\overline{AC}^2=\\overline{BC}^2\\)으로 놓기", explanation: "\\(\\overline{AC}^2=(a-3)^2+1\\), \\(\\overline{BC}^2=(a-5)^2+9\\)<br>\\((a-3)^2+1=(a-5)^2+9\\)<br>\\(-6a+10=-10a+34\\)<br>\\(4a=24\\), 따라서 \\(a=6\\)" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.7 · Thema2 · 예시문제2</span><br>Q7. \\(a,\\ b\\)가 실수일 때, 다음 식의 최솟값을 구하시오.<br>\\[\\sqrt{a^2+b^2}+\\sqrt{(a-1)^2+(b-3)^2}\\]", answer: "O", hint: "두 거리의 합 → 세 점이 일직선일 때 최소", explanation: "이 식은 점 \\(P(a,\\ b)\\)에서 \\(O(0,\\ 0)\\)까지의 거리와 \\(A(1,\\ 3)\\)까지의 거리의 합이다.<br>\\(P\\)가 선분 \\(OA\\) 위에 있을 때 최소이고, 최솟값은 \\(\\overline{OA}=\\sqrt{1^2+3^2}=\\sqrt{10}\\)" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.8 · Thema2 · 발상&알고리즘3</span><br>Q8. “~ 위의 점”이라는 말이 나오면 어떻게 설정하는지 빈칸을 채우시오.<br>① \\(x\\)축 위의 점 → \\((a,\\ ①)\\)<br>② \\(y\\)축 위의 점 → \\((②,\\ a)\\)<br>③ 직선 \\(x+y=1\\) 위의 점 → \\((a,\\ ③)\\)", answer: "O", hint: "축·직선 위의 점은 조건을 만족하도록 한 좌표를 나머지로 표현", explanation: "① \\(0\\) (→ \\((a,\\ 0)\\))<br>② \\(0\\) (→ \\((0,\\ a)\\))<br>③ \\(1-a\\) (→ \\((a,\\ 1-a)\\))" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.8 · Thema2 · 예시문제3</span><br>Q9. 두 점 \\(A(1,\\ -2)\\), \\(B(5,\\ 2)\\)로부터 같은 거리에 있는 점 \\(P(a,\\ b)\\)가 직선 \\(y=x+1\\) 위의 점일 때, \\(a^2+b^2\\)의 값을 구하시오.", answer: "O", hint: "\\(\\overline{AP}^2=\\overline{BP}^2\\), 그리고 \\(b=a+1\\)", explanation: "\\(\\overline{AP}^2=\\overline{BP}^2\\)에서<br>\\((a-1)^2+(b+2)^2=(a-5)^2+(b-2)^2\\)<br>정리하면 \\(a+b=3\\).<br>\\(P\\)가 \\(y=x+1\\) 위에 있으므로 \\(b=a+1\\).<br>두 식에서 \\(a=1,\\ b=2\\).<br>따라서 \\(a^2+b^2=1+4=5\\)" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.8 · Thema2 · 발상&알고리즘4</span><br>Q10. 삼각형의 외심 관련 문제가 나오면 다음 성질을 떠올린다. 다음 빈칸을 채우시오.<br>① 삼각형의 세 꼭짓점에서 외심까지의 __________는 모두 같다.<br>② 직각삼각형의 외심은 __________의 중점이다.<br>③ 중심각은 원주각의 __________배이다.", answer: "O", hint: "외접원의 반지름 / 빗변 / 2", explanation: "① 거리(외접원의 반지름)<br>② 빗변<br>③ \\(2\\)배" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.8 · Thema2 · 예시문제4</span><br>Q11. 좌표평면 위의 한 점 \\(A(2,\\ 1)\\)을 꼭짓점으로 하는 삼각형 \\(ABC\\)의 외심은 변 \\(BC\\) 위에 있고 좌표가 \\((-1,\\ -1)\\)일 때, \\(\\overline{AB}^2+\\overline{AC}^2\\)의 값을 구하시오. (단, 외심은 \\(O\\)이다.)", answer: "O", hint: "외심이 \\(BC\\) 위 → \\(BC\\)는 지름, \\(\\angle A=90^\\circ\\)", explanation: "외심 \\(O\\)가 변 \\(BC\\) 위에 있으므로 \\(\\overline{BC}\\)는 외접원의 지름이고 \\(\\angle A=90^\\circ\\)이다.<br>외접원의 반지름 \\(R=\\overline{OA}=\\sqrt{(2-(-1))^2+(1-(-1))^2}=\\sqrt{9+4}=\\sqrt{13}\\)<br>\\(\\overline{BC}=2R\\)이므로 피타고라스 정리에 의해<br>\\(\\overline{AB}^2+\\overline{AC}^2=\\overline{BC}^2=(2R)^2=4\\times13=52\\)" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.9 · Thema2 · 발상&알고리즘5</span><br>Q12. “삼각형의 모양을 결정”하라는 문제가 나오면 어떻게 풀까? 다음 빈칸을 채우시오.<br>① 1단계 : 세 변의 __________를 구한다.<br>② 2단계 : __________ 혹은 세 변의 길이 동일성을 사용해본다.<br>③ 3단계 : 피타고라스가 성립하면 __________, 길이 동일성이 되면 __________ 혹은 __________이다.", answer: "O", hint: "길이 / 피타고라스 정리 / 직각·정·이등변삼각형", explanation: "① 길이<br>② 피타고라스 정리<br>③ 직각삼각형 / 정삼각형 / 이등변삼각형" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.9 · Thema2 · 예시문제5</span><br>Q13. 세 점 \\(A(1,\\ 2)\\), \\(B(-4,\\ 5)\\), \\(C(-2,\\ -3)\\)을 꼭짓점으로 하는 삼각형 \\(ABC\\)의 모양을 설명하시오.", answer: "O", hint: "세 변의 제곱을 비교", explanation: "\\(\\overline{AB}^2=(-5)^2+3^2=34\\), \\(\\overline{AC}^2=(-3)^2+(-5)^2=34\\), \\(\\overline{BC}^2=2^2+(-8)^2=68\\)<br>\\(\\overline{AB}=\\overline{AC}\\)이고 \\(\\overline{AB}^2+\\overline{AC}^2=\\overline{BC}^2\\)이므로,<br>\\(\\angle A=90^\\circ\\)인 직각이등변삼각형이다." },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.9 · Thema2 · 발상&알고리즘6</span><br>Q14. “제곱의 합이 최소”인 점의 좌표를 구하는 방법을 빈칸에 맞게 말하시오.<br>[방법1] 이차함수의 최대, 최소를 이용하여 구한다.<br>① 1단계 : 점 \\(P\\)를 __________이라고 미지수 설정을 한다.<br>② 2단계 : \\(\\overline{AP}^2+\\overline{BP}^2\\)에 맞게 __________에 관한 관계식을 세운다.<br>③ 3단계 : __________의 최솟값을 이용하여 \\(\\overline{AP}^2+\\overline{BP}^2\\)의 최솟값을 구한다.<br>[방법2]<br>④ 세 점이 __________ 위에 놓이면 직선의 길이는 최소가 된다.<br>⑤ \\(A\\) 혹은 \\(B\\)좌표를 일직선 위에 있게끔 __________을 시킨다.", answer: "O", hint: "미지수 / 미지수(변수) / 이차함수 / 한 직선 / 대칭이동", explanation: "① 미지수 \\((a,\\ b)\\) 등으로 설정<br>② 미지수(설정한 변수)<br>③ 이차함수<br>④ 한 직선(일직선)<br>⑤ 대칭이동" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.9 · Thema2 · 예시문제6</span><br>Q15. 두 점 \\(A(4,\\ 1)\\), \\(B(-2,\\ 5)\\)와 \\(x\\)축 위의 점 \\(P\\)에 대하여 \\(\\overline{AP}^2+\\overline{BP}^2\\)의 최솟값을 구하시오.", answer: "O", hint: "\\(P(a,\\ 0)\\)로 놓고 이차함수 최소", explanation: "\\(P(a,\\ 0)\\)이라 하면<br>\\(\\overline{AP}^2+\\overline{BP}^2=(a-4)^2+1+(a+2)^2+25=2a^2-4a+46=2(a-1)^2+44\\)<br>\\(a=1\\)일 때 최소이고, 최솟값은 \\(44\\)" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.10 · Thema3 · 발상&알고리즘7</span><br>Q16. 도형의 성질 증명 문제는 어떻게 풀까? 다음 빈칸을 채우시오.<br>① 도형을 __________시킨다.<br>② 이때, 미지수를 __________하여 도입한다.<br>③ 문제에 주어진 조건을 통해 __________을 세운다.<br>④ 대칭의 중심이 __________이 되도록 좌표 설정한다.<br>⑤ 직각 point가 __________이 되도록 좌표 설정한다.", answer: "O", hint: "좌표화 / 간단히(문자로) / 관계식 / 원점 / 원점", explanation: "① 좌표화(좌표평면 위에 놓기)<br>② 되도록 간단하게(문자로)<br>③ 관계식(등식)<br>④ 원점<br>⑤ 원점" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.10 · Thema3 · 도형의 좌표화</span><br><span data-figure='pending' style='display:inline-block;margin:0.4rem 0;padding:0.35rem 0.7rem;border:1px dashed #f59e0b;border-radius:0.5rem;color:#f59e0b;font-size:0.78rem;font-weight:700'>📷 교재 그림 자리 — 나중에 여기에 그림 삽입 (data-figure)</span><br>Q17. 교재 그림을 보고 다음 도형의 좌표 설정을 말하시오.<br>① 직사각형 \\(ABCD\\)<br>② 정삼각형 \\(ABC\\)<br>③ 이등변삼각형 \\(ABC\\)<br>④ 직각삼각형 \\(ABC\\)", answer: "O", hint: "대칭·직각을 원점/축에 맞춰 간단히 설정", explanation: "(예시 좌표 설정)<br>① 직사각형 \\(ABCD\\): \\(A(0,\\ 0),\\ B(a,\\ 0),\\ C(a,\\ b),\\ D(0,\\ b)\\)<br>② 정삼각형 \\(ABC\\): \\(A(-a,\\ 0),\\ B(a,\\ 0),\\ C(0,\\ \\sqrt{3}\\,a)\\)<br>③ 이등변삼각형 \\(ABC\\): \\(B(-a,\\ 0),\\ C(a,\\ 0),\\ A(0,\\ b)\\)<br>④ 직각삼각형 \\(ABC\\): \\(A(0,\\ 0),\\ B(a,\\ 0),\\ C(0,\\ b)\\) (직각을 원점에)" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.11 · Thema3 · 예시문제1</span><br>Q18. 직사각형 \\(ABCD\\)의 두 대각선의 길이가 같음을 좌표평면을 이용하여 증명하시오.", answer: "O", hint: "\\(A(0,0),\\ B(a,0),\\ C(a,b),\\ D(0,b)\\)로 설정", explanation: "\\(A(0,\\ 0),\\ B(a,\\ 0),\\ C(a,\\ b),\\ D(0,\\ b)\\)로 놓으면<br>\\(\\overline{AC}=\\sqrt{a^2+b^2}\\), \\(\\overline{BD}=\\sqrt{(0-a)^2+(b-0)^2}=\\sqrt{a^2+b^2}\\)<br>따라서 \\(\\overline{AC}=\\overline{BD}\\)이므로 두 대각선의 길이는 같다." },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.12 · Thema3 · 예시문제2</span><br>Q19. 직사각형 \\(ABCD\\)와 임의의 점 \\(P\\)에 대하여 \\(\\overline{AP}^2+\\overline{CP}^2=\\overline{BP}^2+\\overline{DP}^2\\)이 성립함을 좌표평면을 이용하여 증명하시오.", answer: "O", hint: "\\(A(0,0),B(a,0),C(a,b),D(0,b),P(x,y)\\)", explanation: "\\(A(0,\\ 0),\\ B(a,\\ 0),\\ C(a,\\ b),\\ D(0,\\ b),\\ P(x,\\ y)\\)로 놓으면<br>\\(\\overline{AP}^2+\\overline{CP}^2=(x^2+y^2)+((x-a)^2+(y-b)^2)\\)<br>\\(\\overline{BP}^2+\\overline{DP}^2=((x-a)^2+y^2)+(x^2+(y-b)^2)\\)<br>두 식을 전개하면 모두 \\(x^2+y^2+(x-a)^2+(y-b)^2\\)으로 같다.<br>따라서 \\(\\overline{AP}^2+\\overline{CP}^2=\\overline{BP}^2+\\overline{DP}^2\\)" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.13 · Thema3 · 예시문제7</span><br>Q20. 직각삼각형 \\(ABC\\)가 있다. 빗변 \\(BC\\)의 중점 \\(M\\)에 대하여 \\(2\\overline{AM}=\\overline{BC}\\)임을 좌표평면을 이용하여 증명하시오.", answer: "O", hint: "직각을 원점에: \\(A(0,0),\\ B(a,0),\\ C(0,b)\\)", explanation: "직각인 꼭짓점 \\(A\\)를 원점에 두어 \\(A(0,\\ 0),\\ B(a,\\ 0),\\ C(0,\\ b)\\)로 놓으면<br>\\(M=\\left(\\dfrac{a}{2},\\ \\dfrac{b}{2}\\right)\\)<br>\\(\\overline{AM}=\\sqrt{\\dfrac{a^2}{4}+\\dfrac{b^2}{4}}=\\dfrac{1}{2}\\sqrt{a^2+b^2}\\), \\(\\overline{BC}=\\sqrt{a^2+b^2}\\)<br>따라서 \\(2\\overline{AM}=\\sqrt{a^2+b^2}=\\overline{BC}\\)" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.14 · Thema4 · 개념</span><br>Q21. 중선정리에 대해 다음 질문에 답하시오.<br>① 삼각형 \\(ABC\\)에서 선분 \\(BC\\)의 중점이 \\(M\\)일 때, 중선은 어느 선분인가?<br>② 중선정리의 공식을 쓰시오.<br>③ 중선정리를 증명할 때, 직선 \\(BC\\)는 어떤 축으로 잡는가?<br>④ 선분 \\(BC\\)의 중점 \\(M\\)은 어떤 점이 되도록 좌표평면을 잡는가?", answer: "O", hint: "\\(\\overline{AB}^2+\\overline{AC}^2=2(\\overline{AM}^2+\\overline{BM}^2)\\)", explanation: "① 선분 \\(AM\\) (꼭짓점 \\(A\\)와 대변 \\(BC\\)의 중점 \\(M\\)을 잇는 선분)<br>② \\(\\overline{AB}^2+\\overline{AC}^2=2(\\overline{AM}^2+\\overline{BM}^2)\\)<br>③ \\(x\\)축<br>④ 원점" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.14 · Thema4 · 중선정리 유도</span><br>Q22. 중선정리의 좌표 설정과 유도 과정을 빈칸에 맞게 말하시오.<br>① \\(A\\)는 \\((a,\\ b)\\), \\(B\\)는 \\((\\ ,\\ 0)\\), \\(C\\)는 \\((\\ ,\\ 0)\\)으로 둔다.<br>② \\(\\overline{AB}^2+\\overline{AC}^2\\)를 정리하면 __________이다.<br>③ \\(\\overline{AM}^2\\)는 __________, \\(\\overline{BM}^2\\)는 __________이다.<br>④ 따라서 \\(\\overline{AB}^2+\\overline{AC}^2=\\)__________이 성립한다.", answer: "O", hint: "\\(B(-c,0),\\ C(c,0)\\), \\(M\\)은 원점", explanation: "① \\(B(-c,\\ 0),\\ C(c,\\ 0)\\) (\\(M\\)이 원점이 되도록)<br>② \\(\\overline{AB}^2+\\overline{AC}^2=(a+c)^2+b^2+(a-c)^2+b^2=2a^2+2b^2+2c^2\\)<br>③ \\(\\overline{AM}^2=a^2+b^2\\), \\(\\overline{BM}^2=c^2\\)<br>④ \\(2(\\overline{AM}^2+\\overline{BM}^2)=2(a^2+b^2+c^2)\\)" },

    ] },
    { id: 2,  name: '2강',  questions: [
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.16 · Thema5 · 개념</span><br>Q1. 다음 질문에 답하시오.<br>① 내분점은 어떤 점을 말하는가?<br>② 선분 \\(AB\\) 위의 동점 \\(P\\)에 대하여 \\(\\overline{AP}:\\overline{PB}=m:n\\)일 때, 점 \\(P\\)는 선분 \\(AB\\)를 어떻게 나눈다고 하는가?<br>③ 이때 점 \\(P\\)를 선분 \\(AB\\)의 무엇이라고 하는가?<br>④ 내분점에서 \\(m,\\ n\\)은 어떤 조건을 만족해야 하는가?", answer: "O", hint: "선분을 \\(m:n\\)으로 나누는 내부의 점, \\(m>0,\\ n>0\\)", explanation: "① 선분을 주어진 비로 나누는, 선분 위(내부)에 있는 점이다.<br>② 선분 \\(AB\\)를 \\(m:n\\)으로 내분한다고 한다.<br>③ 선분 \\(AB\\)의 내분점이라 한다.<br>④ \\(m>0,\\ n>0\\) (둘 다 양수)" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.16 · Thema5 · 개념</span><br>Q2. 내분점과 외분점의 출발점에 대해 다음 빈칸을 채우시오.<br>① 이제부터는 “__________ 위의 세 점”의 관계를 살펴본다.<br>② 세 점 중 두 점은 __________, 한 점은 __________으로 둔다.<br>③ 동점 1개가 어떤 __________에 있는지 살펴보는 것이 외분점과 내분점의 출발점이다.<br>④ 내분점과 외분점을 풀어내는 방식은 단 1개의 방식이 아니라, 공식 암기나 직접 __________를 설정하는 등 다양한 방식이 있다.", answer: "O", hint: "직선 / 정점·동점 / 위치 / 미지수", explanation: "① 직선(수직선)<br>② 정점(고정점) / 동점(움직이는 점)<br>③ 위치<br>④ 미지수(좌표)" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.17 · Thema5 · 발상&알고리즘8</span><br>Q3. 선분 \\(AB\\)를 \\(3:2\\)로 내분하는 내분점은 어떻게 찾을까? 다음 빈칸을 채우시오.<br>① 1단계 : \\(3+2\\)를 하여 선분 \\(AB\\)를 __________등분한다.<br>② 2단계 : A(시점) → __________ → B(종점) 순으로 내분점의 위치를 표시한다.<br>③ \\(3:2\\) 내분점은 왼쪽으로부터 \\(5\\)등분했을 때 __________번째 순에 위치한 점이다.", answer: "O", hint: "5등분 / 등분점 / 3번째", explanation: "① \\(5\\)등분<br>② 등분점(눈금)을 차례로<br>③ \\(3\\)번째 (A에서 \\(3\\)칸 간 지점)" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.17 · Thema5 · 예시문제</span><br>Q4. 다음을 구하시오.<br>① 두 점 \\(A(-3)\\), \\(B(5)\\)에 대하여 \\(3:1\\) 내분점 \\(P\\)의 좌표<br>② 두 점 \\(A(-1)\\), \\(B(3)\\)에 대하여 \\(1:3\\) 내분점 \\(P\\)의 좌표", answer: "O", hint: "\\(P=\\dfrac{m x_2+n x_1}{m+n}\\)", explanation: "① \\(\\dfrac{3\\cdot5+1\\cdot(-3)}{3+1}=\\dfrac{12}{4}=3\\) → \\(P(3)\\)<br>② \\(\\dfrac{1\\cdot3+3\\cdot(-1)}{1+3}=\\dfrac{0}{4}=0\\) → \\(P(0)\\)" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.18 · Thema5 · 개념</span><br>Q5. 수직선 위의 내분점 공식에 대해 다음 질문에 답하시오.<br>① 수직선 위의 두 점 \\(A(x_1)\\), \\(B(x_2)\\)를 잇는 선분 \\(AB\\)를 \\(m:n\\)으로 내분하는 점 \\(P(x)\\)의 좌표 공식을 쓰시오.<br>② \\(x_1<x_2\\)일 때 \\(\\overline{AP}\\)를 \\(x,\\ x_1\\)을 사용하여 나타내시오.<br>③ \\(x_1<x_2\\)일 때 \\(\\overline{PB}\\)를 \\(x_2,\\ x\\)를 사용하여 나타내시오.<br>④ \\(\\overline{AP}:\\overline{PB}=m:n\\)에서 만들어지는 비례식을 쓰시오.<br>⑤ \\(m=n\\)이면 점 \\(P\\)는 선분 \\(AB\\)의 어떤 점인가?<br>⑥ 선분 \\(AB\\)의 중점 좌표 공식을 쓰시오.", answer: "O", hint: "\\(x=\\dfrac{m x_2+n x_1}{m+n}\\), \\(m=n\\)이면 중점", explanation: "① \\(x=\\dfrac{m x_2+n x_1}{m+n}\\)<br>② \\(\\overline{AP}=x-x_1\\)<br>③ \\(\\overline{PB}=x_2-x\\)<br>④ \\((x-x_1):(x_2-x)=m:n\\)<br>⑤ 중점<br>⑥ \\(\\dfrac{x_1+x_2}{2}\\)" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.18 · Thema5 · 참고2</span><br>Q6. 선분 \\(AB\\)의 내분점과 선분 \\(BA\\)의 내분점에 대해 다음 질문에 답하시오.<br>① 선분 \\(AB\\)를 \\(m:n\\)으로 내분하는 것과 선분 \\(BA\\)를 \\(m:n\\)으로 내분하는 것은 같은가, 다른가?<br>② 그 이유를 설명하시오.<br>③ 선분 \\(AB\\)를 \\(m:n\\)으로 내분하는 것과 같은 의미가 되는 선분 \\(BA\\)의 내분 비율을 말하시오.<br>④ 선분 \\(AB\\)의 내분점 \\(C\\)는 어떤 순서로 해석하는가?<br>⑤ 선분 \\(BA\\)의 내분점 \\(P\\)는 어떤 순서로 해석하는가?", answer: "O", hint: "다르다 / 선분 \\(AB\\)를 \\(m:n\\) = 선분 \\(BA\\)를 \\(n:m\\)", explanation: "① 다르다.<br>② 시작점(기준)이 달라 비의 방향이 반대가 되므로 서로 다른 점이 된다.<br>③ 선분 \\(BA\\)를 \\(n:m\\)으로 내분<br>④ \\(A \\to B\\) 순서(A에서 출발)<br>⑤ \\(B \\to A\\) 순서(B에서 출발)" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.19 · Thema5 · 예시문제</span><br>Q7. 두 점 \\(A(-2)\\), \\(B(4)\\)에 대하여 다음 내분점의 좌표를 구하시오.<br>① 선분 \\(AB\\)를 \\(3:5\\)로 내분하는 점의 좌표<br>② 선분 \\(AB\\)를 \\(5:3\\)으로 내분하는 점의 좌표", answer: "O", hint: "\\(\\dfrac{m x_2+n x_1}{m+n}\\)", explanation: "① \\(\\dfrac{3\\cdot4+5\\cdot(-2)}{3+5}=\\dfrac{2}{8}=\\dfrac{1}{4}\\)<br>② \\(\\dfrac{5\\cdot4+3\\cdot(-2)}{5+3}=\\dfrac{14}{8}=\\dfrac{7}{4}\\)" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.20 · Thema5 · 참고3</span><br>Q8. 다음 식이 무엇을 의미하는지 말하시오.<br>① \\(\\dfrac{2x_2+x_1}{3}\\)<br>② \\(\\dfrac{3x_2+2x_1}{5}\\)", answer: "O", hint: "\\(\\dfrac{m x_2+n x_1}{m+n}\\)와 비교하면 \\(m:n\\) 내분점", explanation: "① 두 점 \\(x_1,\\ x_2\\)를 잇는 선분을 \\(2:1\\)로 내분하는 점<br>② 두 점 \\(x_1,\\ x_2\\)를 잇는 선분을 \\(3:2\\)로 내분하는 점" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.20 · Thema5 · 참고3</span><br>Q9. 식을 보고 내분점인지 판단하는 방법에 대해 다음 빈칸을 채우시오.<br>① 분자의 계수들의 합을 분모로 나누었을 때 __________로 나누어 떨어지면 내분점 또는 외분점이라고 캐치할 수 있다.<br>② 분자의 연산기호가 __________이면 내분점임을 알 수 있다.<br>③ \\(\\dfrac{3x_2+2x_1}{5}\\)에서 분자의 계수들의 합은 __________이다.<br>④ \\(\\dfrac{3x_2+2x_1}{5}\\)는 \\(x_1,\\ x_2\\)를 __________:__________로 내분하는 점이라고 해석할 수 있다.", answer: "O", hint: "1 / +(덧셈) / 5 / 3:2", explanation: "① \\(1\\) (계수의 합이 분모와 같아 딱 나누어 떨어짐)<br>② \\(+\\) (덧셈)<br>③ \\(3+2=5\\)<br>④ \\(3:2\\)" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.20 · Thema5 · 예시문제9</span><br><span data-figure='pending' style='display:inline-block;margin:0.4rem 0;padding:0.35rem 0.7rem;border:1px dashed #f59e0b;border-radius:0.5rem;color:#f59e0b;font-size:0.78rem;font-weight:700'>📷 교재 그림 자리 — 나중에 여기에 그림 삽입 (data-figure)</span><br>Q10. 그림과 같이 두 점 \\(P(\\sqrt{2})\\), \\(Q(\\sqrt{3})\\)을 수직선 위에 나타내었다.<br>세 점 \\(A\\left(\\dfrac{\\sqrt{2}+\\sqrt{3}}{2}\\right)\\), \\(B\\left(\\dfrac{\\sqrt{3}+3\\sqrt{2}}{1+3}\\right)\\), \\(C\\left(\\dfrac{3\\sqrt{3}-\\sqrt{2}}{3-1}\\right)\\)를 수직선 위에 나타낼 때, 세 점의 위치를 왼쪽부터 순서대로 나열하시오.", answer: "O", hint: "각 점의 근삿값으로 비교 (\\(\\sqrt2\\approx1.41,\\ \\sqrt3\\approx1.73\\))", explanation: "\\(A=\\dfrac{\\sqrt2+\\sqrt3}{2}\\approx1.57\\) (중점), \\(B=\\dfrac{\\sqrt3+3\\sqrt2}{4}\\approx1.49\\) (\\(\\sqrt2\\)에 가까운 \\(1:3\\) 내분점), \\(C=\\dfrac{3\\sqrt3-\\sqrt2}{2}\\approx1.89\\) (외분점)<br>따라서 왼쪽부터 \\(B,\\ A,\\ C\\) 순이다." },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.21 · Thema6 · 개념</span><br>Q11. 좌표평면에서의 내분점에 대해 다음 질문에 답하시오.<br>① 좌표평면 위의 두 점 \\(A(x_1,\\ y_1)\\), \\(B(x_2,\\ y_2)\\)에 대하여 선분 \\(AB\\)를 \\(m:n\\)으로 내분하는 점 \\(P\\)의 좌표 공식을 쓰시오.<br>② 선분 \\(AB\\)의 중점 \\(M\\)의 좌표 공식을 쓰시오.<br>③ 좌표평면에서 내분점을 구할 때 \\(x\\)좌표와 \\(y\\)좌표는 어떻게 관찰해야 하는가?<br>④ 좌표평면에서의 내분점은 결국 어떤 경우와 동일한 방법으로 생각할 수 있는가?", answer: "O", hint: "\\(P\\left(\\dfrac{m x_2+n x_1}{m+n},\\ \\dfrac{m y_2+n y_1}{m+n}\\right)\\)", explanation: "① \\(P\\left(\\dfrac{m x_2+n x_1}{m+n},\\ \\dfrac{m y_2+n y_1}{m+n}\\right)\\)<br>② \\(M\\left(\\dfrac{x_1+x_2}{2},\\ \\dfrac{y_1+y_2}{2}\\right)\\)<br>③ \\(x\\)좌표는 \\(x\\)좌표끼리, \\(y\\)좌표는 \\(y\\)좌표끼리 분리해서 관찰한다.<br>④ 수직선(직선) 위의 내분점과 동일한 방법" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.21 · Thema6 · 개념</span><br>Q12. 좌표평면에서 내분점을 위치표시로 이해하는 방법에 대해 다음 빈칸을 채우시오.<br>① 일직선 위의 세 점이 있으면 \\(x\\)축과 \\(y\\)축에 __________을 내려서 닮음비를 찾는다.<br>② 그러면 수직선과 완벽하게 똑같은 방법으로 __________ 및 __________ 사용이 가능하다.<br>③ 좌표평면에서 \\(x\\)좌표는 __________끼리, \\(y\\)좌표는 __________끼리 분리해서 관찰한다.<br>④ 그렇게 해야 공식으로만 접근하는 것이 아니라 좌표평면 또한 수직선과 같은 방법으로 직접 __________를 할 수 있다.", answer: "O", hint: "수선의 발 / 위치표시·공식 / x좌표·y좌표 / 위치표시", explanation: "① 수선의 발<br>② 위치표시(눈금) / 공식<br>③ \\(x\\)좌표 / \\(y\\)좌표<br>④ 위치표시(작도)" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.21 · Thema6 · 발상&알고리즘10</span><br><span data-figure='pending' style='display:inline-block;margin:0.4rem 0;padding:0.35rem 0.7rem;border:1px dashed #f59e0b;border-radius:0.5rem;color:#f59e0b;font-size:0.78rem;font-weight:700'>📷 교재 그림 자리 — 나중에 여기에 그림 삽입 (data-figure)</span><br>Q13. 일직선 위의 세 점이 나오면 어떻게 할까? 다음 빈칸을 채우시오.<br>① 일직선 위의 세 점에서 수선의 발을 내려 __________을 그린다.<br>② 이때 만들어지는 직각삼각형 \\(PAQ\\), 직각삼각형 \\(BPR\\)은 서로 __________이다.<br>③ 따라서 __________가 성립한다.<br>④ 일직선 위의 세 점이 보이면 일단 __________를 먼저 찾을 생각을 한다.", answer: "O", hint: "직각삼각형 / 닮음 / 닮음비(비례식) / 닮은 삼각형", explanation: "① 직각삼각형<br>② 닮음(닮은 삼각형)<br>③ 닮음비(비례식)<br>④ 닮은 삼각형" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.22 · Thema6 · 예시문제</span><br>Q14. 두 점 \\(A(3,\\ -1)\\), \\(B(6,\\ 8)\\)에 대하여 다음 내분점 \\(P\\)의 좌표를 구하시오.<br>① 선분 \\(AB\\)를 \\(3:1\\)로 내분하는 점 \\(P\\)의 좌표<br>② 선분 \\(AB\\)를 \\(1:3\\)으로 내분하는 점 \\(P\\)의 좌표", answer: "O", hint: "\\(x,\\ y\\) 각각 \\(\\dfrac{m x_2+n x_1}{m+n}\\)", explanation: "① \\(x=\\dfrac{3\\cdot6+1\\cdot3}{4}=\\dfrac{21}{4}\\), \\(y=\\dfrac{3\\cdot8+1\\cdot(-1)}{4}=\\dfrac{23}{4}\\) → \\(P\\left(\\dfrac{21}{4},\\ \\dfrac{23}{4}\\right)\\)<br>② \\(x=\\dfrac{1\\cdot6+3\\cdot3}{4}=\\dfrac{15}{4}\\), \\(y=\\dfrac{1\\cdot8+3\\cdot(-1)}{4}=\\dfrac{5}{4}\\) → \\(P\\left(\\dfrac{15}{4},\\ \\dfrac{5}{4}\\right)\\)" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.23 · Thema6 · 발상&알고리즘12</span><br>Q15. “\\(m\\overline{AB}=n\\overline{BC}\\)”라는 것은 어떤 의미일까? 다음 빈칸을 채우시오.<br>① 점 \\(A,\\ B,\\ C\\)가 일직선 상에 있고 \\(A,\\ B,\\ C\\) 순서대로 있을 때, \\(m\\overline{AB}=n\\overline{BC}\\)이면 점 __________는 선분 \\(AC\\)를 __________:__________으로 내분하는 점이다.<br>② 이 발상은 점 \\(A,\\ B,\\ C\\)가 __________ 상에 있고, __________ 순서대로 있을 때 가능하다.", answer: "O", hint: "\\(\\overline{AB}:\\overline{BC}=n:m\\) → 점 B가 \\(AC\\)를 \\(n:m\\) 내분", explanation: "① \\(m\\overline{AB}=n\\overline{BC}\\)이면 \\(\\overline{AB}:\\overline{BC}=n:m\\)이므로, 점 \\(B\\)는 선분 \\(AC\\)를 \\(n:m\\)으로 내분하는 점이다.<br>② 일직선(한 직선) / \\(A,\\ B,\\ C\\)" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.23 · Thema6 · 예시문제10</span><br>Q16. 두 점 \\(A(3,\\ 2)\\), \\(B(6,\\ -1)\\)을 이은 선분 \\(AB\\)의 연장선 위에 \\(\\overline{AB}=3\\overline{BC}\\)인 점 \\(C\\)의 좌표를 구하시오.", answer: "O", hint: "\\(A,B,C\\) 순서, \\(\\overline{AB}:\\overline{BC}=3:1\\) → B가 \\(AC\\)를 \\(3:1\\) 내분", explanation: "\\(\\overline{AB}=3\\overline{BC}\\)에서 \\(\\overline{AB}:\\overline{BC}=3:1\\)이므로 점 \\(B\\)는 선분 \\(AC\\)를 \\(3:1\\)로 내분한다.<br>\\(B=\\dfrac{3C+A}{4}\\)이므로 \\(C=\\dfrac{4B-A}{3}\\).<br>\\(C_x=\\dfrac{4\\cdot6-3}{3}=7\\), \\(C_y=\\dfrac{4\\cdot(-1)-2}{3}=-2\\)<br>따라서 \\(C(7,\\ -2)\\)" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.23 · Thema6 · 예시문제11</span><br>Q17. 두 점 \\(A(-2,\\ -1)\\), \\(B(4,\\ 5)\\)에 대하여 선분 \\(AB\\)를 \\(2:1\\)로 내분하는 점이 \\(y=kx-5\\) 위에 있을 때, \\(k\\)의 값을 구하시오.", answer: "O", hint: "내분점 좌표를 직선식에 대입", explanation: "\\(2:1\\) 내분점: \\(x=\\dfrac{2\\cdot4+1\\cdot(-2)}{3}=2\\), \\(y=\\dfrac{2\\cdot5+1\\cdot(-1)}{3}=3\\) → \\((2,\\ 3)\\)<br>\\(y=kx-5\\)에 대입: \\(3=2k-5\\), \\(2k=8\\), 따라서 \\(k=4\\)" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.24 · Thema6 · 예시문제12</span><br>Q18. 두 점 \\(A(2,\\ 5)\\), \\(B(7,\\ -1)\\)을 이은 선분 \\(AB\\)를 \\(t:(1-t)\\)로 내분하는 점이 제1사분면 위에 있을 때, 상수 \\(t\\)의 값의 범위를 구하시오.", answer: "O", hint: "내분점이려면 \\(0<t<1\\), 제1사분면은 \\(x>0,\\ y>0\\)", explanation: "\\(t:(1-t)\\) 내분점: \\(x=t\\cdot7+(1-t)\\cdot2=5t+2\\), \\(y=t\\cdot(-1)+(1-t)\\cdot5=5-6t\\) (분모 \\(t+(1-t)=1\\))<br>내분점이 되려면 \\(0<t<1\\).<br>제1사분면 조건: \\(x=5t+2>0\\) (항상 성립), \\(y=5-6t>0 \\Rightarrow t<\\dfrac{5}{6}\\)<br>따라서 \\(0<t<\\dfrac{5}{6}\\)" },
    ] },
    { id: 3,  name: '3강',  questions: [
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.25 · Thema7 · 개념</span><br>Q1. 다음 질문에 답하시오.<br>① 평행사변형의 두 쌍의 대변의 길이는 각각 어떤 관계인가?<br>② 평행사변형의 두 대각선은 서로 다른 것을 어떻게 하는가?<br>③ 평행사변형에서 두 대각선의 중점은 어떤 관계인가?<br>④ 마름모의 네 변의 길이는 어떤 관계인가?<br>⑤ 마름모의 두 대각선은 서로 다른 것을 어떻게 하는가?<br>⑥ 마름모에서 두 대각선의 중점은 어떤 관계인가?", answer: "O", hint: "평행사변형: 대변 같음·대각선 서로 이등분 / 마름모: 네 변 같음·대각선 수직이등분", explanation: "① 각각 서로 같다.<br>② 서로 다른 것을 이등분한다.<br>③ 두 대각선의 중점은 일치한다(같다).<br>④ 네 변의 길이가 모두 같다.<br>⑤ 서로 다른 것을 수직이등분한다.<br>⑥ 두 대각선의 중점은 일치한다." },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.26 · Thema7 · 예시문제13</span><br><span data-figure='pending' style='display:inline-block;margin:0.4rem 0;padding:0.35rem 0.7rem;border:1px dashed #f59e0b;border-radius:0.5rem;color:#f59e0b;font-size:0.78rem;font-weight:700'>📷 교재 그림 자리 — 나중에 여기에 그림 삽입 (data-figure)</span><br>Q2. 오른쪽 그림과 같이 네 점 \\(O(0,\\ 0)\\), \\(A(-3,\\ 4)\\), \\(B(9,\\ 6)\\), \\(C(a,\\ b)\\)에 대하여 \\(\\overline{OA}\\), \\(\\overline{AB}\\)를 이웃하는 두 변으로 하는 평행사변형을 그렸다.<br>선분 \\(BC\\)를 \\(2:1\\)로 내분하는 점의 좌표를 구하시오.", answer: "O", hint: "평행사변형 \\(OABC\\)의 대각선 \\(OB,\\ AC\\)는 서로 이등분 → \\(C=O+B-A\\)", explanation: "평행사변형 \\(OABC\\)에서 두 대각선 \\(OB,\\ AC\\)의 중점이 일치하므로 \\(C=O+B-A=(0+9-(-3),\\ 0+6-4)=(12,\\ 2)\\).<br>선분 \\(BC\\) (\\(B(9,\\ 6),\\ C(12,\\ 2)\\))의 \\(2:1\\) 내분점: \\(x=\\dfrac{2\\cdot12+1\\cdot9}{3}=11\\), \\(y=\\dfrac{2\\cdot2+1\\cdot6}{3}=\\dfrac{10}{3}\\)<br>따라서 \\(\\left(11,\\ \\dfrac{10}{3}\\right)\\)" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.26 · Thema7 · 예시문제14</span><br>Q3. 네 점 \\(A(a,\\ 1)\\), \\(B(2,\\ 4)\\), \\(C(5,\\ 1)\\), \\(D(b,\\ -2)\\)를 꼭짓점으로 하는 사각형 \\(ABCD\\)가 마름모일 때, \\(a+b\\)의 값을 구하시오.", answer: "O", hint: "대각선 \\(AC,\\ BD\\)의 중점 일치 + 네 변 같음", explanation: "평행사변형이므로 대각선 \\(AC,\\ BD\\)의 중점이 일치: \\(\\dfrac{a+5}{2}=\\dfrac{2+b}{2}\\) → \\(b=a+3\\).<br>마름모이므로 \\(\\overline{AB}=\\overline{BC}\\): \\((2-a)^2+9=18\\) → \\((2-a)^2=9\\) → \\(a=-1\\) (\\(a=5\\)이면 \\(A=C\\)라 부적합).<br>따라서 \\(a=-1,\\ b=2\\)이고 \\(a+b=1\\)" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.27 · Thema7 · 개념</span><br>Q4. 삼각형 넓이의 비에 대해 다음 질문에 답하시오.<br>① 평행한 두 직선 사이의 거리는 어떤가?<br>② 밑변이 공통이고, 밑변과 평행한 직선 위에 꼭짓점을 가지는 삼각형들의 넓이는 어떤가?<br>③ 높이가 같은 삼각형의 넓이의 비는 무엇의 비와 같은가?", answer: "O", hint: "높이가 같으면 넓이의 비 = 밑변의 비", explanation: "① 항상 일정하다.<br>② 넓이가 모두 같다.<br>③ 밑변의 길이의 비와 같다." },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.28 · Thema7 · 예시문제15</span><br>Q5. 직선 \\(y=\\dfrac{1}{3}x\\) 위의 두 점 \\(A(3,\\ 1)\\), \\(B(a,\\ b)\\)가 있다. 제2사분면 위의 한 점 \\(C\\)에 대하여 삼각형 \\(BOC\\)와 삼각형 \\(OAC\\)의 넓이의 비가 \\(2:1\\)일 때, \\(a+b\\)의 값을 구하시오. (단, \\(a<0\\)이고, \\(O\\)는 원점이다.)", answer: "O", hint: "\\(O,\\ A,\\ B\\)가 한 직선 위 → 넓이의 비 = \\(\\overline{OB}:\\overline{OA}\\)", explanation: "\\(O,\\ A,\\ B\\)는 모두 직선 \\(y=\\dfrac{1}{3}x\\) 위에 있으므로 점 \\(C\\)로부터의 높이가 같아 \\([BOC]:[OAC]=\\overline{OB}:\\overline{OA}=2:1\\), 즉 \\(\\overline{OB}=2\\,\\overline{OA}\\).<br>\\(\\overline{OA}=\\sqrt{10}\\), \\(\\overline{OB}=\\sqrt{a^2+(a/3)^2}=\\dfrac{|a|\\sqrt{10}}{3}\\)이므로 \\(\\dfrac{|a|\\sqrt{10}}{3}=2\\sqrt{10}\\) → \\(|a|=6\\).<br>\\(a<0\\)이므로 \\(a=-6,\\ b=\\dfrac{a}{3}=-2\\), 따라서 \\(a+b=-8\\)" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.29 · Thema7 · 개념</span><br><span data-figure='pending' style='display:inline-block;margin:0.4rem 0;padding:0.35rem 0.7rem;border:1px dashed #f59e0b;border-radius:0.5rem;color:#f59e0b;font-size:0.78rem;font-weight:700'>📷 교재 그림 자리 — 나중에 여기에 그림 삽입 (data-figure)</span><br>Q6. 각의 이등분선 정리에 대해 다음 빈칸을 채우시오.<br>① 내각 \\(\\angle A\\)의 이등분선이 직선 \\(BC\\)와 만나는 점을 \\(P\\)라 하면, 점 \\(P\\)는 선분 \\(BC\\)의 __________점이다.<br>② 내각의 이등분선의 정리에서 \\(a:b=\\)__________:__________ 이다.<br>③ \\(\\angle A\\)의 외각의 이등분선이 직선 \\(BC\\)와 만나는 점을 \\(P\\)라 하면, 점 \\(P\\)는 선분 \\(BC\\)의 __________점이다.<br>④ 외각의 이등분선의 정리에서 \\(a:b=\\)__________:__________ 이다.", answer: "O", hint: "\\(a=\\overline{AB},\\ b=\\overline{AC}\\)일 때 \\(a:b=\\overline{BP}:\\overline{PC}\\)", explanation: "(\\(a=\\overline{AB},\\ b=\\overline{AC}\\)로 둘 때)<br>① 내분점<br>② \\(\\overline{BP}:\\overline{PC}\\) (내분)<br>③ 외분점<br>④ \\(\\overline{BP}:\\overline{PC}\\) (외분)" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.30 · Thema7 · 예시문제16</span><br>Q7. 세 점 \\(A(3,\\ 5)\\), \\(B(-3,\\ -3)\\), \\(C(7,\\ 2)\\)를 꼭짓점으로 하는 삼각형 \\(ABC\\)가 있다. \\(\\angle A\\)의 이등분선이 변 \\(BC\\)와 만나는 점을 \\(D\\)라 할 때, 삼각형 \\(ABD\\)와 삼각형 \\(ACD\\)의 넓이의 비를 구하시오.", answer: "O", hint: "\\([ABD]:[ACD]=\\overline{BD}:\\overline{DC}=\\overline{AB}:\\overline{AC}\\)", explanation: "\\(\\overline{AB}=\\sqrt{(-6)^2+(-8)^2}=10\\), \\(\\overline{AC}=\\sqrt{4^2+(-3)^2}=5\\).<br>각의 이등분선 정리에서 \\(\\overline{BD}:\\overline{DC}=\\overline{AB}:\\overline{AC}=2:1\\)이고, 두 삼각형은 높이가 같으므로 \\([ABD]:[ACD]=2:1\\)" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.30 · Thema7 · 예시문제17</span><br>Q8. 세 점 \\(A(2,\\ -6)\\), \\(B(-3,\\ 6)\\), \\(C(6,\\ -3)\\)을 꼭짓점으로 하는 삼각형 \\(ABC\\)가 있다. \\(\\angle A\\)의 이등분선이 변 \\(BC\\)와 만나는 점을 \\(D\\)라 할 때, 점 \\(D\\)의 좌표를 구하시오.", answer: "O", hint: "\\(\\overline{BD}:\\overline{DC}=\\overline{AB}:\\overline{AC}\\)로 내분", explanation: "\\(\\overline{AB}=\\sqrt{(-5)^2+12^2}=13\\), \\(\\overline{AC}=\\sqrt{4^2+3^2}=5\\).<br>\\(D\\)는 \\(\\overline{BC}\\)를 \\(\\overline{BD}:\\overline{DC}=13:5\\)로 내분: \\(x=\\dfrac{13\\cdot6+5\\cdot(-3)}{18}=\\dfrac{63}{18}=\\dfrac{7}{2}\\), \\(y=\\dfrac{13\\cdot(-3)+5\\cdot6}{18}=\\dfrac{-9}{18}=-\\dfrac{1}{2}\\)<br>따라서 \\(D\\left(\\dfrac{7}{2},\\ -\\dfrac{1}{2}\\right)\\)" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.31 · Thema8 · 개념</span><br>Q9. 삼각형의 무게중심의 정의와 성질에 대해 다음 질문에 답하시오.<br>① 삼각형의 무게중심은 무엇인가?<br>② 삼각형에서 중선이란 무엇인가?<br>③ 무게중심은 세 중선을 각 꼭짓점으로부터 각각 몇 대 몇으로 내분하는가?<br>④ 세 중선에 의하여 분할된 6개의 삼각형의 넓이는 어떤 관계인가?", answer: "O", hint: "무게중심 = 세 중선의 교점, 중선을 \\(2:1\\) 내분", explanation: "① 삼각형의 세 중선이 만나는 점이다.<br>② 한 꼭짓점과 그 대변의 중점을 잇는 선분이다.<br>③ 각 중선을 꼭짓점으로부터 \\(2:1\\)로 내분한다.<br>④ 6개의 삼각형의 넓이는 모두 같다." },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.31 · Thema8 · 개념</span><br><span data-figure='pending' style='display:inline-block;margin:0.4rem 0;padding:0.35rem 0.7rem;border:1px dashed #f59e0b;border-radius:0.5rem;color:#f59e0b;font-size:0.78rem;font-weight:700'>📷 교재 그림 자리 — 나중에 여기에 그림 삽입 (data-figure)</span><br>Q10. 삼각형의 무게중심 그림을 보고 다음 빈칸을 채우시오.<br>① 무게중심은 중선을 꼭짓점으로부터 __________:__________로 내분한다.<br>② 세 중선에 의하여 분할된 6개의 삼각형의 넓이는 각각 전체 넓이의 __________이다.", answer: "O", hint: "2:1 / 전체의 \\(\\dfrac{1}{6}\\)", explanation: "① \\(2:1\\)<br>② 각각 전체 넓이의 \\(\\dfrac{1}{6}\\)" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.32 · Thema8 · 개념</span><br>Q11. 삼각형의 무게중심의 좌표에 대해 다음 질문에 답하시오.<br>① 삼각형의 무게중심의 좌표는 세 꼭짓점의 좌표를 이용하여 어떻게 구하는가?<br>② 세 점 \\(A(x_1,\\ y_1)\\), \\(B(x_2,\\ y_2)\\), \\(C(x_3,\\ y_3)\\)의 무게중심 \\(G\\)의 좌표 공식을 쓰시오.<br>③ 무게중심은 좌표들의 무엇으로 인식하는가?", answer: "O", hint: "\\(G=\\left(\\dfrac{x_1+x_2+x_3}{3},\\ \\dfrac{y_1+y_2+y_3}{3}\\right)\\)", explanation: "① 세 꼭짓점의 \\(x\\)좌표끼리, \\(y\\)좌표끼리 더해 각각 \\(3\\)으로 나눈다(평균).<br>② \\(G\\left(\\dfrac{x_1+x_2+x_3}{3},\\ \\dfrac{y_1+y_2+y_3}{3}\\right)\\)<br>③ 세 좌표의 평균(평균점)으로 인식한다." },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.32 · Thema8 · 무게중심 좌표 유도</span><br>Q12. 삼각형의 무게중심 좌표 유도 과정을 빈칸에 맞게 말하시오.<br>① \\(BC\\)의 중점을 \\(M(x',\\ y')\\)이라 하면 \\(x'=\\)__________, \\(y'=\\)__________이다.<br>② 무게중심 \\(G\\)는 \\(AM\\)을 __________:__________로 내분한다.<br>③ 따라서 무게중심 \\(G\\)의 \\(x\\)좌표는 __________이고, \\(y\\)좌표는 __________이다.", answer: "O", hint: "\\(M\\)은 \\(BC\\) 중점, \\(G\\)는 \\(AM\\)을 \\(2:1\\) 내분", explanation: "① \\(x'=\\dfrac{x_2+x_3}{2},\\ y'=\\dfrac{y_2+y_3}{2}\\)<br>② \\(2:1\\)<br>③ \\(x=\\dfrac{2x'+x_1}{3}=\\dfrac{x_1+x_2+x_3}{3}\\), \\(y=\\dfrac{y_1+y_2+y_3}{3}\\)" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.32 · Thema8 · 예시문제1</span><br>Q13. 삼각형 \\(ABC\\)에서 \\(A(5,\\ -2)\\), \\(B(-1,\\ 3)\\)이고 무게중심의 좌표가 \\(G(5,\\ 2)\\)일 때, 꼭짓점 \\(C\\)의 좌표를 구하시오.", answer: "O", hint: "\\(G=\\dfrac{A+B+C}{3}\\)", explanation: "\\(\\dfrac{5+(-1)+C_x}{3}=5\\) → \\(C_x=11\\), \\(\\dfrac{-2+3+C_y}{3}=2\\) → \\(C_y=5\\)<br>따라서 \\(C(11,\\ 5)\\)" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.33 · Thema8 · 활용1</span><br>Q14. 삼각형의 무게중심의 활용1에 대해 다음 빈칸을 채우시오.<br>원래 삼각형의 무게중심과, 삼각형의 세 변을 동일한 비율로 내분점 또는 외분점을 각각 설정하여 만든 삼각형의 무게중심은 __________한다.<br>즉, 전체 삼각형의 무게중심과 일정한 비율로 만들어진 내부의 삼각형의 무게중심은 __________하게 된다.", answer: "O", hint: "무게중심은 변하지 않는다 (일치)", explanation: "① 일치<br>② 일치<br>세 변을 같은 비율로 나눈 점들로 만든 삼각형의 무게중심은 원래 삼각형의 무게중심과 항상 일치한다." },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.33 · Thema8 · 예시문제2</span><br>Q15. 삼각형 \\(ABC\\)의 세 변의 중점의 좌표가 각각 \\(A'(1,\\ 2)\\), \\(B'(5,\\ 3)\\), \\(C'(3,\\ 7)\\)일 때, 삼각형 \\(ABC\\)의 무게중심의 좌표를 구하시오.", answer: "O", hint: "세 변 중점 삼각형의 무게중심 = 원래 삼각형의 무게중심", explanation: "세 변의 중점으로 만든 삼각형의 무게중심은 원래 삼각형의 무게중심과 같다.<br>\\(G=\\left(\\dfrac{1+5+3}{3},\\ \\dfrac{2+3+7}{3}\\right)=(3,\\ 4)\\)" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.33 · Thema8 · 활용2</span><br>Q16. 삼각형 \\(ABC\\)와 이 삼각형 내부의 임의의 점 \\(P\\)에 대하여 다음 빈칸을 채우시오.<br>\\(\\overline{AP}^2+\\overline{BP}^2+\\overline{CP}^2\\)의 값이 최소가 되도록 하는 점 \\(P\\)는 삼각형 \\(ABC\\)의 __________과 일치한다.", answer: "O", hint: "무게중심", explanation: "무게중심<br>(\\(\\overline{AP}^2+\\overline{BP}^2+\\overline{CP}^2\\)은 \\(P\\)가 무게중심일 때 최소가 된다.)" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.33 · Thema8 · 예시문제3</span><br>Q17. 좌표평면 위의 세 점 \\(O(0,\\ 0)\\), \\(A(7,\\ 1)\\), \\(B(5,\\ 5)\\)에 대하여 \\(\\overline{OP}^2+\\overline{AP}^2+\\overline{BP}^2\\)을 최소로 하는 점 \\(P\\)의 좌표를 구하시오.", answer: "O", hint: "최소가 되는 점 = 무게중심", explanation: "최소가 되는 점은 무게중심이므로 \\(P=\\left(\\dfrac{0+7+5}{3},\\ \\dfrac{0+1+5}{3}\\right)=(4,\\ 2)\\)" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.34 · Thema8 · 예시문제18</span><br>Q18. 좌표평면 위에서 세 점 \\(O(0,\\ 0)\\), \\(A(5,\\ 2)\\), \\(B(2,\\ 5)\\)를 꼭짓점으로 하는 삼각형 \\(OAB\\)에 대하여 선분 \\(AB\\)를 \\(1:2\\)로 외분하는 점을 \\(C\\), 선분 \\(AB\\)를 \\(2:1\\)로 외분하는 점을 \\(D\\)라 하자. 두 삼각형 \\(OCB\\), \\(OAD\\)의 무게중심을 각각 \\(G_1\\), \\(G_2\\)라 할 때, 선분 \\(G_1 G_2\\)의 길이를 구하시오.", answer: "O", hint: "외분점 \\(=\\dfrac{mB-nA}{m-n}\\)", explanation: "\\(C\\) (\\(1:2\\) 외분) \\(=\\dfrac{1\\cdot B-2\\cdot A}{1-2}=2A-B=(8,\\ -1)\\), \\(D\\) (\\(2:1\\) 외분) \\(=\\dfrac{2\\cdot B-1\\cdot A}{2-1}=2B-A=(-1,\\ 8)\\).<br>\\(G_1=\\left(\\dfrac{0+8+2}{3},\\ \\dfrac{0-1+5}{3}\\right)=\\left(\\dfrac{10}{3},\\ \\dfrac{4}{3}\\right)\\), \\(G_2=\\left(\\dfrac{0+5-1}{3},\\ \\dfrac{0+2+8}{3}\\right)=\\left(\\dfrac{4}{3},\\ \\dfrac{10}{3}\\right)\\).<br>\\(\\overline{G_1 G_2}=\\sqrt{2^2+(-2)^2}=2\\sqrt{2}\\)" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.34 · Thema8 · 예시문제19</span><br>Q19. 삼각형 \\(ABC\\)의 세 변 \\(AB,\\ BC,\\ CA\\)에 대하여 변 \\(AB\\)를 \\(1:2\\)로 내분하는 점의 좌표를 \\((10,\\ 8)\\), 변 \\(BC\\)를 \\(1:3\\)으로 내분하는 점의 좌표를 \\((5,\\ -3)\\), 변 \\(CA\\)를 \\(2:3\\)으로 내분하는 점의 좌표를 \\((2,\\ 12)\\)라 하자. 삼각형 \\(ABC\\)의 무게중심 \\(G\\)의 좌표를 \\((a,\\ b)\\)라 할 때, \\(a+b\\)의 값을 구하시오.", answer: "O", hint: "각 내분점 식을 연립하여 \\(A+B+C\\)를 구한다", explanation: "\\(2A+B=(30,\\ 24)\\), \\(3B+C=(20,\\ -12)\\), \\(2A+3C=(10,\\ 60)\\)을 연립하면 \\(A\\left(11,\\ \\dfrac{78}{5}\\right),\\ B\\left(8,\\ -\\dfrac{36}{5}\\right),\\ C\\left(-4,\\ \\dfrac{48}{5}\\right)\\).<br>\\(A+B+C=(15,\\ 18)\\)이므로 \\(G=(5,\\ 6)\\), 따라서 \\(a+b=11\\)" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.35 · Thema8 · 예시문제20</span><br><span data-figure='pending' style='display:inline-block;margin:0.4rem 0;padding:0.35rem 0.7rem;border:1px dashed #f59e0b;border-radius:0.5rem;color:#f59e0b;font-size:0.78rem;font-weight:700'>📷 교재 그림 자리 — 나중에 여기에 그림 삽입 (data-figure)</span><br>Q20. 오른쪽 그림과 같이 삼각형 \\(ABC\\)에서 \\(\\overline{AB}=9\\), \\(\\overline{BC}=10\\), \\(\\overline{AC}=7\\)이다. \\(BC\\)의 중점이 \\(M\\)이고, 점 \\(G\\)가 삼각형 \\(ABC\\)의 무게중심일 때, 선분 \\(GM\\)의 길이를 구하시오.", answer: "O", hint: "\\(G\\)는 중선 \\(AM\\)을 \\(2:1\\) 내분 → \\(\\overline{GM}=\\dfrac{1}{3}\\overline{AM}\\)", explanation: "중선 \\(AM\\)의 길이: \\(\\overline{AM}^2=\\dfrac{2\\overline{AB}^2+2\\overline{AC}^2-\\overline{BC}^2}{4}=\\dfrac{2\\cdot81+2\\cdot49-100}{4}=40\\), \\(\\overline{AM}=2\\sqrt{10}\\).<br>\\(G\\)는 \\(AM\\)을 \\(2:1\\)로 내분하므로 \\(\\overline{GM}=\\dfrac{1}{3}\\overline{AM}=\\dfrac{2\\sqrt{10}}{3}\\)" },
    ] },
    { id: 4,  name: '4강',  questions: [
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.57 · Thema1 · 핵심태도</span><br>Q1. 다음 질문에 답하시오.<br>① 직선의 방정식에서 가장 중요한 태도는 무엇인가?<br>② 직선의 방정식을 세울 때 찾아야 할 요소 2가지는 무엇인가?<br>③ 직선의 방정식은 위의 2가지만 찾으면 어떻게 할 수 있는가?", answer: "O", hint: "기울기 + 지나는 한 점", explanation: "① 기울기와 지나는 한 점을 찾겠다는 태도.<br>② 기울기, 지나는 한 점.<br>③ 이 2가지만 찾으면 직선의 방정식을 세울(구할) 수 있다." },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.57 · Thema1 · 개념</span><br>Q2. 기울기와 지나는 한 점이 주어진 직선의 방정식에 대해 다음 질문에 답하시오.<br>① 점 \\((x_1,\\ y_1)\\)을 지나고 기울기가 \\(m\\)인 직선의 방정식을 쓰시오.<br>② 직선 위의 임의의 점을 \\(P(x,\\ y)\\)라고 할 때, 기울기 \\(m\\)을 \\(x,\\ y,\\ x_1,\\ y_1\\)으로 나타내시오.<br>③ 위 식의 양변에 \\(x-x_1\\)을 곱하면 어떤 식이 되는가?", answer: "O", hint: "\\(y-y_1=m(x-x_1)\\)", explanation: "① \\(y-y_1=m(x-x_1)\\)<br>② \\(m=\\dfrac{y-y_1}{x-x_1}\\)<br>③ \\(y-y_1=m(x-x_1)\\)" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.58 · Thema1 · 발상&알고리즘1</span><br>Q3. 직선의 방정식은 어떻게 구할까? 다음 빈칸을 채우시오.<br>① 1단계 : __________를 찾는다.<br>② 2단계 : 지나는 __________을 찾는다.<br>③ 3단계 : 직선의 __________을 세운다.", answer: "O", hint: "기울기 / 점 / 방정식", explanation: "① 기울기<br>② (한) 점<br>③ 방정식" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.58 · Thema1 · 예시문제1</span><br>Q4. 점 \\((2,\\ -1)\\)을 지나고 기울기가 \\(-4\\)인 직선의 방정식을 구하시오.", answer: "O", hint: "\\(y-y_1=m(x-x_1)\\)", explanation: "\\(y-(-1)=-4(x-2)\\) → \\(y+1=-4x+8\\) → \\(y=-4x+7\\)" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.58~59 · Thema1 · 개념</span><br>Q5. 서로 다른 두 점이 주어진 경우의 직선의 방정식에 대해 다음 질문에 답하시오.<br>① 서로 다른 두 점 \\(A(x_1,\\ y_1)\\), \\(B(x_2,\\ y_2)\\)를 지나는 직선에서 \\(x_1\\ne x_2\\)일 때, 기울기 \\(m\\)을 구하는 공식을 쓰시오.<br>② \\(x_1\\ne x_2\\)일 때, 두 점 \\(A,\\ B\\)를 지나는 직선의 방정식을 쓰시오.<br>③ \\(x_1=x_2\\)일 때, 직선은 어떤 축에 평행한가?<br>④ \\(x_1=x_2\\)일 때, 두 점 \\(A,\\ B\\)를 지나는 직선의 방정식은 무엇인가?<br>⑤ \\(x_1\\ne x_2\\)일 때, 직선을 점 \\(B\\) 기준으로 나타낸 식을 쓰시오.", answer: "O", hint: "\\(m=\\dfrac{y_2-y_1}{x_2-x_1}\\)", explanation: "① \\(m=\\dfrac{y_2-y_1}{x_2-x_1}\\)<br>② \\(y-y_1=\\dfrac{y_2-y_1}{x_2-x_1}(x-x_1)\\)<br>③ \\(y\\)축에 평행<br>④ \\(x=x_1\\)<br>⑤ \\(y-y_2=\\dfrac{y_2-y_1}{x_2-x_1}(x-x_2)\\)" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.59 · Thema1 · 예시문제2</span><br>Q6. 두 점 \\(A(-1,\\ 4)\\), \\(B(1,\\ -2)\\)를 지나는 직선의 방정식을 구하시오.", answer: "O", hint: "기울기 \\(=\\dfrac{y_2-y_1}{x_2-x_1}\\)", explanation: "기울기 \\(m=\\dfrac{-2-4}{1-(-1)}=\\dfrac{-6}{2}=-3\\).<br>\\(y-4=-3(x+1)\\) → \\(y=-3x+1\\)" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.59 · Thema1 · 예시문제3</span><br>Q7. 두 점 \\(A(-2,\\ 3)\\), \\(B(-2,\\ 9)\\)를 지나는 직선의 방정식을 구하시오.", answer: "O", hint: "두 점의 \\(x\\)좌표가 같음 → \\(y\\)축에 평행", explanation: "두 점의 \\(x\\)좌표가 \\(-2\\)로 같으므로 \\(y\\)축에 평행한 직선. 따라서 \\(x=-2\\)" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.60 · Thema1 · 개념</span><br>Q8. 절편이 주어진 직선의 방정식에 대해 다음 질문에 답하시오.<br>① \\(x\\)절편이 \\(a\\)이고, \\(y\\)절편이 \\(b\\)인 직선의 방정식을 쓰시오. (단, \\(a\\ne0,\\ b\\ne0\\))<br>② \\(x\\)절편이 \\(2\\), \\(y\\)절편이 \\(4\\)인 직선의 방정식을 쓰시오.", answer: "O", hint: "\\(\\dfrac{x}{a}+\\dfrac{y}{b}=1\\)", explanation: "① \\(\\dfrac{x}{a}+\\dfrac{y}{b}=1\\)<br>② \\(\\dfrac{x}{2}+\\dfrac{y}{4}=1\\) (즉 \\(y=-2x+4\\))" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.60 · Thema1 · 개념</span><br>Q9. 좌표축과 평행한 직선의 방정식에 대해 다음 빈칸을 채우시오.<br>① \\(x=a\\)는 \\(x\\)축에 __________인 직선이고, \\(y\\)축에 __________한 직선이다.<br>② \\(x=a\\)는 \\(y\\)축에 평행하고 __________절편이 \\(a\\)인 직선의 방정식이다.<br>③ \\(y=b\\)는 \\(y\\)축에 __________인 직선이고, \\(x\\)축에 __________한 직선이다.<br>④ \\(y=b\\)는 \\(x\\)축에 평행하고 __________절편이 \\(b\\)인 직선의 방정식이다.", answer: "O", hint: "수직 / 평행 / 절편", explanation: "① 수직 / 평행<br>② \\(x\\)절편<br>③ 수직 / 평행<br>④ \\(y\\)절편" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.60 · Thema1 · 예시문제</span><br>Q10. 다음을 구하시오.<br>① 점 \\((5,\\ -6)\\)을 지나고 \\(x\\)축에 평행한 직선의 방정식<br>② 점 \\((2,\\ 4)\\)를 지나고 \\(y\\)축에 평행한 직선의 방정식", answer: "O", hint: "\\(x\\)축 평행 → \\(y=k\\), \\(y\\)축 평행 → \\(x=k\\)", explanation: "① \\(y=-6\\)<br>② \\(x=2\\)" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.61 · Thema1 · 예시문제1</span><br>Q11. 기울기가 \\(2\\)이고 두 점 \\((a,\\ -3)\\), \\((3,\\ a)\\)를 지나는 직선의 방정식을 구하시오.", answer: "O", hint: "두 점의 기울기 \\(=2\\)로 놓고 \\(a\\) 먼저", explanation: "\\(\\dfrac{a-(-3)}{3-a}=2\\) → \\(a+3=2(3-a)\\) → \\(3a=3\\) → \\(a=1\\).<br>점 \\((3,\\ 1)\\), 기울기 \\(2\\): \\(y-1=2(x-3)\\) → \\(y=2x-5\\)" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.61 · Thema1 · 발상&알고리즘2</span><br>Q12. “\\(x\\)축의 양의 방향과 이루는 각의 크기”라는 말이 나오면 어떻게 해야 할까? 다음 빈칸을 채우시오.<br>① 직선과 \\(x\\)축의 양의 방향과 이루는 각이 \\(\\theta\\)라는 말이 보이면 __________를 찾을 생각을 해야 한다.<br>② 직선의 기울기 \\(m\\)과 \\(\\tan\\theta\\)의 관계를 쓰시오.<br>③ \\(\\tan60^\\circ\\)의 값을 쓰시오.<br>④ \\(\\tan45^\\circ\\)의 값을 쓰시오.<br>⑤ \\(\\tan30^\\circ\\)의 값을 쓰시오.", answer: "O", hint: "기울기 \\(m=\\tan\\theta\\)", explanation: "① 기울기<br>② \\(m=\\tan\\theta\\)<br>③ \\(\\tan60^\\circ=\\sqrt{3}\\)<br>④ \\(\\tan45^\\circ=1\\)<br>⑤ \\(\\tan30^\\circ=\\dfrac{1}{\\sqrt{3}}=\\dfrac{\\sqrt{3}}{3}\\)" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.61 · Thema1 · 예시문제2</span><br>Q13. 점 \\((-2,\\ -\\sqrt{3})\\)을 지나고 \\(x\\)축의 양의 방향과 이루는 각의 크기가 \\(60^\\circ\\)인 직선과 \\(x\\)축, \\(y\\)축으로 둘러싸인 삼각형의 넓이를 구하시오.", answer: "O", hint: "기울기 \\(=\\tan60^\\circ=\\sqrt3\\), 넓이 \\(=\\tfrac12|x\\text{절편}||y\\text{절편}|\\)", explanation: "기울기 \\(=\\tan60^\\circ=\\sqrt{3}\\). \\(y-(-\\sqrt3)=\\sqrt3(x+2)\\) → \\(y=\\sqrt3\\,x+\\sqrt3\\).<br>\\(x\\)절편: \\(y=0\\) → \\(x=-1\\). \\(y\\)절편: \\(x=0\\) → \\(y=\\sqrt3\\).<br>넓이 \\(=\\dfrac12\\cdot|-1|\\cdot\\sqrt3=\\dfrac{\\sqrt3}{2}\\)" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.62 · Thema1 · 발상&알고리즘3</span><br>Q14. “일직선 위의 세 점”이 있다는 말은 어떻게 생각해야 할까? 다음 질문에 답하시오.<br>① 일직선상의 세 개의 점이 있다고 하면 무엇과 무엇을 떠올려야 하는가?<br>② 일직선 위의 세 점에서는 어떤 두 개의 점을 잡아도 무엇이 항상 일정한가?<br>③ 서로 다른 세 점이 일직선 위에 있다는 말은 어떤 말과도 동일한가?", answer: "O", hint: "어느 두 점으로 구한 기울기가 모두 같다", explanation: "① 기울기(가 모두 같음)와 직선의 방정식.<br>② 어떤 두 점을 잡아도 기울기가 항상 일정(같다).<br>③ 한 점이 나머지 두 점을 지나는 직선 위에 있다는 말과 동일하다." },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.62 · Thema1 · 예시문제3</span><br>Q15. 점 \\(A(a,\\ a+2)\\)가 두 점 \\(B(4,\\ 8)\\), \\(C(-2,\\ 4)\\)를 지나는 직선 위에 있을 때, 실수 \\(a\\)의 값을 구하시오.", answer: "O", hint: "직선 \\(BC\\)의 방정식에 \\(A\\) 대입", explanation: "직선 \\(BC\\)의 기울기 \\(=\\dfrac{4-8}{-2-4}=\\dfrac{-4}{-6}=\\dfrac{2}{3}\\), \\(y-8=\\dfrac23(x-4)\\).<br>\\(A(a,\\ a+2)\\) 대입: \\(a+2-8=\\dfrac23(a-4)\\) → \\(3(a-6)=2(a-4)\\) → \\(3a-18=2a-8\\) → \\(a=10\\)" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.63 · Thema1 · 예시문제4</span><br>Q16. 점 \\((2,\\ 3)\\)을 지나는 직선 \\(l\\)의 \\(x\\)절편이 \\(y\\)절편의 \\(2\\)배라고 할 때, 직선 \\(l\\)의 방정식을 구하시오. (단, \\(y\\)절편은 \\(0\\)이 아니다.)", answer: "O", hint: "\\(y\\)절편 \\(=b\\), \\(x\\)절편 \\(=2b\\) → \\(\\dfrac{x}{2b}+\\dfrac{y}{b}=1\\)", explanation: "\\(y\\)절편을 \\(b\\), \\(x\\)절편을 \\(2b\\)라 하면 \\(\\dfrac{x}{2b}+\\dfrac{y}{b}=1\\).<br>\\((2,\\ 3)\\) 대입: \\(\\dfrac{2}{2b}+\\dfrac{3}{b}=1\\) → \\(\\dfrac{1}{b}+\\dfrac{3}{b}=1\\) → \\(\\dfrac{4}{b}=1\\) → \\(b=4\\).<br>따라서 \\(x\\)절편 \\(8\\), \\(y\\)절편 \\(4\\): \\(\\dfrac{x}{8}+\\dfrac{y}{4}=1\\) → \\(x+2y-8=0\\)" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.63 · Thema1 · 발상&알고리즘4</span><br>Q17. “삼각형의 넓이를 이등분”하는 상황에서는 어떤 생각을 해야 할까? 다음 빈칸을 채우시오.<br>삼각형의 꼭짓점을 지나고 넓이를 이등분하는 직선의 방정식은 주어진 꼭짓점의 대변의 __________을 지난다고 생각한다.", answer: "O", hint: "대변의 중점", explanation: "중점<br>(한 꼭짓점을 지나면서 넓이를 이등분하는 직선은 그 꼭짓점의 대변의 중점을 지난다. 밑변이 반으로 나뉘어 넓이도 반이 되기 때문.)" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.63 · Thema1 · 예시문제5</span><br>Q18. 좌표평면에서 원점 \\(O\\)를 지나고 꼭짓점이 \\(A(2,\\ -4)\\)인 이차함수 \\(y=f(x)\\)의 그래프가 \\(x\\)축과 만나는 점 중에서 원점이 아닌 점을 \\(B\\)라 하자. 직선 \\(y=mx\\)가 삼각형 \\(OAB\\)의 넓이를 이등분하는 실수 \\(m\\)의 값을 구하시오.<br>① \\(-\\dfrac16\\)  ② \\(-\\dfrac13\\)  ③ \\(-\\dfrac12\\)  ④ \\(-\\dfrac23\\)  ⑤ \\(-\\dfrac56\\)", answer: "O", hint: "\\(y=mx\\)는 꼭짓점 \\(O\\)를 지남 → 대변 \\(AB\\)의 중점 통과", explanation: "\\(y=a(x-2)^2-4\\)가 원점 통과: \\(0=4a-4\\) → \\(a=1\\), \\(y=x^2-4x\\). \\(x\\)축 교점 \\(x=0,\\ 4\\) → \\(B(4,\\ 0)\\).<br>\\(y=mx\\)는 꼭짓점 \\(O\\)를 지나므로 대변 \\(AB\\)의 중점 \\(\\left(3,\\ -2\\right)\\)를 지나야 이등분. \\(-2=3m\\) → \\(m=-\\dfrac23\\). (정답 ④)" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.64 · Thema1 · 발상&알고리즘5</span><br><span data-figure='pending' style='display:inline-block;margin:0.4rem 0;padding:0.35rem 0.7rem;border:1px dashed #f59e0b;border-radius:0.5rem;color:#f59e0b;font-size:0.78rem;font-weight:700'>📷 교재 그림 자리 — 나중에 여기에 그림 삽입 (data-figure)</span><br>Q19. 평행사변형, 직사각형, 마름모의 넓이를 이등분하는 상황에서는 어떤 생각을 해야 할까? 다음 빈칸을 채우시오.<br>① 정사각형, 직사각형, 마름모, 평행사변형은 두 __________의 교점을 지나는 직선에 의해 이등분된다.<br>② 즉, 직선의 방정식이 두 대각선의 __________을 지나야 한다.", answer: "O", hint: "대각선 / 교점", explanation: "① 대각선<br>② 교점 (두 대각선의 교점은 도형의 중심이며, 이 점을 지나는 직선은 넓이를 이등분한다.)" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.64 · Thema1 · 예시문제6</span><br>Q20. 좌표평면 위의 네 직선 \\(x=1,\\ x=3,\\ y=-1,\\ y=4\\)로 둘러싸인 도형의 넓이를 일차함수 \\(y=ax\\)의 그래프가 이등분할 때, 상수 \\(a\\)의 값을 구하시오.<br>① \\(\\dfrac14\\)  ② \\(\\dfrac12\\)  ③ \\(\\dfrac34\\)  ④ \\(1\\)  ⑤ \\(\\dfrac54\\)", answer: "O", hint: "직사각형의 중심을 지나야 이등분", explanation: "네 직선은 직사각형을 이룬다. 중심 \\(=\\left(\\dfrac{1+3}{2},\\ \\dfrac{-1+4}{2}\\right)=\\left(2,\\ \\dfrac32\\right)\\).<br>\\(y=ax\\)가 이 중심을 지나야 하므로 \\(\\dfrac32=2a\\) → \\(a=\\dfrac34\\). (정답 ③)" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.65 · Thema2 · 개념</span><br>Q21. 직선의 방정식의 표준형과 일반형에 대해 다음 질문에 답하시오.<br>① 직선의 방정식의 표준형은 어떤 꼴인가?<br>② 직선의 방정식의 일반형은 어떤 꼴인가?<br>③ 일반형 \\(ax+by+c=0\\)에서 \\(a,\\ b\\)는 어떤 조건을 만족해야 하는가?<br>④ \\(y=x+3\\)은 표준형인가, 일반형인가?<br>⑤ \\(x-y+3=0\\)은 표준형인가, 일반형인가?", answer: "O", hint: "표준형 \\(y=mx+n\\) / 일반형 \\(ax+by+c=0\\)", explanation: "① \\(y=mx+n\\) 꼴<br>② \\(ax+by+c=0\\) 꼴<br>③ \\(a,\\ b\\)가 동시에 \\(0\\)이 아니다 (\\(a^2+b^2\\ne0\\))<br>④ 표준형<br>⑤ 일반형" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.65 · Thema2 · 개념</span><br>Q22. 일반형 \\(ax+by+c=0\\)이 나타내는 직선에 대해 다음 빈칸을 채우시오.<br>① \\(a\\ne0,\\ b\\ne0\\)일 때, \\(y=\\)__________이므로 기울기가 __________, \\(y\\)절편이 __________인 직선을 나타낸다.<br>② \\(a\\ne0,\\ b=0\\)일 때, \\(x=\\)__________이므로 __________축에 평행한 직선을 나타낸다.<br>③ \\(a=0,\\ b\\ne0\\)일 때, \\(y=\\)__________이므로 __________축에 평행한 직선을 나타낸다.", answer: "O", hint: "\\(y=-\\dfrac{a}{b}x-\\dfrac{c}{b}\\)", explanation: "① \\(y=-\\dfrac{a}{b}x-\\dfrac{c}{b}\\), 기울기 \\(-\\dfrac{a}{b}\\), \\(y\\)절편 \\(-\\dfrac{c}{b}\\)<br>② \\(x=-\\dfrac{c}{a}\\), \\(y\\)축에 평행<br>③ \\(y=-\\dfrac{c}{b}\\), \\(x\\)축에 평행" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.65 · Thema2 · 참고1</span><br>Q23. 직선의 방정식의 표준형과 일반형의 차이에 대해 다음 질문에 답하시오.<br>① 표준형은 어떤 꼴인가?<br>② 표준형은 무엇에 대해 정리한 꼴인가?<br>③ 표준형의 장점 2가지를 말하시오.<br>④ 일반형은 어떤 꼴인가?<br>⑤ 일반형은 모든 항을 어디로 이항한 꼴인가?<br>⑥ 일반형은 주로 어떤 상황에서 사용하는가?<br>⑦ 일반형은 \\(b=0\\)일 때 어떤 꼴의 직선의 방정식도 나타낼 수 있는가?", answer: "O", hint: "표준형 \\(y=mx+n\\)(\\(y\\)에 대해 정리) / 일반형은 \\(y\\)축 평행 직선도 표현", explanation: "① \\(y=mx+n\\) 꼴<br>② \\(y\\)에 대해 정리한 꼴<br>③ 기울기와 \\(y\\)절편을 바로 알 수 있다 / 그래프를 그리기 쉽다<br>④ \\(ax+by+c=0\\) 꼴<br>⑤ 모든 항을 좌변(한쪽)으로 이항<br>⑥ 문자(미지수)를 포함하거나 여러 직선을 함께 다룰 때(예: 교점 문제)<br>⑦ \\(y\\)축에 평행한 직선 \\(x=k\\) 꼴" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.66 · Thema2 · 발상&알고리즘6</span><br>Q24. 직선의 방정식의 일반형이 주어진 상황에서 기울기와 \\(y\\)절편은 어떻게 구할까? 다음 빈칸을 채우시오.<br>① 일반형에서는 직선의 기울기와 \\(y\\)절편을 바로 파악하기 __________.<br>② 표준형에서는 기울기와 \\(y\\)절편을 파악하기 쉬우므로, 주어진 일반형의 방정식을 __________으로 바꾼다.<br>③ 1단계 : \\(ax+by+c=0\\)으로 주어진 식을 \\(y\\)에 대하여 정리하여 __________꼴로 바꾼다.<br>④ 2단계 : 기울기는 __________, \\(y\\)절편은 __________이다.", answer: "O", hint: "표준형 \\(y=mx+n\\)으로 정리", explanation: "① 어렵다(힘들다)<br>② 표준형<br>③ \\(y=mx+n\\)<br>④ 기울기 \\(-\\dfrac{a}{b}\\), \\(y\\)절편 \\(-\\dfrac{c}{b}\\)" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.66 · Thema2 · 예시문제1</span><br>Q25. 직선 \\(2x-3y+6=0\\)의 기울기와 \\(y\\)절편을 구하시오.", answer: "O", hint: "\\(y\\)에 대해 정리 → \\(y=mx+n\\)", explanation: "\\(2x-3y+6=0\\) → \\(3y=2x+6\\) → \\(y=\\dfrac23 x+2\\).<br>기울기 \\(\\dfrac23\\), \\(y\\)절편 \\(2\\)" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.67 · Thema2 · 발상&알고리즘7</span><br>Q26. “\\(ax+by+c=0\\)에서 \\(a,\\ b,\\ c\\)의 부호”를 찾아야 하는 상황은 어떻게 할까? 다음 빈칸을 채우시오.<br>① 일반형 \\(ax+by+c=0\\)을 표준형 __________꼴로 바꾼다.<br>② 일반형보다는 __________이 계수들의 부호를 상대적으로 알아내기 더 쉽다.", answer: "O", hint: "표준형 \\(y=mx+n\\)으로", explanation: "① \\(y=mx+n\\)<br>② 표준형 (기울기·\\(y\\)절편의 부호를 통해 \\(a,\\ b,\\ c\\)의 부호를 판단)" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.67 · Thema2 · 예시문제7</span><br><span data-figure='pending' style='display:inline-block;margin:0.4rem 0;padding:0.35rem 0.7rem;border:1px dashed #f59e0b;border-radius:0.5rem;color:#f59e0b;font-size:0.78rem;font-weight:700'>📷 교재 그림 자리 — 나중에 여기에 그림 삽입 (data-figure)</span><br>Q27. 다음 중 조건 \\(ab>0\\), \\(bc<0\\)을 만족하는 직선 \\(ax+by+c=0\\)의 그래프의 개형을 고르시오.", answer: "O", hint: "표준형으로: 기울기 \\(-\\dfrac{a}{b}\\), \\(y\\)절편 \\(-\\dfrac{c}{b}\\)", explanation: "\\(y=-\\dfrac{a}{b}x-\\dfrac{c}{b}\\).<br>\\(ab>0\\) → \\(\\dfrac{a}{b}>0\\) → 기울기 \\(-\\dfrac{a}{b}<0\\) (음의 기울기).<br>\\(bc<0\\) → \\(\\dfrac{c}{b}<0\\) → \\(y\\)절편 \\(-\\dfrac{c}{b}>0\\) (양의 \\(y\\)절편).<br>따라서 기울기가 음수이고 \\(y\\)절편이 양수인 그래프를 고른다." },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.68 · Thema3 · 개념</span><br>Q28. 정점을 지나는 직선에 대해 다음 질문에 답하시오.<br>① 두 직선 \\(ax+by+c=0\\), \\(a'x+b'y+c'=0\\)이 어떤 고정된 한 점에서 만날 때, 그 점을 보통 무엇이라고 부르는가?<br>② 방정식 \\((ax+by+c)+k(a'x+b'y+c')=0\\)은 실수 \\(k\\)의 값에 관계없이 항상 어떤 점을 지나는가?<br>③ “\\(k\\)의 값에 관계없이”라는 말이 나오면 무엇을 떠올려야 하는가?", answer: "O", hint: "항상 지나는 고정점 = 정점", explanation: "① 정점(고정점)<br>② 두 직선의 교점(정점)<br>③ \\(k\\)에 관계없이 항상 지나는 정점을 떠올린다." },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.68 · Thema3 · 예시문제1</span><br>Q29. 직선 \\(x+ky-k-3=0\\)이 \\(k\\)의 값에 관계없이 항상 일정한 점을 지날 때, 지나는 점의 좌표를 구하시오.", answer: "O", hint: "\\(k\\)에 대해 정리 → \\(k\\)의 계수와 상수항 각각 \\(0\\)", explanation: "\\(x-3+k(y-1)=0\\).<br>\\(k\\)에 관계없이 성립하려면 \\(x-3=0,\\ y-1=0\\) → \\(x=3,\\ y=1\\).<br>따라서 \\((3,\\ 1)\\)" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.68 · Thema3 · 개념</span><br>Q30. 두 직선의 교점을 반드시 지나는 직선의 방정식에 대해 다음 질문에 답하시오.<br>① 두 직선 \\(ax+by+c=0\\), \\(a'x+b'y+c'=0\\)의 교점을 지나는 직선은 어떤 꼴로 나타낼 수 있는가?<br>② 이때 \\(k\\)는 무엇인가?<br>③ 실제 어떤 직선의 방정식인지는 \\(k\\)의 값에 따라 어떻게 되는가?<br>④ \\(3x+2y-8=0\\), \\(x+3y-5=0\\)의 교점을 지나는 직선의 방정식을 \\(k\\)를 사용하여 나타내시오.<br>⑤ 위 식에서 \\(k=1\\)일 때의 직선의 방정식을 구하시오.<br>⑥ 위 식에서 \\(k=2\\)일 때의 직선의 방정식을 구하시오.", answer: "O", hint: "\\((ax+by+c)+k(a'x+b'y+c')=0\\)", explanation: "① \\((ax+by+c)+k(a'x+b'y+c')=0\\)<br>② 임의의 실수(매개변수)<br>③ \\(k\\)값에 따라 서로 다른 직선이 된다.<br>④ \\((3x+2y-8)+k(x+3y-5)=0\\)<br>⑤ \\(k=1\\): \\(4x+5y-13=0\\)<br>⑥ \\(k=2\\): \\(5x+8y-18=0\\)" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.69 · Thema3 · 참고2</span><br>Q31. 다음 식의 두 가지 의미를 말하시오.<br>\\[(ax+by+c)+k(a'x+b'y+c')=0\\]", answer: "O", hint: "① 교점을 지나는 직선(들) ② k에 관계없이 정점 통과", explanation: "① 두 직선 \\(ax+by+c=0\\), \\(a'x+b'y+c'=0\\)의 교점을 지나는 직선을 나타낸다. (단, 직선 \\(a'x+b'y+c'=0\\) 자신은 제외)<br>② \\(k\\)의 값에 관계없이 항상 두 직선의 교점(정점)을 지난다." },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.69 · Thema3 · 발상&알고리즘8</span><br>Q32. 두 직선의 교점을 반드시 지나는 직선은 어떻게 세울까? 다음 빈칸을 채우시오.<br>두 직선 \\(ax+by+c=0\\), \\(a'x+b'y+c'=0\\)의 교점을 지나는 직선을 표현하고 싶다면<br>__________ \\(=0\\)<br>으로 나타낼 수 있다. 단, \\(k\\)는 __________이다.", answer: "O", hint: "\\((ax+by+c)+k(a'x+b'y+c')\\)", explanation: "\\((ax+by+c)+k(a'x+b'y+c')=0\\)<br>단, \\(k\\)는 임의의 실수. (이 식은 \\(a'x+b'y+c'=0\\) 자신은 나타내지 못한다.)" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.69 · Thema3 · 예시문제2</span><br>Q33. 두 직선 \\(2x+y-2=0\\), \\(x-y-4=0\\)의 교점을 지나고 \\((1,\\ 1)\\)을 지나는 직선의 방정식을 \\(ax+by-4=0\\)이라 할 때, \\(a-b\\)의 값을 구하시오.", answer: "O", hint: "교점 지나는 직선 \\((2x+y-2)+k(x-y-4)=0\\)에 \\((1,1)\\) 대입", explanation: "\\((2x+y-2)+k(x-y-4)=0\\)에 \\((1,\\ 1)\\) 대입: \\(1+k(-4)=0\\) → \\(k=\\dfrac14\\).<br>대입·정리: \\(9x+3y-12=0\\) → \\(3x+y-4=0\\).<br>\\(ax+by-4=0\\)과 비교하면 \\(a=3,\\ b=1\\), 따라서 \\(a-b=2\\)" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.70 · Thema3 · 예시문제3</span><br>Q34. 좌표평면에서 두 직선 \\(x-3y+2=0\\), \\(3x+y-4=0\\)이 만나는 점과 점 \\((2,\\ 0)\\)을 지나는 직선의 \\(y\\)절편을 구하시오.", answer: "O", hint: "먼저 교점을 구한 뒤 두 점으로 직선", explanation: "교점: \\(x-3y+2=0,\\ 3x+y-4=0\\)을 풀면 \\((1,\\ 1)\\).<br>두 점 \\((1,\\ 1)\\), \\((2,\\ 0)\\)의 기울기 \\(=\\dfrac{0-1}{2-1}=-1\\), \\(y=-(x-2)=-x+2\\).<br>\\(y\\)절편 \\(=2\\)" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.71 · Thema3 · 예시문제8</span><br>Q35. 임의의 실수 \\(k\\)에 대하여 직선 \\((3+k)x-(2-4k)y-9k+1=0\\)이 항상 지나는 점과 원점 사이의 거리를 구하시오.", answer: "O", hint: "\\(k\\)에 대해 정리 → 두 식 \\(=0\\)", explanation: "\\(k\\)에 대해 정리: \\((3x-2y+1)+k(x+4y-9)=0\\).<br>\\(k\\)에 관계없이 성립하려면 \\(3x-2y+1=0,\\ x+4y-9=0\\) → \\((1,\\ 2)\\).<br>원점과의 거리 \\(=\\sqrt{1^2+2^2}=\\sqrt5\\)" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.71 · Thema3 · 예시문제9</span><br>Q36. 두 직선 \\(2x-y+4=0\\), \\(mx-y-2m+3=0\\)이 제2사분면에서 만나도록 하는 상수 \\(m\\)의 값의 범위가 \\(\\alpha<m<\\beta\\)일 때, \\(\\dfrac{1}{\\alpha+\\beta}\\)의 값을 구하시오.", answer: "O", hint: "둘째 직선은 정점 \\((2,\\ 3)\\)을 지남 → 첫째 직선의 제2사분면 부분을 지나는 경계 기울기", explanation: "둘째 직선 \\(y=m(x-2)+3\\)은 \\(m\\)에 관계없이 정점 \\((2,\\ 3)\\)을 지난다. 첫째 직선 \\(y=2x+4\\)는 제2사분면에서 \\((-2,\\ 0)\\)~\\((0,\\ 4)\\) 부분을 지난다.<br>교점이 \\((0,\\ 4)\\): 기울기 \\(=\\dfrac{4-3}{0-2}=-\\dfrac12\\), 교점이 \\((-2,\\ 0)\\): 기울기 \\(=\\dfrac{0-3}{-2-2}=\\dfrac34\\).<br>따라서 \\(-\\dfrac12<m<\\dfrac34\\), \\(\\alpha+\\beta=-\\dfrac12+\\dfrac34=\\dfrac14\\), \\(\\dfrac{1}{\\alpha+\\beta}=4\\)" },
    ] },
    { id: 5,  name: '5강',  questions: [
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.72 · Thema4 · 핵심태도</span><br>Q1. 두 직선의 위치 관계에서 중요한 태도에 대해 다음 질문에 답하시오.<br>① 두 직선의 위치 관계는 크게 몇 가지 범주로 볼 수 있는가?<br>② 기울기만 동일한 경우에는 어떤 경우들이 가능한가?<br>③ 기울기가 다른 경우에는 어떤 경우들이 가능한가?<br>④ 두 직선의 위치 관계를 따져야 하는 상황에서는 먼저 무엇으로 분류해야 하는가?", answer: "O", hint: "먼저 기울기가 같은지 다른지로 분류", explanation: "① 크게 2가지 (기울기가 같은 경우 / 다른 경우).<br>② 평행 또는 일치 (\\(y\\)절편이 다르면 평행, 같으면 일치).<br>③ 한 점에서 만난다 (기울기의 곱이 \\(-1\\)이면 수직).<br>④ 먼저 기울기(가 같은지 다른지)로 분류한다." },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.72 · Thema4 · 개념</span><br>Q2. 두 직선의 평행조건에 대해 다음 질문에 답하시오.<br>① 두 직선 \\(y=mx+n\\), \\(y=m'x+n'\\)이 서로 평행하면 기울기와 \\(y\\)절편은 각각 어떤 관계인가?<br>② 반대로 \\(m=m'\\), \\(n\\ne n'\\)이면 두 직선은 어떤 관계인가?<br>③ 두 직선 \\(ax+by+c=0\\), \\(a'x+b'y+c'=0\\)이 서로 평행할 조건을 비례식으로 쓰시오.", answer: "O", hint: "기울기 같고 \\(y\\)절편 다름 / \\(\\dfrac{a}{a'}=\\dfrac{b}{b'}\\ne\\dfrac{c}{c'}\\)", explanation: "① 기울기는 같고(\\(m=m'\\)), \\(y\\)절편은 다르다(\\(n\\ne n'\\)).<br>② 평행<br>③ \\(\\dfrac{a}{a'}=\\dfrac{b}{b'}\\ne\\dfrac{c}{c'}\\)" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.73 · Thema4 · 참고3</span><br>Q3. 두 직선의 그래프가 일치하는 경우에 대해 다음 질문에 답하시오.<br>① 두 직선 \\(y=mx+n\\), \\(y=m'x+n'\\)에서 \\(m=m'\\)이고 \\(n=n'\\)이면 두 직선은 어떤 관계인가?<br>② 두 직선 \\(ax+by+c=0\\), \\(a'x+b'y+c'=0\\)에서 그래프가 일치할 조건을 비례식으로 쓰시오.<br>③ 직선 \\(ax+by+c=0\\)을 표준형으로 정리하면 어떤 꼴로 나타나는가?<br>④ \\(ax+by+c=0\\)의 기울기와 \\(y\\)절편을 각각 \\(a,\\ b,\\ c\\)로 나타내시오.<br>⑤ 두 직선 \\(3x+2y+6=0\\)과 \\(6x+4y+12=0\\)은 어떤 관계인지 말하시오.", answer: "O", hint: "일치 조건 \\(\\dfrac{a}{a'}=\\dfrac{b}{b'}=\\dfrac{c}{c'}\\)", explanation: "① 일치(같은 직선)<br>② \\(\\dfrac{a}{a'}=\\dfrac{b}{b'}=\\dfrac{c}{c'}\\)<br>③ \\(y=-\\dfrac{a}{b}x-\\dfrac{c}{b}\\)<br>④ 기울기 \\(-\\dfrac{a}{b}\\), \\(y\\)절편 \\(-\\dfrac{c}{b}\\)<br>⑤ \\(6x+4y+12=2(3x+2y+6)\\)이므로 계수비가 \\(\\dfrac36=\\dfrac24=\\dfrac{6}{12}\\), 즉 일치한다." },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.73 · Thema4 · 참고4</span><br>Q4. 두 직선의 기울기와 교점에 대해 다음 질문에 답하시오.<br>① 두 직선의 기울기가 같고 \\(y\\)절편이 다르면 두 직선은 교점을 가지는가?<br>② 두 직선이 평행하지 않다면 두 직선은 무조건 무엇을 가지는가?<br>③ \\(y=2x+3\\)과 \\(y=2x+4\\)는 왜 만나지 않는가?<br>④ \\(y=x+3\\)과 \\(y=-2x+4\\)는 왜 무조건 교점을 가지는가?", answer: "O", hint: "기울기 다르면 반드시 한 점에서 만남", explanation: "① 가지지 않는다(평행이므로 만나지 않는다).<br>② 무조건 교점(한 점)을 가진다.<br>③ 기울기가 \\(2\\)로 같고 \\(y\\)절편이 달라 평행하기 때문.<br>④ 기울기가 \\(1\\)과 \\(-2\\)로 서로 달라 반드시 한 점에서 만나기 때문." },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.74 · Thema4 · 발상&알고리즘9</span><br>Q5. 두 직선이 “평행하다” 또는 “만나지 않는다”라고 나오면 어떻게 해석해야 하는가? 다음 빈칸을 채우시오.<br>① 두 직선이 평행하다 또는 만나지 않는다는 말은 \\(y\\)절편은 __________, 기울기는 __________라고 해석한다.<br>② 직선의 방정식이 일반형으로 주어질 때는 \\(\\dfrac{a}{a'}=\\dfrac{b}{b'}\\)만으로는 두 직선의 __________과 __________를 구분할 수 없다.<br>③ 따라서 일반형에서 두 직선의 평행과 일치를 구분할 때는 \\(\\dfrac{c}{c'}\\)도 반드시 __________해야 한다.", answer: "O", hint: "\\(y\\)절편 다르고 기울기 같음 / 평행·일치는 \\(c/c'\\)로 구분", explanation: "① \\(y\\)절편은 다르고, 기울기는 같다.<br>② 평행 / 일치<br>③ 확인(비교)" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.74 · Thema4 · 예시문제3</span><br>Q6. 점 \\((-1,\\ 2)\\)를 지나고 직선 \\(y=4x+7\\)에 평행한 직선의 방정식을 구하시오.", answer: "O", hint: "평행 → 기울기 \\(4\\) 그대로", explanation: "기울기가 \\(4\\)로 같으므로 \\(y-2=4(x+1)\\) → \\(y=4x+6\\)" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.75 · Thema4 · 예시문제4</span><br>Q7. \\(ax+3y-1=0\\), \\(x-(a+4)y+1=0\\)이 평행할 때, 상수 \\(a\\)의 값을 구하시오.", answer: "O", hint: "\\(\\dfrac{a}{1}=\\dfrac{3}{-(a+4)}\\ne\\dfrac{-1}{1}\\)", explanation: "평행조건 \\(\\dfrac{a}{1}=\\dfrac{3}{-(a+4)}\\): \\(a\\{-(a+4)\\}=3\\) → \\(a^2+4a+3=0\\) → \\((a+1)(a+3)=0\\) → \\(a=-1\\) 또는 \\(a=-3\\).<br>\\(a=-1\\)이면 세 비가 모두 같아 두 직선이 일치하므로 제외. 따라서 \\(a=-3\\)" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.76 · Thema5 · 개념</span><br>Q8. 두 직선의 수직 조건에 대해 다음 질문에 답하시오.<br>① 두 직선 \\(y=mx+n\\), \\(y=m'x+n'\\)이 서로 수직이면 두 기울기 \\(m,\\ m'\\) 사이에는 어떤 관계가 성립하는가?<br>② 반대로 \\(mm'=-1\\)이면 두 직선은 어떤 관계인가?<br>③ 두 직선 \\(ax+by+c=0\\), \\(a'x+b'y+c'=0\\)이 서로 수직이면 어떤 식이 성립하는가?<br>④ 반대로 \\(aa'+bb'=0\\)이면 두 직선은 어떤 관계인가?", answer: "O", hint: "\\(mm'=-1\\) / \\(aa'+bb'=0\\)", explanation: "① \\(mm'=-1\\)<br>② 수직<br>③ \\(aa'+bb'=0\\)<br>④ 수직" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.76 · Thema5 · 개념</span><br>Q9. 두 직선의 수직 조건 유도에 대해 다음 빈칸을 채우시오.<br>① 두 직선 \\(l:y=mx+n\\), \\(l':y=m'x+n'\\)이 서로 수직이면 각각 평행하고 원점을 지나는 두 직선 \\(l_1:y=mx\\), \\(l_1':y=m'x\\)도 서로 __________이다.<br>② 두 직선 \\(l_1,\\ l_1'\\)과 직선 \\(x=1\\)의 교점을 각각 \\(P,\\ Q\\)라고 하면 \\(P\\)의 좌표는 __________, \\(Q\\)의 좌표는 __________이다.<br>③ 삼각형 \\(POQ\\)는 __________삼각형이므로 피타고라스 정리에 의해 \\(\\overline{OP}^2+\\overline{OQ}^2=\\overline{PQ}^2\\)이다.<br>④ 이 식을 정리하면 __________이 성립한다.", answer: "O", hint: "\\(P(1,\\ m),\\ Q(1,\\ m')\\), 직각삼각형 → \\(mm'=-1\\)", explanation: "① 수직<br>② \\(P(1,\\ m),\\ Q(1,\\ m')\\)<br>③ 직각(\\(\\angle O=90^\\circ\\))<br>④ \\((1+m^2)+(1+m'^2)=(m-m')^2\\) → \\(2=-2mm'\\) → \\(mm'=-1\\)" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.77 · Thema5 · 발상&알고리즘10</span><br>Q10. 두 직선이 “수직”이라고 나오면 어떻게 생각해야 하는가? 다음 빈칸을 채우시오.<br>① 표준형 \\(y=mx+n\\), \\(y=m'x+n'\\)에서는 __________을 사용한다.<br>② 일반형 \\(a_1x+b_1y+c_1=0\\), \\(a_2x+b_2y+c_2=0\\)에서는 __________을 사용한다.", answer: "O", hint: "\\(mm'=-1\\) / \\(a_1a_2+b_1b_2=0\\)", explanation: "① \\(mm'=-1\\) (기울기의 곱이 \\(-1\\))<br>② \\(a_1a_2+b_1b_2=0\\)" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.77 · Thema5 · 예시문제1</span><br>Q11. \\(ax+3y-1=0\\), \\(x-(a+4)y+1=0\\)이 수직일 때, 상수 \\(a\\)의 값을 구하시오.", answer: "O", hint: "\\(a_1a_2+b_1b_2=0\\)", explanation: "수직조건: \\(a\\cdot1+3\\cdot\\{-(a+4)\\}=0\\) → \\(a-3a-12=0\\) → \\(-2a-12=0\\) → \\(a=-6\\)" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.77 · Thema5 · 예시문제2</span><br>Q12. \\(y=mx+3\\), \\(y=3x+2\\)가 서로 수직일 때, \\(m\\)의 값을 구하시오.", answer: "O", hint: "\\(mm'=-1\\)", explanation: "\\(m\\cdot3=-1\\) → \\(m=-\\dfrac13\\)" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.78 · Thema5 · 예시문제10</span><br>Q13. 직선 \\(2x+y+3=0\\)과 평행하고 점 \\((4,\\ -5)\\)를 지나는 직선이 점 \\((-1,\\ k)\\)를 지날 때, \\(k\\)의 값을 구하시오.", answer: "O", hint: "기울기 \\(-2\\)로 직선 세우고 \\(x=-1\\) 대입", explanation: "\\(2x+y+3=0\\)의 기울기는 \\(-2\\). 점 \\((4,\\ -5)\\)를 지나는 평행선: \\(y+5=-2(x-4)\\) → \\(y=-2x+3\\).<br>\\(x=-1\\) 대입: \\(k=-2(-1)+3=5\\)" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.78 · Thema5 · 예시문제11</span><br>Q14. 좌표평면 위의 두 점 \\(A(1,\\ 5)\\), \\(B(4,\\ 2)\\)에 대하여 선분 \\(AB\\)를 \\(1:2\\)로 내분하는 점을 지나고, 직선 \\(AB\\)에 수직인 직선의 방정식을 \\(ax-y+b=0\\)이라 할 때, \\(a+b\\)의 값을 구하시오.", answer: "O", hint: "내분점 \\((2,\\ 4)\\), \\(AB\\) 기울기 \\(-1\\) → 수직 기울기 \\(1\\)", explanation: "\\(1:2\\) 내분점: \\(\\left(\\dfrac{1\\cdot4+2\\cdot1}{3},\\ \\dfrac{1\\cdot2+2\\cdot5}{3}\\right)=(2,\\ 4)\\).<br>직선 \\(AB\\)의 기울기 \\(=\\dfrac{2-5}{4-1}=-1\\)이므로 수직인 직선의 기울기는 \\(1\\).<br>\\(y-4=1\\cdot(x-2)\\) → \\(x-y+2=0\\). \\(ax-y+b=0\\)과 비교하면 \\(a=1,\\ b=2\\), 따라서 \\(a+b=3\\)" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.79 · Thema5 · 발상&알고리즘11</span><br>Q15. 마름모가 등장하면 어떤 성질을 이용할 생각을 해야 하는가? 다음 빈칸을 채우시오.<br>① 마름모는 네 변의 길이가 서로 __________.<br>② 마름모의 두 대각선은 서로를 __________한다.<br>③ 즉, 마름모의 두 대각선의 __________은 일치한다.", answer: "O", hint: "네 변 같음 / 수직이등분 / 중점 일치", explanation: "① 같다<br>② 수직이등분<br>③ 중점" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.79 · Thema5 · 예시문제12</span><br><span data-figure='pending' style='display:inline-block;margin:0.4rem 0;padding:0.35rem 0.7rem;border:1px dashed #f59e0b;border-radius:0.5rem;color:#f59e0b;font-size:0.78rem;font-weight:700'>📷 교재 그림 자리 — 나중에 여기에 그림 삽입 (data-figure)</span><br>Q16. 그림과 같이 좌표평면 위에 마름모 \\(ABCD\\)가 있다. 두 점 \\(A,\\ C\\)의 좌표가 각각 \\((1,\\ 3)\\), \\((5,\\ 1)\\)이고, 두 점 \\(B,\\ D\\)를 지나는 직선 \\(l\\)의 방정식이 \\(2x+ay+b=0\\)일 때, \\(ab\\)의 값을 구하시오. (단, \\(a,\\ b\\)는 상수이다.)", answer: "O", hint: "\\(BD\\)는 \\(AC\\)의 수직이등분선 (\\(AC\\)의 중점 통과, \\(AC\\)에 수직)", explanation: "마름모의 두 대각선은 서로 수직이등분하므로 직선 \\(l\\)(=\\(BD\\))은 \\(AC\\)의 중점 \\((3,\\ 2)\\)를 지나고 \\(AC\\)에 수직.<br>\\(AC\\)의 기울기 \\(=\\dfrac{1-3}{5-1}=-\\dfrac12\\)이므로 \\(l\\)의 기울기는 \\(2\\).<br>\\(y-2=2(x-3)\\) → \\(2x-y-4=0\\). \\(2x+ay+b=0\\)과 비교하면 \\(a=-1,\\ b=-4\\), 따라서 \\(ab=4\\)" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.80 · Thema5 · 예시문제13</span><br><span data-figure='pending' style='display:inline-block;margin:0.4rem 0;padding:0.35rem 0.7rem;border:1px dashed #f59e0b;border-radius:0.5rem;color:#f59e0b;font-size:0.78rem;font-weight:700'>📷 교재 그림 자리 — 나중에 여기에 그림 삽입 (data-figure)</span><br>Q17. 자연수 \\(n\\)에 대하여 좌표평면에서 점 \\(A(0,\\ 2)\\)를 지나는 직선과 점 \\(B(n,\\ 2)\\)를 지나는 직선이 서로 수직으로 만나는 점이 \\(P(4,\\ 4)\\)라 할 때, 삼각형 \\(ABP\\)의 무게중심의 좌표를 \\((a,\\ b)\\)라 하자. \\(a+b\\)의 값을 구하시오.", answer: "O", hint: "\\(\\overline{AP}\\perp\\overline{BP}\\)로 \\(n\\)을 먼저 구함", explanation: "직선 \\(AP\\)의 기울기 \\(=\\dfrac{4-2}{4-0}=\\dfrac12\\), 직선 \\(BP\\)의 기울기 \\(=\\dfrac{4-2}{4-n}\\). 수직이므로 \\(\\dfrac12\\cdot\\dfrac{2}{4-n}=-1\\) → \\(4-n=-1\\) → \\(n=5\\).<br>무게중심 \\(=\\left(\\dfrac{0+5+4}{3},\\ \\dfrac{2+2+4}{3}\\right)=\\left(3,\\ \\dfrac83\\right)\\), 따라서 \\(a+b=3+\\dfrac83=\\dfrac{17}{3}\\)" },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.81 · Thema5 · 발상&알고리즘12</span><br>Q18. 두 직선이 만나지 않을 때 어떻게 생각해야 하는가? 다음 질문에 답하시오.<br>① 두 직선이 만나지 않는다는 것은 두 직선이 어떤 상태라는 뜻인가?<br>② 이때 어떤 경우와 헷갈리면 안 되는가?<br>③ 두 직선이 일치하는 경우는 교점의 개수가 몇 개인 것으로 보아야 하는가?", answer: "O", hint: "만나지 않음 = 평행 / 일치는 교점 무수히 많음", explanation: "① 평행한 상태(기울기 같고 \\(y\\)절편 다름).<br>② 두 직선이 일치하는 경우와 헷갈리면 안 된다.<br>③ 교점이 무수히 많다(무수히 많은 점에서 만난다)." },
      { question: "<span style='display:inline-block;background:#1f2937;border:1px solid #374151;border-radius:999px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#10b981;font-weight:700;margin-bottom:0.6rem'>p.81 · Thema5 · 예시문제14</span><br>Q19. \\(ax+y-b=0\\), \\(bx-2y-a=0\\)이 만나지 않을 때, 직선 \\(bx+ay=0\\)의 기울기를 구하시오. (단, \\(a,\\ b\\)는 \\(0\\)이 아닌 실수이다.)", answer: "O", hint: "만나지 않음(평행): \\(\\dfrac{a}{b}=\\dfrac{1}{-2}\\ne\\dfrac{-b}{-a}\\)", explanation: "평행조건 \\(\\dfrac{a}{b}=\\dfrac{1}{-2}\\)에서 \\(b=-2a\\).<br>(\\(\\dfrac{a}{b}=-\\dfrac12\\ne\\dfrac{b}{a}=-2\\)이므로 일치가 아니라 평행 — 조건 만족.)<br>직선 \\(bx+ay=0\\)의 기울기 \\(=-\\dfrac{b}{a}=-\\dfrac{-2a}{a}=2\\)" },
