<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MathStart — 수학 과목 선택</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #0a0a0f;
      font-family: 'Noto Sans KR', sans-serif;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    header {
      text-align: center;
      margin-bottom: 3rem;
    }

    header h1 {
      font-size: clamp(1.8rem, 5vw, 2.8rem);
      font-weight: 800;
      letter-spacing: -0.02em;
    }

    header h1 span {
      background: linear-gradient(135deg, #f97316, #fb923c);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    header p {
      margin-top: 0.6rem;
      font-size: 1rem;
      color: #9ca3af;
    }

    .courses {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 1.5rem;
      width: 100%;
      max-width: 900px;
    }

    .course-card {
      display: flex;
      flex-direction: column;
      background: #141420;
      border: 1px solid #1f1f2e;
      border-radius: 1.25rem;
      padding: 2rem 1.75rem;
      text-decoration: none;
      color: inherit;
      transition: transform 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease;
    }

    .course-card:hover {
      transform: translateY(-4px);
      border-color: var(--accent);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
    }

    .course-card .icon {
      font-size: 2.5rem;
      margin-bottom: 1.25rem;
    }

    .course-card .label {
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 0.4rem;
    }

    .course-card h2 {
      font-size: 1.3rem;
      font-weight: 700;
      margin-bottom: 0.6rem;
      line-height: 1.3;
    }

    .course-card p {
      font-size: 0.9rem;
      color: #9ca3af;
      line-height: 1.6;
      flex: 1;
    }

    .course-card .arrow {
      margin-top: 1.5rem;
      font-size: 1.2rem;
      color: var(--accent);
      transition: transform 0.18s ease;
    }

    .course-card:hover .arrow {
      transform: translateX(4px);
    }

    .card-algebra    { --accent: #f97316; }
    .card-calculus   { --accent: #3b82f6; }
    .card-prob       { --accent: #a855f7; }

    footer {
      margin-top: 3rem;
      font-size: 0.78rem;
      color: #4b5563;
    }
  </style>
</head>
<body>
  <header>
    <h1><span>MathStart</span> 수학 학습</h1>
    <p>과목을 선택하고 OX 퀴즈를 시작하세요</p>
  </header>

  <div class="courses">
    <a href="algebra/" class="course-card card-algebra">
      <div class="icon">📐</div>
      <div class="label">공통수학 2</div>
      <h2>대수 (Algebra)</h2>
      <p>다항식, 방정식과 부등식, 경우의 수 등 대수 단원 OX 퀴즈</p>
      <div class="arrow">→</div>
    </a>

    <a href="calculus/" class="course-card card-calculus">
      <div class="icon">∫</div>
      <div class="label">공통수학 1</div>
      <h2>미적분 (Calculus)</h2>
      <p>수열, 함수의 극한, 미분·적분 등 공통수학1 단원 OX 퀴즈</p>
      <div class="arrow">→</div>
    </a>

    <a href="probability/" class="course-card card-prob">
      <div class="icon">🎲</div>
      <div class="label">확률과 통계</div>
      <h2>확률과 통계</h2>
      <p>순열·조합, 확률, 통계적 추정 등 확률과 통계 단원 OX 퀴즈</p>
      <div class="arrow">→</div>
    </a>
  </div>

  <footer>© 2025 MathStart. All rights reserved.</footer>
</body>
</html>
